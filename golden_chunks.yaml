# golden_chunks.yaml
# -------------------
# Ground-truth retrieval labels for Vitelis KPI benchmarking.
#
# HOW TO USE
# ----------
# 1. Set the environment variable:
#        GOLDEN_CHUNKS_PATH=/path/to/golden_chunks.yaml
# 2. Chunk IDs follow the pattern:  {source_id}::chunk_{idx}
#    where source_id = MD5(url)[:8] from the scraper at time of that run.
# 3. Populate this file with 5-10 manually verified examples per KPI pillar.
#    The Hit Rate, MRR, and nDCG metrics will be meaningful immediately.
# 4. relevance values:
#        1 = relevant  (chunk contains useful signal for this KPI)
#        2 = highly relevant  (chunk is a primary, direct source of evidence)
#        3 = essential  (chunk is the definitive source — ideal top-1 result)
#
# FORMAT
# ------
# <kpi_id>:                     # must match KPIDefinition.kpi_id exactly
#   - chunk_id: "<source_id>::chunk_<idx>"
#     relevance: <1|2|3>        # optional; defaults to 1
#
# NOTE: chunk_0 is used as best estimate. To get exact chunk indices run:
#     collection.get(include=["metadatas"])["ids"]
# ─────────────────────────────────────────────────────────────────────────────

