    - title: Does the company’s C-level publicly communicate a defined AI strategy?
      score: 4
      reasoning: |
        Multiple high-confidence disclosures show MTN’s C-suite and Board actively communicating and governing a clearly defined AI strategy.
        • Board-level engagement: The Board and its Social, Ethics & Sustainability Committee have explicit oversight of Responsible AI matters [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf), and the July 2024 Board strategy session reviewed AI’s strategic relevance and approved direction [[25]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf).
        • Formal governance architecture: A Group AI Policy was approved in 2024 [[25]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf) and an AI Steering Committee/sub-committee of the Executive Committee drives execution [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[10]](https://www.mtn.com/tag/investors).
        • Cross-functional operating model: The Group has established an in-house AI Centre of Excellence and a Cloud CoE to co-ordinate AI activities across all business domains, staffed by >300 engineers [[31]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[20]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).
        • C-level public communication: CEO Ralph Mupita and GCTIO Mazen Mroué repeatedly position AI as the engine of MTN’s growth in public forums, calling for urgent adoption and outlining strategic priorities [[11]](https://iafrica.com/mtn-ceo-warns-africa-must-be-paranoid-about-falling-behind-in-the-global-ai-race)[[18]](https://www.mtn.com/tag/leadership)[[30]](https://www.ecofinagency.com/news-services/1310-49502-mtn-chief-urges-urgent-action-to-prevent-africa-s-ai-divide).
        • Ethical & regulatory engagement: MTN publishes a Responsible AI Policy with the BRAIN framework and engages regulators/industry bodies on responsible AI ecosystems [[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).
        • Partner ecosystem: MTN has signed enterprise-grade OpenAI and other cloud partnerships to deliver large-language-model solutions at scale [[31]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[20]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).
        • Workforce enablement: Training programmes and communications to employees on Responsible AI governance are in place [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf), and HR leadership highlights preparing “MTNers” for AI-human workforce models [[9]](https://technologytimes.ng/mtn-focus-on-human-capital-amid-ai-revolution).
        While numeric reskilling targets or publicly reported change KPIs are not yet disclosed, the presence of Board oversight, formal governance bodies, cross-functional CoEs and public C-suite advocacy exceeds the ‘Medium’ threshold and aligns with most elements of the ‘Medium-High’ criterion. The absence of quantified reskilling KPIs and union/regulator agreements prevents a ‘High’ rating. Therefore, performance is classified as Medium-High with a score of 4.
