    - title: How mature and effective are the company’s change management and communication practices in enabling AI adoption?
      score: 5
      reasoning: |
        Multiple high-confidence sources indicate that MTN has embedded a structured, Group-wide change-management and communication framework to drive AI adoption.

        • Leadership alignment: A dedicated AI Steering Committee guides “responsible, valuable and consistent AI adoption through a shared AI strategy” [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf). Board-level and ExCo oversight of Responsible AI is formally in place, ensuring top-down alignment on change objectives [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf)[[17]](https://www.mtn.com/tag/investors).

        • Company-wide policy framework: The Responsible AI Policy, anchored in the BRAIN principles, has been approved for the entire Group and is positioned as part of “a holistic suite of policies” rather than a standalone document [[6]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[7]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).

        • Institutionalised communication & training: The policy rollout explicitly includes “training initiatives, awareness and communication campaigns and socialisation plans” [[6]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf). Directors and employees “receive regular communications regarding Responsible AI governance updates” and participate in “regular training sessions” on ethical principles and governance standards [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).

        • Coordinated change infrastructure: An in-house AI Centre of Excellence and Cloud CoE coordinate AI activities across the Group, backed by 300+ engineers, providing an organised platform to drive and communicate change consistently across business units [[15]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[2]](https://www.mtn.com/tag/network-as-a-service).

        • Workforce engagement: HR leadership states that 2024 focuses on helping “MTNers embrace change” through human-AI workforce models and neuroscience-based talent programmes, confirming proactive, ongoing engagement with employees about AI-driven transformation [[18]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf)[[14]](https://technologytimes.ng/mtn-focus-on-human-capital-amid-ai-revolution).

        • Continuous improvement loop: The Group commits to “monitoring global developments” and evolving its AI policy, indicating feedback mechanisms and transparent updates to stakeholders [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[23]](https://www.mtn.com/wp-content/uploads/2024/04/MTN-Group-FY-23-Integrated-Annual-Report-1.pdf).

        The breadth (Group-wide), depth (policy, governance, CoEs) and ongoing nature (regular communications, training, iterative updates) of these initiatives align with the Quality-Criteria level 5 definition: “Fully institutionalized change management with transparent, ongoing communication.” No evidence suggests gaps or reactive behaviour. Therefore, the driver is scored High (5).
