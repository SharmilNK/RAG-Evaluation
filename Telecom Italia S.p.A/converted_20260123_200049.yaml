    - title: How structured and scalable is experimentation (PoCs/pilots) with clear success metrics and governance?
      score: 3
      reasoning: |
        MTN has put in place several structural elements that move experimentation beyond ad-hoc pilots, but evidence stops short of showing a fully scaled, metrics-driven engine.

        • Centralised governance and funding: An AI Centre of Excellence and a parallel Cloud CoE co-ordinate AI activities and provide a Group-wide operating model, indicating dedicated budgets and formal oversight for PoCs [[16]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[12]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future)[[14]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[20]](https://www.mtn.com/tag/network-as-a-service)[[21]](https://www.mtn.com/tag/fintech-solutions).

        • Formal gating and oversight: A Responsible AI Policy, an Executive Committee sub-committee for AI, and the BRaiN framework set governance checkpoints before solutions progress, demonstrating that experiments pass through defined gates [[20]](https://www.mtn.com/tag/network-as-a-service)[[15]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).

        • Pipeline of pilots/trials: The Group commits to “proof points of value across all AI domains” and is running direct-to-cell LEO satellite trials and other pilot partnerships, signalling an organised flow of PoCs rather than isolated tests [[11]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf).

        • Pre-defined success metrics: In the Customer Experience agile programme, each of the seven journeys carried explicit ROI measures tied to the CEO’s KPIs, confirming that success/fail criteria are specified up-front for at least part of the portfolio [[1]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).

        • Regular review cadence: Monthly Exco tracking and dedicated steering-committee governance of 17 priority programmes provide a standing forum for reviewing progress and decisions on continuation or scale-up [[8]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[10]](https://www.mtn.com/wp-content/uploads/2024/04/MTN-Group-FY-23-Integrated-Annual-Report-1.pdf).

        • Evidence of cycle-time improvement: The procurement agile scrum team reports a 55 % reduction in time-to-market for a major RFP, hinting at lessons feeding back into faster execution [[1]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).

        Gap to next tier:
        – No quantitative proof that ≥75 % of pilots are formally evaluated or that learnings are consistently codified and reused across the Group.
        – Only isolated examples of time-to-production shortening; no year-on-year hit-rate statistics were provided.

        Given clear structures, success metrics for selected programmes, and standing governance—but lacking hard evidence of evaluation coverage and systematic learning reuse—the driver aligns best with the “Medium” tier (score 3).
