    - title: Has the company acquired AI-specific tools, platforms, or software assets?
      score: 1
      reasoning: |
        The KPI driver explicitly asks whether MTN has *acquired* AI-specific tools, platforms, or software assets.  The consolidated raw data point derived from a scan of all available disclosures and news coverage since 2023 shows **“Number of AI-related acquisitions = 0.”**  All AI activity reported for MTN is limited to:
        •  Strategic partnerships and service consumption – e.g., enterprise-grade OpenAI and other cloud-native services used to power chatbots Zigi and SiYa [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[5]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).
        •  Internal builds coordinated through the in-house AI Centre of Excellence and Cloud CoE with ~300 engineers [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[20]](https://www.techbooky.com/mtn-group-nigeria-implements-ai-for-network-optimisation).
        •  Memoranda of understanding and pilots with external technology firms for data-centre capacity (Genova programme) rather than outright takeovers of technology providers [[18]](https://neusroom.com/mtn-group-talks-build-ai-data-centres-across-africa)[[25]](https://nairametrics.com/2025/07/11/mtn-group-deploys-ai-for-network-optimisation-in-nigeria-sets-stage-for-africa-wide-rollout).

        None of the high-confidence claims (confidence ≥0.85) provide evidence of MTN purchasing a company or IP stack; all describe deployments, pilots, or collaborative agreements.  Therefore, against the evaluation rubric, MTN meets the **“Low”** threshold: 0–1 named AI tools/platforms acquired, with activity confined to pilots or partnerships rather than ownership.  The absence of any confirmed acquisitions translates to the minimum score of **1/5** for this driver.
