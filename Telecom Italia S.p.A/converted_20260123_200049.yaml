    - title: Is there a standardized, auditable methodology to estimate and realize ROI for AI (ex‑ante and ex‑post)?
      score: 2
      reasoning: |
        High-confidence disclosures emphasise a "disciplined approach to investing" and the need for "proof points of value" for AI initiatives [[16]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf)[[17]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[18]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[19]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf). These statements show that benefits are considered and some form of ex-ante value estimate is created, moving the company beyond purely anecdotal impact claims.

        However, the evidence stops short of describing a formal, standardised or audited ROI methodology. None of the cited sources indicate the presence of causal evaluation techniques, counterfactual analysis, or benefit realisation booked in financial systems—all requirements for Medium-High or High performance.

        A medium-confidence role description notes plans to "develop AI performance tracking mechanisms, defining clear KPIs" [[14]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn), implying the framework is still under construction rather than fully operational. Additional high-confidence material about identified use-cases delivering "tangible value" [[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation) and measured implementation reinforces intent but does not confirm systematic ex-post verification.

        Because the company shows evidence of basic value estimation and early KPI setting but lacks proof of standard templates, regular ex-post reviews, or auditability, its maturity most closely aligns with the Low-Medium criterion ("Excel-based TCO/benefit estimates; weak counterfactuals; ex-post rarely measured"). Accordingly, the driver is scored 2 out of 5.
