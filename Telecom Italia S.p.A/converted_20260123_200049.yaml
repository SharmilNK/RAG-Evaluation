    - title: To what extent is metadata (technical + business) captured and used to improve discovery, lineage, and MDM?
      score: 2
      reasoning: |
        Evidence shows the company has begun to consolidate data and establish governance, but stops short of demonstrating the robust metadata-management capabilities required for higher tiers.

        • A moderate-confidence claim describes the ADAM platform that “unif[ies] data from various markets” in a single BigQuery warehouse, enabling staff across 11 countries to work on common data sets [[6]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). Central warehousing usually generates system-level technical metadata (e.g., table names, schemas), so the minimum requirement of “partial technical metadata” is plausibly met.

        • High-confidence statements that “management drives and promotes the efficient, effective, secure use of the technology” [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-king-iv-assessment-report-2025.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf) and that dedicated data-privacy officers and champions are embedded in every market under a structured policy roll-out with 45 framework touch-points [[4]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf) indicate some degree of data governance and control. However, none of these sources mention a formal business glossary, lineage documentation, or master-data synchronisation.

        • No claim—high- or low-confidence—describes a central metadata repository, end-to-end lineage, active metadata services, automated enrichment, or measurable improvements in data discovery time.

        Given that the only concrete evidence relates to a unified warehouse (partial technical metadata) and generic governance commitments, while all higher-level attributes (business glossary, lineage, MDM integration, active metadata) are unsubstantiated, performance aligns best with Quality Criterion 2 (“Partial technical metadata; business glossary missing”).

        The final score is therefore set at 2 (Low-Medium). High-confidence but generic governance claims [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-king-iv-assessment-report-2025.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf)[[4]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf) do not outweigh the absence of specific metadata capabilities, and the sole technical integration claim carries only moderate confidence (0.61), further justifying a conservative rating.
