    - title: Are there structured alliances/JVs to accelerate AI value with shared IP, data, or distribution?
      score: 2
      reasoning: |
        Evidence shows MTN has begun forming external collaborations around AI, but the breadth, maturity and binding nature of these arrangements remain limited.

        • A single clearly-defined, signed growth partnership is reported with Powerfleet to “co-create solutions” that merge MTN’s network data with Powerfleet’s AIoT platform for enterprise clients [[20]](https://iafrica.com/powerfleet-and-mtn-partner-to-deliver-aiot-powered-supply-chain-intelligence-across-africa).  The description points to shared data flows and joint product development, satisfying the definition of a structured alliance, yet it is only one instance.

        • MTN is “in advanced negotiations with U.S. and European partners” to co-invest in a continent-wide network of AI-ready data centres through its Genova unit [[6]](https://tecknexus.com/african-ai-data-centres-mtn-and-cassava-scale-sovereign-compute) [[7]](https://neusroom.com/mtn-group-talks-build-ai-data-centres-across-africa) [[23]](https://www.tekedia.com/mtn-in-advanced-talks-with-us-european-firms-to-build-ai-data-centers-across-africa) [[28]](https://dcpulse.com/news/mtn-group-ai-data-centers-africa) [[30]](https://bisresearch.com/news/mtn-group-to-build-ai-driven-data-centers-across-africa).  These statements emphasise planned co-investment and shared infrastructure but confirm that agreements are still under negotiation, so they cannot be counted as binding alliances at this stage.

        • MTN’s AI strategy references “trials with LEO satellite partners” and ongoing pilots with multiple LEO operators [[4]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf).  While they illustrate collaborative intent, they are framed as pilots and exploratory engagements rather than formal joint ventures with shared IP or commercial accountability.

        • Other mentions of “strategic partnerships” for using OpenAI models and cloud services [[22]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future) appear to be vendor relationships rather than co-owned, risk-sharing alliances.

        Aggregating the evidence, MTN can point to one active, structured partnership and several early-stage or pilot collaborations—totalling fewer than the ≥4 binding alliances required for a Medium rating, with no proof yet of audited customer deployments or multi-country execution.  This places performance above the ‘Low’ threshold (zero alliances) but within the ‘Low-Medium’ band (1–3 collaborations, mainly non-binding and without demonstrated technical or commercial outputs).
