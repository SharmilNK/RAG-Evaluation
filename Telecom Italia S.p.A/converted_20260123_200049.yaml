    kpi_drivers:
    - title: What is the maturity of the Companies AI Strategy?
      score: 4
      reasoning: |
        Multiple high-confidence sources show MTN has moved well beyond isolated pilots to a coordinated, enterprise-level AI programme.
        • Strategy & governance – A Group-wide AI Steering Committee and Executive sub-committee oversee a “world-class Responsible AI Policy,” providing accountability, risk management and ethical standards [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[7]](https://www.mtn.com/tag/investors)[[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[6]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        • Operating model – An in-house AI Centre of Excellence and Cloud CoE orchestrate deployment across the Group, supported by more than 300 engineers and partnerships with OpenAI and other providers [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[12]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[9]](https://www.mtn.com/tag/digital-services).
        • Business alignment & scale – AI use-cases span Network, Finance, HR, Commercial and customer-facing chatbots (Zigi, SiYa), and are being "operationalised at scale" under the MTN Genova transformation to boost productivity, cut costs and lift revenue [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[15]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[18]](https://mtn-investor.com/mtn-ir2023/material-matters-impacting-value-creation.php)[[26]](https://www.engineeringnews.co.za/article/mtn-south-africa-takes-new-ai-step-as-it-launches-chatbot-2023-12-04).
        • Investment discipline – The company follows a disciplined roadmap, continually refining solutions and exploring additional use cases across diagnostic, predictive and prescriptive domains while tracking proof-points of value [[22]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[24]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[25]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf).
        • Workforce readiness – MTN is upskilling staff in analytics, data science and human-AI collaboration; 27 % of critical-capability learning hours are in analytics/data science and AI impact on jobs is explicitly managed [[19]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf)[[17]](https://technologytimes.ng/mtn-focus-on-human-capital-amid-ai-revolution).
        • Ethical maturity – Responsible-AI principles (Balance, Responsibility, Awareness, Integrity, Nurturing) are embedded and publicly reported, signalling formal ethics processes [[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[6]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        These elements match the Quality-4 definition: AI scaled across functions, mature data/ML platforms, tracked governance and skilled workforce.
        However, evidence that AI is the core business engine with automated governance and enterprise-wide measurable impact (Quality-5) is still emergent; no concrete KPI dashboards or proof that AI drives the majority of revenues were cited.
        Considering the preponderance of high-confidence claims (confidence indices ≥0.94 or 1) supporting maturity, and the absence of contradictory evidence, the driver is scored 4 – Medium-High performance.
