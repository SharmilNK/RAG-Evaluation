    - title: Evidence that AI strategy targets disruptive differentiation (new AI‑native offerings, pricing models, or channels) beyond efficiency.
      score: 3
      reasoning: |
        The company has moved beyond isolated ideation and efficiency-only narratives and now maintains a structured pipeline of AI initiatives with external customer touch-points, but it has not yet demonstrated multiple AI-native businesses in pilot with tracked unit economics or material disruptive revenue.

        • Living backlog & discovery experiments – MTN’s AI Centre of Excellence and the group-wide transformation programme “MTN Genova” coordinate “numerous AI use cases across key business domains” and are “operationalising AI at scale” [[15]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[13]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[16]](https://www.mtn.com/tag/digital-services) (CI 1–0.85). This shows an organised funnel rather than ad-hoc brainstorming.

        • At least one concept with customer validation – The OpenAI-powered customer service chatbot “Zigi” is live in MTN Nigeria and interacts with customers, while SiYa supports employees and is planned to guide customers in future purchases [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[12]](https://www.engineeringnews.co.za/article/mtn-south-africa-takes-new-ai-step-as-it-launches-chatbot-2023-12-04)[[20]](https://gadget.co.za/mtnsaisiya) (CI 0.94–0.67). These deployments evidence real-world validation beyond internal POCs.

        • Evidence of intent to monetise/disrupt – Management states the aim to create “AI as a service… making solutions accessible to competitors and similar businesses” and to "productise and monetise AI capabilities across industries" via MTN DataCo [[20]](https://gadget.co.za/mtnsaisiya)[[21]](https://www.glassdoor.com/job-listing/senior-manager-data-scientist-group-strategy-and-transformation-mtn-jv_ic2640385_ko0,63_ke64,67.htm?jl=1009898576986) (CI 0.67–0.41). The cloud-based Genova data-centre business is positioned to diversify revenue streams [[14]](https://neusroom.com/mtn-group-talks-build-ai-data-centres-across-africa) (CI 0.65). However, these remain at planning or early execution stages; no KPIs on unit economics or revenue contribution are reported.

        • Innovation governance track – An AI Steering Committee and Responsible-AI policy framework have been established to guide funding and risk management, but there is no explicit reference to staged venture-style investment gates or a dedicated AI venture arm [[9]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[24]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).

        • Missing elements for the next tier – The evidence does not confirm two or more AI-native offerings in pilot with tracked unit economics, nor does it quantify disruptive revenue >10 % of digital revenue. Therefore the requirements for Medium-High (4) or High (5) are not met.

        Weighting the consistently high confidence of claims describing a structured pipeline and live chatbot against the absence of hard metrics on pilots, funding stages, or disruptive revenue, the most defensible classification is Medium performance (score = 3).
