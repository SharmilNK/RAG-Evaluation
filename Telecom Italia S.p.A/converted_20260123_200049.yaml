    - title: Is there an enterprise‑wide canonical data model that underpins AI/analytics across domains?
      score: 3
      reasoning: |
        Evidence shows MTN has moved beyond ad-hoc, domain-specific data definitions but still lacks the full governance maturity required for higher tiers.

        • A dedicated Advanced Data Analytics Management (ADAM) platform unifies data from 11 African markets into a single BigQuery warehouse, "ensuring it addressed the unique challenges of each market while maintaining a consistent approach across the continent" [[7]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). The existence of a single warehouse and “consistent approach” indicates a canonical schema that spans multiple operating companies.

        • MTN DataCo is "building a multi-OpCo data ecosystem capable of scaling advanced analytics across internal functions (marketing, sales, finance, networks)" [[6]](https://www.glassdoor.com/job-listing/senior-manager-data-scientist-group-strategy-and-transformation-mtn-jv_ic2640385_ko0,63_ke64,67.htm?jl=1009898576986). This confirms that the shared model underpins at least four business domains, satisfying the scope element of the level-3 criterion.

        • High-confidence sources describe an enterprise-wide AI and Cloud Centre of Excellence that "co-ordinates AI activities across the Group" [[3]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation) and an operating model that spans Network, Finance, HR and Commercial functions [[2]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership). Such central coordination supports the presence of formal change and governance processes typically associated with a canonical model.

        However, no source explicitly references governed extension workflows, model-health KPIs, automated downstream validation, or evidence that breaking changes are rare—key requirements for tier-4 and tier-5 performance. The most concrete canonical-model evidence (ADAM) carries only moderate confidence (0.61), while higher-confidence claims are indirect, so an upward adjustment is not warranted.

        Balancing the moderately strong but not comprehensive evidence against the evaluation criteria, MTN’s performance aligns best with "Canonical model defined for priority domains; change process exists; mappings to sources documented" (Quality level 3). Accordingly, the driver is scored as Medium (3/5).
