    - title: Are role‑based learning paths and curricula established for AI (from execs to engineers) with certification?
      score: 3
      reasoning: |
        Multiple high-confidence sources show that MTN has moved well beyond ad-hoc AI training but has not yet demonstrated ≥80% certification of target roles required for a higher tier.

        • Role-based curricula: The Group has “career growth learning journeys based on the five critical skills essential for success” and has mapped these to data science, fintech, emerging tech, AI and ML roles [[18]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf). Functional teams received “comprehensive, blended learning curriculum” in the convergence skilling programme, covering commercial, marketing, product design and other distinct roles [[11]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).

        • Certification / assessments: Microsoft’s Enterprise Skills Initiative provides a “structured learning path” and has already resulted in more than 1 250 employee certifications across Azure, Data & AI and Security tracks [[13]](https://www.mtn.com/category/media-releases). In cloud, 130 on-premise engineers completed 220 platform-related certifications, and 375 additional staff finished 985 cloud courses [[11]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf). Certification implies formal assessment of proficiency.

        • Completion targets & tracking: MTN is “reskilling 8 000 people to equip them for emerging roles in areas like AI and cloud computing” and is “using predictive analytics … to address talent gaps,” demonstrating explicit reskilling targets and progress monitoring [[20]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf). The new ULearn platform shows uptake figures (10 700 users, 71 % of targeted learners accessed; 6 200 registrations and 1 240 completions in critical-skills programmes) evidencing completion tracking [[18]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf)[[19]](https://www.mtn.com/wp-content/uploads/2024/06/MTN-Group-FY-23-Sustainability-Report.pdf).

        • Skills mapping & on-the-job practice: The company undertakes “skills mapping and upskilling initiatives” and runs immersive ‘Demonstrated Learning’ programmes that combine simulation with real business projects, embedding learning into work [[11]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf)[[20]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf).

        Gap preventing Medium-High: None of the cited sources confirm that ≥80 % of all target roles are certified; the highest quantified figure is 71 % platform access and 1 250 certifications, leaving uncertainty about coverage relative to the full target population. Therefore, while MTN meets the Quality-3 definition (role-based curricula, assessments, targets), it falls short of the Quality-4 threshold.

        Balancing the consistently high claim-level confidence (most ≥0.94 or 1.0) with the absence of evidence for the 80 % certification benchmark, the appropriate rating is Medium (score = 3).
