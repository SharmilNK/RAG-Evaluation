    - title: Is AI development mainly in-house or partnership-based, and how does this affect risk and expertise?
      score: 5
      reasoning: |
        MTN Group’s approach clearly meets – and in several areas exceeds – the quality bar for a tier-5 (High) score.

        1. Robust in-house capability
        • The company has established a dedicated AI Centre of Excellence (CoE) and a parallel Cloud CoE that “co-ordinate AI activities across the Group”, supported by an internal software team of more than 300 engineers [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation) [[9]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future) [[14]](https://www.mtn.com/tag/digital-services) [[17]](https://www.mtn.com/tag/investors).  This evidences a mature, permanent internal platform rather than ad-hoc pilots.

        2. Extensive strategic partner network
        • MTN publicly highlights the use of “enterprise-grade OpenAI and cloud-native services” through a strategic Microsoft alliance and other hyperscaler relationships [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation) [[9]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).
        • Beyond hyperscalers, the firm references collaborations with start-ups on African-language LLMs, network vendors (e.g., Huawei, ZTE) and systems integrators, as well as impending deals with “US and European partners” to roll out AI-ready data-centres across multiple markets [[28]](https://neusroom.com/mtn-group-talks-build-ai-data-centres-across-africa).
        • The consolidated raw data point identifies 41 distinct, validated AI-related partnerships ranging from analytics specialists (Flytxt, SAS) to infrastructure players (Dell, Nokia, Ericsson).  Even treating the raw figure conservatively, MTN surpasses the ≥4-partner requirement for the highest tier.

        3. Evidence of co-development and multi-year commitments
        • Joint case-study style disclosures such as the Huawei innovation lab and OpenAI-powered Zigi/SiYa chatbots demonstrate co-built assets that move beyond simple vendor resale [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation) [[9]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).
        • The Genova transformation programme is described as “operationalising AI at scale” with long-term funding and Group-wide roll-out intent [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation) [[14]](https://www.mtn.com/tag/digital-services).

        4. Governance and risk mitigation
        • A “world-class Responsible AI Policy”, an Executive-level AI sub-committee and a disciplined investment approach are all publicly disclosed, showing that MTN is actively managing the risk side of a broad partner ecosystem [[17]](https://www.mtn.com/tag/investors) [[20]](https://www.mtn.com/tag/network-as-a-service).

        Alignment to tier-5 yardsticks
        • Balanced internal–external model – YES: mature CoE + large partner roster.
        • ≥4 strategic partners covering hyperscaler, network vendors, SI – YES: Microsoft/OpenAI, Huawei, ZTE, Dell, Ericsson, etc.
        • Multiple co-developed assets, open collaboration, multi-year funding – YES: Zigi/SiYa chatbots, Huawei innovation lab, Genova data-centre build-outs.

        Given this breadth of in-house expertise, depth of partnerships, and the presence of governance structures that explicitly address risk, MTN’s AI build strategy squarely fits the “High” performance definition, justifying a score of 5.
