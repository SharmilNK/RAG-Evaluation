    - title: What AI technologies/models are used, and what is the maturity of agent-based AI integrations in business operations?
      score: 3
      reasoning: |
        High-confidence sources confirm MTN has moved beyond traditional analytics into live Large-Language-Model deployments. The Group relaunched its customer-facing Zigi chatbot in Nigeria with an OpenAI back-end [[9]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[15]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[24]](https://cryptorank.io/news/feed/4267f-mtn-nigeria-transforms-customer-service) and operates the SiYa employee copilot inside Microsoft Teams in South Africa [[9]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[15]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[20]](https://www.engineeringnews.co.za/article/mtn-south-africa-takes-new-ai-step-as-it-launches-chatbot-2023-12-04)[[22]](https://gadget.co.za/mtnsaisiya). Both systems are described as in-production and delivering day-to-day assistance, meeting the KPI requirement for at least one LLM/RAG pilot in customer experience and an early assistive tool for employees. Additional evidence of an AI-driven MoMo mobile-money assistant [[26]](https://www.mtn.com/tag/mtn-mobile-money) and statements that enterprise-grade OpenAI services and local-language LLMs are being adopted across Network, Finance, HR and Commercial functions [[6]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[2]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[4]](https://www.mtn.com/tag/fintech-solutions) further corroborate multi-domain experimentation.

        However, the documentation stops short of proving agent-based, multi-workflow automation or mature MLOps tooling, and no data is provided on job postings referencing LLM, RAG or agent frameworks—criteria explicitly required for the Medium-High (≥6 postings) or High (≥10 postings) tiers. Governance structures (Responsible AI policy, AI CoE) are noted [[6]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[5]](https://www.mtn.com/tag/network-as-a-service)[[3]](https://www.mtn.com/tag/investors) but do not offset the absence of labour-market signals.

        Weighting the strong, consistent, high-confidence operational claims [[9]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[15]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[6]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation) against the missing evidence on hiring scale and agentic architecture, MTN squarely satisfies the ‘Medium’ definition: production LLM use in customer service, an employee copilot, and public case studies, but insufficient proof for the higher thresholds. Therefore the driver is scored 3 (Medium).
