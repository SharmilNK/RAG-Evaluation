    - title: How long has the company had operational AI solutions in place?
      score: 2
      reasoning: |
        The earliest high-confidence, externally reported AI deployments for the company appear in late-2023:
        • MTN re-launched its customer service chatbot “Zigi” with OpenAI capability in Nigeria and introduced the employee assistant “SiYa” in South Africa in December 2023 [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf) [[15]](https://www.mtn.com/wp-content/uploads/2024/04/MTN-Group-FY-23-Integrated-Annual-Report-1.pdf).
        • Group leadership communications in February 2024 describe 2024 as the shift "from hype to implementation," confirming that operational roll-out only started recently [[17]](https://technologytimes.ng/mtn-focus-on-human-capital-amid-ai-revolution).
        • Additional announcements show further deployments in 2024 (OpenAI integration into Zigi) [[23]](https://cryptorank.io/news/feed/4267f-mtn-nigeria-transforms-customer-service) and 2025 (network-traffic optimisation in Nigeria and other African markets) [[21]](https://nairametrics.com/2025/07/11/mtn-group-deploys-ai-for-network-optimisation-in-nigeria-sets-stage-for-africa-wide-rollout), reinforcing that large-scale operationalisation is very recent.

        There is some lower-confidence evidence of earlier activity – a vendor-management AI site-optimisation proof-of-concept in 2019 [[26]](https://www.mtn.com/power-management-tool) and references to an AI-enabled marketing initiative and MoMo chatbot in 2019 [[2]](https://www.researchgate.net/publication/378769168_Artificial_Intelligence_A_New_Trends_and_Strategy_For_Marketing_and_Advertising_Success_and_Performance_A_Study_Of_MTN_Nigeria_Plc). However, these sources carry substantially lower confidence scores (0.58 and 0.45) and describe pilots or proofs of concept rather than clearly operational, externally verified solutions. They therefore receive reduced weighting in the final assessment.

        Given that the first well-substantiated, high-confidence public evidence of operational AI solutions emerges in 2023, the company fits the evaluation definition of a “late adopter” (first execution 2023–2025). The supplementary, lower-confidence 2019 references are not sufficient to shift the company into the earlier “early-adopter” bracket.

        Accordingly, performance on the driver “Adoption speed of AI solutions” is classified as Low-Medium with a numerical score of 2.
