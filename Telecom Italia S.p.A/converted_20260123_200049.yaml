    - title: How rigorous is partner/vendor capability assessment (security, compliance, quality, delivery, integration)?
      score: 4
      reasoning: |
        Multiple high-confidence sources show that MTN applies a risk-based, evidence-driven process when selecting and monitoring partners.
        •  Due diligence is mandatory before onboarding; suppliers must sign MTN’s Supplier Code of Conduct and pass ESG screening, with identified risks mapped through the Joint Alliance for Corporate Social Responsibility third-party audit programme [[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf) (confidence 1) and the company reports KPI-level results from these audits [[12]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf) (0.94).
        •  A dedicated panel of external providers conducts desktop due-diligence, KYC and business-partner information checks, supplementing in-house capabilities [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf) (0.94).
        •  Risk-based compliance monitoring frameworks are in place "to proactively identify and address vulnerabilities," specifically calling out partner/trade compliance and sanctions exposure [[6]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[7]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[8]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[9]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf) (all confidence 1).
        •  Cyber-security requirements are contractually embedded; MTN integrates enhanced security standards (aligned with ISO 27001 and NIST) and includes an information-security annexure in all new or renewed third-party contracts, ensuring vendor compliance with its cyber-policies [[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf)[[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[7]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf) (conf. 1–0.94).
        •  MTN’s combined-assurance model coordinates internal and external assurance providers to validate that partner controls operate within defined risk thresholds, and the Board receives regular deep-dive reviews on key vendor-related risks [[3]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf)[[10]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf) (conf. 1).
        These practices exceed a simple checklist (Quality level 2) and meet Quality level 4 requirements: they are risk-based, use external and internal audits (JAC plus combined assurance) and embed corrective actions via contract clauses. However, the evidence stops short of demonstrating fully continuous, performance-based contracts with documented year-on-year vendor improvement, which is required for the highest tier.
        Hence, MTN’s partner/vendor capability assessment is assessed as MEDIUM-HIGH performance, corresponding to a score of 4 out of 5.
