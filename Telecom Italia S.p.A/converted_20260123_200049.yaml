    - title: To what degree has the company built AI literacy and encouraged knowledge sharing across the workforce?
      score: 5
      reasoning: |
        The company shows clear, enterprise-wide commitment to building AI literacy and facilitating knowledge exchange across the workforce.

        • Scale and reach of training – MTN is reskilling 8 000 employees for roles in AI and cloud computing, explicitly to "ensure our workforce remains competitive" [[19]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf). Cloud learning programmes have been opened to the entire workforce, with staff from call-centres, marketing, HR and other non-technical areas completing 985 cloud-related courses [[8]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).

        • Group-wide learning platforms – The MTN ULearn digital platform facilitates continuous AI upskilling, recording 6 200 registrations and 1 240 completions in critical skills such as AI and machine learning; 71 % of all targeted learners accessed the new platform within four months [[31]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf)[[29]](https://www.mtn.com/wp-content/uploads/2024/06/MTN-Group-FY-23-Sustainability-Report.pdf).

        • Structured programmes and communities of practice – An in-house AI Centre of Excellence (CoE) and a parallel Cloud CoE have been created to co-ordinate AI activities and share best practice across the Group’s functions and markets, supported by 300+ engineers [[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation). An AI Steering Committee provides cross-functional governance and alignment [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf). These structures constitute formal communities that promote peer learning and knowledge dissemination.

        • Responsible-AI awareness and ongoing communications – All directors and employees receive regular communications and training on the Responsible AI policy, ethical principles and governance standards, embedding broad literacy on AI capabilities and limitations [[14]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).

        • Continuous, multi-channel knowledge sharing – Events such as company-wide Career Week focused on future tech careers and high-value learning options, encouraging employees to explore AI-related pathways [[31]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf). The on-demand skill pool and predictive analytics-led skills mapping further reinforce an organisational culture of knowledge exchange [[19]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf).

        The breadth (all functions, multiple countries), depth (cloud, data, AI ethics, agile methods) and formal infrastructure (ULearn platform, CoEs, steering committees) exceed the “Structured AI learning and internal communities” threshold and align with the highest criterion of “Enterprise-wide AI literacy programmes, knowledge platforms, and culture of peer sharing.” Therefore, performance is classified as High with a score of 5.
