    - title: Do users have a governed self‑service data & AI portal/marketplace (catalog, access control, usage analytics)?
      score: 2
      reasoning: |
        Available evidence provides only partial indications that MTN has begun enabling self-service access to data and AI assets, but does not demonstrate the richer governance, cataloguing and automation features required for higher tiers.

        • A medium-confidence source describes the ADAM analytics platform built on Google Cloud that “allows MTN business users to take advantage of the technologies regardless of their IT experience,” signalling some level of self-service access to shared data assets [[3]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). However, the claim does not specify the existence of a governed data catalog, nor does it mention access-approval workflows, metadata freshness, or usage analytics—all elements needed to exceed the basic level.

        • High-confidence statements focus on organisational enablers such as an AI Centre of Excellence and Cloud CoE coordinating activities across the group [[6]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation), and on responsible-AI governance structures [[22]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf). While these demonstrate strategic commitment and governance at a policy level, they do not evidence a concrete self-service data marketplace with catalog, lineage, or automated access control.

        • Additional references to risk-management and AI Steering Committees [[11]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf) and in-house data-driven tools for supply-chain decision making [[15]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf) again highlight general analytics maturity but remain silent on cataloging, request fulfilment metrics, or portal usage analytics required for medium or higher performance tiers.

        Given that only one medium-confidence claim signals basic self-service capabilities and no sources substantiate curated catalogs, automated approvals, lineage, or high fulfilment rates, MTN is assessed at “Low-Medium” performance (score 2). This reflects probable existence of a nascent or basic catalog/portal but insufficient evidence to confirm the curated, governed and highly automated experience described in tiers 3-5.
