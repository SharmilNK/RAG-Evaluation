  - id: ai_organizational
    name: Organizational
    insights:
      overview: |
        Organizational performance is Medium-High (KPI Score 3.8): MTN’s strongest maturity dimension is the institutional scaffolding for AI—governance visibility, change enablement, and scaled workforce programs—creating a credible foundation for sustainable adoption. The reasoning highlights board and executive oversight, an AI Steering Committee, and a Group Responsible AI policy, supported by an AI/Cloud CoE model that drives cross-functional coordination. Change management, communication, and large-scale enablement activities are described as broad and persistent.

        Across drivers, MTN’s organizational “operating muscle” is apparent: governance and role clarity are well developed, AI literacy and knowledge sharing are scaled, and employee well-being/engagement practices are treated as part of transformation rather than a side effort. The organization also demonstrates meaningful external collaboration and partnerships, reinforcing its ability to execute across multiple markets.

        The gaps explain why MTN does not reach High. The reasoning stresses incomplete formalization of top accountable AI leadership (no clearly titled CAIO), immature shared AI KPI frameworks across business units, and limited external evidence of research depth and AI-specific talent visibility. AI risk appetite is referenced but not yet evidenced as domain-specific and operationalized through auditable lifecycle controls and dashboards, which reduces confidence in fully standardized governance at scale.

        To close the distance, MTN should: formalize a single accountable AI executive mandate; hard-wire shared AI OKRs and KPI dashboards across operating companies; build a live model risk management framework (inventory, standardized reviews, exception tracking); seek independent assurance to strengthen credibility; and increase transparency on leadership taxonomy and capability coverage. Key risks to monitor include accountability diffusion as scale increases, uneven control adoption across markets, and a growing gap between internal capability and externally visible evidence of maturity.
      deep_dives: |
        Organizational

        Definition: Organizational maturity evaluates whether the company has the leadership, governance, culture, talent systems, and change management to scale AI safely and consistently. It includes accountability structures, cross-functional collaboration, AI literacy and role-based learning, well-being and engagement during transformation, and compliance/ethics governance as organizational routines.

        What “good” looks like in telecom: High maturity typically includes a clearly designated accountable AI leader (or equivalent), board-visible governance, shared KPIs across business units, scaled AI literacy and role-based curricula, and a model risk management operating rhythm. Illustrative (not supplied in the input) indicators could include enterprise AI OKRs tied to business planning, auditable policy compliance across use cases, and a live model inventory reviewed by governance forums.

        MTN’s score (3.8) reflects strength in governance and enablement, with specific gaps in formalized accountability and measurement. The reasoning highlights board-level oversight, executive committees, and a Responsible AI policy; it also points to a CoE-based operating model and well-orchestrated change communications reaching large populations. These are structural strengths that reduce adoption friction and help standardize behavior across markets.

        Constraints are also explicit: no titled CAIO, leadership bench not fully enumerated, and enterprise-wide shared KPI frameworks are still emerging. The reasoning also notes that AI-labeled roles and externally visible research depth appear modest, suggesting either a real gap or a visibility gap that can still affect credibility and talent attraction.

        Target vs peers: MTN (3.8) is above Vodacom (3.4), Bharti Airtel (2.8), and Ooredoo (3.0), indicating comparatively stronger governance-and-change muscle than these peers. However, MTN is behind Orange (4.2) and e& (4.3), implying those peers have more institutionalized governance, ethics-by-design, and enterprise accountability mechanisms (as reflected by the higher scores).

        Implications & next steps: MTN’s path to High performance is to “close the operationalization gap” within governance. That means formalizing enterprise accountability (CAIO-equivalent mandate), embedding shared KPIs across operating companies, and industrializing model risk management through inventories, standardized reviews, and exception tracking. Because MTN’s Organizational maturity is already strong, improvements here will also unlock Execution gains—by making value tracking, monitoring, and portfolio discipline part of the operating rhythm rather than an optional practice.

        Evidence limits: The analysis is based strictly on the provided KPI score and the category reasoning narrative, and peer comparisons use only the provided scores. No explicit evidence supplied; inference from the KPI reasoning patterns.
