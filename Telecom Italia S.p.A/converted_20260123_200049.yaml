    - title: What business‑visible monitoring exists for models in production (performance, drift, data quality, incidents) and who sees it?
      score: 2
      reasoning: |
        Evidence that MTN has business-visible monitoring for production AI models is limited and largely centred on early-stage or technically focused capabilities.

        •  A programme statement lists the need to “develop AI performance tracking mechanisms” with clear KPIs to optimise model performance [[2]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn). This shows that some form of monitoring is on the roadmap, but it is framed as a development activity rather than an already-operational system, pointing to a basic maturity level.

        •  Network predictive-maintenance use cases rely on real-time systems that “detect anomalies such as signal drops, power outages, or overheating, enabling swift intervention by technical teams” [[5]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). While this confirms live monitoring of model outputs, it is oriented to technical operations. There is no indication that the information is exposed through dashboards to business stakeholders or that business KPIs are incorporated.

        •  Broader governance references (AI Steering Committee, Responsible-AI oversight) demonstrate organisational attention to AI risk management but do not provide concrete details on dashboards, drift alerts or coverage of deployed models [[7]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[12]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).

        Taken together, the evidence supports the existence of basic, technology-centric monitoring with manual or engineer-facing alerting, but lacks proof of unified health views, business metrics, or role-based dashboards required for higher tiers. Because the strongest claims are of moderate confidence and emphasise work-in-progress rather than fully embedded capabilities, the driver is best classified as Low-Medium (score 2).
