improvement_levers:
- title: Install enterprise AI value-realization architecture with CFO-grade benefit booking
  journey_stage: Strategy & Governance
  validation_score: 92
  impact: High
  effort: Medium
  improvement_type: Value realization discipline
  functions_to_engage:
  - Group Finance
  - Strategy & Transformation
  - AI/Cloud CoE
  - Data & Analytics
  - Technology
  - Customer Operations
  - Network Operations
  - Risk & Compliance
  pain_point:
    title: Scaled activity without scaled, auditable outcomes
    description: MTN’s AI program is described as well-orchestrated with board-sanctioned governance and 6–10 use cases, but evidence highlights incomplete, programmatic value tracking, limited financially quantified scaled use cases, and monitoring that is largely technical rather than business-visible. The structural risk is that spend and complexity scale faster than proven benefits, reducing capital efficiency and weakening executive confidence in prioritization.
  solution:
    title: CFO-coowned benefits engine with standard KPIs and gates
    description: Create a Group-wide AI value-realization system that makes every use case measurable, comparable, and finance-bookable. Define a standard KPI library (e.g., AHT, care deflection, churn proxies, energy/OPEX, call quality, network reliability measures), a single benefits methodology (baseline, counterfactual, attribution, and realization timing), and stage-gates that require evidence before scaling across opcos. Stand up a quarterly Value Review chaired by CFO/CTO with kill/pivot/scale decisions, and publish an internal “AI value scorecard” that links model health and adoption to P&L and operational outcomes. This shifts behavior from shipping to proving, and funds scale only when outcomes are repeatable.
  deep_dive: |
    1. Why This Matters Now (Trigger & Urgency)
    MTN’s scores show a common inflection point: Strategy is solid (3.4) and Organizational maturity is strong (3.8), but Execution is lower (2.9) and evidence explicitly calls out incomplete programmatic value tracking and limited financially quantified scaled use cases. That combination typically creates a “confidence gap” at the moment AI cost, model risk, and portfolio breadth begin to expand. Without CFO-grade benefit booking, the organization risks scaling activity faster than returns, and governance becomes procedural rather than outcome-led. No public evidence supplied — inference from industry maturity patterns.

    2. Opportunity Scope & Boundary Conditions
    Scope: all AI initiatives that materially affect CX, network performance, operational efficiency, or revenue levers, including the current 6–10 diversified use cases referenced in evidence. The boundary condition is that MTN already has board-sanctioned Responsible AI governance and an AI/Cloud CoE with decision rights; the lever is not to rebuild governance, but to connect delivery to enterprise benefits and funding decisions. Deliverables must be auditable and comparable across operating companies. No public evidence supplied — inference from industry maturity patterns.

    3. External Signals & Benchmarks (Outside-In Proof)
    Across the benchmark set, MTN’s Execution score (2.9) trails Orange (3.8), e& (3.7), Vodacom (3.3), and Bharti Airtel (3.3), while MTN’s Strategy (3.4) is below e& (4.3) and slightly below Orange (3.7) and Vodacom (3.8). The evidence themes explain the gap: MTN is described as having strong enablers and integration but lagging standardized ROI methodology and group-wide KPI architecture, while higher-scoring peers are characterized by broader ROI-positive portfolios and more consistent outcome linkage. No public evidence supplied — inference from industry maturity patterns.

    4. Root-Cause Hypotheses (Consulting Diagnostic Lens)
    H1 (Governance/decision rights): Value decisions are not CFO-coowned and therefore benefits are not booked consistently. Diagnostic question: Who signs off ex-ante business cases and ex-post realization, and is Finance accountable for variance?
    H2 (Incentives/ownership): Product and ops teams are rewarded for delivery output (deployments) more than net value and adoption. Diagnostic question: What proportion of AI OKRs are outcome KPIs vs delivery milestones?
    H3 (Process/workflows): Stage-gates exist for compliance, but not for value evidence (baseline/counterfactual) before scale-out. Diagnostic question: What evidence is required to move from pilot to multi-opco rollout?
    H4 (Data/tooling maturity): Monitoring is largely technical, so executives cannot see value and risk in one view. Diagnostic question: Do dashboards connect model health to operational KPIs and P&L metrics?
    H5 (Vendor/ecosystem complexity): Partner-delivered solutions obscure unit economics and attribution. Diagnostic question: Can MTN attribute value and cost by use case and by supplier/stack component?
    H6 (Portfolio management): Kill rates and horizon mix are not explicit, so portfolio sprawl increases. Diagnostic question: What is the quarterly process to stop or re-scope underperforming initiatives?
    No public evidence supplied — inference from industry maturity patterns.

    5. Value Mechanics (How Value Is Actually Created)
    AI creates value only when it changes decisions and behaviors in core workflows at scale. For MTN, evidence already cites outcomes such as reductions in contact volumes, improved call quality, and energy/OPEX savings, but the mechanism to compound that value is repeatability: standardized baselines, consistent attribution, and a clear “scale pattern” that can be deployed across markets. The benefits engine turns each use case into a measurable asset with known unit economics, making prioritization and funding rational rather than narrative-driven. No public evidence supplied — inference from industry maturity patterns.

    6. Quantified Value Ranges (Directional but Serious)
    Directional ranges (not precise):
    Low case: low single-digit % improvement in a few targeted operational KPIs with limited cross-opco replication.
    Base case: mid single-digit % improvement across multiple functions as proven use cases scale beyond isolated markets; measurable OPEX avoidance and service quality gains.
    High case: sustained multi-function improvements with consistent benefit booking and scale patterns, enabling material margin support and reduced run-cost of AI through better prioritization.
    Not quantified in provided evidence; value expected via cost reduction, risk avoidance, and/or revenue uplift. No public evidence supplied — inference from industry maturity patterns.

    7. Execution Complexity & Risk Profile
    Complexity is medium because the main build is operating discipline, not net-new technology: define KPI taxonomy, implement finance sign-off, and establish stage-gate governance. Risks: (i) political friction if benefits booking reallocates credit, (ii) baseline quality issues across opcos, and (iii) over-bureaucratization slowing delivery. Mitigation: start with a small set of KPIs tied to existing evidence (CX contact volumes, call quality, energy/OPEX), then expand. No public evidence supplied — inference from industry maturity patterns.

    8. Implementation Blueprint (How Alix Would Run It)
    Phase 1 (2–4 weeks): Rapid diagnostic of top 10–15 AI initiatives, current baselines, and Finance involvement; define standard benefit taxonomy and evidence requirements; establish a Value Review cadence and a “single portfolio view.” Decision gate: agree on KPI library and ownership.
    Phase 2: Pilot/proof of value on 3–5 initiatives already integrated into workflows; implement ex-ante/ex-post templates; build executive dashboard connecting model and business KPIs. Decision gate: kill/pivot/scale based on realized benefits.
    Phase 3: Scale and institutionalize across opcos; embed into annual planning; automate reporting; enforce portfolio hygiene with explicit kill-rate targets. Governance cadence: monthly working group, quarterly ExCo Value Review. No public evidence supplied — inference from industry maturity patterns.

    9. Role of AlixPartners vs. Client
    Alix: design the benefits framework, run the rapid diagnostic, establish governance rituals, and build practical templates and dashboards that link model performance to operational KPIs. Client: provide baseline data, nominate accountable owners in Finance and the CoE, and enforce stage-gate decisions across opcos. Jointly: run the first two quarterly Value Reviews to hard-wire behavior. No public evidence supplied — inference from industry maturity patterns.

    10. Proof Points & Analogous Cases
    In telecom, execution maturity rises when firms move from “use case stories” to CFO-grade portfolio tracking; this typically correlates with higher Execution scores like Orange (3.8) and e& (3.7) in the benchmark set. MTN’s evidence explicitly notes value being reported for isolated cases rather than through a group-wide KPI architecture, indicating a clear, addressable gap. No public evidence supplied — inference from industry maturity patterns.

    11. Key Questions to Validate with the Client
    Which 6–10 use cases are truly scaled vs localized? What benefits are currently quantified and who signs them off? Are baselines consistent across markets? What is the current kill-rate and how is it governed? How are partner costs allocated to use cases? What is the current executive view that connects model health, adoption, and business outcomes in one place? No public evidence supplied — inference from industry maturity patterns.

