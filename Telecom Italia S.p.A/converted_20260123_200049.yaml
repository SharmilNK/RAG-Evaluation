    - title: Is risk appetite for AI explicitly defined (by domain/use case) and used for approvals and guardrails?
      score: 3
      reasoning: |
        • MTN has an approved Group-wide Responsible AI Policy (2024) that establishes the BRaiN framework and “minimum governance and safety requirements applicable to all AI system deployments across MTN,” covering fairness, privacy, human-rights and other sensitive risk areas [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf)[[13]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf).
        • Multiple high-confidence claims state that all AI and algorithm use is “guided by our Responsible AI Policy” to ensure that the necessary guardrails are in place [[1]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).  Operating-company Executive Committees are accountable for “ensuring compliance with the MTN Responsible AI Policy,” indicating that approvals for AI projects are expected to reference those guardrails [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).
        • Enterprise-wide ERM documentation notes that MTN “translates risk appetite into actionable risk preferences for each principal risk” with “clear thresholds and KRIs” and embeds these thresholds in business planning and decision making [[17]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[18]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf).  Because ‘Technology/Information-security’ appears as a principal risk category, AI-related risks inherit defined thresholds that approvals must observe.
        • Oversight is provided by the Board (through the Social, Ethics & Sustainability Committee) and a dedicated Executive-level AI sub-committee, demonstrating formal governance alignment between stated risk appetite and approval processes [[11]](https://www.mtn.com/tag/investors)[[13]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf).

        These elements collectively satisfy the “Medium” quality criterion: risk thresholds for sensitive AI areas exist and are referenced during approvals/guard-rails.  However, the evidence stops short of (a) quantitative, domain-specific appetite statements, (b) automated workflow checks, or (c) documented exception tracking with owners and timelines.  Therefore MTN’s performance is assessed as Medium (score 3).
