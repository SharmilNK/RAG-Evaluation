    - title: To what extent has the company achieved measurable workforce efficiency through AI or GenAI — such as automation, task augmentation, or optimized hiring — resulting in stable or increased output with equal or fewer FTEs?
      score: 3
      reasoning: |
        Evidence of measurable workforce-efficiency benefits from AI at MTN is limited to a few, function-specific use cases.  The strongest quantitative datapoint is the 40 % year-on-year reduction in contact-centre call volumes after migrating operations in South Africa, Nigeria and Uganda to the Genesys Cloud CX platform [[27]](https://www.telecomtv.com/content/digital-platforms-services/mtn-bets-on-ai-and-cloud-for-customer-service-makeover-48607).  A 40 % deflection of interactions in customer service clearly exceeds the 20–30 % improvement threshold required for a Medium rating, but it is confined to a single function rather than the 2–3 functions required for a Medium-High score.

        Group-wide productivity metrics do not yet show a step-change: MTN’s Composite Productivity Performance Index (CPPI) remained broadly flat at 0.99 in 2023, inside a 0.95–1.05 band maintained for several years [[11]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).  Staff-cost-to-revenue ratios are similarly stable at ~6.8 % [[11]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf), and there is no disclosure of head-count reductions or hiring avoidance directly attributable to AI, as confirmed by management in the People Report and other filings [[11]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).  The raw data assessment of “no explicit FTE reduction reported due to AI/automation” further corroborates the limited enterprise-wide impact.

        High-confidence qualitative claims demonstrate that MTN has established an AI Centre of Excellence, a cloud CoE and is rolling out multiple use cases across Network, Finance, HR and Commercial domains [[7]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation), but these statements do not yet provide quantified efficiency outcomes.

        Weighting these points, the single-function, high-magnitude automation (40 % call-volume deflection) justifies placement in the Medium tier (score = 3).  The lack of multi-function evidence or documented workforce reduction prevents an upgrade to Medium-High, while the clear >20 % efficiency improvement in one major workflow keeps the score above Low-Medium.
