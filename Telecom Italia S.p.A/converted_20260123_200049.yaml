    - title: To what extent has the company established a mature, enterprise-wide data strategy and foundational architecture that effectively supports AI development and deployment?
      score: 4
      reasoning: 'MTN has an enterprise-wide data strategy and foundation that is centrally coordinated, governed, and scaled across markets, with clear time-scoped platform expansion that resolves prior footprint inconsistencies. 1) Central coordination and operating model: A Group AI Centre of Excellence (CoE) and a Cloud CoE coordinate AI activities across the Group and are staffed by 300+ engineers, evidencing central stewardship of data and platforms rather than isolated pilots [[1]](https://www.mtn.com/tag/fintech-solutions). 2) Unified governance: Responsible-AI policies (e.g., BRaiN) and Group-level governance (AI Steering Committee and an Executive Committee sub-committee) provide oversight across the model and data lifecycle, supporting consistent, scalable architecture across opcos [[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[3]](https://www.mtn.com/tag/investors)[[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf). 3) Infrastructure blueprint aligned to data/AI: MTN’s infrastructure strategy integrates fibre, subsea capacity and AI-enabled data centres to underpin digital workloads, indicating a planned backbone for data and AI at scale [[5]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf). 4) Time-bounded platform footprint: ADAM (Advanced Data Analytics Management) on Google Cloud centralised data from an initial cohort of 11 operating companies and processes trillions of records monthly [[6]](https://www.communicationstoday.co.in/mtn-genova-driving-africas-ai-potential-through-responsible-innovation); subsequent reporting shows Google Cloud (incl. Vertex AI) in use across 19 markets, reflecting expansion beyond the initial ADAM onboarding set [[7]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership). This resolves the 11 vs. 19 discrepancy by distinguishing the initial ADAM cohort from later Group-wide cloud adoption. 5) Cross-functional scale: AI use cases are operational across Network, Finance, HR and Commercial domains, indicating that the underlying architecture supports diverse production workloads [[8]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation). Together, these points meet the Quality 4 threshold: scaled AI across functions, mature platforms, and formal ethics. Absent explicit evidence of fully automated governance loops and continuous, adaptive re-platforming across all markets, a Level 5 rating is not yet warranted.'
