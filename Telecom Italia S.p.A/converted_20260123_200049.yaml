    kpi_drivers:
    - title: To what extent does the organization allocate and scale financial, human, and technological resources to AI initiatives in a way that delivers measurable business outcomes?
      score: 4
      reasoning: |
        Multiple high-confidence sources show that MTN has moved well beyond pilot-level spending on AI and is now allocating material financial, human and technological resources across the enterprise.
        •  Dedicated structures: The Group has created an AI Centre of Excellence and a Cloud CoE that coordinate AI activity across business units and are staffed by an internal software team of more than 300 engineers [[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[4]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[6]](https://www.mtn.com/tag/digital-services)[[7]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future)[[10]](https://www.mtn.com/tag/investors)[[16]](https://www.mtn.com/tag/network-as-a-service).
        •  Enterprise-wide scale: AI use cases are being executed in Network, Finance, HR and Commercial functions as part of the group-wide “MTN Genova” transformation programme that aims to boost productivity, reduce costs and grow revenue [[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[7]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).
        •  Sustained funding discipline: Management explicitly commits to “a disciplined approach to investing in the development of capabilities, governance, partnerships and proof points of value across all AI domains” and to continuing to refine solutions while expanding use cases that drive operational efficiency and revenue generation [[9]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[11]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf)[[12]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[14]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf).
        •  Governance and reprioritisation mechanisms: A Group-wide AI Policy, an AI Steering Committee and Responsible-AI oversight ensure that funding is tied to strategic KPIs and that projects are continuously reviewed for impact and risk [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[10]](https://www.mtn.com/tag/investors)[[19]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[20]](https://www.mtn.com/wp-content/uploads/2024/04/MTN-Group-FY-23-Integrated-Annual-Report-1.pdf).
        •  Measurable business outcomes: The company states it is already tracking “proof points of value” for CVM, network operations and cost efficiency [[9]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf) and is putting in place AI-performance KPIs and ROI tracking frameworks [[8]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn).
        •  Human-capital investment: MTN is reskilling 8 000 employees for AI/cloud roles and has instituted talent-acquisition and retention programmes targeted at data science and other critical AI capabilities, signalling sustained resource scaling beyond the technology budget alone [[13]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[12]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[15]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).

        While the documentation references value “proof points” and KPI development, it does not yet provide detailed ROI dashboards or quantified returns. Therefore, the evidence exceeds the “Medium” threshold of dedicated teams in select areas, and satisfies most of the “Medium-High” criterion—sustained scaling across functions with measurable impact—yet stops short of the full enterprise KPI-linked rigor required for a “High” score. Balancing the breadth of high-confidence evidence with the current absence of disclosed ROI metrics, the driver is rated Medium-High with a numerical score of 4.
