    - title: Proportion of AI use cases that are ROI-positive (benefits exceed total costs)
      score: 2
      reasoning: |
        Across the evidence set, MTN reports only a handful of AI initiatives where clear, quantifiable business benefits have been realised – for instance, fuel-saving algorithms for data-centre generators, dynamic energy management at cell sites and fibre-cut sensing that lowers downtime costs [[27]](https://www.mtn.com/tag/network-as-a-service), as well as a 40 % year-over-year reduction in call-centre volumes after migrating to an AI-enabled Genesys Cloud CX platform in South Africa [[21]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).  High-confidence statements note that the Group is still "building proof points of value" and "refining AI solutions while exploring additional use cases" [[11]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[6]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation), signalling that ROI confirmation is confined to pilot or early-stage deployments rather than the bulk of its AI portfolio.  No source indicates that a majority of the company’s AI use cases have yet demonstrated positive financial returns; instead MTN emphasises ongoing trials, governance and capability building [[5]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[19]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf), which implies a limited proportion of ROI-positive projects today.

        Given the absence of data showing that more than a small subset of use cases are already ROI-positive, and considering that only isolated examples of realised savings or revenue uplift are provided, the most defensible placement against the KPI thresholds is the Low-Medium tier (5–15 % of use cases ROI-positive), mapped to a score of 2.
