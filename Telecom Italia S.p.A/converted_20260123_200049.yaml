    - title: How well are cross-functional collaboration and governance structures established to coordinate AI initiatives across departments?
      score: 4
      reasoning: |
        Multiple high-confidence sources show that MTN has moved well beyond informal or siloed AI work into a structured, Group-wide governance set-up. Board-level bodies (the Board and the Social, Ethics & Sustainability Committee) have explicit oversight of Responsible AI across functions [[2]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf)[[21]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf).  A Group-approved AI Policy (2024) formalises accountability for all business units and markets [[15]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf)[[16]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-king-iv-assessment-report-2025.pdf).  Cross-functional forums exist at executive level: an AI Steering Committee coordinates a shared AI strategy and ensures consistent adoption Group-wide [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf), while a dedicated sub-committee of the Group Executive Committee provides execution governance and impact management for IT and AI initiatives [[6]](https://www.mtn.com/tag/network-as-a-service)[[7]](https://www.mtn.com/tag/fintech-solutions).  Operationally, an AI Centre of Excellence and a Cloud CoE coordinate implementation across Network, Finance, HR and Commercial domains, supported by >300 engineers, demonstrating day-to-day cross-department collaboration [[13]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[11]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).  Risk, ethics and regulatory playbooks are developed centrally and rolled out to operating companies, further embedding common processes [[21]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[22]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf).

        However, evidence on enterprise-wide, shared AI KPIs is still emerging—claims note that KPI-tracking mechanisms are being developed and that policy work remains “in progress” [[3]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn)[[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).  Because shared KPI frameworks are not yet fully implemented, the set-up aligns best with the criterion "Defined governance model and collaborative workflows" rather than the top-tier “fully integrated with shared KPIs.”  Weighting the predominance of high-confidence evidence of formal structures against the medium-confidence, still-developing KPI element results in a Medium-High performance tier and a numerical score of 4.
