    - title: To what extent does the company promote an ethical culture and mechanisms for continuous improvement in AI practices?
      score: 5
      reasoning: |
        Multiple high-confidence sources demonstrate that MTN goes well beyond merely having a written ethics policy and shows ethics-by-design embedded throughout the AI lifecycle with mechanisms for ongoing learning and formal review.

        • Formal, group-wide Responsible AI Policy and a detailed Responsible AI Position Statement are in place, anchored in the BRaiN framework and an internal AI playbook, setting minimum governance and safety requirements for all AI deployments and expressly covering fairness, transparency, accountability, privacy/security and human-rights considerations [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf) – satisfying the ‘defined policy’ element.

        • Oversight structures include a Board-level Social, Ethics & Sustainability Committee, an Executive-Committee sub-committee focused on AI, and an AI Steering Committee driving governance and continuous improvement of AI practices [[6]](https://www.mtn.com/tag/fintech-solutions)[[17]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-king-iv-assessment-report-2025.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf). This fulfils the criterion for an “active ethics committee”.

        • Continuous-improvement mechanisms are documented: the policy is explicitly stated to “evolve along with the latest AI advances” and will be rolled out with training, awareness and socialisation plans across the Group [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf). MTN conducts periodic ethics-maturity surveys (Ethisphere 2022), a 2023 Ethics Programme Risk Assessment across all operating companies and ongoing digital-human-rights impact assessments tied to election cycles – demonstrating recurring audits and learning loops [[13]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf)[[12]](https://www.mtn.com/wp-content/uploads/2024/06/MTN-Group-FY-23-Sustainability-Report.pdf)[[22]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf).

        • A formal training and awareness pipeline is embedded: regular mandatory ethics training for all employees, managers, executives and Board members, plus ethics-day campaigns and whistle-blowing awareness to reinforce culture-of-speaking-up principles [[13]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf)[[14]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).

        • Dedicated operational resources such as an AI Centre of Excellence and Cloud CoE coordinate ethical AI adoption, while risk-management frameworks and key-risk-indicator monitoring are embedded in every op-co, showing lifecycle integration and data-driven oversight [[10]](https://www.mtn.com/tag/investors)[[23]](https://mtn-investor.com/mtn-ir2023/material-matters-impacting-value-creation.php).

        Collectively, these elements meet—and in several places exceed—the ‘High’ quality criterion (“Ethics-by-design embedded across lifecycle; continuous learning and audits applied”). Therefore the appropriate rating is High (score 5).
