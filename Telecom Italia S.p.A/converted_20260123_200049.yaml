    - title: How well does the company report compliance with AI-related regulations?
      score: 3
      reasoning: |
        MTN publicly discloses an enterprise-wide Responsible AI Policy and associated governance structure overseen by a Board sub-committee and operating-company ExCos, signalling a formal approach to regulatory compliance [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf)[[14]](https://www.mtn.com/tag/investors).

        The company maps its controls to recognised external frameworks, explicitly referencing guidance from the NIST Cybersecurity Framework and ISO/IEC 27001:2013 when describing guardrails for AI and algorithm use [[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[3]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf).  This meets the medium-tier criterion of aligning to an external framework.

        Robust compliance infrastructure is further evidenced by a Group compliance department replicated in all operating companies, monthly reporting to senior management, and an internal control-improvement programme supported by risk-based monitoring and testing that covered 92 % of identified obligations in 2023 [[17]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf)[[6]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf)[[7]](https://www.mtn.com/wp-content/uploads/2024/06/MTN-Group-FY-23-Sustainability-Report.pdf).  These activities demonstrate active legal oversight and internal audits relevant to AI-related obligations.

        MTN also issues annual Transparency Reports that discuss AI’s human-rights impact, legal requests, and its approach to legislative compliance across multiple jurisdictions, indicating readiness for cross-border regulatory requirements and ongoing stakeholder reporting [[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[3]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).

        However, the disclosures do not mention independent third-party certifications (e.g., ISO/IEC 42001), regulator-confirmed assessments, or detailed, documented procedures specifically for high-risk AI systems or AI-specific supplier requirements.  Because these higher-tier elements are absent, MTN does not reach the Medium-High or High thresholds.

        Weighing the strong, high-confidence evidence of framework alignment, policy governance, and internal testing [confidence indices ~1.0] against the lack of certification or high-risk AI process detail, the company’s reporting quality aligns most closely with the ‘Medium’ tier (score 3).
