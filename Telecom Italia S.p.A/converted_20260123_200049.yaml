    - title: To what extent has the company maintained data security and confidentiality in its AI operations — including the presence or absence of data breaches, leaks, or other security incidents over the past five years?
      score: 3
      reasoning: |
        Corrected and consistent reasoning:

        - Scope and timeframe: Assessment covers the past five years and includes both confidentiality events (data breaches/leaks) and other material security incidents (e.g., denial-of-service) affecting MTN’s networks or customer-data environment, given the KPI wording [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).

        - Incident history:
          • One confirmed data-breach within the window: an April 2025 intrusion disclosed by MTN/regulators that exposed customer information in several markets, including approximately 5,700 Ghanaian subscribers [[28]](https://3news.com/business/mtn-ghana-confirms-data-breach-affected-approximately-5700-customers).
          • In 2023–2024, MTN experienced denial-of-service campaigns that caused service disruptions but, per available disclosures, did not involve confirmed data exfiltration; these remain relevant as security incidents within the KPI scope [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).

        - Controls and governance:
          • MTN operates a Group Information Security framework aligned with ISO/IEC 27001 and the NIST Cybersecurity Framework [[4]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf).
          • A Group Data Privacy & Protection Policy governs how personal data are collected, processed, stored, and disposed of, supported by designated information officers and staff training programmes [[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).
          • Internal reporting for 2023 notes no substantiated complaints of customer-privacy breaches or data loss, underscoring the absence of confirmed confidentiality failures prior to 2025 [[5]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf).
          • Board-level oversight has elevated cyber risk, with security-resilience roadmaps and crisis-simulation exercises to harden defences and improve response capabilities [[6]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf).

        - Evaluation against rubric: Robust enterprise-wide controls and governance, an otherwise clean pre-2025 record, and an isolated but confirmed breach in 2025—plus non-exfiltration security incidents handled without material customer-data loss—align with “Managed risk; isolated incidents handled effectively.” This sits below the “no incidents” level and above “partial remediation,” supporting a score of 3/5 [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[28]](https://3news.com/business/mtn-ghana-confirms-data-breach-affected-approximately-5700-customers)[[4]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf)[[5]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf)[[6]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf).
