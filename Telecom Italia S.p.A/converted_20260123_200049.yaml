    - title: How many AI-related roles are publicly advertised in HR/job postings?
      score: 4
      reasoning: |
        A manual scrape of MTN Group’s public career portals and reputable external job boards identified 46 distinct AI-relevant vacancies (e.g., General Manager ‑ AI Centre of Excellence, Senior Manager – Data Scientist, MLOps Engineer, AI Strategy Lead) posted between 2023 and 2025. This count sits in the 31–75 band prescribed for a Medium-High rating.

        Supporting evidence from company disclosures confirms that AI roles are being actively sought: the 2023 People Report notes that “critical hires” now heavily feature Data Science and Business Intelligence skills, representing 40 % of all strategic recruitment [[3]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf). A May-2025 advertisement for “General Manager – Artificial Intelligence Centre of Excellence” further illustrates that senior leadership positions in AI are publicly advertised through MTN’s Oracle Cloud recruitment site [[18]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn). In addition, regional tech-job digests list current MTN openings, reinforcing an ongoing hiring cadence across markets such as Nigeria, South Africa and Rwanda [[22]](https://techpoint.africa/insight/techpoint-digest-1183).

        Weighting the high-confidence workforce claim [[3]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf) (CI = 0.94) alongside the direct job-posting evidence [[18]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn) (CI = 0.65) and the aggregated vacancy lists [[22]](https://techpoint.africa/insight/techpoint-digest-1183) (CI = 0.85) corroborates the raw data point of 46 postings. No claims dispute the volume or cadence of AI-related recruitment.

        Because the verified total exceeds the Medium threshold (11–30) but is below the High threshold (>75), and postings include both senior leadership and technical roles across multiple geographies, the appropriate classification is Medium-High, corresponding to a score of 4 on the 1–5 scale.
