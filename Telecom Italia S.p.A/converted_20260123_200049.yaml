    - title: Is the firm actively shaping AI standards and regulation via consortia, position papers, and pilots?
      score: 3
      reasoning: |
        Multiple high-confidence sources confirm that MTN is more than a passive observer but stops short of industry leadership.

        • Engagements with major standard-setting bodies – GSMA, African Telecommunications Union (ATU), Smart Africa and the International Telecommunication Union (ITU) – are explicitly cited as part of a proactive regulatory advocacy programme aimed at AI-related issues such as data privacy and spectrum management [[20]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf).
        • MTN worked with the GSMA and a group of operators to co-create a Responsible AI Maturity Roadmap, demonstrating active contribution to an industry standard rather than mere membership [[4]](https://www.mtn.com/tag/network-as-a-service)[[5]](https://www.mtn.com/tag/fintech-solutions)[[6]](https://www.communicationstoday.co.in/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        • The company participates in GSMA-run ESG metrics and Digital Integrity pilots, indicating hands-on involvement in multi-stakeholder pilots that test and refine emerging standards [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).
        • Internal documentation states that MTN "actively engages with industry regulators and associations to contribute to the shaping of responsible AI ecosystems" across its markets [[12]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf), reinforcing the intention to influence regulation.

        Taken together, these high-confidence claims meet the Quality-3 definition: active contributions and participation in at least one standards-related pilot.

        However, no evidence was found of MTN holding chair or leadership positions within these bodies, nor of the company being recognised externally as a thought leader whose inputs measurably shape regulation. Consequently the assessment does not reach the Medium-High (4) or High (5) tiers.

        Balancing the breadth of engagement (strong) against the absence of documented leadership roles (gap), the confidence-weighted outcome is a Medium performance rating with a numerical score of 3.
