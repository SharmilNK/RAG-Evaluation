  pain_point:
    title: Thin external research/IP footprint and limited ecosystem leadership
    description: MTN’s Innovation score is Low–Medium (2.3) with evidence of few AI patent families, no verifiable research publications, no open-source contributions, and only one structured alliance alongside exploratory relationships. This limits defensibility, bargaining power with partners, and talent magnetism—risking MTN becoming an adept adopter rather than a creator.
  solution:
    title: Innovation operating system with IP pipeline and alliance scaling
    description: 'Stand up a lightweight but rigorous innovation operating system: define 2–3 priority domains, set targets for patent filings and publishable outputs, and create an invention-harvesting process connected to delivery teams. Launch a managed open-source program for non-differentiating components to build ecosystem credibility. Convert pilots into several binding, multi-market alliances with clear data/IP terms and measured outcomes, and scale MTN’s data-sharing model (evidence references Chenosis) to multiple partners with automated consent, monitoring, and SLA-backed privacy controls. This creates defensible assets while retaining disciplined governance.'
  deep_dive: |
    1. Why This Matters Now (Trigger & Urgency)
    MTN’s Innovation score (2.3) is materially below Strategy (3.4) and Organizational (3.8). Evidence explicitly calls out sparse outward-facing outputs: few patent families, no verifiable research publications, no open-source contributions, and modest academic engagement. This gap matters because AI advantage increasingly depends on defensible assets (IP, proprietary methods, ecosystem influence) and on talent attraction. Without an innovation engine, MTN risks dependence on partners and commoditization. No public evidence supplied — inference from industry maturity patterns.

    2. Opportunity Scope & Boundary Conditions
    Scope: build an innovation system that produces measurable outputs (patents, publications, open-source releases, alliance outcomes) while remaining aligned to Responsible AI governance and business priorities. Boundary conditions: MTN already has strong partner due diligence and governed experimentation; the missing piece is external creation velocity and scaling alliances into multi-market, outcome-tracked partnerships. The approach should not compromise sensitive data and must strengthen privacy controls as data sharing expands. No public evidence supplied — inference from industry maturity patterns.

    3. External Signals & Benchmarks (Outside-In Proof)
    Among competitors, Orange’s Innovation score is 3.8 with a strong research and IP engine, while e& is 3.0 with disciplined experimentation and alliances but thin IP and open source. Vodacom is 2.2 and Airtel 2.4, similar to MTN’s 2.3, and are also described as having weak external markers (minimal patents/publications/OSS). This pattern indicates that moving from 2.x to 3.x requires a deliberate IP and ecosystem strategy, not just more pilots. No public evidence supplied — inference from industry maturity patterns.

    4. Root-Cause Hypotheses (Consulting Diagnostic Lens)
    H1 (Governance/decision rights): Innovation outputs are not owned by a single accountable leader with targets. Diagnostic question: Who owns patents/publications/OSS KPIs and budget?
    H2 (Incentives/ownership): Delivery teams are not incentivized to produce publishable or patentable artifacts. Diagnostic question: Are invention disclosures and publications part of performance goals?
    H3 (Process/workflows): No systematic invention-harvesting process exists. Diagnostic question: How many invention disclosures were submitted in the last year?
    H4 (Data/tooling maturity): Data-sharing is policy-led and not yet automated for multi-partner scale. Diagnostic question: Are consent, access, and monitoring automated with auditable trails?
    H5 (Vendor/ecosystem complexity): Alliances remain exploratory without binding terms that create joint IP and measurable outcomes. Diagnostic question: How many alliances have defined IP and benefit-sharing terms?
    H6 (Talent/research): External research footprint is thin, limiting credibility. Diagnostic question: What is the publication pipeline and academic partnership model?
    No public evidence supplied — inference from industry maturity patterns.

    5. Value Mechanics (How Value Is Actually Created)
    A defensible innovation engine increases value by improving bargaining power with vendors and partners, attracting talent, and creating reusable assets that reduce cost and speed delivery. Patents and publications signal credibility and can protect differentiated approaches. Open-source releases of non-differentiating components build ecosystem gravity and can improve hiring. Scaled alliances with automated data-sharing controls create repeatable partnership revenue and accelerate innovation conversion into products and operational outcomes. No public evidence supplied — inference from industry maturity patterns.

    6. Quantified Value Ranges (Directional but Serious)
    Directional ranges (not precise):
    Low case: modest increase in external credibility and partner leverage with initial patents and publications.
    Base case: meaningful improvement in talent attraction and partnership economics as MTN produces consistent outputs and scales alliances.
    High case: defensible assets and ecosystem influence enable premium positioning for select offerings and reduce dependency risks.
    Not quantified in provided evidence; value expected via cost reduction, risk avoidance, and/or revenue uplift. No public evidence supplied — inference from industry maturity patterns.

    7. Execution Complexity & Risk Profile
    Effort is medium: it requires process and governance more than heavy platform builds, though scaling data-sharing controls may require technical investment. Risks include low-quality outputs (publishing for vanity), IP leakage, and compliance issues in data-sharing collaborations. Mitigate by anchoring outputs to 2–3 business domains, using strong legal/IP review, and embedding Responsible AI and privacy controls into collaboration patterns. No public evidence supplied — inference from industry maturity patterns.

    8. Implementation Blueprint (How Alix Would Run It)
    Phase 1 (2–4 weeks): Define innovation thesis and priority domains; set targets for patents/publications/OSS; stand up invention-harvesting process and governance; assess current alliances and data-sharing readiness. Decision gate: approve targets and governance.
    Phase 2: Pilot the engine—run invention workshops, draft first filings, establish 2–3 academic partnerships, release one non-sensitive open-source component, and convert one pilot alliance into a binding multi-market program with outcome KPIs and privacy controls. Decision gate: continue/scale based on output quality and adoption.
    Phase 3: Scale—expand alliance portfolio, institutionalize publication cadence, maintain OSS program, and automate multi-partner data-sharing (consent, monitoring, SLAs) to reduce risk as ecosystem expands. No public evidence supplied — inference from industry maturity patterns.

    9. Role of AlixPartners vs. Client
    Alix: design the innovation operating system, facilitate domain selection and target setting, establish governance rhythms, and help structure alliance and IP decision packs. Client: provide domain experts, fund priority partnerships, execute IP filings through legal, and maintain OSS and alliance programs. Jointly: ensure outputs link to measurable business outcomes and do not weaken privacy/security posture. No public evidence supplied — inference from industry maturity patterns.

    10. Proof Points & Analogous Cases
    The benchmark set demonstrates that Innovation maturity differs significantly: Orange’s higher score is associated with stronger research/IP and alliances, while MTN’s evidence explicitly cites thin patents/publications/OSS. MTN already has disciplined partner due diligence and governed experimentation; the missing component is outward creation and conversion of pilots into structured alliances with measurable outcomes—making this a targeted, feasible step-change. No public evidence supplied — inference from industry maturity patterns.

    11. Key Questions to Validate with the Client
    Which 2–3 domains should MTN “own” intellectually? What is the current count of patent families and publications, and what blocks output? What data-sharing model exists today and how scalable is it? How many alliances are structured vs exploratory? What governance exists for OSS and IP risk? How will MTN measure ecosystem impact (adoption, partner outcomes, talent metrics)? No public evidence supplied — inference from industry maturity patterns.

    12. Conversion to Mandate (Next Step)
    Entry project: “Innovation OS Stand-up” plus conversion of one pilot partnership into a structured, multi-market alliance with measured outcomes.
    Duration and team size: 8–14 weeks to stand up governance and launch first outputs; scale over 12–24 months.
    Decision required: approve innovation targets and a small ring-fenced budget for filings, partnerships, and OSS maintenance.
    90-day success: innovation thesis published internally, first invention-harvesting cycle completed, at least one patent/publication candidate in process, and one alliance restructured with clear data/IP terms and outcome KPIs. No public evidence supplied — inference from industry maturity patterns.
