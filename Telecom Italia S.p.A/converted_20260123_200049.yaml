    - title: How effectively does the organization foster international and multicultural collaboration in AI development and deployment?
      score: 4
      reasoning: |
        Multiple high-confidence sources show that the organisation routinely works with partners and teams that cross national and cultural boundaries.
        • Group-wide AI Centre of Excellence and Cloud CoE coordinate AI work for 16 operating countries and are staffed by 300+ engineers, giving the company an in-house, multicultural technical hub that supports projects across Africa [[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        • The firm has forged "strategic partnerships" with global players such as OpenAI and cloud-native providers and simultaneously nurtures collaborations with African start-ups building local-language LLMs, demonstrating simultaneous international and regional co-development [[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[3]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future)[[6]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership).
        • It publicly committed to fund Nigeria’s N-ATLAS open-source multilingual LLM and to mobilise resources from across its African footprint, a concrete example of cross-country cooperation aimed at linguistic inclusion [[11]](https://leadership.ng/mtn-group-funds-ai-language-inclusion-backs-nigerias-multilingual-dataset-initiative)[[17]](https://independent.ng/mtn-group-responds-to-nigerias-call-to-support-african-languages-research-for-ai)[[29]](https://businessday.ng/technology/article/mtn-pledges-support-for-nigerias-ai-language-initiative-to-empower-1-5bn-africans).
        • Senior leadership repeatedly calls for tripartite collaboration among governments, private sector and civil society to build African AI capacity, indicating that such partnerships are not ad-hoc but a strategic priority [[27]](https://www.mtn.com/mtn-group-calls-for-africa-to-act-urgently-on-ai-to-avoid-a-digital-underclass)[[20]](https://www.ecofinagency.com/news-services/1310-49502-mtn-chief-urges-urgent-action-to-prevent-africa-s-ai-divide).
        • Participation in industry initiatives such as the GSMA Responsible AI Maturity Roadmap reflects engagement with a wider, global telecom community on AI governance [[9]](https://www.mtn.com/tag/network-as-a-service)[[10]](https://www.mtn.com/tag/fintech-solutions).

        Taken together, this evidence matches the Quality-4 definition: “Regular multinational AI collaboration with cultural inclusion policies.”  However, the documentation stops short of proving that "deeply multicultural AI teams" and fully embedded global co-design practices are already in place. No data are provided on the demographic make-up of AI teams or on formalised inclusion metrics, so the threshold for the highest tier (5) is not fully met.

        The preponderance of high-confidence (≥0.85) claims supporting sustained multinational cooperation justifies a score of 4 (Medium-High), while the absence of direct evidence on embedded multicultural team composition holds the score below 5.
