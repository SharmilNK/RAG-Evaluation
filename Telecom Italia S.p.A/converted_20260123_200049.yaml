    - title: How clear are cross‑functional roles and responsibilities for AI (business, product, data, risk, legal) from idea to run?
      score: 4
      reasoning: |
        Multiple high-confidence sources show that MTN has moved beyond ad-hoc ownership and put an end-to-end operating model in place that assigns accountable owners across business, product, data, risk and legal functions.
        •  An in-house AI Centre of Excellence and a parallel Cloud CoE "co-ordinate AI activities across the Group" and sit within an "appropriate operating model" designed for AI delivery [[12]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        •  A dedicated AI Steering Committee has been created to "drive responsible, valuable and consistent AI adoption through a shared AI strategy" – indicating cross-functional representation and clear decision rights from idea to run [[4]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).
        •  Governance is tiered: a special sub-committee of the Executive Committee provides oversight and impact management for IT/AI, while the Board’s Social, Ethics & Sustainability Committee monitors Responsible AI performance, and each operating-company Executive Committee is charged with policy compliance [[5]](https://www.mtn.com/tag/network-as-a-service)[[7]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).
        •  MTN’s Responsible AI Policy, built on the BRaiN framework, explicitly embeds accountability, ethics, risk and compliance considerations into every stage of the AI life-cycle, ensuring that risk/legal voices are engaged before deployment of sensitive use cases [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).
        •  Evidence from the data-privacy programme shows how MTN operationalises governance touch-points (45 framework checkpoints, department-level champions, quarterly senior-management reviews), demonstrating the presence of stage-gated processes with named owners that are analogous to AI governance routines [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        Taken together, these elements satisfy the Quality-Criteria (4): an end-to-end operating model is codified and supported by governance stage gates and accountable owners, and it is rolled out Group-wide, implying coverage of most AI use cases.
        However, the documentation does not yet mention formal auditing of role clarity, SLA tracking, or quantitative evidence that >95 % of use cases follow the defined RACI. Because those measurement and continuous-improvement mechanisms required for the highest tier are not evidenced, the rating is capped at Medium-High with a score of 4.
