  - id: ai_execution
    name: Execution
    insights:
      overview: |
        Execution performance is Medium (KPI Score 2.9): MTN demonstrates strong delivery enablers and credible operational rollouts, but business-visible control and value discipline are not yet mature enough to consistently convert deployments into repeatable, audited outcomes. The reasoning highlights a capable execution engine—resourcing and governance are in place, multiple AI solutions are integrated into workflows, release cadence is healthy, and regulatory alignment is well developed. These are meaningful strengths that reduce “pilot churn” risk.

        Across drivers, MTN’s execution strengths cluster around input capacity and deployment mechanics: material resourcing, integration into core processes, and a balanced in-house/partner model. The narrative also points to ongoing improvement cycles and multi-domain operationalization (customer care, network operations, and internal assistants), indicating that AI is not confined to isolated experiments.

        The countervailing pattern is outcome rigor: only a limited set of use cases are documented as implemented and financially quantified, ROI-positive share appears low, and productivity gains are concentrated in one function. Monitoring exists but is largely technical and not business-visible, and there is no evidence of systematic external benchmarking for delivery speed, quality, or cost. Portfolio governance is present but lacks the auditable ROI methodology, unified dashboards, and stage-gate “kill/scale” discipline needed for repeatable enterprise performance.

        To close the distance, MTN should: implement a standardized, auditable ROI methodology with finance sign-off (ex-ante baselines and ex-post validation); stand up unified business-visible model monitoring linking model health to operational KPIs; introduce external delivery benchmarks and targets; formalize portfolio stage gates and explicit kill rates; and scale the few proven use cases across markets to increase the ROI-positive share. Key risks to monitor include scaling complexity ahead of control, value leakage due to weak measurement discipline, and incident exposure without business-facing oversight.
      deep_dives: |
        Execution

        Definition: Execution measures how effectively the organization turns AI strategy into production reality: funding and resourcing, delivery speed and release cadence, integration into business processes, operationalization and usage at scale, monitoring and control in production, ROI/benefits realization, portfolio management discipline, and regulatory compliance during rollout.

        What “good” looks like in telecom: Mature execution typically shows a repeatable delivery pipeline (idea-to-prod), robust MLOps and monitoring with role-based visibility, standardized ROI and benefits realization, and portfolio governance with stage gates. Illustrative (not supplied in the input) indicators could include a unified model inventory, drift and incident SLAs, externally benchmarked delivery throughput, and finance-booked benefits tracking.

        MTN’s score (2.9) reflects a credible deployment engine but an immature value-and-control layer. The reasoning emphasizes strong engines for delivery and compliance: MTN has invested in AI resourcing and governance, integrated AI into core workflows, maintained a healthy release cadence, and aligned with regulatory expectations. These strengths are consistent with an organization that can deploy at scale rather than remain stuck in pilots.

        However, the same reasoning explicitly identifies execution constraints: a limited number of use cases are documented as implemented and financially quantified; ROI-positive share is small; workforce efficiency gains are concentrated in one function; agentic automation is not pervasive; and monitoring is not business-visible. The weakest execution signal is the absence of external benchmarks for delivery speed/quality/cost, which typically prevents objective target-setting and continuous improvement at scale.

        Target vs peers: MTN (2.9) sits below Vodacom (3.3) and Bharti Airtel (3.3), indicating peers are executing more consistently even if not fully top-tier. The largest gaps are versus Orange (3.8) and e& (3.7), suggesting these peers combine delivery engines with stronger value capture and instrumentation. MTN is at parity with Ooredoo (2.9), implying similar maturity constraints in measurement discipline and control-plane execution.

        Implications & next steps: The path from 2.9 to Medium-High is less about “more pilots” and more about “enterprise economics and control.” MTN should institutionalize an auditable value-realization framework (standard templates, baselines, counterfactual logic, and finance booking), establish a unified model inventory with dashboards that business stakeholders can review, and introduce external benchmarks to set explicit delivery targets. Portfolio governance should shift from periodic tracking to stage-gated decisions with explicit scale/stop criteria, improving capital rotation and raising the share of ROI-positive use cases. Finally, MTN should expand measured productivity and automation beyond the current concentrated domains, using the same measurement discipline to prove gains.

        Evidence limits: The assessment is grounded only in the provided KPI score and reasoning narrative; peer comparisons use only the provided scores. No explicit evidence supplied; inference from the KPI reasoning patterns.
