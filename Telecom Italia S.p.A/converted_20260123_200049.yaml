    - title: Number of AI use cases demonstrating measurable financial impact (e.g., revenue, cost, or efficiency gains)
      score: 2
      reasoning: |
        Several AI initiatives have produced clearly quantified financial or efficiency benefits, but the evidence shows these remain a minority of MTN’s overall AI portfolio.

        • Concrete, measurable impact is documented for a limited set of use cases:
          – A site-optimisation proof-of-concept cut energy-related CO₂ emissions by 53 % while lowering power costs and avoiding network downtime [[28]](https://www.mtn.com/power-management-tool).
          – Predictive analytics and the ADAM platform delivered a 50 % improvement in key call-quality metrics with Meta, 40 % fewer contact-centre calls, and 1.46 M kWh annual energy savings on a 1 000-site network in South Africa [[8]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).

        • High-confidence strategic disclosures emphasise that the Group is still at the “proof-points of value” stage and is “exploring additional use cases to deliver impact” across revenue, network and efficiency domains [[3]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[4]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[5]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[6]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf).  These statements confirm that only a subset of the “numerous AI use cases” the Group has identified is already yielding measurable results.

        • Leadership communications repeat that MTN is “operationalising AI at scale” but are focused on building governance, capabilities and pilots rather than reporting widespread, monetised outcomes [[12]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[14]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[16]](https://www.mtn.com/tag/network-as-a-service).

        • No sources indicate a majority of use cases (≥26 %) have yet demonstrated hard financial returns, and the language of ongoing refinement and expansion suggests the proportion remains relatively small.

        Synthesising the concrete examples (showing some impact) with the broader context of many still-maturing pilots, the best fit with the KPI quality thresholds is 10–25 % of use cases showing measurable impact.  This corresponds to the Low-Medium tier and a numerical driver score of 2.
