    - title: Is the AI use‑case portfolio actively balanced by impact, feasibility, risk, and time‑to‑value with stage‑gates?
      score: 3
      reasoning: |
        Multiple high-confidence sources indicate that MTN manages its AI initiative portfolio through a structured process that goes well beyond an opportunistic backlog but stops short of the full horizon-mix and dynamic re-balancing seen in best-in-class programmes.

        • Governance and Investment Discipline – MTN states it "follows a disciplined approach to investing in the development of capabilities, governance, partnerships and proof points of value across all AI domains" [[10]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[11]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf).  This wording signals formal, criteria-based assessment rather than ad-hoc selection.

        • Explicit Risk Dimension – The Group-wide Responsible AI Policy is used "to mitigate potential risks" in every AI initiative [[10]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf) and embeds "accountability for AI decisions and actions" [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf), showing that risk is an explicit scoring factor, not just implicit.

        • Viability & Feasibility Checks – Board documentation highlights that each investment is evaluated for "viability and feasibility … assessing the key risks and returns" before capital is allocated [[16]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf), demonstrating multi-factor gating that includes impact and feasibility.

        • Ongoing Portfolio Monitoring – MTN conducts "continuous monthly ExCo tracking and reporting on strategic programmes" including AI roll-outs, with KPI dashboards to measure progress against strategic priorities [[12]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf).  The cadence of monthly executive reviews meets – and in frequency exceeds – the quarterly review expectation for a Medium rating.

        • Central Coordination of Use-cases – An in-house AI Centre of Excellence coordinates "numerous AI use cases across key business domains" [[18]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation), reinforcing that the portfolio is managed holistically rather than as isolated projects.

        However, no evidence is provided of:
        – A targeted horizon mix (e.g., 60/30/10) or capacity allocation by tier.
        – Quantified stage-gate thresholds (e.g., >70% investments passing) or transparent kill rates.
        – Explicit inclusion of data-readiness scoring or documented exit criteria for pilots.

        Given the clear presence of multi-criteria gating (impact, feasibility, risk) and regular executive reviews, MTN surpasses the Low-Medium threshold.  The absence of horizon balancing and metric-driven kill rates prevents it from reaching Medium-High.  Accordingly, performance is classified as Medium with a numeric score of 3.
