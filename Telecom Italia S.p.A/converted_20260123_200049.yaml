    - title: What percentage and number of staff work in AI development, data engineering, AI product management, etc.?
      score: 5
      reasoning: |
        The company reports a workforce of 17 569 employees as of year-end 2023 [[2]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).  It also states that its in-house AI Centre of Excellence, together with a supporting Software Solutions team, includes “more than 300 engineers” dedicated to coordinating and delivering AI solutions across the Group [[12]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).  Even when taken as a minimum bound (300), this equates to c.1.7 % of total headcount (300 ÷ 17 569), comfortably above the >1.50 % threshold set for the Quality-5 band.

        High-confidence corroboration comes from multiple sources.  Source 12 (confidence 1.0) provides the explicit headcount figure; Source 17 (0.65) repeats that the AI CoE is staffed by “more than 300 engineers,” confirming scale and resilience.  Further evidence of breadth and seniority is visible in the reference to enterprise-wide AI use cases across Network, Finance, HR and Commercial functions [[12]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation) and the establishment of both an AI CoE and a Cloud CoE—hallmarks of a platform-team operating model expected in the Medium-High to High tiers.

        Sustained hiring momentum is demonstrated by the Group’s 40 % “critical capability” hiring in 2023, with Data Science and Business Intelligence explicitly listed among those skills [[2]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).  The People Report notes that overall growth in management/leadership layers since 2021 has been driven by “the need for specialised talent to establish and sustain our platform businesses” [[2]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf), evidencing an ongoing talent pipeline rather than a one-off build-up.

        External branding around AI careers and capabilities is also visible: press releases emphasise that MTN is “operationalising AI at scale” under the ‘MTN Genova’ transformation programme and positions AI as the “engine reshaping businesses” [[12]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[17]](https://www.techbooky.com/mtn-group-nigeria-implements-ai-for-network-optimisation), reinforcing market-facing commitment to AI talent.

        Collectively, the >1.5 % staffing ratio, presence of a centralised AI platform team, continuous critical-skill hiring and strong external signalling satisfy all elements of the High performance criteria.  No higher-confidence claims contradict these data points, and lower-confidence items are directionally consistent.  Therefore, the driver is scored High (5).
