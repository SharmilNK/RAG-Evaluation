        Some evidence shows MTN funding African language data sets for future large-language-model work [[11]](https://leadership.ng/mtn-group-funds-ai-language-inclusion-backs-nigerias-multilingual-dataset-initiative)[[21]](https://independent.ng/mtn-group-responds-to-nigerias-call-to-support-african-languages-research-for-ai); however, this relates to data contribution rather than publishing or maintaining open-source AI repositories. None of the high-confidence claims (CI ≥ 0.9) reference stars, forks, external contributors, or public repositories—key indicators required to meet even a Low-Medium (tier 2) threshold. In effect, the evidence set is consistent in describing closed, enterprise-grade adoption and internal innovation, with silence on any open-source leadership or contributions.

        Given the total absence of documented public AI repositories and the clear emphasis on private, internally governed code bases, the company aligns with Quality Criterion 1 (“internal artificial-intelligence code exists only in private repositories; no public repositories”), warranting a Low performance classification and a score of 1 on the 1–5 scale.
