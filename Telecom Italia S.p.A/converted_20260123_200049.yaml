    - title: To what extent is the company’s hardware and cloud infrastructure capable of handling expanding AI workloads with high responsiveness, scalability, and cost-efficiency?
      score: 4
      reasoning: 'MTN’s infrastructure is hybrid and AI-optimised, combining elastic public cloud with sovereign AI-grade data centres, while acknowledging capacity and execution risks. 1) Scalable cloud foundation: Google Cloud (incl. Vertex AI) is used across 19 markets, providing elasticity and the ability to ramp AI workloads efficiently [[1]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). 2) Internal capability to scale: 130 engineers have earned 220 cloud certifications and 375 employees completed 985 cloud-computing courses, strengthening operational capacity for cloud-scale AI [[2]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf). 3) Sovereign AI infrastructure: The Genova initiative is building GPU-ready, Tier III data centres (e.g., a 9 MW, ~$240m Lagos facility) and positioning compute-as-a-service that bundles MTN’s 4G/5G, fibre and edge footprint, enhancing responsiveness and cost-optimised scaling for AI training and inference [[3]](https://tecknexus.com/african-ai-data-centres-mtn-and-cassava-scale-sovereign-compute)[[4]](https://bisresearch.com/news/mtn-group-to-build-ai-driven-data-centers-across-africa). 4) Execution risks: Africa’s current share of global AI data-centre capacity is <2%, with power/energy constraints and build-out timelines presenting risks; not all planned capacity is yet online [[5]](https://www.ecofinagency.com/news-digital/2209-48879-mtn-ceo-reveals-ai-data-centre-push-as-telcos-compete-for-africa-s-digital-future)[[6]](https://www.mobileworldlive.com/mtn/mtn-eyes-ai-data-centre-expansion-across-africa). Net: The hybrid estate already supports responsive, scalable AI workloads (Quality 4). The incomplete rollout and broader capacity constraints preclude a Level 5 at this stage. Note: This is consistent with the data-platform drivers by time-bounding coverage—19 markets references the broader Google Cloud footprint, not the initial ADAM onboarding set.'
