    - title: Do standardized, privacy‑preserving data‑sharing mechanisms exist across the ecosystem?
      score: 3
      reasoning: |
        MTN has established a formal, group-wide Data Privacy and Protection Policy that specifies how personal data is collected, processed, transferred and disposed of, and the Policy is supported by 45 framework touch-points, 19 detailed procedure chapters and several template controls for data-sharing agreements [[6]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[4]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf).  These documents constitute standardised legal and technical templates that can be reused with external parties, satisfying the “frameworks defined” element of the Medium quality threshold.

        Evidence of at least one live, privacy-preserving data-sharing arrangement is provided by the TransUnion Telco Data Score initiative: MTN shares call-detail-record (CDR) data with TransUnion via its Chenosis API marketplace, with explicit consumer consent managed under South Africa’s POPIA and MTN responsible for consent governance and secure connection provisioning [[8]](https://www.mtn.com/tag/sustainability)[[3]](https://www.mtn.com/tag/investors)[[7]](https://www.mtn.com/tag/leadership)[[10]](https://www.mtn.com/tag/digital-services)[[11]](https://www.mtn.com/tag/fintech-solutions).  The Chenosis set-up demonstrates a concrete, operational mechanism rather than an ad-hoc bilateral exchange and confirms that MTN has moved beyond purely internal policies to external implementation.

        Additional controls reinforce the standardisation claim: MTN appoints data-privacy officers in every operating market, has clear breach-reporting procedures, and conducts routine checks and awareness sessions to assure compliance with the group framework [[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[6]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).  Participation in industry initiatives such as the GSMA Telecommunication Information Sharing and Analysis Centre (T-ISAC) shows MTN is comfortable sharing certain classes of data (e.g., threat intelligence) in a structured, multi-stakeholder environment [[12]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).

        However, the evidence set does not confirm that multiple commercial data-sharing partners are already live, nor does it show automated compliance checks or formalised SLA-based breach monitoring across the ecosystem.  While the TransUnion collaboration reports a 25–35 % uplift in model predictive power — indicating tangible value creation from data-sharing [[10]](https://www.mtn.com/tag/digital-services) — this single example does not demonstrate ecosystem-wide scaling.

        Given strong proof of standardised frameworks and at least one operational partner but limited proof of multi-partner scale, automated controls or comprehensive SLA monitoring, MTN meets the criteria for "Medium" performance (Score 3) and falls short of the "Medium-High" and "High" thresholds that require multiple live partners and automated, ecosystem-wide governance.
