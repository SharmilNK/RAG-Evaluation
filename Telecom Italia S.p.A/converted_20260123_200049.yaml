    - title: Presence of clear governance or accountability for AI strategy
      score: 5
      reasoning: |
        Multiple high-confidence sources show that MTN has instituted governance that exceeds the requirements for the highest performance tier.
        • Board-level oversight – The Board of Directors, through its Social, Ethics and Sustainability Committee, explicitly “have oversight over the Group’s actions and performance regarding Responsible AI” [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf). This satisfies the criterion of board-level accountability.
        • Executive structures – Several MTN Board committees are responsible for integrating digital (including AI-related) human-rights considerations into strategy, while the Group Executive Committee is “accountable for the execution” of these strategies [[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[3]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        • Dedicated AI governance bodies – MTN has created a Group-wide AI Steering Committee to “drive responsible, valuable and consistent AI adoption through a shared AI strategy” [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).
        • Formal frameworks and policies – A Group Responsible AI Policy was approved in 2024 to guide “the use of AI throughout the Group” [[6]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf)[[7]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-king-iv-assessment-report-2025.pdf), and governance mechanisms (standard operating procedures, decision matrix, scenario playbooks, etc.) are documented to manage AI risk and performance [[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[3]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        These elements collectively demonstrate clear, formalised governance with both board-level and executive accountability for AI risk and ethics, meeting and exceeding the Quality-5 threshold (“Board-level AI committee or executive oversight of AI risk and ethics disclosed”). Lower-tier criteria (implied ownership, defined ownership, or only a published framework) are also met but are superseded by the explicit board oversight.
        Weighting the evidence: all cited claims carry the highest confidence scores (CI = 1 for [[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[3]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[6]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf)[[7]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-king-iv-assessment-report-2025.pdf) and CI = 0.76 for [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf)), giving strong support for a High (5/5) assessment on the driver "Presence of clear governance or accountability for AI strategy".
