    - title: Job titles- number of employees in (1. AI & ML Engineering 2. Data & Analytics, 3. NLP & Generative AI, 4. AI Product & Strategy)
      score: 2
      reasoning: |
        Publicly-available LinkedIn profile analysis identified 99 current MTN employees whose primary job titles fall into AI & ML Engineering (29), Data & Analytics (62), NLP & Generative AI (7) and AI Product & Strategy (1). This figure places the company at the upper edge of the 20-99 band defined in the evaluation criteria, corresponding to Low-Medium performance (score 2).

        Strategic talent actions cited in multiple high-confidence disclosures show MTN is investing in future capacity but do not yet translate into a larger, verifiable AI head-count:
        • MTN has created an in-house AI Centre of Excellence and a Cloud CoE, "supported by an internal Software Solutions team equipped with more than 300 engineers" [[16]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation). While sizable, the statement does not specify how many of these engineers hold AI-specific roles, so it cannot be fully credited toward the KPI.
        • The company is "reskilling 8 000 people to equip them for emerging roles in areas like AI and cloud computing" [[9]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf). This illustrates pipeline development rather than confirmed AI positions on record today.
        • HR leadership notes that 2024 will focus on preparing the workforce for "human-AI workforce models" and highlights the need for data scientists and modellers in HR teams [[2]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf); however, the claim again addresses capability planning, not current AI headcount.

        Given the weight of verifiable LinkedIn data (high relevance to the driver) and the absence of contradictory headcount evidence, MTN’s present AI talent base is scored as Low-Medium. Strategic initiatives cited in the claims signal upward momentum but are not yet sufficient to move the company into the Medium threshold (≥100 AI-labelled roles).
