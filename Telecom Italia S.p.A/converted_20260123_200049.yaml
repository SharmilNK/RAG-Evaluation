        The company has publicly communicated several elements of an AI strategy that go beyond vague statements. 2024 and 2025 Integrated/Transparency Reports outline a “disciplined approach to investing in the development of capabilities, governance, partnerships and proof-points of value across all AI domains” and list forward-looking actions such as refining AI solutions, expanding use cases and conducting LEO satellite trials [[4]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[5]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[6]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[7]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf)[[11]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf).

        Governance ownership is evident: a Group-wide Responsible AI Policy, an AI Steering Committee and an Executive Committee sub-committee provide oversight and accountability for execution [[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[9]](https://www.mtn.com/tag/network-as-a-service)[[10]](https://www.mtn.com/tag/fintech-solutions).  The AI Centre of Excellence, Cloud CoE and PACE/Ambition 2025 programmes embed AI into broader enterprise transformation plans [[15]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[17]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf).  These disclosures show the roadmap is enterprise-wide and linked to strategy.

        However, the available evidence does not specify measurable, time-bound milestones or funding allocations. Statements such as “looking ahead to 2024 we will continue to advance AI adoption” and “monitor developments and explore additional use cases” remain qualitative and lack KPI targets or dated checkpoints [[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[4]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[27]](https://bisresearch.com/news/mtn-group-to-build-ai-driven-data-centers-across-africa).  Periodic updates are implied by annual reports, but no clear milestone tracking framework is presented.

        Given the presence of a publicly available roadmap with strategic objectives and formal governance—but with limited detail on concrete milestones, KPIs or funding alignment—the performance aligns best with the Quality Criteria level 3 (Medium). High-confidence sources dominate the evidence set, and there is no conflicting information, so the score is held at 3 rather than adjusted upward.
