    - title: Does the company publish clear governance documents outlining AI and Data use, deployment, and controls?
      score: 4
      reasoning: |
        Multiple high-confidence disclosures show that MTN publicly issues stand-alone governance documents for AI and data use that go well beyond a brief policy mention.

        • Dedicated, published Responsible AI Policy (approved 2024) built on the BRAIN framework sets guard-rails for bias mitigation, privacy protection and ethical use across the AI life-cycle [[4]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).
        • Policy is supported by detailed governance mechanisms – standard operating procedures, scenario playbooks, decision matrices, impact assessments and performance management – to operationalise controls [[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[4]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        • Clear oversight structure: Board Social, Ethics & Sustainability Committee and a Group-level AI Steering Committee provide top-down governance, while OpCo Executive Committees ensure local compliance, establishing human oversight at each deployment stage [[2]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[4]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        • Risk and compliance alignment is documented: references to NIST CSF, ISO 27001 and internal Data Privacy & Protection Policy supply concrete privacy / security metrics and vendor-independent control standards [[7]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[4]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        • MTN issues public Transparency Reports annually (2023, 2024) that include case studies on elections, cyber-incidents and data-governance responses, demonstrating periodic updates and incident learnings [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[4]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).

        These elements satisfy the Quality-4 definition (detailed governance covering risk tiers, bias/privacy metrics, human oversight and periodic updates). However, none of the supplied evidence cites the existence of live dashboards, model inventories or public audit summaries – requirements unique to the Quality-5 threshold. Therefore, the company is assessed at "Medium-High" performance.

        Score assigned: 4/5.
