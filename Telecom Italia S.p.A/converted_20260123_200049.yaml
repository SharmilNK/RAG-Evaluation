    - title: Has the company appointed an executive or function dedicated to AI ethics and risk?
      score: 3
      reasoning: |
        Multiple high-confidence sources confirm that MTN has formally assigned organisational responsibility for AI ethics and risk, satisfying the Quality-Criteria(3) requirements but not fully evidencing the more advanced controls required for a higher tier.

        • Dedicated governance body – The company "established the AI Steering Committee that is aimed at driving responsible, valuable and consistent AI adoption" [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf) and has set up a “special sub-committee of the Executive Committee to provide oversight, execution governance and impact management…with a special focus on AI” [[6]](https://www.mtn.com/tag/network-as-a-service)[[7]](https://www.mtn.com/tag/fintech-solutions)[[9]](https://www.mtn.com/tag/investors).  These structures demonstrate that a named function/committee is in place to oversee AI ethics and risk.

        • Published policy & high-level risk process – MTN approved a Group-wide Responsible AI Policy in 2024 [[10]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf)[[11]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-king-iv-assessment-report-2025.pdf) and issued a detailed Responsible AI Position Statement anchored in the BRaiN framework, spelling out ethical principles and minimum safety requirements for all AI deployments [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).  The policy includes commitments to accountability, privacy, fairness and human-rights impact assessment, evidencing a documented risk-management approach.

        • Supporting activities – The policy rollout is backed by employee training and awareness programmes, and MTN "actively engages with industry regulators and associations to contribute to the shaping of responsible AI ecosystems" [[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf), showing early steps toward regulator engagement and staff capability building.

        Gap analysis against Quality Criteria(4): While a central function, training and regulator engagement are documented, the evidence set does not explicitly mention formal review gates (e.g., bias/privacy/robustness checks) or the existence of a model register.  Because those key elements are not substantiated, the company falls short of the Medium-High threshold.

        On balance, the presence of a standing committee and published policy clearly exceeds Low-Medium expectations, meeting all elements of the Medium tier.  Given the missing proof of more advanced operational controls, the appropriate classification is therefore Medium, corresponding to a score of 3/5.
