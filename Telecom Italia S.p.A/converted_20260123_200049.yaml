    - title: To what extent is the company modernizing or integrating legacy systems into its current data and AI architecture to eliminate bottlenecks and data silos?
      score: 4
      reasoning: |
        Multiple high-confidence sources confirm that the company has moved most of its data and AI workloads onto cloud-native, API-enabled platforms. MTN has created both an AI Centre of Excellence and a Cloud CoE and is “operationalising AI at scale” through enterprise-grade OpenAI and other cloud-native services [[16]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[12]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[18]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future)[[17]](https://www.mtn.com/tag/digital-services).  Additional evidence shows that MTN’s analytics stack now runs on Google Cloud (BigQuery, Vertex AI) and the ADAM platform, which unifies data from every market and processes trillions of records, demonstrating broad legacy migration to a modern cloud warehouse architecture [[6]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).  Leadership statements describe the organisation as “transforming into an API- and AI-driven organisation,” emphasising API-based interoperability across functions [[15]](https://www.businesstechafrica.co.za/telecoms/2023/12/06/mtn-looks-to-ai-to-cut-costs-and-strengthen-user-experiences) and highlighting the use of AI and APIs to “future-proof” operations [[2]](https://www.engineeringnews.co.za/article/mtn-south-africa-takes-new-ai-step-as-it-launches-chatbot-2023-12-04).

        Taken together, these high-confidence claims indicate that the majority of legacy systems have been modernised and integrated into an API-driven, cloud environment—aligning with the Medium-High (4) criterion: “Majority modernised; API-based interoperability.”

        A small body of lower-confidence academic analysis still cites data-integration difficulties and lingering legacy challenges at MTN Nigeria, suggesting that full elimination of silos has not yet been achieved [[1]](https://www.researchgate.net/publication/386392093_Leveraging_Business_Intelligence_for_Strategic_Decision_Making_Analyzing_Its_Impact_on_MTN_Nigeria%27s_Organizational_Performance). Because these critical remarks carry lower confidence, they temper but do not overturn the dominant evidence.

        Weighting the strong, consistent, high-confidence modernization claims against the weaker, lower-confidence indications of remaining gaps, the appropriate assessment is Medium-High performance with a numerical score of 4.
