    - title: To what extent has the company adopted modern, enterprise-grade analytics and AI platforms that streamline model development, deployment, monitoring, and lifecycle management?
      score: 4
      reasoning: 'Evidence shows MTN operates a largely standardised, enterprise-grade analytics/AI stack with Group coordination, modern MLOps building blocks, and broad production use, while the platform coverage is time-scoped to avoid the 11 vs. 19 market inconsistency. 1) Group-level platforms and talent: An AI CoE and Cloud CoE coordinate AI activities across the Group, supported by 300+ engineers—strong indicators of a standardised enterprise stack [[1]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation). 2) Unified technical foundation: ADAM on Google Cloud (BigQuery, Dataproc, Vertex AI) centralised data from an initial 11 opcos and processes trillions of records monthly; later reporting shows Google Cloud services (incl. Vertex AI) in use across 19 markets, evidencing scaling beyond the initial ADAM cohort [[3]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom)[[3]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). 3) MLOps building blocks: Use of Red Hat OpenShift containers and Ansible automation, alongside stated migration targets, indicates pipeline automation and scalable deployment typical of enterprise MLOps [[4]](https://extensia.tech/mtn-nigeria-bets-on-cloud-to-modernise-infrastructure). 4) Governance overlay: Responsible AI policies and Group committees provide formal oversight for model deployment and operation [[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf). 5) Breadth of production use: AI is operationalised across Network, Finance, HR and Commercial domains, confirming Group-wide platform usage rather than isolated tools [[5]](https://www.mtn.com/tag/fintech-solutions). Why not 5? There is no explicit, end-to-end evidence of fully automated model monitoring, retraining and continuous deployment at scale across all markets. Thus, Level 4 is appropriate.'
