    - title: How explicitly does AI enhance the customer value proposition (e.g., personalization, NPS, retention) and tie to growth/margin outcomes?
      score: 3
      reasoning: |
        Most high-confidence evidence (confidence index = 1) positions AI as a strategic enabler and describes intended benefits for customer experience and revenue, but provides only qualitative links to value creation [[4]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[5]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[6]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf)[[7]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf).  Mid-confidence sources supply the first quantified proof points: MTN reports a 40 % YoY drop in customer-care call volumes after deploying the Genesys Cloud CX platform in South Africa, Nigeria and Uganda, indicating measurable service-efficiency and experience gains across three markets [[9]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).  The same source cites a 50 % improvement in key voice/video call performance metrics through an AI collaboration in Nigeria, plus predictive churn-risk segmentation and proactive offers [[9]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).  Further medium-confidence reporting notes the ADAM analytics platform delivering near-real-time insights for 270 million subscribers and guiding personalised bundles, again demonstrating defined KPIs such as call-quality uplift and churn prediction, albeit still limited to case-specific metrics [[9]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).  Group statements confirm an operating model (AI Centre of Excellence, “MTN Genova”) with use-case pipelines spanning CVM, network and customer service, implying hypotheses and KPI frameworks are in place [[19]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[22]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).

        However, the quantitative evidence remains narrow (two main metrics) and does not yet cover NPS or churn reductions at group level, nor shows roadmap-embedded uplift targets.  The available metrics stem from isolated initiatives rather than a fully programmatic, multi-segment measurement regime.  Consequently, MTN exceeds the Low-Medium threshold (qualitative links only) by demonstrating defined KPIs and initial validated gains, but falls short of the Medium-High bar that requires systematic, multi-metric tracking embedded in product/CRM plans.

        Weighted by confidence, the qualitative but high-confidence claims establish intent, while the moderate-confidence quantitative claims substantiate early impact.  The blend aligns best with a "Medium" performance classification and a numerical score of 3.
