    - title: To what extent has the company implemented robust mechanisms that safeguard data against unauthorized access or misuse, ensuring compliance with privacy and security regulations (e.g., GDPR, CCPA)?
      score: 4
      reasoning: |
        Multiple high-confidence statements show that the company has instituted an organisation-wide data-protection framework that is aligned to leading international security and privacy standards. The group states it is “aligned with ISO 27001 and the NIST Cybersecurity Framework” and has clear lifecycle controls for personal data [[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf).  A comprehensive Data Privacy & Protection Programme (Project Guardian) with 12 components has been rolled out across all operating markets, embedding 45 framework touch-points, 19 procedure chapters and template controls, supported by dedicated Data Privacy Officers and departmental champions as well as quarterly senior-management governance meetings [[4]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).

        Routine training and awareness have been scaled up: 54 initial socialisation sessions, follow-ups and e-learning modules covering 14 topics were delivered group-wide [[4]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf).  The company reports “no substantiated complaints regarding breaches of customer privacy or data loss” in 2023 and has expanded privacy controls to 11 additional markets lacking local legislation [[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf).  Continuous monitoring mechanisms are evident through a combined-assurance model overseen by the Board Audit Committee, risk-based compliance testing that covered 92 % of obligations, and over 700 compliance risk-management plans, complemented by robotics and data-analytics tooling to enhance oversight [[10]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf)[[7]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf).  Advanced features such as a Responsible AI Policy and planned SOAR automation indicate movement toward AI-specific compliance automation [[5]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf).

        However, the evidence refers only to “alignment” with ISO 27001 rather than an independently verified certification, and explicit privacy-by-design certification is not demonstrated.  Therefore, while the company clearly exceeds a formal framework with periodic audits (Tier 3) and shows organisation-wide implementation (Tier 4), the lack of documented external certification and full automation keeps it short of the “High” benchmark.  Accordingly, a Medium-High performance rating of 4/5 is warranted.
