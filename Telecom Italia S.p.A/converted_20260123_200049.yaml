    - title: How visible and concrete is the company’s public advocacy and action on responsible AI (AI‑for‑Good)?
      score: 4
      reasoning: |
        Multiple high-confidence sources show that MTN has moved well beyond a simple statement of intent on Responsible-AI.

        • Public advocacy & commitments – MTN has issued a formal "Responsible AI Policy" and a public position statement anchored in its BRAIN principles, available in the 2024 Transparency & Sustainability reports [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[4]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).
        • Concrete, on-going programmes – The Group is rolling out responsible-AI guardrails in advertising, internal AI roll-out, election-related due-diligence and human-rights impact assessments across several markets [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).  Training programmes and awareness campaigns accompanying the policy were completed in Aug–Sep 2024 [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).
        • Multi-year external partnerships – MTN collaborates with UNICEF (Child Online Safety round-table), the Internet Watch Foundation and is an active member of the Global Network Initiative (GNI) [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        • External assurance & benchmarking – MTN underwent its first independent GNI assessment in 2024 and is ranked 6th (best outside US/EU) in the Ranking Digital Rights ‘Telco Giants’ scorecard [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).  These third-party assessments provide external credibility to its claims.
        • Impact metrics disclosed – The company reports a sustained 80 % score on the independent Reputation Index, completion rates for human-rights impact assessments in multiple markets and published digital-rights rankings [[14]](https://www.listcorp.com/jse/mtn/mtn-group-limited/news/audited-annual-financial-results-for-the-period-ended-31-december-2024-3165879.html)[[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).  While some metrics are qualitative, they evidence measurable outcomes over several years.

        Taken together, the evidence matches the Quality-Criteria level 4: a "multi-year portfolio with partners, impact metrics reported, external assurance for claims."  No proof was found of MTN’s tools being openly shared and widely used by the broader community, so the company falls short of the level-5 "recognised leader" threshold.  Therefore, a Medium-High performance tier and a score of 4/5 are assigned.
