    - title: How proactive and impactful is the company’s public AI messaging (social, white papers) in core markets?
      score: 3
      reasoning: |
        Claim evidence shows MTN has issued a solid but not yet metrics-rich stream of public AI communications during the past year.

        • Corporate white-paper depth – The 2024 Transparency Report dedicates a full section to MTN’s “Principles for Responsible AI,” laying out Balance, Responsibility, Awareness, Integrity and Nurturing pillars [[5]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[6]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).

        • Annual-report narrative – The Group’s 2023/24 integrated report provides multiple AI-focused “Strategic response” and “Material matters” pages that describe GenAI use cases across CVM, network operations and efficiency, and reference governance controls [[8]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf)[[9]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[10]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[11]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[22]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf).

        • Executive thought-leadership – Articles by the Group Head of Advertising (Mar-25 “AI and the elephant in the room” plus earlier posts) discuss telco-data-driven personalisation and AI adoption challenges in marketing [[13]](https://ads.mtn.com/ai-and-the-elephant-in-the-room).

        • External earned media – A Feb-2024 news piece highlights MTN Nigeria’s integration of OpenAI into its Zigi chatbot, naming partners Microsoft and Superbo and signalling proactive messaging beyond owned channels [[17]](https://cryptorank.io/news/feed/4267f-mtn-nigeria-transforms-customer-service).

