  - id: ai_innovation
    name: Innovation
    insights:
      overview: |
        Innovation performance is Medium (KPI Score 2.3): MTN shows meaningful internal experimentation discipline and governance, but limited outward-facing innovation outputs and ecosystem leadership, which constrains defensibility. The reasoning highlights strong enablers—responsible AI governance, gated experimentation via centers of excellence, standardized data-sharing frameworks with at least one live example, and rigorous partner due diligence. These factors indicate MTN can manage innovation safely and execute with partners.

        Across drivers, MTN’s innovation strengths are process-oriented: experimentation is governed rather than ad hoc, data-sharing is possible under standardized privacy frameworks, and partner evaluation is risk-based. The company also participates in industry bodies and pilots, which helps it track and influence practices even without being the leading voice.

        The limiting pattern is external creation and signaling. The reasoning explicitly calls out a thin research/IP footprint (few patents, no verifiable research publications, no open-source contributions) and only modest academic engagement. Alliances exist but appear limited in number and depth relative to what would indicate ecosystem leadership, and data-sharing is proven in a narrow set of examples rather than scaled across a broad partner ecosystem with automated controls.

        To close the distance, MTN should: set explicit targets for patents and publications tied to priority domains; establish flagship academic partnerships with a publication pipeline; selectively open-source non-differentiating components to build ecosystem gravity; expand structured alliances with shared data/IP and measured outcomes; and scale privacy-preserving data-sharing with stronger automation and SLAs. Key risks to monitor include becoming an “adept adopter” without defensible IP, reduced talent magnetism without research/OSS signals, and increased compliance risk if data-sharing scales without automated controls.
      deep_dives: |
        Innovation

        Definition: Innovation measures whether the company creates and captures differentiated AI value beyond adoption: research outputs, patents/IP, open-source contributions, academic and ecosystem partnerships, structured alliances, experimentation scalability, privacy-preserving data collaboration, and visible participation in standards and regulatory shaping.

        What “good” looks like in telecom: High innovation maturity typically combines disciplined experimentation with outward outputs—patents, publications, open-source or community tools—and scaled ecosystem plays (joint ventures, co-developed assets, multi-partner data collaboration). Illustrative (not supplied in the input) indicators could include a measurable pipeline from PoCs to products, a sustained publication cadence, and repeatable data-sharing mechanisms that scale across partners with automated compliance.

        MTN’s score (2.3) reflects strong internal scaffolding but weak external innovation markers. The reasoning notes robust governance and experimentation discipline, standardized data-sharing frameworks with at least one live use case, and rigorous partner due diligence. These are important because they enable safe innovation and reduce third-party and compliance risks.

        However, MTN’s innovation constraints are explicit and material: few AI patent families, no verifiable research publications, and no open-source contributions. Academic engagements appear modest and ad hoc, and alliances are limited in number and/or binding depth. This configuration is characteristic of a company that can adopt and operationalize innovation, but is not yet creating visible, defensible assets that strengthen bargaining power and long-term differentiation.

        Target vs peers: MTN (2.3) is slightly above Vodacom (2.2) and above Ooredoo (1.9), suggesting it is not the weakest innovator in this set. It is roughly comparable to Bharti Airtel (2.4), which implies a similar “partner-led innovation with limited external IP signals” posture. The major gap is to Orange (3.8), indicating Orange has far stronger external R&D, IP, and ecosystem evidence; MTN is also below e& (3.0), which suggests stronger innovation operating model and ecosystem leverage than MTN’s current posture.

        Implications & next steps: To move from 2.3 to Medium-High, MTN should prioritize creation velocity and external credibility without undermining its strong governance. That means establishing an IP and publication agenda tied to business domains, forming a small number of flagship academic partnerships, and selectively open-sourcing components that build ecosystem gravity while keeping differentiating assets proprietary. MTN should also scale privacy-preserving data collaboration from single examples to multiple partner integrations with more automation and monitoring, and convert experimentation into a portfolio-level engine with measurable conversion and reuse.

        Evidence limits: The conclusions use only the provided KPI score and the Innovation reasoning narrative, and peer comparisons rely only on provided scores. No explicit evidence supplied; inference from the KPI reasoning patterns.
