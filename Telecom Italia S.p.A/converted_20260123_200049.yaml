    - title: AI Team Leadership structure- number of leaders (percentage of Job Titles)
      score: 4
      reasoning: |
        Multiple high-confidence sources show MTN has moved beyond isolated AI roles to a clearly defined leadership and governance model.
        • Central accountable executive: Group Chief Technology & Information Officer Charles Molapisi now carries explicit responsibility for “speeding up AI use-case adoption across the business” while remaining on the Group Executive Committee, providing C-suite ownership of AI strategy [[10]](https://www.listcorp.com/jse/mtn/mtn-group-limited/news/group-strategic-review-and-operating-model-changes-to-support-execution-change-in-role-of-a-director-3227970.html).
        • Formal governance bodies: The Group has created an AI Steering Committee to drive “responsible, valuable and consistent AI adoption through a shared AI strategy” [[6]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf) and a special sub-committee of the Executive Committee for AI oversight and impact management [[19]](https://www.mtn.com/tag/network-as-a-service).
        • Dedicated organisational structures: MTN has established an in-house AI Centre of Excellence (CoE) alongside a Cloud CoE to “co-ordinate AI activities across the Group,” supported by more than 300 engineers [[15]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        • Cross-domain leadership coverage: Statements highlight that AI leadership spans Network, Finance, HR and Commercial domains, indicating domain leads beyond IT alone [[15]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        • Responsible-AI framework: Publicly released Responsible AI principles and policy demonstrate mature governance and ethics leadership, satisfying the ‘external reference’ element of the tier-4 definition [[7]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[19]](https://www.mtn.com/tag/network-as-a-service).

        These elements match Quality Criterion 4 (3.5–5 % + CoE + steering committee + domain leads). While no precise percentage of AI/Data job titles is disclosed, the breadth of leadership roles and formal oversight bodies exceed the expectations for Criterion 3 and align with the structural requirements of Criterion 4.

        Because the quantitative head-count evidence is absent, a small downward adjustment from a perfect score is warranted, but the consolidated high-confidence evidence of a Group-level CoE, steering committees and C-suite ownership justifies a Medium-High performance rating with a numerical score of 4.
