    - title: How mature and reproducible is the model development workflow (from experimentation to CI/CD and release)?
      score: 3
      reasoning: |
        Evidence shows the company has moved beyond ad-hoc notebooks but is not yet operating a fully automated, enterprise-wide MLOps stack.

        • A high-confidence statement confirms the creation of an AI Centre of Excellence and a Cloud CoE that co-ordinate model work across the Group, supported by an internal engineering team of 300+ people [[10]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation). The presence of dedicated CoEs indicates standardisation of tooling and environments beyond simple scripts.

        • The organisation is migrating core workloads onto Red Hat OpenShift and uses Ansible for daily automation, having already completed a 70 % migration with zero downtime and targeting 50 % of total workloads on the container platform this year [[17]](https://extensia.tech/mtn-nigeria-bets-on-cloud-to-modernise-infrastructure). Container-based deployments and daily automated tasks align with reproducible build and deploy practices typical of medium-maturity MLOps.

        • The ADAM analytics platform unifies data from 11 countries on Google Cloud (BigQuery, Dataproc, Vertex AI) [[18]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). Vertex AI natively provides pipeline orchestration and artifact versioning, suggesting that train/evaluate/serve workflows are becoming standardised.

        • Corporate objectives explicitly include ‘continuous improvement in AI deployment methodologies’ and ‘clear KPIs to assess model performance’ [[19]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn), signalling a formal process for monitoring and iterative release.

        Gaps remain: no claim references automated data/robustness tests, canary or blue-green releases, or the share of models governed by the workflow. Therefore, criteria for Medium-High (full CI/CD with ≥80 % coverage) or High (end-to-end automation and 95 %+ coverage) are not met.

        Balancing relatively strong but still partial infrastructure evidence against the absence of higher-level controls, the driver is rated Medium (score 3).
