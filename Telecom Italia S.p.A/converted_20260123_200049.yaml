    - title: Does the company collaborate with leading AI ethics organizations?
      score: 4
      reasoning: |
        Multiple high-confidence disclosures show the company works with several recognised AI-ethics and digital-rights bodies and does more than hold passive membership.
        •  Memberships: Global Network Initiative (GNI), Internet Watch Foundation (IWF), UN Global Compact and the GSMA Mobile Alliance Against Child Sexual Abuse Content are all listed as standing affiliations [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        •  Active working-group participation: the firm sits on the GNI Policy Committee, the Joint Audit Co-operation Human Rights Stream, GSMA Sustainability Network Meeting and GSMA ESG Metrics for Mobile, with meetings occurring monthly [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).
        •  Additional collaboration: the company co-operates with GSMA on an ESG metrics pilot and a digital-integrity pilot, and leverages JAC to share best practices and case studies on human-rights risks in the supply chain [[7]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).

        These engagements exceed the “Medium” threshold of merely belonging to several bodies with occasional activity and meet the “Medium-High” criterion of holding active roles in working groups that influence guidance and policy.

        No evidence was found of chairing these organisations, leading industry benchmarks, or receiving external awards, which prevents a “High” (5) rating.

        Given the breadth of memberships and the documented, recurring working-group roles, the appropriate assessment is Medium-High performance, corresponding to a score of 4 on the 1–5 scale.
