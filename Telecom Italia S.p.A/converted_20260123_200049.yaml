    - title: To what extent are the company’s processes and tools for developing, deploying, monitoring, and improving ML models mature, automated, and aligned with production standards?
      score: 3
      reasoning: |
        Multiple high-confidence statements demonstrate that MTN has put in place group-wide structures to coordinate model development – e.g., an AI Centre of Excellence and a Cloud CoE that "co-ordinate AI activities across the Group" [[2]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[1]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[4]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future)[[5]](https://www.mtn.com/tag/network-as-a-service).  These centres, together with a dedicated AI Steering Committee, are tasked with "driving responsible, valuable and consistent AI adoption" and continuously refining solutions across the Group [[14]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).  Further, MTN is "establishing AI performance tracking mechanisms… and adopting best practices to accelerate AI model development, testing, and deployment" while setting "standards, processes and frameworks across all AI programs" [[8]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn).

        The evidence confirms the presence of defined, repeatable MLOps processes in several parts of the organisation (CoE-led standards, performance KPIs, governance forums), matching the Quality-3 description of “Defined MLOps pipeline in select teams.”  However, none of the high-confidence claims explicitly reference full lifecycle automation, systematic versioning, QA gates, or real-time monitoring/feedback loops that would meet the Quality-4 or Quality-5 thresholds.  The strongest process-maturity indications (performance tracking, continuous-improvement mandates) come from a moderate-confidence source [[8]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn), so they cannot on their own justify an upgrade to Medium-High.

        Balancing the solid, high-confidence governance and CoE evidence with the absence of explicit proof of automated, enterprise-grade pipelines, the driver is best assessed at Medium performance (score 3).
