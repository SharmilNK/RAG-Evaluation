    - title: Are AI use cases integrated into core business processes, or do they operate as standalone projects?
      score: 4
      reasoning: |
        Multiple high-confidence statements confirm that MTN has pushed AI well beyond isolated pilots and into day-to-day operations across several core domains.
        • Breadth of integration – MTN lists active AI use cases in at least four distinct business processes: customer service (Zigi chatbot) [[5]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[20]](https://cryptorank.io/news/feed/4267f-mtn-nigeria-transforms-customer-service), employee HR support (SiYa chatbot) [[5]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf), network operations (fuel-saving for data-centres, dynamic energy management, fibre-cut sensing, traffic balancing) [[16]](https://www.mtn.com/tag/network-as-a-service), and commercial/CVM functions [[2]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation). The CI-1 claim that AI use cases span Network, Finance, HR and Commercial functions demonstrates ≥3 integrated processes [[2]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        • Closed-loop automation – The network energy-management and traffic-balancing initiatives adjust network parameters in real time, evidencing automated, closed-loop actions rather than simple analytics [[16]](https://www.mtn.com/tag/network-as-a-service). Chatbots autonomously resolve queries, reinforcing automation in customer and HR workflows [[5]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[20]](https://cryptorank.io/news/feed/4267f-mtn-nigeria-transforms-customer-service).
        • Documented KPI impact – An external article reports a 50 % improvement in voice/video call quality after MTN applied its AI analytics platform with Meta, providing a concrete, published process KPI gain [[20]](https://cryptorank.io/news/feed/4267f-mtn-nigeria-transforms-customer-service). Executive comments also cite productivity boosts and cost reduction from the “MTN Genova” programme [[2]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        • Change-management & guardrails – MTN has set up an AI Centre of Excellence, a Cloud CoE, and a dedicated Executive Committee sub-committee, accompanied by a Responsible AI policy to govern deployment [[2]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[9]](https://www.mtn.com/tag/investors)[[11]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf). These structures signal formal change-management supporting sustained integration.
        Taken together, the evidence satisfies the Quality-4 definition: deep integration across ≥3 processes, closed-loop execution, demonstrable KPI improvements, and visible organisational enablers.
        However, the material stops short of the Quality-5 bar because: (a) only a handful of quantified KPI gains are externally documented, not “sustained KPI gains” across the enterprise; (b) no evidence is given of automated rollback/approval workflows or field-ops dispatch; and (c) coverage, while broad, is not yet explicitly enterprise-wide with policy enforcement across every customer, network and field operation.
        Therefore, MTN’s performance on “Business deployment – integration into on-going operations” is rated Medium-High, corresponding to a score of 4.
