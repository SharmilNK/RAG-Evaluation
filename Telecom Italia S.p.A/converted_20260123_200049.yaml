    - title: Has the company appointed a dedicated Chief Data Officer or equivalent position - exclusivly related to Governance?
      score: 2
      reasoning: |
        The documentation shows that MTN has some senior roles and policies touching data governance, but no evidence of a dedicated, enterprise-wide Chief Data Officer (CDO) or equivalent position focused exclusively on data governance.

        • Leadership structure: The only group-level role that carries an information-/data-related title is the Group Chief Technology and Information Officer (GCTIO). This executive is mandated to "leverage current and emerging technologies" and works alongside other functions on sustainability, but the remit is broader technology and IT rather than a stand-alone data-governance mandate [[8]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Climate-Report.pdf).

        • Distributed responsibility model: Each operating market has appointed a Data Privacy Officer and supporting “data privacy champions,” indicating local-level governance rather than a single enterprise CDO [[13]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[14]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).

        • Policy framework: The company publicly references a Group AI Policy approved in 2024 [[11]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf)[[10]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-king-iv-assessment-report-2025.pdf) and a Group-wide Data Privacy & Protection Policy [[4]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf). These policies demonstrate some governance discipline around data and AI, satisfying the “limited public mandate” element of Quality-Criteria (2).

        • Absence of CDO signals: Across all high-confidence sources provided, there is no mention of a Chief Data Officer, Chief Data & Analytics Officer, or similarly titled executive, nor evidence of a data council or board-level oversight body dedicated to data strategy and governance.

        Mapping to the evaluation rubric:
        – Quality-Criteria (1) is exceeded because MTN does have data/AI policies and identifiable senior managers touching data.
        – The situation aligns with Quality-Criteria (2): a senior data/information leader exists under the technology organisation with a limited governance mandate, and the governance work appears fragmented across privacy officers rather than consolidated under an enterprise CDO.
        – Criteria (3) and above are not met because no dedicated CDO or equivalent, no enterprise data council, and no evidence of extensive hiring (job-posting) or standardized data platform are presented.

        Given the balance of evidence (all high confidence scores), the appropriate assessment is Low-Medium performance, corresponding to a numerical score of 2.
