    - title: Total number of documented AI use cases implemented by the company
      score: 2
      reasoning: |
        The evidence base discloses six AI use-cases that have moved beyond ideation and are already deployed or being actively rolled out across MTN Group operations:
        1. Intelligent AI-enabled fuel-consumption savings for data-centre generators in South Africa [[4]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        2. AI-driven cell-site dynamic energy management in Benin [[4]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        3. AI-driven fibre-cut sensing for fixed networks in Côte d’Ivoire [[4]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation).
        4. Network-traffic balancing and optimisation in Nigeria, confirmed again in the July-2025 rollout communication [[4]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[22]](https://nairametrics.com/2025/07/11/mtn-group-deploys-ai-for-network-optimisation-in-nigeria-sets-stage-for-africa-wide-rollout).
        5. “Zigi” customer-service chatbot in MTN Nigeria, relaunched with OpenAI capability in 2024 [[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[8]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf).
        6. “SiYa” employee assistant chatbot introduced in MTN South Africa in December-2023 [[8]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[17]](https://mtn-investor.com/mtn-ir2023/material-matters-impacting-value-creation.php).

        •   The first four use-cases are detailed in a high-confidence (Confidence Index = 1) corporate statement, providing strong, primary-source validation.
        •   The two chatbot examples are supported by separate disclosures with Confidence Index ≈ 0.94, still well above the caution threshold.
        •   Other narrative claims refer only to “numerous” or “additional” use-cases without giving specifics or counts; these were excluded under the scope-validation rule.

        Aggregating the validated datapoints yields a total of 6 implemented AI use-cases. According to the supplied KPI rubric, 6–15 documented use cases corresponds to the Low-Medium performance band. The result therefore maps to a numerical driver score of 2.

        Because the majority of counted items come from the highest-confidence sources and no contradictory data suggest more than 15 fully implemented cases, the Low-Medium tier is both evidence-based and conservative.
