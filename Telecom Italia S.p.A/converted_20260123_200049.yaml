    - title: Does the company sponsor or actively participate in AI research conferences and academic partnerships?
      score: 2
      reasoning: |
        Evidence shows MTN Group has begun to engage with AI-focused academic and research activity, but the scale and depth remain limited.

        • Academic research partnership – African language LLM datasets: MTN publicly accepted Nigeria’s call to fund academic research and dataset collection for African languages to power local large-language-model development [[17]](https://www.mtn.com/mtn-group-takes-up-nigerias-call-to-action-with-pledge-to-support-african-languages-research-for-ai)[[18]](https://independent.ng/mtn-group-responds-to-nigerias-call-to-support-african-languages-research-for-ai)[[12]](https://www.mtn.com/category/spotlight-stories)[[13]](https://thenationonlineng.net/mtn-group-to-support-african-languages-research-for-ai)[[16]](https://businessday.ng/technology/article/mtn-pledges-support-for-nigerias-ai-language-initiative-to-empower-1-5bn-africans)[[4]](https://leadership.ng/mtn-group-funds-ai-language-inclusion-backs-nigerias-multilingual-dataset-initiative). This constitutes one concrete, research-oriented collaboration aligned to the KPI.

        • University linkage: MTN, the University of Johannesburg and the African Editors Forum launched the Pan-African Media Innovation Programme, equipping journalists to navigate AI-driven information environments [[11]](https://www.mtn.com/tag/network-as-a-service)[[22]](https://www.mtn.com/tag/leadership). While not a pure AI-research lab, it is an academic partnership touching AI skills.

        • Industry working-group participation: Regular involvement in GSMA and GNI working groups keeps MTN engaged with policy and technical dialogue in the telecom/AI space but does not demonstrate direct sponsorship of AI research conferences or academic labs [[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).

        Gaps versus higher-tier criteria
        – No claims report co-authored academic papers, conference committee roles, or a recurring sponsorship/presence at major AI conferences (NeurIPS, ICLR, TM Forum etc.).
        – Only 1-2 research-oriented collaborations are evidenced; no formal joint AI lab or Memorandum of Understanding with universities is documented in the supplied claims.

        Consequently, MTN meets the definition of Low-Medium performance (Tier 2): it has a small number of ad-hoc academic engagements and early sponsorship activity but lacks the volume, formality and publication record required for Medium or higher tiers.
