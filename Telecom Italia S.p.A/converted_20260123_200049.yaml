    - title: How does the company integrate community engagement and social responsibility into its AI initiatives?
      score: 4
      reasoning: |
        MTN demonstrates structured and ongoing integration of community engagement and social responsibility in its AI activities.

        • Comprehensive policy foundation – The Group-wide Responsible AI Policy, built on the BRAIN principles, embeds fairness, accountability and stakeholder protection into every stage of AI development and deployment [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).  The policy is explicitly framed through a human-rights lens to safeguard customers and communities [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).  These high-confidence sources show that social impact is an explicit design criterion, satisfying at least the “defined social responsibility principles” threshold.

        • Regular impact assessment and community-focused due diligence – MTN conducts digital human-rights impact assessments, election-readiness plans and heightened due-diligence reviews in markets experiencing conflict, directly tying AI use to community risk management [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).  Child-online-safety research in three markets and forthcoming awareness campaigns further evidence recurring assessments linked to vulnerable groups [[17]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf).  This meets the requirement for recurrent ethical impact checks.

        • Active community programmes linked to digital & AI inclusion – Corporate-social-investment (CSI) programmes are categorised and tracked, with a strong focus on youth digital education and rural connectivity, aligning AI deployment with broader community empowerment goals [[11]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf).  Responsible-AI leadership is also positioned as a driver for bridging the digital divide and enhancing financial inclusion [[13]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[22]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf).

        • Governance & stakeholder engagement – Board-level oversight via the Social, Ethics & Sustainability Committee, an executive sub-committee for AI, and mandatory employee training ensure responsible-AI expectations cascade through the organisation and are communicated externally to regulators and civil-society partners [[8]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).  An internal AI Steering Committee and Centre of Excellence further institutionalise governance and transparency [[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[6]](https://www.mtn.com/tag/network-as-a-service).

        • Transparency and measurement gaps – While MTN publishes Transparency Reports and classifies CSI projects for tracking, the evidence does not show detailed, publicly disclosed metrics that quantify social outcomes specifically attributable to AI systems.  The lack of granular, measurable AI-specific impact data prevents a full "High" rating.

        Weighting the abundant high-confidence evidence of policy, assessments and engagement against the limited proof of quantified impact, the company clearly exceeds the “Medium” bar and fits the “Regular community engagement and ethical impact assessments” description.  However, the measurement shortfall stops it from reaching the top tier.  Accordingly, the driver is scored at 4 (Medium-High).
