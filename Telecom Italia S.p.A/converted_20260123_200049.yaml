    - title: How systematically are external benchmarks used to drive AI delivery performance (speed, quality, cost) and improvement targets?
      score: 1
      reasoning: |
        None of the supplied evidence demonstrates that the company applies external peer or industry benchmarks to the performance of its AI delivery pipeline (speed, quality, or cost). High-confidence sources describe internal governance and continuous-improvement efforts – for example, the AI Steering Committee that "drives responsible, valuable and consistent AI adoption" [[8]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf) and the intent to "develop AI performance tracking mechanisms" and "drive continuous improvement in AI deployment methodologies" [[7]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn). However, these references are limited to internal KPIs and do not cite any comparison against external best-in-class figures.

        The only references to systematic external benchmarking relate to executive remuneration, where salaries are compared to the 50th percentile of peer groups [[10]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf). While this shows the organisation understands benchmarking in general, it is unrelated to AI delivery performance and therefore cannot be counted toward this driver.

        Because no claim—regardless of confidence—mentions external benchmarks for AI model lead time, defect rate, cost per model, or similar delivery metrics, the situation aligns with Quality-Criteria level 1: “No external benchmarking; delivery metrics not defined or inconsistent.” Consequently, performance is assessed as Low with a score of 1/5.
