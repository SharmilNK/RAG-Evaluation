    - title: How ready is the company’s culture to embrace data-driven decision-making and continuous AI-enabled improvement?
      score: 4
      reasoning: |
        Multiple high-confidence sources show that MTN has moved well beyond isolated pilots and is actively institutionalising data-driven and AI-enabled ways of working across the Group.

        • Leadership-led operating model: The Group has created an AI Centre of Excellence and Cloud CoE that coordinate AI work across Network, Finance, HR and Commercial functions, backed by 300+ engineers [[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[6]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[8]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future).
        • Governance & ethics embedded: A Responsible AI Policy, BRAIN framework and an Executive-level sub-committee provide oversight and ethical guard-rails for all AI decisions [[11]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[9]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[13]](https://www.mtn.com/tag/investors)[[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).
        • Workforce enablement: Programmes such as “Data Literacy for All” [[26]](https://www.mtn.com/wp-content/uploads/2023/04/MTN-Group-FY-22-Integrated-Annual-Report.pdf) and HR initiatives to “future-fit our people for AI” [[14]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf)[[17]](https://technologytimes.ng/mtn-focus-on-human-capital-amid-ai-revolution) signal an enterprise-wide push to make data fluency a core skill.
        • Demonstrated data usage at scale: MTN processes about 4 trillion data records monthly across 19 countries, illustrating that large portions of the business already rely on analytics for decisions [[27]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).
        • Continuous improvement structures: An AI Steering Committee guides risk management, KPIs and model performance tracking to institutionalise learning loops [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[15]](https://www.myjobmag.co.za/job/general-manager-artificial-intelligence-center-of-excellence-mtn).

        These elements meet the criterion of “Data-driven culture promoted through leadership and tools” (Quality level 4).

        Why not “High” (level 5)?  Several high-confidence statements note that 2024 is the "start of a move from hype to implementation" and that many solutions are still being refined or in pilot phase [[14]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf)[[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[18]](https://www.mtn.com/wp-content/uploads/2024/04/MTN-Group-FY-23-Integrated-Annual-Report-1.pdf)[[19]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf). This indicates the culture, though strongly sponsored, is not yet universally rooted in every decision and behaviour across the organisation.

        Weighted by the predominance of high-confidence evidence showing advanced readiness but tempered by equally credible indications of ongoing rollout, the appropriate score is therefore 4 – Medium-High.
