    - title: Are there board members with proven AI expertise?
      score: 4
      reasoning: |
        The company has established clear board-level oversight of artificial intelligence but currently lacks multiple directors with deep AI credentials, placing it at the upper-mid range of the scale.

        • Formal board committee with AI remit – The Social, Ethics and Sustainability Committee, a standing committee composed entirely of independent non-executive directors, lists “Ensure responsible generative AI processes and systems” among its 2025 key focus areas, confirming that AI risk and ethics are explicitly part of its charter [[6]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[3]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[7]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf)[[5]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf)[[13]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-group-fy-24-integrated-report_spreads.pdf).  A separate governance statement also specifies that both the Board of Directors and this committee “have oversight over the Group’s actions and performance regarding Responsible AI” [[1]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf).  This satisfies the criterion of a “formal board committee with AI in its remit and disclosed oversight responsibilities.”

        • General technology skills on the board – Profiles show one director with a PhD in Electrical Engineering (Shaygan Kheradpir) and another with a BCom in Information Systems (Sandile Gwala), indicating general technology backgrounds but no direct evidence of substantive AI/ML leadership or academic AI credentials [[3]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)[[5]](https://www.mtn.com/wp-content/uploads/2025/07/MTN-Group-FY-24-Integrated-Report.pdf)[[6]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24ir-final-2025.pdf)[[7]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf).  Board-effectiveness reviews further highlight a need to strengthen digital and fintech expertise, implying limited current depth in advanced technologies such as AI [[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf).

        • Absence of multiple AI experts – Across all board biographies provided, there is no documentation of any director who has led data-science or AI functions or holds recognised academic AI distinctions.  Therefore the threshold of “≥2 directors with strong AI/ML credentials” is not met.

        Weighting the strong, high-confidence evidence of a dedicated committee (meets Quality-4 requirement) against the equally high-confidence indication of limited individual AI skill on the board (falls below Quality-5), the consolidated assessment aligns with Tier “Medium-High” and a numerical score of 4.
