    - title: To what extent does the company actively support employee well-being and engagement throughout its AI transformation journey?
      score: 5
      reasoning: |
        Multiple high-confidence sources show that MTN goes well beyond ad-hoc or plan-level references and has embedded employee well-being and engagement into every phase of its AI transformation.

        • Structured, continuous well-being programme – MTN’s EVP “Live Inspired” specifically commits to weaving physical, emotional and financial well-being into everyday culture and HR processes, with HR “coaching the organisation towards good habits.” [[4]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf)

        • Quantitative monitoring – The company runs formal engagement instruments (Sentimeter, Culture Audit, Happy People & eNPS surveys) and tracks detailed scores on strategic engagement, workplace flexibility, inclusion, reward and collaboration, all reported year-on-year (+3-6 pp improvements). [[4]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf)

        • AI-linked change management – Leadership openly connects these well-being efforts to the AI journey. The CHRO states that 2024 is about “helping MTNers embrace change” as AI moves from hype to implementation. [[11]](https://technologytimes.ng/mtn-focus-on-human-capital-amid-ai-revolution)

        • Large-scale reskilling & supportive rewards – MTN is reskilling 8 000 employees for AI/cloud roles, using predictive analytics to identify turnover risks and an “evolving rewards system” to keep staff motivated and aligned with transformation goals. [[10]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24intergrated-report-final-2025.pdf)

        • Governance integration – The Responsible AI Policy explicitly protects employees’ rights and is backed by Board-level and executive oversight plus mandatory training for all staff, tying well-being considerations to AI governance structures. [[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[18]](https://www.mtn.com/wp-content/uploads/2025/04/mtn-position-statement-on-responsible-artifical-intelligence.pdf)

        • Health & safety standards – Alignment with ISO 45001 and programmes encouraging mental-health awareness, counselling and lifestyle initiatives further demonstrate holistic well-being support. [[25]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf)

        Because MTN shows (a) continuous measurement of engagement/well-being, (b) dedicated initiatives linked to AI change, and (c) formal inclusion of employee protections within its Responsible AI governance, it meets—and slightly exceeds—the Quality-5 threshold. No conflicting lower-confidence evidence was found, and the majority of supporting claims carry very high confidence (≥0.94 or 1.0). Therefore the driver is rated "High" with a score of 5.
