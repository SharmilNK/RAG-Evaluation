    - title: How well is delivery aligned with applicable AI/sector regulations during rollout and operation (e.g., DPIA, model cards, DSARs)?
      score: 4
      reasoning: |
        MTN has moved well beyond basic policy statements and can demonstrate structured, multi-market execution of regulatory requirements during AI rollout and live operation.

        •  Group-wide data-privacy programme was rolled out across all operating markets with “45 data privacy framework touch-points, 19 procedure chapters and several template controls” and a Data Privacy Officer appointed in every market, supported by departmental champions and quarterly governance meetings [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).  This shows evidence collection in defined tooling and broad geographic coverage.

        •  The Responsible AI Policy explicitly draws on ISO 27001, NIST and other global best-practice frameworks while being tailored to local legal contexts, signalling that multi-region obligations are mapped and embedded at design time [[8]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf) [[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf).

        •  Continuous digital-human-rights and privacy impact work is evidenced through a Digital Human Rights Impact Assessment (DHRIA) toolkit that has already been used in at least eleven markets (seven initial + four in 2023) to identify and mitigate risks before go-live [[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).  This is materially similar to DPIAs and provides structured artefacts for each use case.

        •  An AI Steering Committee, AI Centre of Excellence and executive-level sub-committee provide oversight of compliance in delivery and operations, ensuring that regulatory checks are performed prior to deployment and during BAU operations [[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf) [[17]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership) [[10]](https://www.mtn.com/tag/investors).

        Collectively, the evidence satisfies the ‘Medium-High’ rubric: obligations across regions are mapped, formal artefacts (impact assessments, privacy records, templates) are produced ahead of launch, and governance tooling captures evidence.

        However, no proof is offered of automated compliance-by-design pipelines, external audits passed, or “zero major findings” within the last 12 months.  In the absence of such high-maturity indicators, the score cannot be elevated to ‘High’.

        Therefore the driver is rated Medium-High with a numerical score of 4.
