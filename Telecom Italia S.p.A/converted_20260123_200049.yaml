        The evidence indicates that MTN has publicly documented at least six distinct AI use cases since 2023:
        • Customer-care – relaunch of the Zigi chatbot in Nigeria with OpenAI integration [[21]](https://www.mtn.com/wp-content/uploads/2024/04/MTN-Group-FY-23-Integrated-Annual-Report-1.pdf).
        • Employee experience – SiYa AI-powered assistant deployed to staff in South Africa in Dec-2023 [[21]](https://www.mtn.com/wp-content/uploads/2024/04/MTN-Group-FY-23-Integrated-Annual-Report-1.pdf).
        • Network/OPEX – AI-enabled data-centre fuel-consumption optimisation in South Africa [[16]](https://www.mtn.com/tag/fintech-solutions).
        • Network/OPEX – AI-driven cell-site dynamic energy management in Benin [[16]](https://www.mtn.com/tag/fintech-solutions).
        • Network operations – AI-driven fibre-cut sensing in Côte d’Ivoire [[16]](https://www.mtn.com/tag/fintech-solutions).
        • Network operations – traffic balancing and optimisation in Nigeria [[16]](https://www.mtn.com/tag/fintech-solutions).

        These use cases span at least three business domains (customer care, HR/people, and multiple network-operation sub-domains), satisfying the domain-breadth requirement of the Medium-High tier.

        Strategic linkage is explicitly stated: MTN’s group-wide “Genova” programme seeks to "boost productivity, elevate customer experience, reduce costs and accelerate revenue generation" through AI [[6]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership), and management stresses that use cases are "targeted … to deliver tangible value" across the business [[7]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation). Several of the documented cases (fuel and energy optimisation, dynamic energy management) are directly tied to OPEX/energy savings, while chatbots address CX/NPS objectives.

        Claim-level confidence is high: the chatbots and network use-case disclosures come from medium-to-high confidence sources (0.76–0.82), and the statements on strategic intent are from the highest-confidence sources (confidence = 1). No conflicting evidence was found, and there is no documentation of >10 use cases.

        Against the KPI rubric this places MTN squarely in Quality Criterion 4 – “6-10 use cases spanning ≥3 domains with explicit ties to 5G rollout, CX/NPS, OPEX/energy.” Hence, performance is rated Medium-High with a score of 4/5.
