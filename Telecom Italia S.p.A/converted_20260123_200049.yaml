    - title: How frequently does the company release new AI-based functionalities or model improvements?
      score: 4
      reasoning: |
        Evidence shows MTN released at least three distinct AI-based functionalities in the most recent operating period and several more at pilot/early-production scale, spanning multiple domains and geographies.

        • Customer-facing LLM upgrades: The Group “re-launched” the Zigi customer-service chatbot in MTN Nigeria with OpenAI capability in 2024 [[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf).  A separate employee-assistant chatbot, SiYa, was put into production in South Africa in December 2023 [[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[26]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf).  Both releases build on the same OpenAI foundation model, indicating versioned improvement rather than one-off pilots.

        • Network & operations AI:  MTN began full deployment of an AI solution for network-traffic optimisation in Nigeria in July 2025 [[19]](https://nairametrics.com/2025/07/11/mtn-group-deploys-ai-for-network-optimisation-in-nigeria-sets-stage-for-africa-wide-rollout) and reports live implementations of AI-driven dynamic energy management in Benin, fibre-cut sensing in Côte d’Ivoire and intelligent fuel-consumption optimisation in South Africa [[13]](https://www.mtn.com/tag/network-as-a-service)[[11]](https://www.mtn.com/tag/fintech-solutions).  These represent additional releases in a second domain (network/energy operations).

        Counting only the high-confidence items (Zigi, SiYa, network optimisation) yields three confirmed releases.  Including the additional 0.85-confidence operational roll-outs raises the total above four and demonstrates multi-country rollout across at least two functional areas.

        The pattern fits the KPI’s “3–4 releases/year built on the same foundation model across ≥2 domains” criterion, warranting a Medium-High tier.  However, published sources do not yet evidence ≥5 releases per year, formal public roadmap transparency or detailed adoption metrics, preventing a move to the High tier.  Therefore a score of 4 is assigned.
