    - title: To what extent has the company operationalized AI — demonstrating tangible rollout and active usage of AI or GenAI in core business operations, workflows, or decision processes at scale?
      score: 3
      reasoning: |
        Multiple high-confidence sources indicate that MTN has moved well beyond pilot experiments and is actively running several AI solutions in production across different business areas. The company reports “numerous AI use cases across key business domains including Network, Finance, HR and Commercial” [[3]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation), and specific scaled deployments are listed, such as the OpenAI-powered Zigi customer-service chatbot in Nigeria and the SiYa employee assistant in South Africa [[1]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[13]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf). In the network function, MTN is already using AI for dynamic energy management in Benin, fuel-consumption savings for data centres in South Africa, fibre-cut sensing in Côte d’Ivoire, and network-traffic balancing in Nigeria [[9]](https://www.mtn.com/tag/network-as-a-service)[[12]](https://www.communicationstoday.co.in/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[15]](https://www.techbooky.com/mtn-group-nigeria-implements-ai-for-network-optimisation). These examples span at least four functions and operate in several countries, satisfying part of the Quality-3 definition (8–15 scaled use cases across 2–3 functions).

        Operational governance is also maturing: an in-house AI Centre of Excellence, a Cloud CoE, and a Group-wide “MTN Genova” programme coordinate rollout and enforce standards [[2]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[4]](https://www.mtn.com/tag/digital-services)[[5]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future). A formal Responsible AI Policy and an Executive Committee sub-committee provide oversight and incident governance [[3]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[6]](https://www.mtn.com/tag/investors). While this evidences core MLOps and governance infrastructure, the available materials do not quantify the total number of scaled use cases (>15) or confirm that more than 50 % of processes or workforce are AI-enabled— requirements for the Medium-High (4) tier.

        Given clear proof of multiple live, cross-regional AI solutions, but an absence of explicit metrics showing very wide (>50 %) organisational penetration or >15 scaled use cases, MTN’s rollout maturity most closely aligns with the “Medium” performance tier. High-confidence claims (CI ≈ 1.0) support the breadth and governance of deployments, whereas no evidence (of any confidence level) substantiates enterprise-wide saturation. Therefore, a score of 3/5 is warranted.
