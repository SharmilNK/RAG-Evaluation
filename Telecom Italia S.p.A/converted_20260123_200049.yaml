    - title: To what extent is the AI strategy localized for markets/segments (language, culture, regulation, data availability)?
      score: 3
      reasoning: |
        Multiple high-confidence statements confirm that MTN has begun embedding market/segment localisation into its AI roadmap. The Group’s AI Centre of Excellence and Genova programme are "promoting innovative collaborations with start-ups focused on local language LLMs" to improve customer experience solutions [[16]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[12]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[13]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future) and MTN publicly supports initiatives such as Nigeria’s Atlas for Languages & AI at Scale to build multilingual, open-source datasets [[27]](https://www.ecofinagency.com/news-services/1310-49502-mtn-chief-urges-urgent-action-to-prevent-africa-s-ai-divide).  Group executives repeatedly stress the need for African-built LLMs that reflect local languages and realities [[17]](https://punchng.com/africa-must-act-fast-on-inclusive-ai-mtn-ceo-warns)[[26]](https://extensia.tech/mtn-group-calls-for-urgent-investment-in-ai-infrastructure-and-skills-to-drive-inclusive-growth-in-africa)[[3]](https://iafrica.com/mtn-ceo-warns-africa-must-be-paranoid-about-falling-behind-in-the-global-ai-race).  Governance structures – a Responsible AI Policy and an executive-level sub-committee – provide oversight of ethical and region-appropriate deployment [[16]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[23]](https://www.mtn.com/tag/investors)[[19]](https://www.mtn.com/wp-content/uploads/2025/05/mtn-group-fy-24-integrated-report.pdf).

        Taken together, this indicates that localisation requirements are recognised during discovery and at least one market (Nigeria) already has multilingual data/processes in scope, matching the Quality-3 description.  However, the evidence stops short of documenting systematic localisation playbooks applied across three or more markets or the tracking of performance parity and remediation SLAs required for Quality-4 or Quality-5. No explicit proof is provided that governance bodies formally approve regional adaptations pre-launch or that fairness metrics are monitored per region.

        Given the clear but still emerging localisation practices, weighted heavily by several maximum-confidence sources yet lacking breadth and maturity indicators, the driver is rated "Medium" with a numerical score of 3.
