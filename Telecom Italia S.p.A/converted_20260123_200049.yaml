    - title: To what extent does the company integrate and harmonize data from diverse internal and external sources to make it efficiently usable for AI and analytics applications?
      score: 4
      reasoning: 'MTN demonstrates mature, cloud-native data integration that is both large-scale and progressively expanding across markets, with the previously conflicting market counts reconciled by timing. 1) Consolidated internal data layer: The ADAM platform on Google Cloud BigQuery centralised data from an initial set of 11 operating companies and processes trillions of records monthly, evidencing automated ingestion and harmonisation beyond basic ETL [[1]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). 2) Group-wide cloud adoption: Subsequent disclosures show Google Cloud (incl. Vertex AI) usage spanning 19 markets [[1]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom). Interpreted together, ADAM’s initial 11-opco consolidation has been scaling, while the wider Google Cloud footprint reflects broader access to cloud-native analytics/AI services—resolving 11 vs. 19 by time-bounding scope. 3) Breaking silos and external data: The planned white-label Unity AIoT platform is designed to break down data silos and provide seamless integration across enterprise systems and partners, signalling mature interoperability with external sources [[2]](https://iafrica.com/powerfleet-and-mtn-partner-to-deliver-aiot-powered-supply-chain-intelligence-across-africa). Overall, MTN meets Quality 4: automated pipelines, unified data foundation, and strong usability. While robust, the evidence stops short of comprehensive, real-time harmonisation of all internal and external sources with fully governed metadata at Group scale—hence not a Level 5.'
