    - title: How strongly is an AI-driven and innovation-oriented mindset embedded in the company’s organizational culture?
      score: 4
      reasoning: |
        Multiple high-confidence sources show that MTN has gone well beyond isolated technical pilots and is embedding AI thinking across the organisation. A Group-wide Responsible AI framework (BRAIN) links ethical AI to the company’s core values and behaviours, explicitly promoting "continuous learning and improvement" in AI use [[1]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf)[[2]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf). Executive-level structures – an AI Steering Committee and a dedicated ExCo sub-committee – give AI governance the same prominence as other strategic disciplines [[3]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf)[[8]](https://www.mtn.com/tag/network-as-a-service)[[16]](https://www.mtn.com/tag/investors).

        Operationally, MTN has stood up a Group AI Centre of Excellence and Cloud CoE, coordinating more than 300 engineers and rolling out AI use cases in Network, Finance, HR and Commercial functions under the ‘MTN Genova’ transformation programme [[5]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[4]](https://techafricanews.com/2025/07/10/mtn-group-launches-responsible-ai-strategy-to-drive-africas-digital-future)[[6]](https://africabusinesscommunities.com/artificial-intelligence/mtn-launches-responsible-ai-strategy-to-drive-african-tech-leadership)[[7]](https://www.mtn.com/tag/digital-services).

        Culturally, HR is preparing “MTNers for human-AI workforce models”, launching AI-specific reskilling initiatives, flexible talent pools and neuroscience-based hiring to strengthen AI collaboration skills [[13]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf)[[12]](https://technologytimes.ng/mtn-focus-on-human-capital-amid-ai-revolution). A company-wide hackathon (“global infinity challenge”) involved 200+ employees from 19 markets co-creating AI solutions, reinforcing cross-functional innovation behaviour [[13]](https://mtn-investor.com/reporting-suite/pdf/mtn-people-report-2023.pdf).

        These elements match Quality Criterion 4: AI mindset integrated into values and management principles. However, medium-confidence evidence notes that leadership still sees "the need for a step change in AI culture, ethics … and AI skills development" [[19]](https://www.engineeringnews.co.za/article/mtn-south-africa-takes-new-ai-step-as-it-launches-chatbot-2023-12-04), indicating the programme is not yet a fully pervasive “AI-first” culture envisaged by Criterion 5. Balancing strong, high-confidence integration initiatives with this acknowledged gap, the appropriate rating is Medium-High, score 4.
