    - title: Has a formal Chief AI Officer role been established?
      score: 2
      reasoning: |
        No announcement of a stand-alone Chief AI Officer could be found. Instead, MTN has assigned group-wide AI responsibility to its existing Group Chief Technology & Information Officer (GCTIO).  In November 2025 the company stated that Charles Molapisi will "remain on the Group Exco taking up his previous role as GCTIO" with "additional responsibilities and focus on speeding up AI use-case adoption" [[18]](https://www.listcorp.com/jse/mtn/mtn-group-limited/news/group-strategic-review-and-operating-model-changes-to-support-execution-change-in-role-of-a-director-3227970.html).  Earlier disclosures likewise describe Molapisi, in his capacity as Group CTO, as "lead[ing] the company’s AI adoption strategy" [[17]](https://iafrica.com/mtn-ceo-warns-africa-must-be-paranoid-about-falling-behind-in-the-global-ai-race).

        These statements show that an executive at Exco level has been earmarked to drive AI, which fulfils the criterion of a "CAIO or equivalent referenced" but the role is not titled Chief AI Officer and its dedicated remit, reporting line and resources are not detailed publicly.  Supporting governance structures such as an AI Steering Committee are mentioned [[2]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_transparency_report.pdf) and a specialised Executive-Committee sub-committee gives additional oversight [[4]](https://www.mtn.com/tag/network-as-a-service)[[6]](https://www.communicationstoday.co.in/mtn-genova-driving-africas-ai-potential-through-responsible-innovation), yet their presence does not compensate for the absence of a clearly defined CAIO post.

        Given the evidence, MTN meets Quality Tier 2 (Low-Medium): an equivalent senior leader is referenced, but scope and formal designation remain unclear, and external updates are limited.  Higher tiers require a formally titled CAIO with direct CEO/board line and published enterprise AI KPIs, none of which are evidenced in the supplied material.  Therefore a confidence-adjusted score of 2/5 is assigned.
