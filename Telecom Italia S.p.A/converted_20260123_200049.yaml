    - title: Evidence of AI initiatives with reported impact on key metrics (efficiency, CX, cost, or revenue)
      score: 4
      reasoning: |
        Several AI initiatives show measurable business impact across different MTN Group functions.
        • Network efficiency & CX – The ADAM analytics platform and a 2025 collaboration with Meta delivered a 50 % improvement in key voice/video call performance indicators for 270 million-plus subscribers, while migration to Genesys Cloud CX cut call-centre volumes by 40 % YoY, directly evidencing service-quality and cost benefits [[12]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).
        • Energy & sustainability – Deployment of Huawei’s PowerStar in South Africa saves 1.46 million kWh annually and lowers carbon emissions by 1.37 kt, demonstrating quantified OPEX and ESG gains [[12]](https://www.techinafrica.com/mtn-data-analytics-impact-on-african-telecom).
        • Infrastructure optimisation – An AI-driven tower-site platform reduced CO₂ emissions by 53 % during a proof-of-concept and achieved zero network downtime, linking AI to tangible operational savings [[22]](https://www.mtn.com/power-management-tool).
        These quantified outcomes span customer experience, cost, and environmental metrics, satisfying the “partial quantification” criterion for a Medium-High rating.
        High-confidence statements further confirm that MTN has institutionalised AI (Group AI Centre of Excellence, >300 engineers, and numerous use cases in Network, Finance, HR and Commercial domains) with the explicit goal of boosting productivity, lowering costs and growing revenue [[7]](https://www.mtn.com/mtn-genova-driving-africas-ai-potential-through-responsible-innovation)[[10]](https://www.mtn.com/wp-content/uploads/2024/04/mtn-group-fy-23-integrated-annual-report-1.pdf)[[21]](https://www.businesstechafrica.co.za/telecoms/2023/12/06/mtn-looks-to-ai-to-cut-costs-and-strengthen-user-experiences). Although these sources are largely qualitative, their very high confidence scores reinforce that the cited quantitative examples sit within a broad, company-wide AI programme rather than isolated pilots.
        Because the quantified evidence covers multiple initiatives but is reported for only selected geographies and durations—with moderate confidence levels (≈0.53–0.58)—the score is capped at 4 instead of 5, which would require recurring, consistently documented impact across all business lines.
