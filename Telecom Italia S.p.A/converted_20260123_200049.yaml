    - title: How complete and enforced are data & model and policies/standards (quality, lineage, privacy, retention, access)?
      score: 3
      reasoning: |
        Multiple high-confidence sources indicate that MTN has formally approved and enterprise-wide data privacy and information security policies. The updated Data Privacy & Protection Policy now spans all operating markets with 45 framework touch-points and 19 procedure chapters, and Data Privacy Officers plus departmental “champions” have been appointed to own compliance in each market [[1]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).  Alignment with external standards such as ISO 27001 and the NIST Cyber-security Framework further evidences policy completeness and quality guidance for how data are collected, stored, processed and disposed of [[3]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Sustainability-Report.pdf).  Enforcement mechanisms go beyond policy documents: 54 face-to-face socialisation sessions, 28 follow-ups and e-learning comprising five modules establish recurring staff training and management accountability [[1]](https://mtn-investor.com/fy-2024-reporting-suite/pdf/mtn-fy24-transparency-report-2025.pdf)[[2]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-Transparency-Report-1.pdf).  MTN’s combined-assurance governance model provides ongoing oversight, and group-wide compliance monitoring and testing covered 92 % of stated obligations during 2023 [[6]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf), exceeding the ≥80 % coverage threshold required for a Medium-High rating.

        However, none of the cited evidence confirms that policy controls are enforced through automated “policy-as-code” or automated checks embedded in data pipelines; references to “leveraging technology” remain generic and do not prove automated exception tracking [[16]](https://www.mtn.com/wp-content/uploads/2025/04/MTN-Group-FY-24-King-IV-Assessment-Report.pdf).  Because this automation requirement is unmet, the organisation does not fully satisfy the Medium-High (4) quality criteria.  Likewise, while no substantiated privacy breaches were reported in 2023 [[6]](https://www.mtn.com/wp-content/uploads/2024/04/mtn_fy23_sustainability_report.pdf), continuous real-time monitoring across >95 % of assets and policy-as-code evidence—needed for a High (5) score—are not demonstrated.  Balancing strong formal governance, broad coverage and recurring training against the lack of proven automated enforcement, the driver is best classified as Medium, corresponding to a numerical score of 3.
