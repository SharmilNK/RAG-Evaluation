- kpi_id: kpi_1
  name: Does the company have an AI strategy?
  pillar: Strategy
  type: rubric
  question: What is the maturity of the Companies AI Strategy?
  rubric:
  - '1: AI used sporadically, no formal strategy, limited business alignment.'
  - '2: Standalone AI projects, emerging roadmap, early data efforts but not integrated
    organization-wide.'
  - '3: Defined AI strategy aligned to business, cross-functional teams, enterprise
    data management, basic governance.'
  - '4: AI scaled across functions, mature data and ML platforms, KPIs tracked, workforce
    skilled, formal ethics.'
  - '5: AI is core to business model, continuous optimization, differentiated innovation,
    automated governance, and measurable impact.'
  evidence_requirements: Strategic alignment- aligning growth and margin strategy
    to needs.
- kpi_id: kpi_2
  name: Percentage of AI initiatives with outcomes tied to measurable business KPIs.
  pillar: Strategy
  type: rubric
  question: Evidence of AI initiatives with reported impact on key metrics (efficiency,
    CX, cost, or revenue)
  rubric:
  - '1: No public evidence of AI impact'
  - '2: Only vague qualitative mentions (e.g. “AI improves customer experience”)'
  - '3: 1–2 specific examples with some evidence of business benefit'
  - '4: Several initiatives with partial quantification (efficiency, cost, or CX impact)'
  - '5: Multiple initiatives with clearly quantified and recurring impact across business
    lines'
  evidence_requirements: Strategic alignment- aligning growth and margin strategy
    to needs.
- kpi_id: kpi_3
  name: C-level statements about AI Strategy
  pillar: Strategy
  type: rubric
  question: Does the company’s C-level publicly communicate a defined AI strategy?
  rubric:
  - '1: No public signals of stakeholder commitment to AI‑driven change.'
  - '2: High‑level intent (e.g., upskilling plans) without governance, budget, or
    operating‑model changes.'
  - '3: Formal governance (e.g., AI council) or CAIO appointment; initial budget lines
    or hiring push; launch of training program and partner MoUs.'
  - '4: Cross‑functional operating model with clear RACI; disclosed reskilling targets
    (e.g., ≥1,000 employees), regulatory/ethics engagement, and signed multi‑year
    partner agreements to support rollout.'
  - '5: Board‑level oversight (committee/charter), public change KPIs (e.g., % workforce
    trained, adoption rates), union/regulator agreements where relevant, and multi‑year
    funding commitments with progress updates in filings.'
  evidence_requirements: Strategic alignment- aligning growth and margin strategy
    to needs
- kpi_id: kpi_4
  name: Presence of AI talent/experience on the Board
  pillar: Strategy
  type: rubric
  question: Are there board members with proven AI expertise?
  rubric:
  - '1: Zero directors with AI/ML/data expertise.'
  - '2: One director with general tech/IT background; limited direct AI experience.'
  - '3: ≥1 director with substantive AI/ML/data leadership (e.g., led DS/ML at major
    tech) or recognized academic AI credentials; sporadic mention of board AI oversight.'
  - '4: ≥2 directors with strong AI/ML credentials OR a formal board committee with
    AI in its remit (e.g., Technology & Innovation/Risk) and disclosed oversight responsibilities.'
  - '5: ≥3 directors with AI/ML track records AND an active board committee overseeing
    AI strategy/risk/ethics; regular AI reporting in the annual report and participation
    in external AI governance forums.'
  evidence_requirements: Strategic alignment- aligning growth and margin strategy
    to needs
- kpi_id: kpi_5
  name: AI communications in social media, white papers (volume and boldness of messaging),
    limit to G7 or primary markets
  pillar: Strategy
  type: rubric
  question: How proactive and impactful is the company’s public AI messaging (social,
    white papers) in core markets?
  rubric:
  - '1: ≤2 items in last 12 months; generic messaging; no metrics or named partners/customers.'
  - '2: 3–5 items; mostly marketing; limited telecom specificity; few quantified claims.'
  - '3: 6–10 items; includes ≥1 white paper or major conference talk (e.g., MWC, TM
    Forum) with telecom use‑case detail; at least one piece with quantified impact.'
  - '4: 11–20 items; steady multi‑channel cadence; several case studies with metrics
    (e.g., AHT↓, energy↓), named partners/customers, and earned‑media pickup.'
  - '5: >20 items; sustained multi‑channel presence; bold, target‑backed claims (e.g.,
    care deflection ≥20%, RAN energy ↓ ≥10%), multiple reference customers, open‑sourced
    assets/benchmarks, and third‑party awards.'
  evidence_requirements: Trust and change management- secure stakeholder buy-in to
    drive change
- kpi_id: kpi_6
  name: Number of use cases  and alignment with strategic priorities
  pillar: Strategy
  type: rubric
  question: What is the number of documented AI use cases, and how well are they aligned
    with business strategy?
  rubric:
  - '1: 0 disclosed AI use cases.'
  - '2: 1–2 isolated pilots (e.g., basic chatbot or RPA) with no explicit link to
    telecom strategy.'
  - '3: 3–5 disclosed use cases (e.g., churn prediction, network anomaly alerts, SIM‑fraud
    detection) with limited/implicit strategic linkage; mixed pilot/production status.'
  - '4: 6–10 use cases spanning ≥3 domains (customer care, network/SRAN, field ops,
    B2B) with explicit ties to 5G rollout, CX/NPS, OPEX/energy; several in production
    with metrics.'
  - '5: >10 use cases across portfolio (care automation/FCR/AHT, proactive outage
    prevention/MTTR, SON/RAN energy optimization, predictive maintenance, enterprise
    SLA assurance, sales NBA) with strong strategic linkage and analyst‑recognized
    business impact.'
  evidence_requirements: Use Case Selection- Target high impact use cases
- kpi_id: kpi_7
  name: When were the first AI solutions executed?
  pillar: Strategy
  type: rubric
  question: How long has the company had operational AI solutions in place?
  rubric:
  - '1: No public evidence of executed AI solutions as of today; only roadmap language
    or experiments without dates/results.'
  - '2: First externally evidenced execution 2023–2025 (late adopter).'
  - '3: First externally evidenced execution 2020–2022 (follower).'
  - '4: First externally evidenced execution 2017–2019 (early adopter within telco).'
  - '5: First externally evidenced execution ≤2016 (pioneer), and evidence of continuity
    (at least one AI project referenced in external sources in ≥3 different years
    since 2018).'
  evidence_requirements: Adoption speed of AI solutions
- kpi_id: kpi_8
  name: Presence and clarity of a publicly communicated AI roadmap outlining long-term
    objectives, milestones, and investment priorities.
  pillar: Strategy
  type: rubric
  question: Presence and clarity of a publicly communicated AI roadmap outlining long-term
    objectives, milestones, and investment priorities.
  rubric:
  - '1: No roadmap or only vague statements.'
  - '2: Draft or internal roadmap; limited scope.'
  - '3: Public roadmap with some milestones but unclear ownership or KPIs.'
  - '4: Comprehensive roadmap with defined goals, milestones, and periodic updates.'
  - '5: Enterprise-wide, integrated AI roadmap with measurable milestones, funding
    alignment, and executive accountability.'
  evidence_requirements: Long term AI Roadmap
- kpi_id: kpi_9
  name: To what extent does the organization allocate and scale financial, human,
    and technological resources to AI initiatives in a way that delivers measurable
    business outcomes?
  pillar: Execution
  type: rubric
  question: To what extent does the organization allocate and scale financial, human,
    and technological resources to AI initiatives in a way that delivers measurable
    business outcomes?
  rubric:
  - '1: Minimal or ad-hoc resource allocation.'
  - '2: Small budgets/pilots; inconsistent tracking.'
  - '3: Dedicated AI funding and teams in select areas; some business outcomes measured.'
  - '4: Sustained resource scaling across functions; measurable ROI for major initiatives.'
  - '5: Systematic enterprise allocation tied to KPIs, ROI dashboards, and continuous
    reprioritization.'
  evidence_requirements: AI Funding
- kpi_id: kpi_10
  name: Type of technology, AI model (include agentic AI) point in time implementation
    or agents Maturity of agentic workforce within the operating model.
  pillar: Execution
  type: rubric
  question: What AI technologies/models are used, and what is the maturity of agent-based
    AI integrations in business operations?
  rubric:
  - '1: Only generic analytics/RPA publicly visible; no LLM/agent pilots; 0 job postings
    citing LLM/RAG/agent frameworks.'
  - '2: One‑off ML/LLM pilot disclosed; vendor‑led POC; 1–2 job postings mention LLM/RAG;
    no agentic workforce evidence.'
  - '3: Classical ML plus ≥1 LLM/RAG pilot in CX or knowledge search; early assistive
    “copilot” for employees; 3–5 job postings cite LLM/RAG; one public case study.'
  - '4: Production LLM/RAG in ≥2 domains (e.g., care deflection + field ops) and initial
    agentic automations (e.g., ticket triage); ≥2 case studies and ≥6 job postings
    referencing agents/LLM ops; mentions of MLOps/tooling.'
  - '5: Agentic architecture embedded in operating model (multi‑agent workflows in
    care, network assurance, field ops) with governance; >3 public references and
    ≥10 job postings citing agent frameworks; analyst/award recognition and reported
    KPI gains.'
  evidence_requirements: AI building- build tailored, practical AI models
- kpi_id: kpi_11
  name: Has implementation been primarily an in-house development or partnership model?
    In-house or outsource some risk, external expertise
  pillar: Execution
  type: rubric
  question: Is AI development mainly in-house or partnership-based, and how does this
    affect risk and expertise?
  rubric:
  - '1: Single‑vendor POCs; no internal AI platform/team publicly evident; no multi‑year
    alliances.'
  - '2: Vendor‑led pilots with staff augmentation; 1–2 named partners; limited internal
    ownership.'
  - '3: Hybrid approach with internal product owner and partner build; ≥2 named partners
    (e.g., hyperscaler + OSS/BSS); initial internal ML/data hires visible.'
  - '4: Clear build‑buy‑partner strategy: public internal AI platform, ≥3 strategic
    partners, joint case studies, early co‑development/IP sharing.'
  - '5: Balanced model: robust in‑house platform/CoE plus ≥4 strategic partners (hyperscaler,
    network vendors, SI); multiple co‑developed assets, open‑source/patents, and long‑term
    funding disclosed.'
  evidence_requirements: AI building- build tailored, practical AI models
- kpi_id: kpi_12
  name: Nature of AI use cases- Does the model integrate into business processes or
    is it a stand-alone?
  pillar: Execution
  type: rubric
  question: Are AI use cases integrated into core business processes, or do they operate
    as standalone projects?
  rubric:
  - '1: Stand‑alone tools/demos; no links to OSS/BSS/CRM or operational workflows.'
  - '2: Partial integration in a single function (e.g., basic chatbot) without process
    KPIs.'
  - '3: Integrated into ≥2 processes (e.g., CRM next‑best‑offer, NOC anomaly triage)
    with published process KPIs; limited automation.'
  - '4: Deep integration across ≥3 processes with closed‑loop actions (e.g., auto‑ticketing/dispatch);
    case studies cite AHT/FCR/MTTR improvements; visible change‑management.'
  - '5: Enterprise‑wide integration across customer, network, and field ops with policy/guardrails;
    external reports show sustained KPI gains and automated rollback/approval workflows.'
  evidence_requirements: Business deployment- integration into on-going operations
- kpi_id: kpi_13
  name: Number Use case with ROI stated, and what ROI was, how long it took to be
    achieved
  pillar: Execution
  type: rubric
  question: Total number of documented AI use cases implemented by the company
  rubric:
  - '1: 1–5 use cases'
  - '2: 6–15 use cases'
  - '3: 16–30 use cases'
  - '4: 31–60 use cases'
  - '5: More than 60 use cases (broad enterprise-wide deployment)'
  evidence_requirements: Performance and ROI tracking
- kpi_id: kpi_14
  name: Use cases- Number of disclosed AI use cases
  pillar: Execution
  type: rubric
  question: Number of AI use cases demonstrating measurable financial impact (e.g.,
    revenue, cost, or efficiency gains)
  rubric:
  - '1: <10% of use cases show measurable impact'
  - '2: 10–25% of use cases show measurable impact'
  - '3: 26–50% of use cases show measurable impact'
  - '4: 51–75% of use cases show measurable impact'
  - '5: >75% of use cases show measurable impact'
  evidence_requirements: Performance and ROI tracking
- kpi_id: kpi_15
  name: To what extent has the company achieved measurable workforce efficiency through
    AI or GenAI — such as automation, task augmentation, or optimized hiring — resulting
    in stable or increased output with equal or fewer FTEs?
  pillar: Execution
  type: rubric
  question: To what extent has the company achieved measurable workforce efficiency
    through AI or GenAI — such as automation, task augmentation, or optimized hiring
    — resulting in stable or increased output with equal or fewer FTEs?
  rubric:
  - '1: Limited impact: <10% improvement in a defined function or <5% automation of
    interactions; no measurable productivity gain.'
  - '2: Localized impact: 10–20% productivity improvement OR 5–15% automation/deflection
    in specific workflows (e.g., care, networks, IT).'
  - '3: Functional impact: 20–30% improvement in one major function OR 15–25% automation
    across multiple workflows.'
  - '4: Multi-function impact: documented efficiency gains in 2–3 major functions,
    with 20–40% automation/augmentation and measurable throughput increase.'
  - '5: Enterprise impact: >40% automation or augmentation in several functions; measurable
    enterprise-wide productivity uplift; hiring avoided at scale (>5–10% workforce
    equivalent).'
  evidence_requirements: Performance and ROI tracking
- kpi_id: kpi_16
  name: Number of use cases with financial value
  pillar: Execution
  type: rubric
  question: Proportion of AI use cases that are ROI-positive (benefits exceed total
    costs)
  rubric:
  - '1: <5% ROI-positive'
  - '2: 5–15% ROI-positive'
  - '3: 16–30% ROI-positive'
  - '4: 31–50% ROI-positive'
  - '5: >50% ROI-positive'
  evidence_requirements: Performance and ROI tracking
- kpi_id: kpi_17
  name: New functionality releases, build on from foundational model
  pillar: Execution
  type: rubric
  question: How frequently does the company release new AI-based functionalities or
    model improvements?
  rubric:
  - '1: No new AI functionality released publicly in the last 12 months.'
  - '2: 1 minor feature release (pilot scale) not clearly built on a foundation model.'
  - '3: 2–3 releases enhancing a foundation/LLM (e.g., RAG, prompt library, new telco
    intents); ≥1 in production.'
  - '4: 3–4 releases/year building on the same foundation (versioned upgrades) across
    ≥2 domains; integration/API extensions noted.'
  - '5: ≥5 releases/year with roadmap transparency; multi‑language/country rollout;
    extensions (tools/agents) on a stable foundation model; external references and
    adoption metrics.'
  evidence_requirements: Continuous learning and improvement. Refine models with new
    attributes and data
- kpi_id: kpi_18
  name: To what extent has the company operationalized AI — demonstrating tangible
    rollout and active usage of AI or GenAI in core business operations, workflows,
    or decision processes at scale?
  pillar: Execution
  type: rubric
  question: To what extent has the company operationalized AI — demonstrating tangible
    rollout and active usage of AI or GenAI in core business operations, workflows,
    or decision processes at scale?
  rubric:
  - '1: Up to 4 pilots and 1 scaled use cases; <5% of processes or workforce uses
    artificial intelligence; no monitoring, no service levels, and no centralized
    governance.'
  - '2: 2–8 scaled use cases in 1 function; 15–25% of processes or workforce uses
    artificial intelligence; basic and inconsistent operational procedures with limited
    documentation.'
  - '3: 8–15 scaled use cases across 2–3 functions; 25–50% of processes or workforce
    uses artificial intelligence; core operations in place including model registry,
    monitoring, retraining triggers, and documented incidents.'
  - '4: 15–25 scaled use cases across 4–7 functions and multiple regions; 50–80% of
    processes or workforce uses artificial intelligence; standardized operations including
    automated testing, drift detection, formal approvals, and regular leadership reporting.'
  - '5: >25 scaled use cases across ≥8 functions and several countries; >80% of processes
    or workforce uses artificial intelligence; enterprise-grade operations with high
    reliability, strict quality controls, independent audits, and finance-confirmed
    business impact.'
  evidence_requirements: Rollout and Usage
- kpi_id: kpi_19
  name: Appointment of a Chief Data Officer (or Data Leadership title equivalent)
  pillar: Technical
  type: rubric
  question: Has the company appointed a dedicated Chief Data Officer or equivalent
    position - exclusivly related to Governance?
  rubric:
  - '1: No named CDO/data leadership role; no public data‑governance or AI/data policy
    references.'
  - '2: Senior data leader exists (e.g., VP/Head) but not enterprise‑wide; reports
    under IT; limited public mandate; ≤2 relevant data/ML governance job postings
    in last 12 months.'
  - '3: Named CDO/CDO‑equivalent appointed (≤36 months) with enterprise data‑governance
    scope; data policy/standards mentioned in filings or website; 3–5 related postings.'
  - '4: Enterprise CDO with board/exec oversight, data council, and published governance
    (catalog, quality, privacy); ≥6 postings for data/ML platform/governance; references
    to a standardized data platform.'
  - '5: Mature model: CDO reporting to CEO/CFO/CTO; board or committee oversight;
    periodic public reporting on data/AI governance; evidence of standardized data
    platform across markets/brands.'
  evidence_requirements: Data- secure and expand data
- kpi_id: kpi_20
  name: To what extent has the company maintained data security and confidentiality
    in its AI operations — including the presence or absence of data breaches, leaks,
    or other security incidents over the past five years?
  pillar: Technical
  type: rubric
  question: To what extent has the company maintained data security and confidentiality
    in its AI operations — including the presence or absence of data breaches, leaks,
    or other security incidents over the past five years?
  rubric:
  - '1: Repeated or major data breaches; weak controls.'
  - '2: One or more incidents with partial remediation.'
  - '3: Managed risk; isolated incidents handled effectively.'
  - '4: No incidents in past five years; strong controls and certifications.'
  - '5: Proactive AI-specific security, independent audits, real-time monitoring;
    spotless record.'
  evidence_requirements: Data- secure and expand data
- kpi_id: kpi_21
  name: To what extent has the company established a mature, enterprise-wide data
    strategy and foundational architecture that effectively supports AI development
    and deployment?
  pillar: Technical
  type: rubric
  question: To what extent has the company established a mature, enterprise-wide data
    strategy and foundational architecture that effectively supports AI development
    and deployment?
  rubric:
  - '1: No coherent data strategy or architecture.'
  - '2: Fragmented data initiatives; limited AI readiness.'
  - '3: Central data architecture under development; partial AI enablement.'
  - '4: Established enterprise data strategy enabling scalable AI.'
  - '5: Fully integrated, adaptive data architecture governed enterprise-wide with
    AI readiness by design.'
  evidence_requirements: Data Strategy and Architecture
- kpi_id: kpi_22
  name: To what extent does the company integrate and harmonize data from diverse
    internal and external sources to make it efficiently usable for AI and analytics
    applications?
  pillar: Technical
  type: rubric
  question: To what extent does the company integrate and harmonize data from diverse
    internal and external sources to make it efficiently usable for AI and analytics
    applications?
  rubric:
  - '1: Data silos; no integration.'
  - '2: Basic ETL or manual data joins.'
  - '3: Integration across key systems; moderate usability for AI.'
  - '4: Automated pipelines; unified data lake/mesh; strong usability.'
  - '5: Near-real-time data integration, governed metadata, external + internal harmonization.'
  evidence_requirements: Data integration and interoperability
- kpi_id: kpi_23
  name: To what extent is the company’s hardware and cloud infrastructure capable
    of handling expanding AI workloads with high responsiveness, scalability, and
    cost-efficiency?
  pillar: Technical
  type: rubric
  question: To what extent is the company’s hardware and cloud infrastructure capable
    of handling expanding AI workloads with high responsiveness, scalability, and
    cost-efficiency?
  rubric:
  - '1: Infrastructure outdated or on-prem only.'
  - '2: Partial cloud use; scalability limits.'
  - '3: Modern infrastructure but cost/latency issues.'
  - '4: Scalable hybrid/cloud infra optimized for AI loads.'
  - '5: Elastic, cost-optimized AI infrastructure with auto-scaling and performance
    monitoring.'
  evidence_requirements: Infrastructure Scalability and Performance
- kpi_id: kpi_24
  name: To what extent has the company adopted modern, enterprise-grade analytics
    and AI platforms that streamline model development, deployment, monitoring, and
    lifecycle management?
  pillar: Technical
  type: rubric
  question: To what extent has the company adopted modern, enterprise-grade analytics
    and AI platforms that streamline model development, deployment, monitoring, and
    lifecycle management?
  rubric:
  - '1: No standard AI/analytics platform.'
  - '2: Tools exist but fragmented; manual processes.'
  - '3: Unified platform adopted by some teams.'
  - '4: Enterprise-wide standardized AI platform with MLOps tooling.'
  - '5: Fully integrated AI ecosystem with governance, automation, and continuous
    model ops.'
  evidence_requirements: Technology & Analytics platforms
- kpi_id: kpi_25
  name: To what extent are the company’s processes and tools for developing, deploying,
    monitoring, and improving ML models mature, automated, and aligned with production
    standards?
  pillar: Technical
  type: rubric
  question: To what extent are the company’s processes and tools for developing, deploying,
    monitoring, and improving ML models mature, automated, and aligned with production
    standards?
  rubric:
  - '1: Manual, experimental workflows.'
  - '2: Basic CI/CD; inconsistent monitoring.'
  - '3: Defined MLOps pipeline in select teams.'
  - '4: Automated, monitored ML lifecycle with versioning and QA.'
  - '5: Enterprise-grade continuous ML ops with feedback loops and A/B governance.'
  evidence_requirements: MLOps and Model Management
- kpi_id: kpi_26
  name: To what extent has the company implemented robust mechanisms that safeguard
    data against unauthorized access or misuse, ensuring compliance with privacy and
    security regulations (e.g., GDPR, CCPA)?
  pillar: Technical
  type: rubric
  question: To what extent has the company implemented robust mechanisms that safeguard
    data against unauthorized access or misuse, ensuring compliance with privacy and
    security regulations (e.g., GDPR, CCPA)?
  rubric:
  - '1: No compliance controls; violations reported.'
  - '2: Basic policies; partial compliance.'
  - '3: Formal compliance framework with periodic audits.'
  - '4: Certified, organization-wide compliance with privacy laws.'
  - '5: Continuous monitoring, privacy-by-design, AI-specific compliance automation.'
  evidence_requirements: Data security & Privacy
- kpi_id: kpi_27
  name: To what extent is the company modernizing or integrating legacy systems into
    its current data and AI architecture to eliminate bottlenecks and data silos?
  pillar: Technical
  type: rubric
  question: To what extent is the company modernizing or integrating legacy systems
    into its current data and AI architecture to eliminate bottlenecks and data silos?
  rubric:
  - '1: Legacy systems dominate; no integration plan.'
  - '2: Partial modernization projects.'
  - '3: System upgrades underway; partial AI connectivity.'
  - '4: Majority modernized; API-based interoperability.'
  - '5: Fully integrated, API-driven, cloud-native environment; no functional silos.'
  evidence_requirements: Legacy System modernization and integration
- kpi_id: kpi_28
  name: To what extent does the company explore and adopt complementary frontier technologies
    (e.g., IoT, blockchain, edge computing, AR/VR, quantum computing) that enhance
    or expand AI capabilities?
  pillar: Technical
  type: rubric
  question: To what extent does the company explore and adopt complementary frontier
    technologies (e.g., IoT, blockchain, edge computing, AR/VR, quantum computing)
    that enhance or expand AI capabilities?
  rubric:
  - '1: No exploration of emerging tech.'
  - '2: Ad-hoc R&D pilots.'
  - '3: Regular experimentation in some areas.'
  - '4: Active multi-tech adoption supporting AI value creation.'
  - '5: Strategic, scaled integration of frontier tech with measurable AI synergies.'
  evidence_requirements: Emerging Tech Adoption (AI-adjacent)
- kpi_id: kpi_29
  name: Investments in AI-focused companies
  pillar: Technical
  type: rubric
  question: Has the company invested in AI-focused startups or technology companies?
  rubric:
  - '1: 0 publicly disclosed AI investments or CVC activity in last 36 months.'
  - '2: 1 small AI investment or accelerator participation disclosed; limited detail
    on use-case fit.'
  - '3: 2–3 AI investments disclosed (last 36 months) with at least one telco-relevant
    use case (e.g., network AI, CX GenAI); basic integration pilots mentioned.'
  - '4: 4–6 AI investments; portfolio spans multiple telco domains (OSS/BSS, RAN,
    CX); co-development or joint GTM announcements with milestones.'
  - '5: >6 AI investments and an active CVC program; follow-on rounds or exits; portfolio
    companies referenced in deployments/case studies with measurable impact.'
  evidence_requirements: Technology- build or buy scalable AI infrastructure
- kpi_id: kpi_30
  name: Acquisitions of AI-focused companies
  pillar: Technical
  type: rubric
  question: Has the company acquired any AI-focused firms in recent years?
  rubric:
  - '1: No AI-focused acquisitions disclosed in last 36 months.'
  - '2: 1 acquihire or minor AI acquisition disclosed; limited integration evidence.'
  - '3: 1–2 AI acquisitions with clear telco applicability (e.g., model monitoring,
    network analytics) and initial post-merger integration milestones.'
  - '4: ≥2 AI acquisitions integrated into platforms/processes within 12–18 months;
    public case studies/benefits (e.g., MTTR↓, energy↓).'
  - '5: ≥3 AI acquisitions with demonstrable integration across markets/domains (OSS/BSS,
    network, CX) and disclosed synergy metrics or analyst recognition.'
  evidence_requirements: Technology- build scalable AI infrastructure
- kpi_id: kpi_31
  name: Acquisitions of AI-focused tools
  pillar: Technical
  type: rubric
  question: Has the company acquired AI-specific tools, platforms, or software assets?
  rubric:
  - '1: 0–1 named AI tools/platforms publicly referenced; activity limited to trials/POCs.'
  - '2: 2–3 named tools adopted (e.g., model serving or vector DB) but limited integration;
    no reference architecture; vendor-led pilots.'
  - '3: 3–5 named tools in production across ≥3 categories (e.g., feature store, MLOps,
    monitoring, vector DB, orchestration); at least one vendor case study.'
  - '4: 6–8 tools rationalized under a reference architecture with APIs/SSO/RBAC;
    multi-domain usage (CX, network, field) and ≥2 public case studies.'
  - '5: >8 tools integrated as a coherent platform with centralized governance and
    observability; multi-country rollout and recurring third-party references/benchmarks.'
  evidence_requirements: Technology- build scalable AI infrastructure
- kpi_id: kpi_32
  name: Partnerships with AI companies
  pillar: Technical
  type: rubric
  question: How extensive are the company’s partnerships with external AI vendors
    or startups?
  rubric:
  - '1: 0–1 active partnerships in last 24 months with verifiable activity; 0 strategic
    partners of material scale; no published use cases or technical outputs.'
  - '2: 2–10 active partnerships with limited depth; 0–1 strategic partners; activity
    limited to pilots or proofs of concept without published results or customer adoption.'
  - '3: 11–20 active partnerships across 2–3 business areas; includes ≥1 strategic
    partner beyond standard cloud providers; at least 1 publicly demonstrated technical
