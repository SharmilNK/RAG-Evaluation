  - '4: ROI approach audited; causal methods (e.g., A/B, diff‑in‑diff); ≥75% launches
    with verified ex‑post impact; benefits booked in finance.'
  - '5: Portfolio‑level ROI tracked quarterly; forecast vs actual variance ≤10%; ROI
    learnings feed selection and funding decisions.'
  evidence_requirements: Performance and ROI tracking
- kpi_id: kpi_69
  name: How well is delivery aligned with applicable AI/sector regulations during
    rollout and operation (e.g., DPIA, model cards, DSARs)?
  pillar: Execution
  type: rubric
  question: How well is delivery aligned with applicable AI/sector regulations during
    rollout and operation (e.g., DPIA, model cards, DSARs)?
  rubric:
  - '1: Regulatory obligations unknown; no process or documentation.'
  - '2: Basic policies exist; compliance checks after build; limited evidence.'
  - '3: Rollout checklist includes DPIA/record of processing; model cards for sensitive
    use cases; DSAR process defined.'
  - '4: Multi‑region obligations mapped; evidence collected in tooling; ≥80% use cases
    with complete artifacts before go‑live.'
  - '5: Compliance‑by‑design; obligations monitored continuously; audits passed; evidence
    generated automatically; zero major findings in last 12 months.'
  evidence_requirements: Rollout and Usage
- kpi_id: kpi_70
  name: Is the AI use‑case portfolio actively balanced by impact, feasibility, risk,
    and time‑to‑value with stage‑gates?
  pillar: Execution
  type: rubric
  question: Is the AI use‑case portfolio actively balanced by impact, feasibility,
    risk, and time‑to‑value with stage‑gates?
  rubric:
  - '1: Opportunistic backlog; no formal prioritization; frequent pivots.'
  - '2: Simple scoring matrix used sporadically; risk dimension implicit.'
  - '3: Multi‑criteria scoring incl. risk and data readiness; quarterly portfolio
    reviews; clear exit criteria for pilots.'
  - '4: Targeted portfolio balance (e.g., 60/30/10 horizon mix); capacity allocated
    by tier; >70% of investments meet stage‑gate thresholds.'
  - '5: Dynamic rebalancing on signal changes; consistent horizon mix achieved; kill
    rates transparent; value/throughput steadily improves.'
  evidence_requirements: Business deployment- integration into on-going operations
- kpi_id: kpi_71
  name: How mature and reproducible is the model development workflow (from experimentation
    to CI/CD and release)?
  pillar: Technical
  type: rubric
  question: How mature and reproducible is the model development workflow (from experimentation
    to CI/CD and release)?
  rubric:
  - '1: Ad hoc notebooks; environments unmanaged; manual releases.'
  - '2: Partial versioning; some scripted training; basic code review.'
  - '3: Standardized pipelines for train/eval/serve; artifact versioning; reproducible
    builds.'
  - '4: Full CI/CD for models and data; automated tests (data/robustness); canary
    releases and rollbacks; ≥80% of models use the workflow.'
  - '5: End‑to‑end automation incl. feature store, lineage, governance gates; blue‑green/Shadow
    deploy at scale; 95%+ coverage.'
  evidence_requirements: MLOps and Model Management
- kpi_id: kpi_72
  name: Do users have a governed self‑service data & AI portal/marketplace (catalog,
    access control, usage analytics)?
  pillar: Technical
  type: rubric
  question: Do users have a governed self‑service data & AI portal/marketplace (catalog,
    access control, usage analytics)?
  rubric:
  - '1: No catalog; access via tickets; tribal knowledge.'
  - '2: Basic catalog; manual access approvals; stale metadata.'
  - '3: Curated catalog with ownership, quality SLAs; role‑based access; usage tracking
    for popular assets.'
  - '4: Unified portal for data/models/features; approvals automated; lineage visible;
    >70% requests fulfilled via self‑service.'
  - '5: Marketplace drives network effects; recommendations/rating; policy‑as‑code;
    >90% requests self‑served with median wait <1h.'
  evidence_requirements: Technology & Analytics platforms
- kpi_id: kpi_73
  name: Is there an enterprise‑wide canonical data model that underpins AI/analytics
    across domains?
  pillar: Technical
  type: rubric
  question: Is there an enterprise‑wide canonical data model that underpins AI/analytics
    across domains?
  rubric:
  - '1: No common model; each team crafts its own definitions.'
  - '2: Initial conventions in 1–2 domains; collisions frequent.'
  - '3: Canonical model defined for priority domains; change process exists; mappings
    to sources documented.'
  - '4: Enterprise model adopted across ≥4 domains; governed extensions; model health
    KPIs tracked; breaking changes rare.'
  - '5: Canonical model is productized; downstream systems auto‑validated; cross‑company
    interoperability achieved.'
  evidence_requirements: Data Strategy and Architecture
- kpi_id: kpi_74
  name: How complete and enforced are data & model and policies/standards (quality,
    lineage, privacy, retention, access)?
  pillar: Technical
  type: rubric
  question: How complete and enforced are data & model and policies/standards (quality,
    lineage, privacy, retention, access)?
  rubric:
  - '1: Policies informal or outdated; violations unmanaged.'
  - '2: Core policies drafted; manual enforcement; training optional.'
  - '3: Approved policies for quality/lineage/privacy/retention/access; owners named;
    periodic attestation.'
  - '4: Automated policy checks in pipelines; exceptions tracked; ≥80% assets covered;
    staff trained annually.'
  - '5: Policy‑as‑code across stack; continuous monitoring; >95% coverage; zero critical
    violations in last 12 months.'
  evidence_requirements: Data security & Privacy
- kpi_id: kpi_75
  name: To what extent is metadata (technical + business) captured and used to improve
    discovery, lineage, and MDM?
  pillar: Technical
  type: rubric
  question: To what extent is metadata (technical + business) captured and used to
    improve discovery, lineage, and MDM?
  rubric:
  - '1: Scattered spreadsheets; minimal metadata captured.'
  - '2: Partial technical metadata; business glossary missing.'
  - '3: Central metadata repository; lineage for critical flows; initial business
    glossary with owners.'
  - '4: End‑to‑end lineage incl. ML features; glossary linked to KPIs; metadata drives
    impact analysis; ≥80% critical assets covered.'
  - '5: Active metadata; automated enrichment; MDM synchronized; discovery time reduced
    ≥50%; audit queries answered on demand.'
  evidence_requirements: Data integration and interoperability
- kpi_id: kpi_76
  name: Is risk appetite for AI explicitly defined (by domain/use case) and used for
    approvals and guardrails?
  pillar: Organizational
  type: rubric
  question: Is risk appetite for AI explicitly defined (by domain/use case) and used
    for approvals and guardrails?
  rubric:
  - '1: No stated risk appetite; decisions case‑by‑case.'
  - '2: Generic statement exists; not applied in approvals.'
  - '3: Risk thresholds defined for sensitive areas (e.g., privacy, safety); approvals
    reference them.'
  - '4: Risk appetite quantified by domain; thresholds tied to controls; exceptions
    tracked with owner and timeline.'
  - '5: Risk appetite operationalized enterprise‑wide; auto‑checks in workflows; risk
    profile reported to exec/board.'
  evidence_requirements: Cultural Readiness for Data-Driven Transformation
- kpi_id: kpi_77
  name: How visible and concrete is the company’s public advocacy and action on responsible
    AI (AI‑for‑Good)?
  pillar: Organizational
  type: rubric
  question: How visible and concrete is the company’s public advocacy and action on
    responsible AI (AI‑for‑Good)?
  rubric:
  - '1: No public position; no initiatives.'
  - '2: High‑level statement on website; isolated volunteer efforts.'
  - '3: Published commitments and KPIs; ≥1 active program; periodic updates.'
  - '4: Multi‑year portfolio with partners; impact metrics reported; external assurance
    for claims.'
  - '5: Recognized leader; sustained, measurable social impact; open resources/tools
    widely used.'
  evidence_requirements: Community and Social Responsibility
- kpi_id: kpi_78
  name: Are role‑based learning paths and curricula established for AI (from execs
    to engineers) with certification?
  pillar: Organizational
  type: rubric
  question: Are role‑based learning paths and curricula established for AI (from execs
    to engineers) with certification?
  rubric:
  - '1: Ad hoc trainings; no curriculum; low participation.'
  - '2: Basic courses offered; attendance tracked; no proficiency targets.'
  - '3: Role‑based curricula (e.g., exec, PM, DS, ops); assessments required; completion
    targets set.'
  - '4: Certifications recognized; on‑the‑job practice integrated; ≥80% of target
    roles certified; skills mapped to roles.'
  - '5: Continuous upskilling; paths tied to career progression and performance; skills
    inventory drives staffing.'
  evidence_requirements: AI Literacy and Knowledge Sharing
- kpi_id: kpi_79
  name: How structured and scalable is experimentation (PoCs/pilots) with clear success
    metrics and governance?
  pillar: Innovation
  type: rubric
  question: How structured and scalable is experimentation (PoCs/pilots) with clear
    success metrics and governance?
  rubric:
  - '1: Ad hoc PoCs; success undefined; learnings lost.'
  - '2: Basic pilot template; limited metrics; sporadic reviews.'
  - '3: Standard experiment design; predefined success/fail metrics; quarterly review
    board; ≥50% pilots evaluated.'
  - '4: Scaled pipeline with budgets and gates; ≥75% pilots evaluated; learnings codified
    and reused.'
  - '5: Experimentation is a core engine; hit rate improving YoY; time‑to‑pilot and
    time‑to‑production continuously shortened.'
  evidence_requirements: Not specifically called out in AI Playbook
- kpi_id: kpi_80
  name: Are there structured alliances/JVs to accelerate AI value with shared IP,
    data, or distribution?
  pillar: Innovation
  type: rubric
  question: Are there structured alliances/JVs to accelerate AI value with shared
    IP, data, or distribution?
  rubric:
  - '1: 0 alliances or joint ventures related to artificial intelligence; only basic
    vendor or cloud relationships; no shared intellectual property, no shared data,
    no shared infrastructure.'
  - '2: 1–3 non-binding collaboration agreements (memoranda, letters of intent) without
    financial commitments; no shared assets; no technical output, pilots, or governance
    structures in the last 24 months.'
  - '3: ≥4 binding alliance with formal shared intellectual property terms and financial
    contribution from both parties; 1 early technical output (prototype or co-developed
    model) but no customer deployment and limited to one business area or one country.'
  - '4: 5–10 alliances or joint ventures with shared financial risk, joint ownership
    of intellectual property, and shared data or shared infrastructure; at least 1
    joint solution deployed to customers with audited value contribution; execution
    spans multiple functions or multiple countries.'
  - '5: More than 3 multi-year alliances or joint ventures operating across several
    countries with co-investment, joint roadmaps, and shared commercial accountability;
    at least 2 customer-facing joint products that generate material profit-and-loss
    impact; governed through joint boards, contractual performance reviews, and renewal
    based on measurable outcomes.'
  evidence_requirements: Not specifically called out in AI Playbook
- kpi_id: kpi_81
  name: Do standardized, privacy‑preserving data‑sharing mechanisms exist across the
    ecosystem?
  pillar: Innovation
  type: rubric
  question: Do standardized, privacy‑preserving data‑sharing mechanisms exist across
    the ecosystem?
  rubric:
  - '1: No frameworks; bilateral ad hoc exchanges.'
  - '2: Templates exist but not enforced; legal review each time.'
  - '3: Frameworks defined (e.g., clean rooms, FL); templates for DPA/DSA; ≥1 partner
    live.'
  - '4: Multiple partners live; technical & legal controls measured; breaches/incidents
    monitored with SLA.'
  - '5: Ecosystem‑wide frameworks scaled; automated compliance checks; data‑sharing
    materially improves model performance and time‑to‑value.'
  evidence_requirements: Not specifically called out in AI Playbook
- kpi_id: kpi_82
  name: Is the firm actively shaping AI standards and regulation via consortia, position
    papers, and pilots?
  pillar: Innovation
  type: rubric
  question: Is the firm actively shaping AI standards and regulation via consortia,
    position papers, and pilots?
  rubric:
  - '1: No participation; passive observer.'
  - '2: Membership in 1–2 bodies; limited engagement.'
  - '3: Active contributions (papers/working groups); participation in ≥1 standards
    pilot.'
  - '4: Leadership roles or chair positions; citations; pilots inform internal policies.'
  - '5: Recognized thought leader; influences regulation; measurable advantages from
    early alignment.'
  evidence_requirements: Not specifically called out in AI Playbook
- kpi_id: kpi_83
  name: How rigorous is partner/vendor capability assessment (security, compliance,
    quality, delivery, integration)?
  pillar: Innovation
  type: rubric
  question: How rigorous is partner/vendor capability assessment (security, compliance,
    quality, delivery, integration)?
  rubric:
  - '1: Informal selection; references only.'
  - '2: Checklist exists; limited validation; no scoring.'
  - '3: Structured scoring with weightings; evidence required; ≥1 vendor audit/year.'
  - '4: Risk‑based assessments per use case; red teaming; ≥3 critical vendors audited/year;
    corrective actions tracked.'
  - '5: Integrated, continuous assessment; performance‑based contracts; consistent
    vendor improvements YoY.'
