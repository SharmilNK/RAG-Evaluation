- kpi_id: what_ai_technologies_models_are_used_and_what_is_the_maturity_of_agent_based_ai_integrations_in_business_operations
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange S.A. demonstrates organization-wide deployment of generative-AI\
    \ \u201Ccopilot\u201D-style capabilities via Orange Business\u2019s Live Intelligence\
    \ platform, with explicit intent to expand into domain-specific assistants and\
    \ agentic capabilities, indicating maturity beyond isolated pilots. Orange states\
    \ Live Intelligence has helped \u201C90,000 employees use generative AI,\u201D\
    \ and describes active internal usage across software engineering (code writing),\
    \ HR (job descriptions), and commercial/legal work (RFP responses and contract\
    \ review), which evidences employee-facing GenAI embedded into day-to-day operations\
    \ rather than a single proof-of-concept. [1]\n\nIn customer operations (CX), Orange\
    \ Business reports generative AI embedded \u201Cdirectly into contact center and\
    \ CRM environments\u201D to automate customer interactions end-to-end and assist\
    \ human agents with real-time transcription, recommendations, sentiment analysis,\
    \ and post-call documentation. Orange Business further reports \u201C80 million\
    \ AI conversations managed in 2025,\u201D which is consistent with scaled/production\
    \ usage rather than an early pilot. [3] A parallel Orange press release repeats\
    \ the same operational claims (contact-center/CRM embedding and 80 million AI\
    \ conversations), reinforcing that this is a formal, externally communicated offering.\
    \ [7]\n\nOn agent-based AI maturity, Orange\u2019s public materials show clear\
    \ exploration and initial productization intent, but stop short of proving multi-agent\
    \ workflows are broadly embedded across the operating model. Orange Business explicitly\
    \ says it is \u201Cexploring agentic AI\u201D and wants to enable the platform\
    \ to \u201Cmake decisions to interconnect with other systems,\u201D which indicates\
    \ movement toward agentic integrations but is framed as a next step rather than\
    \ confirmed enterprise-wide deployment. [1] Additional reporting describes \u201C\
    agentic AI-powered cloud telephony\u201D that can \u201Cplan the next action and\
    \ autonomously manage the entire call journey,\u201D which supports the presence\
    \ of at least one agentic automation concept/product in operations, particularly\
    \ in voice/CX contexts. [5]\n\nOrange also publicly emphasizes the need for \u201C\
    strong tooling\u201D to \u201Cmonitoring, managing, and iterating on the agents\
    \ across different AI models,\u201D which is an MLOps/agent-operations signal\
    \ aligned with more mature adoption patterns; however, this discussion is presented\
    \ as thought leadership rather than a concrete inventory of internal production\
    \ agent workflows. [4]\n\nTechnology/model specificity is only partially disclosed\
    \ in the provided evidence. The cited materials confirm the use of \u201CGenerative\
    \ AI\u201D through the Live Intelligence platform and its integration into contact\
    \ center/CRM workflows, but they do not name specific foundation models (e.g.,\
    \ GPT-4, Mistral, etc.) or provide architectural details such as RAG implementation\
    \ specifics. [1][3] As a result, the assessment focuses on demonstrated operational\
    \ deployment and stated agentic direction, rather than model-level transparency.\
    \ [1][3]\n\nRubric alignment: The evidence supports production GenAI in at least\
    \ two operational areas: (1) employee productivity across multiple corporate functions\
    \ (engineering, HR, contracting/RFP work) and (2) customer care/contact center/CRM\
    \ operations at significant scale (80 million AI conversations in 2025). [1][3]\
    \ The company also shows early agentic automation direction (agentic AI exploration\
    \ for decisioning/integration and agentic telephony claims), plus MLOps/tooling\
    \ awareness, meeting the core characteristics of Score 4. [1][4][5] The evidence\
    \ does not substantiate Score 5 requirements such as clearly documented multi-agent\
    \ workflows embedded across multiple core operating domains (e.g., network assurance\
    \ and field ops), quantified KPI gains attributable to agentic architectures,\
    \ or hiring/job-posting counts referencing agent frameworks (not provided here).\
    \ [1][3][5]\n\nEvidence gaps and conservatism: No relevant evidence in the packet\
    \ provides job-posting counts for LLM/RAG/agent frameworks, and no provided source\
    \ enumerates multiple named external case studies beyond the Live Intelligence\
