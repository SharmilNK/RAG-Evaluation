- kpi_id: how_long_has_the_company_had_operational_ai_solutions_in_place
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "No relevant KPI-specific signals are provided for \u201Chow long has\
    \ the company had operational AI solutions in place,\u201D so the score is determined\
    \ from dated, externally evidenced examples of AI solutions in operation. [2]\n\
    \nThe earliest clear, dated evidence in the provided materials of an operational\
    \ AI solution at Orange S.A. is from 2023, when Orange teams developed \u201C\
    Live Intelligence,\u201D described as a \u201Cmulti-LLM generative AI platform\u201D\
    \ enabling employees to use generative AI in a secure environment, with \u201C\
    more than 90,000 users\u201D having tested it. [2]\n\nAdditional Orange-authored\
    \ content supports that Live Intelligence is not just a pilot concept but includes\
    \ operational governance/monitoring features (e.g., tracking adoption through\
    \ usage data, oversight dashboards for AI activity) consistent with ongoing use\
    \ rather than a one-off experiment; however, this content does not provide an\
    \ earlier first-execution date than 2023. [3]\n\nA further Orange-authored article\
    \ reinforces operationalization by describing that Live Intelligence was tested\
    \ on 50,000 employees before launch, again without providing any pre-2023 first-operation\
    \ date for AI solutions. [7]\n\nOther provided evidence references internal tools\
    \ (e.g., \u201CDinootoo\u201D) and AI usage at Orange, but it is framed around\
    \ a 2025 event and does not provide a first execution year or earlier dated operational\
    \ AI deployment that would move the first externally evidenced execution into\
    \ 2022 or earlier. [4]\n\nGiven the rubric thresholds, the first externally evidenced\
    \ execution in the provided evidence falls in 2023, which aligns with the 2023\u2013\
    2025 \u201Clate adopter\u201D band. [2]\n\nScore 5 cannot be supported because\
    \ there is no evidence in the provided sources of AI solutions being operational\
    \ by 2016 or earlier, nor evidence of continuity across at least three different\
    \ years since 2018 (as required by the rubric). [2][3][4][7]"
