- kpi_id: is_risk_appetite_for_ai_explicitly_defined_by_domain_use_case_and_used_for_approvals_and_guardrails
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Orange (via its Orange Business communications) describes a formal mechanism\
    \ to assess and classify AI risk by project and to use that classification in\
    \ governance decisions, but the public evidence does not show an explicitly defined,\
    \ quantified \u201Crisk appetite\u201D by domain/use case with threshold levels\
    \ tied to specific control requirements, nor any exception register with owners\
    \ and timelines. [1][8]\n\nOrange states it has established a \u201CResponsible\
    \ AI Design Authority to qualify the risk level associated with each AI project,\u201D\
    \ and that this authority \u201Cclassifies AI systems based on their potential\
    \ impact on individuals, society and critical sectors,\u201D which indicates explicit\
    \ risk categorization criteria tied to impact areas (individuals/society/critical\
    \ sectors) rather than purely ad hoc decisions. [1] Orange also reports a \u201C\
    centralized Responsible AI Committee\u201D that \u201Cprovides a decision-making\
    \ structure on complex questions around AI deployment, accountability and risk\
    \ management,\u201D which indicates that approvals/decisions can reference the\
    \ risk assessment outputs. [1]\n\nIn addition, Orange claims its \u201CData &\
    \ AI Ethics Charter and By Design Governance\u201D is embedded into operations\
    \ and provides \u201Can overarching framework for governing how we approach data\
    \ and AI,\u201D which supports the presence of enterprise principles/guardrails\
    \ for AI decisions. [7][8] Orange further links its governance approach to EU\
    \ AI Act-style risk obligations, stating that \u201Cbusiness lines must ensure\
    \ that they have human oversight mechanisms in place for high-risk systems\u201D\
    \ and that it addressed this by embedding structures, processes, roles, and human\
    \ intervention mechanisms into AI development and operational workflows. [3] This\
    \ is consistent with defined thresholds for sensitive/high-risk areas (e.g., human\
    \ oversight for high-risk systems) and suggests that approval and deployment expectations\
    \ differ by assessed risk level. [3]\n\nHowever, the available evidence does not\
    \ explicitly define a \u201Crisk appetite\u201D (i.e., what level of risk is acceptable)\
    \ by domain or use case, and it does not provide quantified thresholds (e.g.,\
    \ numeric tolerance levels, risk scoring cutoffs, or domain-specific acceptance\
    \ criteria) tied to specific control sets. [1][3][7][8] The evidence also does\
    \ not show that exceptions to risk appetite/thresholds are tracked with accountable\
    \ owners and remediation timelines, nor that risk appetite is operationalized\
    \ via automated checks in workflows and reported regularly to executive or board\
    \ level. [1][3][7][8]\n\nGiven the rubric, the strongest support is for having\
    \ risk thresholds and governance expectations for high-risk/sensitive systems\
    \ (notably EU AI Act-aligned \u201Chigh-risk\u201D oversight) and having approvals/decision\
    \ structures that can use the risk qualification/classification outputs. [1][3]\
    \ This aligns best to Score 3 (risk thresholds for sensitive areas and approvals\
    \ referencing them), while falling short of Score 4\u20135 due to lack of publicly\
    \ evidenced domain-quantified appetite, control-mapped thresholds, and formal\
    \ exception tracking/automation/board reporting. [1][3][7][8]"
