    \ Authority that qualifies the risk level for each AI project and classifies systems\
    \ based on potential impact on individuals, society, and critical sectors, alongside\
    \ a centralized Responsible AI Committee for decisions on complex deployment/accountability/risk-management\
    \ questions. [1] These elements align with \u201Cregular \u2026 ethical impact\
    \ assessments\u201D and ongoing governance expected at Score 4. [1][2]\n\nOrange\u2019\
    s community- and society-facing integration is evidenced by inclusion-oriented\
