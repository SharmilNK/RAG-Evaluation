    \ that, in Africa, it incorporated regional languages into open-source AI models\
    \ \u201Cfor the first time,\u201D with the explicit purpose of promoting digital\
    \ inclusion by enabling communication in local languages and \u201Cdemocratiz[ing]\
    \ AI access.\u201D [3] This indicates AI initiatives designed with community inclusion\
    \ outcomes in mind, rather than only internal efficiency or product performance,\
    \ supporting community engagement/social responsibility integration. [3]\n\nOrange\
    \ also connects social responsibility to fairness and non-discrimination efforts\
    \ through bias reduction and external certification. [6] It states that its AI\
    \ research teams \u201Ccontinuously work to decrease bias,\u201D that it monitors\
    \ KPIs to demonstrate \u201Ctransparency and fair AI,\u201D and that it was the\
    \ first company awarded the GEEIS-AI (AI Gender and Diversity) certification,\
    \ intended to raise awareness across the AI development chain from design to operation.\
    \ [6] These practices strengthen the case for embedded ethical practice and ongoing\
    \ assessment activity (Score 4), though the evidence stops short of providing\
    \ the specific KPI values and longitudinal performance results that would demonstrate\
    \ \u201Ctransparent, measurable\u201D outcomes at Score 5. [6]\n\nOn environmental\
    \ responsibility, Orange reports integrating sustainability considerations into\
    \ AI from the design stage and adds a measurement practice that is partly transparent.\
    \ [3][8] Specifically, it states it \u201Ccalculat[es] and communicat[es] the\
    \ carbon costs of GenAI solutions sold to our customers,\u201D applies life cycle\
    \ assessment (LCA) to evaluate AI on the cloud, and is working on mitigation through\
