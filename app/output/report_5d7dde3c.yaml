- kpi_id: how_strongly_is_an_ai_driven_and_innovation_oriented_mindset_embedded_in_the_company_s_organizational_culture
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange shows strong evidence that an AI-driven, innovation-oriented\
    \ mindset is being embedded broadly across the organization through enterprise-wide\
    \ enablement, grassroots experimentation, and formal responsible-AI structures\u2014\
    though the provided evidence stops short of demonstrating an unambiguous, company-wide\
    \ \u201CAI-first\u201D culture that would justify the top tier. [2][3][4][8]\n\
    \nOrange has moved beyond an \u201CAI as an IT tool\u201D framing by enabling\
    \ wide employee participation and experimentation with generative AI. [2][3] Orange\
    \ reports making its proprietary GenAI platform \u201CLive Intelligence\u201D\
    \ available to its entire workforce (over 100,000 employees), explicitly positioning\
    \ the rollout as democratizing GenAI rather than limiting it to specialists. [2]\
    \ The same source set describes sustained, large-scale usage (12,000\u201315,000\
    \ daily users and up to 48,000 monthly users) and a high volume of employee-built\
    \ artifacts (over 20,000 personal AI agents, with ~300 elevated to enterprise-grade\
    \ \u201Cofficial\u201D tools), which indicates AI-enabled innovation is occurring\
    \ bottom-up at meaningful scale rather than only in pilot teams. [3]\n\nThe evidence\
    \ also indicates Orange is cultivating a culture that supports ongoing learning\
    \ and peer-driven innovation, which aligns with management encouraging experimentation\
    \ (rubric level 3+) and moving toward integration into operating principles (rubric\
    \ level 4). [4] Orange reports employees becoming advocates who organize grassroots\
    \ initiatives such as \u201CLive Intelligence caf\xE9s\u201D and team hackathons\
    \ to help peers adopt and innovate with GenAI, suggesting AI activity is socially\
    \ reinforced rather than confined to formal training programs. [4] Orange further\
    \ reports an employee satisfaction rate for the tool of 8.3/10, which supports\
    \ that adoption is not merely mandated but positively received by users. [4]\n\
    \nResponsible innovation appears institutionalized through governance, transparency,\
    \ and ethical-by-design practices, supporting a \u201Cmanagement principles\u201D\
    \ integration consistent with a score of 4. [2][5][7] Orange states it created\
    \ clear technical and legal frameworks so employees can experiment confidently\
    \ while protecting data and reputation, which indicates governance is designed\
    \ to enable (not block) innovation. [2] Orange also describes radical transparency\
    \ features\u2014employees can create and share AI assistants and can see and understand\
    \ system settings and prompts\u2014positioning responsible use as part of everyday\
    \ practice rather than a back-office compliance layer. [2] Orange additionally\
    \ describes oversight mechanisms (a dashboard providing visibility into AI activity,\
    \ including costs and carbon emissions) and an employee charter pledge around\
    \ privacy (no personally identifiable information stored), reinforcing that \u201C\
    how we innovate\u201D is codified into operating norms. [5]\n\nOrange\u2019s HR\
    \ leadership messaging and large-scale acculturation/training further support\
    \ that cultural change is being driven beyond technical functions. [8][3] Orange\u2019\
    s Executive Vice President of Human Resources is cited describing the need to\
    \ \u201Cget employees on board with this transformation,\u201D emphasizing human-centered\
    \ collaboration with AI and explicitly calling for training and development supported\
    \ by acculturation tools (Dinootoo) and a network of ambassadors. [8] Separately,\
    \ Orange reports that 50,000 employees are fully trained to use GenAI, which is\
    \ consistent with broad internal capability-building rather than isolated experimentation.\
    \ [3]\n\nHowever, the evidence provided does not fully meet the rubric bar for\
    \ a \u201Ccompany-wide AI-first mindset with continuous innovation culture\u201D\
    \ (score 5). [3][8] While Orange reports large-scale availability and significant\
    \ daily/monthly usage of Live Intelligence, the same evidence also implies adoption\
    \ is still partial (e.g., 48,000 monthly users out of 100,000 employees, and 50,000\
    \ trained), which suggests strong momentum but not yet a universal, default \u201C\
    AI-first\u201D way of working everywhere in the company. [3] The evidence also\
    \ emphasizes \u201Cresponsible enablement\u201D and training/acculturation as\
    \ a transformation in progress, which supports Medium-High rather than unequivocal\
    \ High. [3][8]\n\nCounted entities (employee-led innovation mechanisms explicitly\
    \ cited): [4]\n1) Live Intelligence caf\xE9s (grassroots initiatives organized\
    \ by employee advocates). [4]\n2) Team hackathons (organized to inspire and support\
    \ peers). [4]\n\nOverall, the evidence best fits rubric level 4: AI is embedded\
    \ via enterprise-wide tools, democratized innovation, transparency/guardrails,\
    \ and structured training/ambassador networks\u2014indicating AI mindset integration\
    \ into operating norms and management practices\u2014but not yet demonstrably\
    \ \u201CAI-first\u201D for the entire company. [2][3][4][5][8]"
