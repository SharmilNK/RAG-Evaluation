- kpi_id: has_the_company_appointed_an_executive_or_function_dedicated_to_ai_ethics_and_risk
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Orange S.A. demonstrates that it has established dedicated governance\
    \ bodies focused on AI ethics and risk, but the provided public evidence does\
    \ not clearly show a single executive role dedicated to AI ethics/risk, nor does\
    \ it provide enough detail to confirm the more advanced operational elements required\
    \ for higher tiers (e.g., model register, formal review gates, training at scale,\
    \ or independent oversight reporting). [1][8]\n\nDedicated AI ethics/risk functions\
    \ are evidenced by Orange\u2019s creation of a \u201CResponsible AI Design Authority\u201D\
    \ that is described as an expert multidisciplinary authority responsible for qualifying/classifying\
    \ the risk level associated with each AI project based on potential impact. [1]\
    \ Orange also states it has a \u201Ccentralized Responsible AI Committee\u201D\
    \ that provides decision-making structure on complex AI deployment, accountability,\
    \ and risk-management questions. [1] In addition, Orange describes a corporate-level\
    \ \u201CEthics Council\u201D that reviews AI projects, trains teams, and participates\
    \ in developing responsible solutions, indicating an ongoing function rather than\
    \ an ad hoc activity. [8]\n\nOrange also provides evidence of a published ethical\
    \ framework, stating it has a \u201CData & AI Ethics Charter and By Design Governance\u201D\
    \ that serves as an overarching framework for governing its approach to data and\
    \ AI, aligned with the EU AI Act and related legislation. [3][8] This combination\u2014\
    dedicated governance bodies (Design Authority/Committee/Ethics Council) plus a\
    \ published charter/framework\u2014meets the rubric expectations for a score of\
    \ 3 (dedicated lead/committee and published policy with high-level risk process).\
    \ [1][3][8]\n\nHowever, the evidence does not clearly substantiate the rubric\
    \ requirements for score 4. While Orange references an internal platform \u201C\
    to manage AI system models\u201D and mentions \u201Ccentralized governance\u201D\
    \ and \u201Cintegrated safeguards for GDPR compliance,\u201D it does not explicitly\
    \ confirm a model register, formalized review gates across bias/privacy/robustness,\
    \ or organization-wide staff training as a defined program with clear requirements\
    \ and coverage. [1] The Ethics Council page mentions \u201Ctraining programs,\u201D\
    \ but does not provide the operational detail (e.g., mandatory training, scope,\
    \ completion metrics) needed to evidence a mature central Responsible AI function\
    \ with systematic gates and registers as described in the score-4 rubric. [8]\n\
    \nThe evidence also falls short of score 5 requirements (independent oversight\
    \ with periodic transparency reports, measurable risk KPIs, and explicit participation\
    \ in external standards bodies). While Orange indicates it is \u201Cpart of the\
    \ EU AI Pact\u201D and references monitoring KPIs in general terms, the provided\
