- kpi_id: to_what_extent_has_the_company_operationalized_ai_demonstrating_tangible_rollout_and_active_usage_of_ai_or_genai_in_core_business_operations_workflows_or_decision_processes_at_scale
  pillar: DB Imported
  type: rubric
  score: 5.0
  confidence: 0.7
  rationale: "Orange S.A. demonstrates enterprise-scale operationalization of AI/GenAI,\
    \ evidenced by a very large number of deployed AI use cases, widespread employee\
    \ rollout and active usage, and concrete examples of AI embedded in core operational\
    \ decisioning and automation across multiple countries. [7][2][8]\n\nOn scaled\
    \ deployment breadth, Orange reports introducing 146 \u201Chigh-impact\u201D AI\
    \ use cases in 2023, which substantially exceeds the rubric\u2019s threshold of\
    \ \u201C>25 scaled use cases\u201D for the top tier and indicates AI is not limited\
    \ to a handful of pilots. [7] This is reinforced by an enterprise GenAI program\
    \ that has progressed beyond experimentation into ongoing usage at material scale,\
    \ including large numbers of \u201Cofficial\u201D enterprise-grade tools built\
    \ from internal agent creation. [2]\n\nOn active usage at scale (workforce adoption),\
    \ Orange states it rolled out its proprietary GenAI platform \u201CLive Intelligence\u201D\
    \ to every employee in 2023, with 12,000\u201315,000 daily users and up to 48,000\
    \ employees using it each month, indicating sustained day-to-day operational usage\
    \ rather than one-time trials. [2] In parallel, Orange\u2019s internal tool \u201C\
    Dinootoo\u201D surpassed 100,000 unique users, further supporting broad workforce\
    \ reach. [8] Orange also reports substantial enablement through training (e.g.,\
    \ 50,000 employees \u201Cfully trained to use GenAI\u201D for Live Intelligence;\
    \ and 60,000 employees trained for Dinootoo), which is consistent with enterprise-level\
    \ operationalization where AI is expected to be used in standard workflows. [2][8]\n\
    \nOn \u201Ctangible rollout\u201D into core operations and decision processes\
    \ (not just general productivity), the evidence includes multiple operational\
    \ domains: (1) marketing decisioning using AI to predict which offers are most\
    \ relevant to customers, described as driving measurable revenue increases across\
    \ \u201Cmany\u201D countries and being replicated to additional countries; (2)\
    \ contact-center operations supported by automation (RPA) with 500,000 hours saved\
    \ in 2023; and (3) network operations where radio configuration is automated in\
    \ most countries and Orange automatically changes 20 million radio parameters\
    \ per month, with some use cases leveraging AI to reduce energy consumption. [7]\
    \ These examples indicate AI is embedded in core business operations (commercial,\
    \ customer operations, network operations) and deployed across geographies. [7]\n\
    \nOn operational controls and governance to sustain scaled usage, Orange describes\
    \ usage monitoring and \u201Cclear oversight of all AI activity\u201D via a dashboard\
    \ for its GenAI tool, explicitly used to track adoption through usage data and\
    \ the creation of AI assistants, which aligns with standardized operational management\
    \ rather than ad hoc experimentation. [1] The same source indicates oversight\
    \ extends to cost and carbon visibility and model selection controls, suggesting\
    \ Orange has implemented enterprise guardrails around GenAI usage. [1]\n\nWhile\
    \ the evidence does not quantify the exact percentage of Orange\u2019s total workforce\
    \ or processes using AI at a daily or >80% level, the combination of (a) enterprise-wide\
    \ rollout to employees, (b) very high user counts (including 100,000 unique users\
    \ on Dinootoo), (c) sustained daily/monthly usage metrics for Live Intelligence,\
    \ and (d) 146 high-impact AI use cases plus large-scale network automation across\
    \ most countries collectively supports the rubric\u2019s Score 5 characterization\
    \ of AI operationalization at enterprise scale across several countries and functions.\
    \ [7][2][8][1]"
