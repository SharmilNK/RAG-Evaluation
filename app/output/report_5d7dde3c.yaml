- kpi_id: how_complete_and_enforced_are_data_model_and_policies_standards_quality_lineage_privacy_retention_access
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Orange (via Orange Business communications) provides explicit commitments\
    \ and governance mechanisms that indicate the existence of approved policies/standards\
    \ across several required domains (privacy, retention, access/security) and at\
    \ least partial governance for AI models, but the provided evidence does not demonstrate\
    \ automated enforcement, quantified coverage (e.g., \u226580% of assets), or exception\
    \ tracking required for higher tiers. [5]\n\n**Privacy, retention, and data location\
    \ controls (policy presence):** Orange states \u201Cclear commitments\u201D that\
    \ \u201Cno data sent to large language models (LLMs) would be retained or reused,\u201D\
    \ and that \u201Call data would be hosted securely within Europe,\u201D which\
    \ directly maps to retention and data residency/privacy policy intent. [5] Orange\
    \ also states that even when adding web search capabilities, it ensured \u201C\
    full compliance with these strict protocols,\u201D indicating the rules are not\
    \ merely aspirational but treated as enforceable operating requirements, at least\
    \ for the GenAI tooling described. [5]\n\n**Access/security governance and lifecycle\
    \ framing (policy scope):** Orange Business frames cybersecurity as requiring\
    \ compliance with \u201Cdata retention laws\u201D and protection against \u201C\
    unauthorized access,\u201D and emphasizes \u201Ccontinuously monitoring\u201D\
    \ data \u201Clocation, integrity, and accessibility,\u201D which aligns with access/security\
    \ and monitoring expectations at a policy/standards level. [3] The same source\
    \ also states trust and compliance must be embedded across the \u201Cdata lifecycle,\u201D\
    \ explicitly including \u201Cdata creation and governance to processing, deployment,\
    \ and insight generation,\u201D supporting the presence of lifecycle-wide standards\
    \ rather than isolated controls. [3]\n\n**Model governance structures exist (ownership/governance\
    \ signals, but not full policy enforcement detail):** Orange Business states it\
    \ has created a \u201Csecure and compliant internal platform to manage AI system\
    \ models,\u201D providing \u201Ccentralized governance\u201D and \u201Cintegrated\
    \ safeguards for GDPR compliance,\u201D which supports the presence of model governance\
    \ and privacy-by-design controls. [7] It also describes formal governance bodies\u2014\
    a \u201CResponsible AI Design Authority\u201D to qualify/classify risk for each\
    \ AI project and a \u201Ccentralized Responsible AI Committee\u201D for decision-making\
    \ on AI deployment/accountability/risk management\u2014supporting that governance\
    \ ownership/decision rights exist for AI systems. [7]\n\n**What is missing to\
    \ reach Score 4\u20135 (automation, coverage, and enforcement metrics):** None\
    \ of the provided evidence quantifies the share of data/model assets covered by\
    \ these policies (e.g., \u226580% or >95%), describes automated policy checks\
    \ integrated into data/model pipelines, or demonstrates systematic exception tracking\
    \ and resolution. [3][5][7] The evidence also does not show annual staff-wide\
    \ training, periodic attestation, or zero critical violations in the past 12 months,\
    \ all of which are required by the Score 4\u20135 rubric. [3][5][7]\n\n**Rubric\
    \ alignment and conservative scoring:** Given the explicit retention/privacy commitments\
    \ for GenAI usage, the stated continuous monitoring intent around data integrity/accessibility,\
    \ and the described centralized model governance structures, Orange meets the\
    \ bar for having approved policies/standards with named governance mechanisms\
    \ (Score 3). [3][5][7] However, due to the absence of evidence for automated enforcement,\
    \ exception management, and coverage/training metrics, a higher score is not supported.\
    \ [3][5][7]"
