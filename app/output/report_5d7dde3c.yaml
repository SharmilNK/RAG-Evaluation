- kpi_id: how_well_does_the_company_report_compliance_with_ai_related_regulations
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange (via Orange Business) publicly reports multiple, specific elements\
    \ of AI regulatory compliance readiness\u2014especially aligned to the EU AI Act\u2014\
    going beyond general commitments by describing governance bodies, risk classification,\
    \ risk management planning, and auditing practices. [1][3][5][6]\n\nOrange reports\
    \ having created a \u201Csecure and compliant internal platform\u201D for managing\
    \ AI system models with \u201Ccentralized governance\u201D and \u201Cintegrated\
    \ safeguards for GDPR compliance,\u201D explicitly positioning this as part of\
    \ meeting \u201CEuropean regulatory standards.\u201D [1] This constitutes concrete\
    \ compliance-oriented control infrastructure rather than a high-level statement\
    \ of intent. [1]\n\nOrange also describes formal internal governance structures\
    \ to oversee AI risk and compliance, including a \u201CResponsible AI Design Authority\u201D\
    \ that \u201Cqualif[ies] the risk level associated with each AI project\u201D\
    \ and \u201Cclassifies AI systems based on their potential impact,\u201D as well\
    \ as a \u201Ccentralized Responsible AI Committee\u201D for decision-making on\
    \ \u201Caccountability and risk management.\u201D [1] This indicates an organized,\
    \ documented process for risk-based governance that mirrors the EU AI Act\u2019\
    s risk-tiering logic. [1][6]\n\nFor high-risk system expectations, Orange explicitly\
    \ discusses \u201Chuman oversight mechanisms\u201D for \u201Chigh-risk systems\u201D\
    \ and states it has embedded \u201Cclear structures, processes and roles into\
    \ AI development and operational workflows,\u201D including \u201Cmechanisms for\
    \ human intervention\u201D in case of anomalies or ethical dilemmas. [3] This\
    \ is a concrete control description tied to AI Act-style accountability and oversight\
    \ obligations. [3]\n\nOrange further reports \u201Ccomprehensive AI Act risk management\
    \ planning,\u201D including \u201Crisk assessment processes, mitigation strategies\
    \ and regular auditing of AI systems for compliance monitoring.\u201D [5] The\
    \ explicit mention of \u201Cregular auditing\u201D supports the rubric\u2019s\
    \ requirement for internal audits/processes, and the linkage to AI Act compliance\
    \ indicates regulatory readiness reporting. [5]\n\nIn addition, Orange reports\
    \ participation in the \u201CEU AI Pact,\u201D describing it as a vehicle for\
    \ \u201Cdialogue with policymakers, industry leaders and other stakeholders,\u201D\
    \ and positioning it as helping companies \u201Ccomply with the EU AI Act before\
    \ its full enforcement.\u201D [5] This indicates active engagement in a regulator-adjacent\
    \ initiative tied to AI Act preparedness (though it is not equivalent to formal\
    \ regulator enforcement engagement or annual statutory compliance reporting).\
    \ [5]\n\nOrange also reports having a \u201CData & AI Ethics Charter and By Design\
    \ Governance\u201D as an \u201Coverarching framework\u201D for governing data\
    \ and AI, stating it is \u201Caligning with the EU AI Act and evolving legislation\u201D\
    \ in the region. [6] This strengthens the evidence that compliance is treated\
    \ systematically within a governance framework rather than as a one-off project.\
    \ [6]\n\nHowever, the public materials provided do not demonstrate the rubric\u2019\
    s highest tier elements, such as independent management-system certification specifically\
    \ for AI governance (e.g., ISO/IEC 42001) and recurring, annual compliance reporting\
    \ to stakeholders. [5][6] While Orange states it was awarded the \u201CGEEIS-AI\u201D\
    \ certification, the cited context is oriented to gender/diversity in the AI development\
    \ chain rather than an overarching AI regulatory compliance certification scheme,\
    \ and the evidence does not describe it as an independent assessment of EU AI\
    \ Act compliance or a full AI governance management system certification. [5]\n\
    \nBased on the above, Orange\u2019s reporting meets the rubric\u2019s Score 4\
    \ characteristics (documented processes for risk classification, high-risk oversight\
    \ mechanisms, and regular auditing/compliance monitoring), but does not reach\
    \ Score 5 due to the absence in the provided evidence of ISO/IEC 42001 (or equivalent)\
    \ AI governance certification and explicit annual compliance reporting. [1][3][5][6]"
