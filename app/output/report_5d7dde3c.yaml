  pillar: DB Imported
  type: rubric
  score: 5.0
  confidence: 0.7
  rationale: "Orange S.A. demonstrates enterprise-scale AI literacy enablement supported\
    \ by training at significant employee volumes, plus multiple mechanisms that encourage\
    \ peer knowledge sharing around internal GenAI tools. [2][5]\n\nOrange reports\
    \ training tens of thousands of employees on its internal AI/GenAI tooling, which\
    \ indicates structured, repeatable learning programs rather than ad hoc upskilling.\
    \ [2][5] Specifically, Orange states that 60,000 employees have been trained to\
    \ use Dinootoo, and that the tool has surpassed 100,000 unique users, indicating\
    \ broad workforce reach for both enablement and practical usage. [2] In parallel,\
    \ Orange states that 50,000 employees are fully trained to use GenAI in the context\
    \ of its Live Intelligence rollout, reinforcing the presence of large-scale AI\
    \ literacy efforts across the organization. [5]\n\nOrange also evidences formalized,\
    \ internal \u201Chuman support\u201D structures that go beyond training content\
    \ alone, consistent with a culture of peer support and knowledge diffusion. [2][3]\
    \ Orange reports that 25,000 employees have been supported by a network of ambassadors\
    \ on specific use cases, which is a clear internal community-of-practice style\
    \ mechanism for spreading skills and practical know-how. [2] The same source set\
    \ describes this ambassador network as part of Orange\u2019s approach to \u201C\
    get employees on board\u201D through training, development, and an acculturation\
    \ tool, further tying workforce enablement to structured change management. [3]\n\
    \nKnowledge sharing is additionally enabled through product features and grassroots\
    \ community practices around Orange\u2019s GenAI platform. [6][7] Orange describes\
    \ that with Live Intelligence \u201Cevery employee can \u2026 create and share\
    \ AI assistants,\u201D which functions as an internal knowledge-sharing mechanism\
    \ because reusable assistants/prompts can be shared across colleagues. [6][7]\
    \ Orange further notes that employees have organized grassroots initiatives such\
    \ as \u201CLive Intelligence caf\xE9s and team hackathons\u201D to inspire and\
    \ support peers, which is direct evidence of peer-to-peer learning and internal\
    \ communities forming around AI usage. [7]\n\nOrange\u2019s approach is framed\
    \ explicitly as enterprise-wide enablement rather than limited rollouts to specialists,\
    \ and the company links this to transparent guardrails and internal education\
    \ to build trust and adoption. [5][6] Orange states that it made Live Intelligence\
    \ available to its entire workforce (over 100,000 employees), and that this democratized\
    \ access encouraged staff to explore the technology and develop solutions in their\
    \ day-to-day workflows, which supports the notion of broad AI literacy rather\
    \ than role-restricted training only. [6] The evidence also indicates that Orange\
    \ provides \u201Cshort training modules for all employees,\u201D further supporting\
    \ the breadth of the literacy initiative. [8]\n\nTaken together\u2014large-scale\
    \ reported training numbers, workforce-wide tool access, an ambassador support\
    \ network at scale, and explicit mechanisms for sharing AI assistants plus community\
    \ events\u2014Orange meets the rubric\u2019s highest bar for enterprise-wide AI\
    \ literacy programs and a culture of peer sharing. [2][5][6][7]"
