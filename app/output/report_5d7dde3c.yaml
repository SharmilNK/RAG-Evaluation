- kpi_id: does_the_company_s_c_level_publicly_communicate_a_defined_ai_strategy
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange S.A.\u2019s C-level publicly signals a defined AI strategy by\
    \ directly framing GenAI as a strategic business asset and showing visible CEO\
    \ engagement in internal GenAI rollout communications. Orange Business reports\
    \ that CEO Aliette Mousnier-Lompr\xE9 attended key meetings and shared her experience\
    \ of the company\u2019s GenAI tool \u201CLive Intelligence,\u201D explicitly positioning\
    \ GenAI as \u201Ca strategic business asset, not just an IT tool,\u201D and noting\
    \ customized training for the Executive Committee. [3]\n\nThe company also publicly\
    \ describes governance structures and operating mechanisms that indicate a structured\
    \ AI strategy beyond high-level intent. Orange Business states it has created\
    \ a \u201CResponsible AI Design Authority\u201D to qualify risk levels for AI\
    \ projects and a centralized \u201CResponsible AI Committee\u201D to provide decision-making\
    \ on AI deployment, accountability, and risk management. [4] Orange Business further\
    \ describes embedding \u201Cclear structures, processes and roles into AI development\
    \ and operational workflows,\u201D and using multidisciplinary teams spanning\
    \ legal/technical/compliance, which supports the existence of cross-functional\
    \ operating practices for AI delivery and compliance. [1]\n\nOrange S.A.\u2019\
    s public communications also emphasize external regulatory alignment and responsible\
    \ AI principles as part of its AI approach. Orange Business describes a \u201C\
    Responsible AI By Design\u201D philosophy with human oversight across the AI lifecycle,\
    \ including intervention mechanisms for anomalies or ethical dilemmas, and explicitly\
    \ ties its governance approach to EU AI Act accountability and oversight expectations.\
    \ [1] Orange Business also describes building a secure and compliant internal\
    \ platform to manage AI system models with \u201Ccentralized governance\u201D\
    \ and \u201Cintegrated safeguards for GDPR compliance,\u201D reinforcing that\
    \ strategy communications include governance and compliance elements rather than\
    \ only experimentation. [4]\n\nIn terms of scale signals consistent with a defined\
    \ AI strategy being communicated from leadership, Orange Business reports the\
    \ GenAI tool \u201CLive Intelligence\u201D was tested on 50,000 employees before\
    \ launch, indicating large-scale internal deployment planning and change management.\
    \ [1] Separately, Orange\u2019s public-facing content states that \u201C100,000\
    \ employees are using its internal Dinootoo tool,\u201D indicating broad workforce\
    \ exposure to internal AI tooling (a key component of an enterprise AI strategy).\
    \ [7]\n\nHowever, the evidence provided does not demonstrate several elements\
    \ required for the highest rubric tier (Score 5). The provided sources do not\
    \ show board-level AI oversight via a dedicated committee/charter specifically\
    \ for AI, do not disclose multi-year funding commitments for AI, and do not provide\
    \ public change KPIs such as workforce training percentages or adoption-rate targets\
    \ with progress updates in formal filings. [3][4][7] The evidence also does not\
    \ provide explicit reskilling targets stated as a numeric commitment (e.g., \u201C\
    \u22651,000 employees reskilled\u201D) even though it discusses upskilling/reskilling\
    \ in general terms. [1]\n\nGiven the clear C-level public communication (CEO visibility\
    \ and ExCom training) plus formal responsible-AI governance bodies and large-scale\
    \ internal tool rollout\u2014yet without the board-level oversight, multi-year\
    \ funding disclosure, and formal public change KPIs required for Score 5\u2014\
    Orange S.A. best fits Score 4 (Medium-High). [1][3][4][7]"
