- kpi_id: presence_and_clarity_of_a_publicly_communicated_ai_roadmap_outlining_long_term_objectives_milestones_and_investment_priorities
  pillar: DB Imported
  type: rubric
  score: 1.0
  confidence: 0.7
  rationale: "Orange S.A.\u2019s provided public materials in scope do not constitute\
    \ a publicly communicated AI roadmap with long-term objectives, milestones, and\
    \ investment priorities, because the evidence consists of general thought-leadership\
    \ and guidance on AI governance, infrastructure, and \u201Ctrustworthy AI\u201D\
    \ rather than a structured roadmap. [1][2][4][6][7]\n\nThe Orange Business article\
    \ on \u201CData & AI trends for 2026\u201D discusses external regulatory timelines\
    \ (e.g., EU AI Act enforcement cycles) and common organizational responses (frameworks,\
    \ inventories, committees), but it does not set out Orange S.A.-specific long-term\
    \ objectives, dated milestones, or investment priorities that would allow a reader\
    \ to track progress against a roadmap. [1]\n\nThe infrastructure-focused blog\
    \ emphasizes general best practices for operationalizing GenAI services (e.g.,\
    \ treating infrastructure as an enabler, placing ideas in a \u201Cparking lot\u201D\
    ), but it does not define an Orange S.A. roadmap with explicit milestones, owners,\
    \ or measurable targets. [2]\n\nThe Orange Business \u201CGenAI: trust by design\u201D\
    \ and \u201Ctrusted AI\u201D articles frame trust, compliance, and governance\
    \ principles as critical to adoption and responsible implementation, but they\
    \ do not provide a roadmap artifact (e.g., multi-year plan with phases, milestones,\
    \ and investment themes) for Orange S.A. [4][6]\n\nThe ethical AI blog mentions\
    \ Orange Business embedding governance structures, processes, and roles into AI\
    \ workflows and references testing \u201CLive Intelligence\u201D on 50,000 employees\
    \ before launch, but this is an example of governance practice and product validation\
    \ rather than a publicly articulated, long-term AI roadmap with milestones and\
    \ investment priorities. [7]\n\nSignals provided focus on governance structures,\
    \ AI ethics documentation, AI use cases, products, and AI infrastructure initiatives;\
    \ however, none of the signals explicitly evidences the existence and clarity\
    \ of a publicly communicated AI roadmap with milestones and investment alignment,\
    \ which is the KPI being scored. [40][69][112][122][75][62]\n\nGiven the lack\
    \ of any roadmap-like public document (or equivalent roadmap disclosure with objectives,\
    \ milestones, and investment priorities) in the evidence set, the conservative\
    \ assessment against the rubric is Score 1 (no roadmap or only vague statements).\
    \ [1][2][4][6][7]"
