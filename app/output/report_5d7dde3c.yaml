- kpi_id: to_what_extent_does_the_company_promote_an_ethical_culture_and_mechanisms_for_continuous_improvement_in_ai_practices
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange S.A. demonstrates a defined Responsible/ethical AI framework\
    \ with formal governance and review bodies, plus mechanisms that indicate ongoing\
    \ improvement and oversight, but the provided evidence does not fully substantiate\
    \ independent, systematic audits and lifecycle-wide assurance at the level implied\
    \ by the highest rubric tier. [5][3][4]\n\nOrange has a formal ethical AI framework\
    \ articulated through a \u201CData & AI Ethics Charter and By Design Governance,\u201D\
    \ which it describes as an overarching framework for governing its approach to\
    \ data and AI and for embedding ethical principles into operations. [5] Orange\
    \ also states that \u201C100% of Orange\u2019s new AI solutions are developed\
    \ according to the principles of our Ethics Charter,\u201D which indicates an\
    \ organization-wide expectation rather than a limited, ad hoc approach. [8] This\
    \ combination supports the rubric requirement for more than mere awareness (Scores\
    \ 1\u20132) and indicates defined policy with broad application. [5][8]\n\nOn\
    \ mechanisms and oversight, Orange describes dedicated AI governance structures,\
    \ including a \u201CResponsible AI Design Authority\u201D that qualifies and classifies\
    \ AI project risk levels based on potential impacts, and a centralized \u201C\
    Responsible AI Committee\u201D that provides decision-making on complex questions\
    \ related to AI deployment, accountability, and risk management. [3] These structures\
    \ align strongly with the rubric\u2019s Score 4 expectation of an active ethics\
    \ committee and a continuous review/decision process, because they are positioned\
    \ as standing authorities used to assess AI projects and guide deployment decisions\
    \ rather than one-off reviews. [3]\n\nOn continuous improvement mechanisms embedded\
    \ into development and operations, Orange states it embeds \u201Cclear structures,\
    \ processes and roles into AI development and operational workflows,\u201D and\
    \ that it applies a \u201CResponsible AI By Design\u201D philosophy with human\
    \ oversight integral \u201Cat every stage of the AI lifecycle,\u201D including\
    \ mechanisms for human intervention in case of anomalies or ethical dilemmas.\
    \ [1] Orange also describes organizational measures supporting continuous improvement,\
    \ including multidisciplinary teams (legal, technical, compliance) and upskilling/reskilling\
    \ efforts to meet governance and regulatory demands. [1] Additionally, Orange\
    \ indicates it implemented comprehensive AI Act risk management planning that\
    \ includes risk assessment processes, mitigation strategies, and \u201Cregular\
    \ auditing of AI systems for compliance monitoring,\u201D which strengthens the\
    \ case for an improvement loop beyond static policy. [4]\n\nOrange also describes\
    \ broader ethical-culture mechanisms that can reinforce ethical practice and reporting\
    \ pathways, including a \u201CData Ethics and AI Committee\u201D and a whistleblowing\
    \ confidential system for reporting violations with protections against retaliation,\
    \ as presented in an integrated report for Orange Polska. [2] However, because\
    \ this evidence is specific to Orange Polska rather than explicitly to Orange\
    \ S.A. group-wide governance, it is best treated as contextual support rather\
    \ than the primary basis for scoring the parent company\u2019s KPI performance.\
    \ [2]\n\nDespite strong governance-by-design and committee structures, the evidence\
    \ set does not clearly demonstrate the full breadth of Score 5 (\u201CEthics-by-design\
    \ embedded across lifecycle; continuous learning and audits applied\u201D) at\
    \ an enterprise assurance level with repeatable, independent audit practices across\
    \ the lifecycle. [1][4] While Orange references \u201Cregular auditing\u201D for\
    \ compliance monitoring and describes bias-reduction work and monitoring KPIs\
    \ for transparency/fairness, the provided excerpts do not specify audit independence,\
    \ audit scope/coverage across all AI systems, or how audit outcomes systematically\
    \ feed into continuous learning, remediation, and re-certification across the\
    \ portfolio. [4] Therefore, the most supportable rating is Score 4 (Medium-High):\
    \ active committees/authorities and continuous review processes with governance\
    \ embedded into workflows, but without enough detail in the provided evidence\
    \ to confirm the comprehensive, audit-driven continuous learning regime implied\
    \ by Score 5. [1][3][4]"
