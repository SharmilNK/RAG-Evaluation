- kpi_id: is_ai_development_mainly_in_house_or_partnership_based_and_how_does_this_affect_risk_and_expertise
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange S.A.\u2019s AI development approach is a clear build\u2013buy\u2013\
    partner model, with visible in-house products/teams complemented by multiple strategic\
    \ technology partnerships, which together reduce single-vendor lock-in risk while\
    \ expanding access to external expertise. [1][8]\n\nOrange explicitly frames partnering\
    \ and reuse (licensed software and open source) as the \u201Cfirst port of call,\u201D\
    \ and it states it partners on language models (including with Mistral) rather\
    \ than building foundational models itself, specifically to avoid being \u201C\
    stuck in a particular AI model family,\u201D which is a direct lock-in risk mitigation\
    \ posture. [1]\n\nAt the same time, Orange shows strong internal ownership and\
    \ productization capability where it sees strategic need: it developed \u201C\
    Live intelligence\u201D internally to control shadow GenAI usage, drove large-scale\
    \ internal adoption (over 90,000 employees), and then turned it into a B2B product\u2014\
    evidence of in-house build capacity and a pathway from internal tooling to market\
    \ offerings. [1]\n\nOrange Business publicly presents a sizable internal capability\
    \ base, claiming \u201C2,600 Data & AI experts\u201D in its Digital Services business\
    \ line, which supports the rubric requirement for a substantive internal team/CoE-like\
    \ capability rather than vendor-led pilots alone. [8]\n\nPartnership breadth is\
    \ also clearly evidenced. Orange Business lists an explicit \u201CData & AI partner\
    \ network\u201D including Qlik, Alteryx, Snowflake, Denodo, Databricks, AWS, Google\
    \ Cloud, and Microsoft\u2014well above the rubric\u2019s threshold for multiple\
    \ strategic partners across the data/AI stack and hyperscalers. [8] Orange additionally\
    \ has a public Google Cloud case-study-style blog post describing Orange\u2019\
    s AI-use-case delivery organization and its underlying data platform evolution\
    \ toward cloud, reinforcing that hyperscaler partnerships are part of its AI execution\
    \ model. [4]\n\nGovernance and delivery practices described for Live Intelligence\
    \ indicate Orange is managing risk and expertise in a structured way, using multidisciplinary\
    \ teams and extensive internal testing (tested on 50,000 employees before launch)\
    \ and embedding \u201CResponsible AI By Design\u201D and human oversight mechanisms\
    \ into AI workflows, which reduces operational and compliance risk as AI is scaled.\
    \ [3]\n\nHow this mix affects risk and expertise: (1) risk is reduced through\
    \ explicit multi-model/multi-partner positioning (avoidance of being locked into\
    \ a single model family) and through internal controls that counter shadow GenAI\
    \ via an Orange-built tool; and (2) expertise is strengthened by combining a large\
    \ internal expert base with a broad partner ecosystem spanning data platforms\
    \ and cloud providers, enabling Orange to access best-of-breed capabilities while\
    \ retaining internal product ownership for strategic assets. [1][8]\n\nLimitations\
    \ vs. a top-tier (score 5): while Orange demonstrates an in-house product (Live\
    \ Intelligence) and a broad partner ecosystem, the provided evidence does not\
    \ substantiate multiple examples of formal co-development/IP-sharing assets (e.g.,\
    \ patents/open-source tied directly to these partnerships) or long-term funding\
    \ disclosures for joint AI programs as required for the highest rubric tier. [1][8]"
