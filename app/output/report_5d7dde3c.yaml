- kpi_id: how_systematically_are_external_benchmarks_used_to_drive_ai_delivery_performance_speed_quality_cost_and_improvement_targets
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Orange shows evidence of internal measurement discipline and some cost/performance\
    \ optimization choices in AI delivery, but the provided evidence does not show\
    \ systematic use of *external benchmarks* (e.g., top\u2011quartile peer targets\
    \ across multiple delivery metrics) to set AI delivery performance targets for\
    \ speed, quality, and cost. [1][3][5]\n\nOrange reports that it uses a \u201C\
    company-wide dashboard\u201D to display progress on AI value creation, indicating\
    \ a structured internal performance tracking mechanism. [3] Orange also describes\
    \ \u201Ca thorough methodology\u201D with its finance team to measure AI value,\
    \ with use cases put into a dashboard that is \u201Cauditable across the company,\u201D\
    \ reinforcing that internal measurement is formalized for at least value/cost\
    \ outcomes. [5] However, these dashboard and methodology statements are about\
    \ internal measurement and governance rather than explicit comparison to external\
    \ benchmarks or peers. [3][5]\n\nOn cost-performance decisions, Orange states\
    \ that when building tools internally it will \u201Cdefault to the cheapest, fastest\
    \ model\u201D for the relevant domain, while continuing to assess and update its\
    \ set of models, which indicates active optimization against cost and speed considerations.\
    \ [1] The evidence also mentions identified value from AI (\u20AC300m) with a\
    \ goal to increase this value to \u20AC600m, which reflects internal target-setting\
    \ for business value rather than delivery performance benchmarking against external\
    \ standards. [1]\n\nThe evidence set includes references to external studies (e.g.,\
    \ an MIT study and a McKinsey-partnered study) but these are used as contextual\
    \ industry commentary rather than as explicit benchmark targets tied to Orange\u2019\
    s AI delivery performance metrics or improvement plans. [4][7] The Orange Poland\
    \ integrated report excerpt discusses aspirations to be an \u201Cindustry benchmark\
    \ for efficiency and productivity,\u201D but it does not describe an external\
    \ benchmarking system, specific benchmark sets, or target setting vs top-quartile\
    \ peers for AI delivery metrics. [8]\n\nGiven the rubric, a score of 3 or higher\
    \ would require a defined benchmark set (lead time, failure rate, cost, etc.)\
    \ and explicit baseline-vs-top-quartile gap analysis at least annually, or top-quartile\
    \ peer-based OKRs with retrospectives and measurable YoY improvement. [Rubric]\
    \ The provided evidence does not document any peer/top-quartile benchmark selection,\
    \ external benchmark data sources, annual gap analyses, or OKRs tied to closing\
    \ externally benchmarked gaps for AI delivery speed/quality/cost. [1][3][5][8]\
    \ Therefore, Orange best fits \u201Coccasional peer comparisons\u201D at most\
    \ (industry studies referenced without linkage to delivery OKRs), resulting in\
    \ a Low-Medium score. [4][7]"
