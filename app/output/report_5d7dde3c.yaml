- kpi_id: how_ready_is_the_company_s_culture_to_embrace_data_driven_decision_making_and_continuous_ai_enabled_improvement
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange shows strong cultural readiness for data-driven decision-making\
    \ and continuous AI-enabled improvement, with clear signs of broad internal adoption,\
    \ data democratization practices, and governance mechanisms\u2014though the evidence\
    \ does not fully demonstrate an organization-wide, default behavioral norm (the\
    \ bar for Score 5). [1][7]\n\nOrange has demonstrated large-scale internal AI\
    \ tool adoption that supports day-to-day knowledge work, which is a key cultural\
    \ enabler for widespread data/AI usage rather than isolated experimentation. [1]\
    \ The company\u2019s internal tool \u201CDinootoo\u201D is reportedly used by\
    \ 100,000 employees, which implies broad exposure and acculturation to AI-assisted\
    \ ways of working across a sizable portion of the workforce. [1] This breadth\
    \ of usage supports a conclusion that Orange is beyond \u201Cincreasing reliance\
    \ in specific functions\u201D (Score 3) and is actively promoting data/AI-enabled\
    \ work through internal tools (Score 4). [1]\n\nOrange\u2019s culture also appears\
    \ oriented toward \u201Cbringing data to the people\u201D via multi-year investments\
    \ in data democratization, including establishing processes and rules that enable\
    \ employee agility. [7] The evidence indicates Orange has implemented \u201Cits\
    \ own version of a data mesh,\u201D where a central team provides tools and infrastructure\
    \ while operating teams are accountable for data quality, accessibility, and freshness.\
    \ [7] This model is directly aligned with a data-driven culture because it embeds\
    \ data stewardship responsibilities into operating teams while scaling access\
    \ across business lines. [7] A concrete example of cross-functional data use is\
    \ cited: marketing can run campaigns that relate to network quality, suggesting\
    \ data is accessible and usable beyond traditional analytics teams. [7]\n\nIn\
    \ addition, Orange\u2019s approach includes explicit attention to governance and\
    \ ethical frameworks that typically accompany mature, scalable data/AI adoption\
    \ and help institutionalize responsible data-driven behaviors. [4] Orange Business\u2019\
    \ positioning emphasizes democratizing data access while ensuring quality, reliability,\
    \ security, and compliance, and it highlights governance and change management\
    \ as necessary for \u201Csustainable value\u201D from AI deployments. [4] This\
    \ emphasis reinforces that the company is not only deploying tools, but also promoting\
    \ supporting structures and norms (leadership/tooling/governance) consistent with\
    \ a Score 4 culture. [4]\n\nHowever, the evidence stops short of proving Score\
    \ 5 (an organization-wide belief and behavior rooted in data-driven and AI-enhanced\
    \ decisions as the default mode). [1][7] While Dinootoo\u2019s 100,000 users and\
    \ the data democratization/data mesh narrative indicate significant scale, the\
    \ sources do not provide direct evidence that decision-making across all major\
    \ corporate functions is systematically and measurably AI/data-driven, nor do\
    \ they document uniform behavioral expectations (e.g., mandatory metrics-driven\
    \ governance for decisions across the enterprise). [1][7] The TM Forum interview\
    \ also notes the journey is \u201Cnowhere near done,\u201D which supports a conservative\
    \ conclusion that Orange is advanced but not yet fully organization-wide in the\
    \ Score 5 sense. [7]\n\nTherefore, based on the demonstrated breadth of internal\
    \ AI tooling, mature data democratization practices, and explicit governance/change-management\
    \ orientation\u2014tempered by acknowledgments that the transformation is ongoing\u2014\
    Orange scores as Medium-High (4). [1][4][7]"
