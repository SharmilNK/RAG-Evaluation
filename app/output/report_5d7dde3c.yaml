- kpi_id: to_what_extent_is_metadata_technical_business_captured_and_used_to_improve_discovery_lineage_and_mdm
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Orange S.A.\u2019s public evidence provided here indicates a complex,\
    \ fragmented data estate and some interest in modern governance capabilities,\
    \ but it does not substantiate a central, operational metadata capability (repository,\
    \ lineage, business glossary ownership) or metadata-driven processes (impact analysis,\
    \ MDM sync, discovery-time reduction) at the levels required for scores 3\u2013\
    5. [5][6]\n\nFragmentation signals that metadata capture and standardization are\
    \ likely challenging at enterprise scale, since Orange reports \u201Cmore than\
    \ 60 data lakes and data warehouses\u201D across multiple on\u2011premises sites\
    \ in the context of building and scaling AI use cases. [5] This environment is\
    \ consistent with only partial and uneven metadata availability across platforms,\
    \ because multiple lakes/warehouses typically imply inconsistent cataloging and\
    \ governance unless a centralized metadata layer is explicitly evidenced, which\
    \ is not provided in the supplied materials. [5]\n\nThe Orange Business materials\
    \ included are largely service/marketing statements about \u201Cdata visibility,\u201D\
    \ \u201Ctake control of your data assets,\u201D \u201Cdemocratize data access,\u201D\
    \ and governing data assets, but they do not provide concrete, verifiable proof\
    \ that Orange S.A. operates (1) a central metadata repository, (2) lineage coverage\
    \ for critical flows, (3) a business glossary with named owners, or (4) linkage\
    \ of glossary terms to KPIs. [3][6] Because the rubric for score 3 requires an\
    \ actual central metadata repository plus lineage for critical flows plus an initial\
    \ owned glossary, and none of these elements are evidenced explicitly, the score\
    \ cannot be raised to 3 on the basis of the provided sources. [3][6]\n\nSome of\
    \ the provided thought-leadership content discusses GenAI-assisted governance\
    \ capabilities such as automatically classifying datasets, inferring metadata,\
    \ and enriching lineage, but this is framed as an industry trend rather than a\
    \ description of Orange S.A.\u2019s implemented, measurable practices. [7] As\
    \ a result, it cannot be counted as evidence that Orange S.A. has active/automated\
    \ metadata enrichment or end-to-end lineage in production, nor that metadata is\
    \ being used to drive impact analysis or synchronize with MDM. [7]\n\nNo supplied\
    \ evidence demonstrates master data management (MDM) synchronization with metadata,\
    \ audit queries answered on demand, quantified discovery-time reduction, end-to-end\
    \ lineage (including ML features), or a stated percentage (e.g., \u226580%) of\
    \ critical assets covered\u2014each of which is necessary to justify scores 4\u2013\
    5. [3][5][6][7]\n\nGiven the absence of explicit proof of a centralized repository\
    \ and business glossary ownership (score 3 threshold), but the presence of governance\
    \ intent and a push toward better \u201Cdata visibility\u201D and governed access\
    \ (suggesting more than ad-hoc spreadsheets alone), Orange S.A. is best placed\
    \ at score 2 (partial technical metadata; business glossary missing/unevidenced)\
    \ based strictly on the provided evidence. [3][5][6]"
