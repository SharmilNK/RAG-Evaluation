- kpi_id: innovation
  pillar: DB Imported
  type: rubric
  score: 2.111111111111111
  confidence: 0.7
  rationale: "Overall, the Innovation KPI category demonstrates early-stage, uneven\
    \ maturity, with innovation activity occurring more implicitly than through an\
    \ intentional, enterprise-defined approach\u2014consistent with a Low\u2013Medium\
    \ score of 2.1/5.\n\nAcross the drivers, the dominant theme is absence of explicit\
    \ articulation: innovation is not clearly anchored in the AI Playbook as a named\
    \ priority, operating model, or measurable set of commitments. This typically\
    \ signals that innovative work may be happening opportunistically within teams\
    \ or initiatives, but without consistent definitions (what \u201Cinnovation\u201D\
    \ means in this context), standardized mechanisms (how ideas are generated, tested,\
    \ funded, and scaled), or shared success metrics (how innovation outcomes are\
    \ tracked and compared). The aggregate result suggests pockets of practice rather\
    \ than a coherent system\u2014enough evidence of activity or intent to avoid a\
    \ \u201CLow,\u201D but insufficient clarity and governance to credibly claim strong\
    \ performance.\n\nThe 2.1/5 score and Low\u2013Medium tier are justified because\
    \ \u201Cnot specifically called out\u201D is a structural limitation: when innovation\
    \ is not explicitly codified, it tends to lack durable ownership, funding pathways,\
    \ and repeatable processes for experimentation-to-production. In practical terms,\
    \ this typically depresses KPI performance because outputs (pilots, prototypes,\
    \ novel use cases) do not reliably translate into scaled impact, and learning\
    \ loops are inconsistent. The presence of multiple child inputs (9) averaging\
    \ slightly above 2 implies some supporting signals exist, but they are not strong\
    \ or consistent enough to elevate the category into a Medium tier.\n\nFor leadership,\
    \ the primary risk is that innovation remains accidental\u2014dependent on motivated\
    \ individuals\u2014while the organization simultaneously increases AI investment\
    \ and expectations. The immediate next step is to explicitly define innovation\
    \ within the AI Playbook (scope, guardrails, and target outcomes), assign accountable\
    \ ownership (e.g., an innovation lead or council tied to AI governance), and introduce\
    \ lightweight but formal mechanisms for intake, experimentation, and scaling (stage\
    \ gates, funding criteria, and post-pilot measurement). Doing so would convert\
    \ dispersed activity into a managed portfolio, improve comparability of results,\
    \ and create the evidence base required to lift the KPI category into a solid\
    \ Medium performance tier."
  citations: []
