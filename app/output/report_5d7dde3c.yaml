- kpi_id: are_there_board_members_with_proven_ai_expertise
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange S.A. demonstrates meaningful AI expertise connected to its governance,\
    \ with evidence of a formal Board-level committee covering technology and multiple\
    \ identified board members with AI experience, but the provided materials do not\
    \ substantiate the higher bar of \u22653 directors with clearly documented AI/ML\
    \ track records plus explicit, regular board-level AI reporting.\n\nThe signals\
    \ provided indicate multiple board members with AI experience (3) and at least\
    \ one board member with AI expertise (1). These two structured data points conflict\
    \ on the precise count of AI-specialist directors, but taken together they support\
    \ that Orange has more than one director with some level of AI experience and\
    \ at least one with deeper AI expertise. Using the rubric thresholds, that places\
    \ Orange at least in the band where there is substantive AI capability present\
    \ at board level and potentially multiple such directors, which aligns best to\
    \ a score of 4 rather than 3 given the indication of more than one AI-experienced\
    \ director. [1][2]\n\nIn addition to director experience signals, Orange discloses\
    \ a Board of Directors supported by a Strategy and Technology Committee that reviews\
    \ the Group\u2019s \u201Cstrategic and technological orientations\u201D and \u201C\
    innovation objectives,\u201D which is consistent with formal board-level oversight\
    \ of technology topics (including AI as part of technology strategy), satisfying\
    \ the rubric path for score 4 that allows either \u22652 strong AI/ML directors\
    \ or a formal board committee with AI-relevant remit and disclosed oversight responsibilities.\
    \ [3]\n\nHowever, the evidence supplied does not clearly enumerate Orange S.A.\
    \ board directors and their individual AI/ML credentials, nor does it show that\
    \ AI is explicitly included in a board committee\u2019s formal remit (e.g., \u201C\
    AI,\u201D \u201CAI risk,\u201D or \u201CAI ethics\u201D explicitly in committee\
    \ responsibilities) beyond general technology and innovation oversight. The Data\
    \ and AI Ethics Council described is an independent external council of 11 experts\
    \ (including AI researchers and ethics/governance leaders) rather than the Board\
    \ of Directors itself, so it is relevant to AI governance broadly but does not\
    \ directly prove board-member AI expertise or board committee AI oversight as\
    \ required for score 5. [4][5]\n\nGiven (a) structured signals indicating multiple\
    \ board members with AI experience and at least one with AI expertise, and (b)\
    \ documented board committee infrastructure for strategy and technology oversight,\
    \ Orange S.A. meets the \u201CMedium-High\u201D bar. The absence, in the provided\
    \ evidence, of (i) clear documentation of \u22653 board directors with AI/ML track\
    \ records and (ii) explicit ongoing AI reporting and external AI governance forum\
    \ participation at board level prevents a \u201CHigh\u201D (5) rating on this\
    \ KPI. [1][3][4]"
