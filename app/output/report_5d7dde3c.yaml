- kpi_id: to_what_extent_has_the_company_implemented_robust_mechanisms_that_safeguard_data_against_unauthorized_access_or_misuse_ensuring_compliance_with_privacy_and_security_regulations_e_g_gdpr_ccpa
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange\u2019s implemented mechanisms demonstrate organization-wide,\
    \ standards-based controls and privacy governance consistent with certified compliance,\
    \ but the provided evidence does not substantiate continuous monitoring and AI-specific\
    \ compliance automation at the level required for the top tier. [1][8]\n\nOrange\
    \ Polska Group (an Orange S.A. operating entity) reports a certified Information\
    \ Security Management System compliant with ISO 27001, which is a widely recognized\
    \ control framework used to safeguard confidentiality, integrity, and availability\
    \ of information and reduce risk of unauthorized access or misuse. [1] Orange\
    \ Polska Group also reports ISO 27018 certification, which specifically covers\
    \ protection of personally identifiable information (PII) in cloud contexts, strengthening\
    \ privacy controls over regulated personal data. [1]\n\nThe same Orange Polska\
    \ evidence describes dedicated security-response and trust mechanisms via the\
    \ CERT Orange Polska unit, including recurring FIRST and Trusted Introducer certifications,\
    \ which supports a structured incident-response capability aligned to cybersecurity\
    \ best practices. [1] In addition, Orange Polska has a designated Data Protection\
    \ Officer (DPO) responsible for GDPR compliance-related activities including recommendations\
    \ on data protection impact assessments (DPIAs) and liaison with the supervisory\
    \ authority, indicating formal privacy governance and regulatory alignment. [1]\n\
    \nOperational compliance outcomes and monitoring indicators are also disclosed\
    \ for Orange Polska, including tracking of substantiated complaints and penalties\
    \ with the Polish supervisory authority (UODO), reporting 0 fines related to personal\
    \ data breaches in both 2024 and 2023. [3] Orange Polska also reports employee\
    \ security training coverage (97.5% in 2024, with a target of 100% by 2025), which\
    \ is a key organizational safeguard against misuse and unauthorized access driven\
    \ by human factors. [3]\n\nOrange Polska further describes a GDPR-aligned process\
    \ for assessing and counteracting effects of violations of rights and freedoms\
    \ of individuals, referencing GDPR, ISO 29134:2017, and Article 29 Working Party\
    \ guidance, and it reports privacy/security training and e-learning on information\
    \ security and personal data protection, indicating structured processes rather\
    \ than ad hoc controls. [4] The company also states it maintains strict control\
    \ over disclosures to authorized government bodies and ensures accountability\
    \ of access and integrity of transferred data, which are mechanisms aimed at preventing\
    \ unauthorized disclosure and misuse. [2]\n\nFor AI-related governance that touches\
    \ privacy and compliance, Orange Business states it has created a secure internal\
    \ platform to manage AI system models with centralized governance and integrated\
    \ safeguards for GDPR compliance, and it has a Responsible AI Design Authority\
    \ and centralized Responsible AI Committee to classify AI projects by risk and\
    \ address accountability and risk management. [8] Orange Polska\u2019s integrated\
    \ report also references a Data Ethics and AI Committee focused on ethical considerations\
    \ in data and AI technologies, which supports governance around higher-risk data\
    \ use cases. [5]\n\nHowever, the evidence does not clearly demonstrate the \u201C\
    continuous monitoring\u201D and \u201CAI-specific compliance automation\u201D\
    \ required for a score of 5 across Orange S.A. as a whole; the AI platform claims\
    \ describe governance and safeguards, but not automated compliance controls or\
    \ continuous monitoring regimes with measurable coverage and performance. [8]\
    \ Additionally, much of the detailed certification and KPI disclosure is for Orange\
    \ Polska (a group entity) rather than explicitly for Orange S.A. group-wide, so\
    \ a conservative tier below \u201CHigh\u201D is warranted despite strong certified\
    \ controls and governance signals. [1][3]\n\nBased on the rubric, the presence\
    \ of ISO 27001 and ISO 27018 certifications, a DPO function aligned to GDPR, structured\
    \ incident response certifications, and tracked supervisory authority outcomes\
    \ best fit \u201CCertified, organization-wide compliance with privacy laws\u201D\
    \ (Score 4), rather than the automation- and continuous-monitoring-heavy Score\
    \ 5. [1][3][8]"
