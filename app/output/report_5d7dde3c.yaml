- kpi_id: how_well_is_delivery_aligned_with_applicable_ai_sector_regulations_during_rollout_and_operation_e_g_dpia_model_cards_dsars
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange (via Orange Business communications about its AI delivery and\
    \ governance) describes multiple governance and compliance mechanisms that suggest\
    \ regulatory alignment is designed into delivery, rather than being a purely post-build\
    \ check. Orange states it has embedded \u201Cclear structures, processes and roles\
    \ into AI development and operational workflows,\u201D and that its tools follow\
    \ a \u201CResponsible AI By Design\u201D philosophy with human oversight mechanisms\
    \ across the AI lifecycle, including defined intervention mechanisms for anomalies\
    \ or ethical dilemmas. [1]\n\nOrange reports centralized governance capabilities\
    \ intended to support regulatory compliance during rollout and operation. It states\
    \ it has built a \u201Csecure and compliant internal platform to manage AI system\
    \ models,\u201D providing \u201Ccentralized governance\u201D and \u201Cintegrated\
    \ safeguards for GDPR compliance,\u201D alongside end-to-end assistance to customers\
    \ adopting generative AI. [2] This indicates delivery enablement and governance\
    \ are organized in platform/tooling rather than only in policy documents. [2]\n\
    \nOrange provides evidence of formal review/qualification structures that map\
    \ to regulatory risk-classification expectations (a precursor to applying the\
    \ right regulatory obligations by use-case). It states it established a \u201C\
    Responsible AI Design Authority\u201D to qualify the risk level associated with\
    \ each AI project and classify AI systems based on potential impact on individuals,\
    \ society, and critical sectors, and also created a centralized \u201CResponsible\
    \ AI Committee\u201D for decision-making on complex deployment, accountability,\
    \ and risk-management questions. [2] Orange also states it formed multidisciplinary\
    \ teams involving legal, technical, and compliance experts as part of its AI governance\
    \ plan tailored to regulatory demands. [1]\n\nOrange explicitly links its governance\
    \ approach to the EU AI Act and ongoing legislative change, which is consistent\
    \ with multi-obligation mapping (at least at the EU level) and operational monitoring\
    \ intent. It states it created a Data & AI Ethics Charter and \u201CBy Design\
    \ Governance\u201D that provides an overarching framework for how it approaches\
    \ data and AI, and that by embedding these principles into operations it aligns\
    \ with the EU AI Act and evolving regional legislation. [3] It also describes\
    \ \u201Ccomprehensive AI Act risk management planning,\u201D including risk assessment,\
    \ mitigation strategies, and \u201Cregular auditing of AI systems for compliance\
    \ monitoring.\u201D [8] Orange further states it is part of the EU AI Pact, committing\
    \ to apply AI Act principles ahead of enforcement, which supports a proactive\
    \ compliance posture. [8]\n\nHowever, the evidence provided does not demonstrate\
    \ several rubric-specific artifacts and thresholds required for the highest tier,\
    \ and it is also incomplete for some elements of Score 3. The supplied materials\
    \ do not provide explicit evidence of a rollout checklist including DPIAs/records\
    \ of processing, do not mention model cards for sensitive use cases, and do not\
    \ mention DSAR processes, despite referencing GDPR compliance safeguards at a\
    \ platform level. [2] The sources also do not provide quantified coverage (e.g.,\
    \ \u201C\u226580% use cases with complete artifacts before go-live\u201D), nor\
    \ do they provide audit outcomes (e.g., passing external audits with \u201Czero\
    \ major findings\u201D in the last 12 months) or evidence that compliance evidence\
    \ is generated automatically. [8]\n\nGiven the strong evidence of embedded governance\
    \ structures, risk classification, centralized committee oversight, and stated\
    \ regular compliance monitoring/auditing\u2014yet lacking explicit DPIA/model\
    \ card/DSAR evidence and lacking quantified pre-go-live artifact completion\u2014\
    Orange\u2019s delivery alignment with applicable AI/sector regulations best fits\
    \ a Medium-High performance level (Score 4) rather than Medium (Score 3) or High\
    \ (Score 5). [1][2][3][8]"
