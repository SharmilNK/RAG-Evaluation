- kpi_id: to_what_extent_has_the_company_maintained_data_security_and_confidentiality_in_its_ai_operations_including_the_presence_or_absence_of_data_breaches_leaks_or_other_security_incidents_over_the_past_five_years
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "## KPI assessment (data security & confidentiality in AI operations,\
    \ last five years)\n\n### 1) Incident history signal indicates multiple breaches\
    \ within the last five years\nOrange S.A.\u2019s structured signals indicate there\
    \ have been multiple data-breach events in the last five years, specifically \u201C\
    3 breaches\u201D in the past five years. [1] This directly contradicts any \u201C\
    spotless record\u201D requirement and places performance below rubric levels that\
    \ require zero incidents. [1]\n\n### 2) Controls and commitments are described,\
    \ but they do not negate the incident signal\nOrange Business describes security\
    \ and confidentiality commitments for GenAI use, including commitments that data\
    \ sent to LLMs would not be retained or reused and that data would be hosted securely\
    \ within Europe. [2] Orange Business also describes a \u201CTrust by Design\u201D\
    \ framework with safeguards against data leaks and alignment to the EU AI Act,\
    \ positioned as a governance and control approach for trustworthy AI. [3]\n\n\
    ### 3) Security certifications exist (in a subsidiary), supporting remediation\
    \ capability but not a \u201Cno incident\u201D outcome\nOrange Polska (a group\
    \ entity) reports holding an Information Security Management System certification\
    \ aligned to ISO/IEC 27001 covering telecommunications/ICT, hosting, cloud computing,\
    \ cybersecurity, and personal data processing in cloud computing, and it explicitly\
    \ notes AI solutions as an area of special attention. [4] This is evidence of\
    \ established security controls within the group, but it is not evidence of zero\
    \ breaches at Orange S.A. level across the past five years. [4]\n\n### 4) Rubric\
    \ mapping and final tier selection\nUnder the rubric, a record of multiple breaches\
    \ within the last five years is inconsistent with Scores 4\u20135, which require\
    \ no incidents and, for 5, a spotless record alongside advanced proactive assurance.\
    \ [1] Given the explicit signal of \u201C3 breaches\u201D in the last five years\
    \ and the lack of detailed, incident-specific remediation outcomes in the provided\
    \ evidence, the most supportable rating is that Orange S.A. experienced one or\
    \ more security incidents with partial remediation disclosure (Score 2), rather\
    \ than \u201Cisolated incidents handled effectively\u201D (Score 3), which would\
    \ require clearer evidence of effective handling and outcomes for each incident.\
    \ [1]\n\n## Key evidence gaps (material to scoring)\nThe provided evidence does\
    \ not enumerate the three breaches, their scope, whether they were AI-system-specific,\
    \ root cause, impacted data, or documented remediation effectiveness, limiting\
    \ the ability to justify Score 3. [1]\n"
