- kpi_id: how_rigorous_is_partner_vendor_capability_assessment_security_compliance_quality_delivery_integration
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange shows a structured and risk-based approach to partner/vendor\
    \ assessment, with recurring verification for higher-risk suppliers and the use\
    \ of external assessment/audit mechanisms, but the provided evidence does not\
    \ demonstrate continuous, integrated (always-on) assessment or performance-based\
    \ contracting required for the top tier. [1][3]\n\nOrange Polska Group (part of\
    \ Orange\u2019s footprint) describes a supplier/partner risk assessment methodology\
    \ that explicitly uses operational, geographic, product-specific, and sectoral\
    \ risk factors and then categorizes suppliers by risk level (from very high to\
    \ low), which aligns to risk-based assessments \u201Cper use case\u201D in the\
    \ rubric\u2019s higher tiers. [1] The same source states that suppliers in high\
    \ and very-high risk categories are assessed using EcoVadis or similar systems\
    \ (or CSR questionnaires for smaller companies), indicating a standardized evaluation\
    \ framework supported by external tools rather than informal checks. [1]\n\nThe\
    \ cadence described is also more rigorous than annual ad-hoc reviews: verification\
    \ occurs at the start or renewal of cooperation, and for high-risk partners it\
    \ is conducted annually or biennially, indicating periodic reassessment tied to\
    \ risk level. [1] In addition, Orange\u2019s group-level responsible purchasing\
    \ disclosures state it runs a \u201Csystematic evaluation process\u201D that relies\
    \ on external assessments and on-site audits, and that it uses continuous-improvement\
    \ reviews, corrective action plans, and tailored training with suppliers, which\
    \ supports the rubric requirement around corrective actions being tracked and\
    \ suppliers being supported to improve. [3]\n\nOn compliance-focused capability\
    \ assessment, Orange Polska Group\u2019s due diligence process verifies business\
    \ partners for corruption, sanctions, and fraud risks, which adds a formal control\
    \ dimension to partner onboarding and renewal rather than a simple checklist.\
    \ [1] Orange Polska further states that its Compliance Agency conducts inspections\
    \ in high-risk entities/subsidiaries and that these inspections include evaluating\
    \ the partner verification process and reviewing the use of compliance clauses\
    \ in contracts, which evidences governance and oversight of third-party controls.\
    \ [2]\n\nHowever, the evidence does not confirm key score-5 elements such as an\
    \ integrated continuous assessment model across security/compliance/quality/delivery/integration,\
    \ nor does it show performance-based contracts or consistent year-over-year vendor\
    \ performance improvement metrics. [3][4] The evidence also does not substantiate\
    \ rubric-specific red teaming of vendors or quantify that at least three critical\
    \ vendors are audited per year; while Orange references on-site audits and Orange\
    \ Polska references inspections, the disclosed count is four compliance inspections\
    \ in 2024 and these are described as inspections in internal units/subsidiaries\
    \ rather than explicitly \u201Ccritical vendor audits.\u201D [2][3]\n\nGiven the\
    \ demonstrated risk-tiering, recurring reassessment for high-risk partners, external\
    \ assessment tooling (EcoVadis), on-site audits, and corrective action plans\u2014\
    paired with gaps versus continuous/performance-based contracting and explicit\
    \ critical-vendor audit counts\u2014Orange best fits the \u201CMedium-High\u201D\
    \ tier. [1][3]"
