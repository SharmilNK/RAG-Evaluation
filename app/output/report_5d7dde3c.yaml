- kpi_id: is_the_firm_actively_shaping_ai_standards_and_regulation_via_consortia_position_papers_and_pilots
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Orange S.A. shows some external engagement with emerging AI regulation\
    \ via participation in at least one multi-stakeholder initiative, but the provided\
    \ evidence does not demonstrate leadership roles, standards-setting contributions\
    \ (e.g., working-group outputs or position papers), or clear participation in\
    \ standards pilots tied to formal standards bodies.\n\nOrange states that it is\
    \ \u201Cpart of the EU AI Pact,\u201D which it describes as a voluntary, open\
    \ declaration intended to support early application of EU AI Act principles and\
    \ to shape AI governance \u201Cthrough dialogue with policymakers, industry leaders\
    \ and other stakeholders.\u201D [2] This is direct evidence of involvement in\
    \ a regulatory-adjacent consortium/initiative connected to the EU AI Act, meeting\
    \ the rubric\u2019s minimum notion of membership/participation in an external\
    \ body. [2]\n\nHowever, the evidence set is largely oriented toward Orange\u2019\
    s internal governance and compliance implementation rather than actively shaping\
    \ standards or regulation through external outputs. Orange describes a \u201C\
    secure and compliant internal platform\u201D with centralized governance and GDPR\
    \ safeguards, and it reports establishing a \u201CResponsible AI Design Authority\u201D\
    \ and a centralized \u201CResponsible AI Committee\u201D to structure decision-making\
    \ on AI accountability and risk management. [1] Orange further states that the\
    \ \u201Cdevelopment of the AI Act has significantly influenced\u201D its approach\
    \ and that it tested its Live Intelligence solution internally with 50,000 employees\
    \ before launch, but this is an internal deployment/pilot rather than a standards\
    \ pilot in a standards-setting or regulatory sandbox context. [3]\n\nThe evidence\
    \ does not document Orange authoring or co-authoring AI standards position papers,\
    \ submitting formal responses to consultations, leading/chairing standards committees,\
    \ or running standards pilots with recognized standards organizations (e.g., ETSI/ISO/IEC)\
    \ as required to reach Score 3+ on the rubric. [1][2][3] The provided governance\
    \ page for Orange\u2019s Data & AI Ethics Council indicates Orange aims to stay\
    \ \u201Cone step ahead\u201D of regulation and that the council \u201Ctakes action\u201D\
    \ by reviewing AI projects and training teams, but it does not evidence direct\
    \ external standards leadership or regulatory influence mechanisms (e.g., cited\
    \ publications or committee roles). [8]\n\nGiven the single clearly evidenced\
    \ external initiative (EU AI Pact) [2] and the absence of documented working-group/position-paper\
    \ contributions or standards pilots in the supplied materials, Orange\u2019s performance\
    \ best fits Score 2 (membership/limited engagement) rather than Score 3 or above.\
    \ [1][2][3][8]"
