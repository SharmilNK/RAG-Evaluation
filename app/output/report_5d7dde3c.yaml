- kpi_id: how_frequently_does_the_company_release_new_ai_based_functionalities_or_model_improvements
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange S.A. demonstrates a steady cadence of releasing and expanding\
    \ AI-based functionalities centered on its Live Intelligence foundation and adjacent\
    \ Orange Business GenAI offers, with evidence of repeated productization and domain\
    \ expansion rather than a single isolated pilot. Orange\u2019s internally built\
    \ Live Intelligence product is described as using multiple LLMs (including Mistral,\
    \ OpenAI, and Google Gemini) and supporting multiple end-user capabilities such\
    \ as content generation, contextual Q&A over databases, and automation of repetitive\
    \ tasks, indicating an actively maintained, foundation-model-based platform rather\
    \ than a one-off feature. [3]\n\nOrange\u2019s release activity is evidenced by\
    \ (1) the creation and distribution of an internal \u201Clibrary\u201D of assistants/prompt-tools\
    \ at enterprise scale (stated as \u201Cmore than 18,000 built within Orange so\
    \ far\u201D), plus (2) commercialization of that capability externally through\
    \ Orange Business (\u201Cnow Orange Business is selling that externally\u201D\
    ), which signals iterative enablement and packaging of functionality for broader\
    \ rollout. [1] Orange Business also describes introducing a \u201Cmulti-LLM GenAI\
    \ solution\u201D positioned as a fully managed SaaS solution with a library of\
    \ pre-defined prompts, with an explicit launch plan beginning in France and then\
    \ expanding across Europe, supporting the notion of ongoing product releases and\
    \ rollouts rather than a single deployment. [2]\n\nAcross domains, Orange Business\
    \ cites embedding generative AI directly into contact center and CRM environments\
    \ to automate customer-experience interactions and assist agents with transcription,\
    \ recommendations, sentiment analysis, and post-call documentation, and states\
    \ that these solutions rely on the Live Intelligence platform. [5] This demonstrates\
    \ Live Intelligence-based functionality being extended beyond internal knowledge\
    \ work into customer-care/CRM/contact-center domains, consistent with multi-domain\
    \ release/extension activity on the same foundation. [5]\n\nWhile the evidence\
    \ supports multiple distinct AI functionality introductions and expansions (internal\
    \ platform capability + external SaaS offering + CX/contact-center embedding),\
    \ it does not provide a clear count of at least five separately dated public releases\
    \ within a single year, nor does it provide roadmap-style transparency with adoption\
    \ metrics per release (beyond noting user tracking is not publicly available).\
    \ [3] As a result, the performance aligns best with a Medium-High tier (3\u2013\
    4 releases/year or equivalent ongoing versioned expansion across multiple domains\
    \ with integration extensions), but falls short of the rubric\u2019s \u201CHigh\u201D\
    \ threshold that requires \u22655 releases/year with explicit roadmap transparency\
    \ and multi-country rollout details plus adoption metrics. [2][3][5]"
