- kpi_id: how_structured_and_scalable_is_experimentation_pocs_pilots_with_clear_success_metrics_and_governance
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Orange S.A. shows evidence of governance structures and defined impact\
    \ areas for AI initiatives, but the provided evidence does not demonstrate a consistently\
    \ structured, scalable experimentation pipeline with explicit success metrics,\
    \ evaluation coverage (e.g., \u226550% or \u226575% of pilots evaluated), or formal\
    \ stage gates and codified learnings at the level required for higher rubric tiers.\
    \ [2][4][6][8]\n\nOn governance, Orange describes \u201Cclear technical and legal\
    \ frameworks\u201D and a \u201Csecure and compliant foundation\u201D for GenAI\
    \ adoption (e.g., commitments about data retention/reuse and EU hosting), and\
    \ visible senior-leader involvement, which indicates some centralized oversight\
    \ and risk management around experimentation and deployment. [2][7] Orange Business\
    \ also describes embedding \u201Cclear structures, processes and roles into AI\
    \ development and operational workflows,\u201D and establishing formal bodies\
    \ including a \u201CResponsible AI Design Authority\u201D and a \u201Ccentralized\
    \ Responsible AI Committee,\u201D which are strong governance signals relevant\
    \ to running pilots responsibly. [4][8]\n\nOn experimentation at scale, Orange\
    \ Business reports testing \u201CLive Intelligence\u201D on \u201C50,000 of our\
    \ employees before launch,\u201D and separately states Live Intelligence was made\
    \ available to \u201Cover 100,000 employees,\u201D which evidences large-scale\
    \ internal piloting and broad experimentation access. [4][7] However, the evidence\
    \ does not specify whether this employee test used predefined success/fail criteria,\
    \ how outcomes were measured, or whether results were reviewed by a recurring\
    \ governance forum (e.g., a quarterly review board) as required for a score of\
    \ 3 or higher. [4][7]\n\nOn success metrics, Orange provides some examples of\
    \ intended or category-level KPIs rather than experiment-level success criteria.\
    \ For example, Orange\u2019s AI use-case team cites ambitions including revenue,\
    \ cost savings, and customer experience improvements \u201Cas defined by Net Promoter\
    \ Score,\u201D which suggests metrics exist but does not show standardized experiment\
    \ design or explicit thresholds for go/no-go decisions. [1] In a separate Orange\
    \ Business context, success measurement categories are described (customer experience\
    \ KPIs such as time to service/outages and operational efficiency KPIs such as\
    \ platforms retired and closed-loop processes activated), but these are presented\
    \ as general measurement buckets rather than a governed, repeatable pilot scorecard\
    \ with defined pass/fail gates. [6]\n\nCritically, the structured signal for experimentation\
    \ volume indicates \u201CNumber of pilots since 2023: 3,\u201D which\u2014without\
    \ accompanying evidence of standardized evaluation rates, gated funding, or learnings\
    \ being codified and reused\u2014supports only a basic, not fully scaled, experimentation\
    \ operating model. [43] In addition, while Orange\u2019s governance for responsible\
    \ AI is described in detail, the evidence does not quantify the share of pilots\
    \ evaluated (\u226550% or \u226575%), does not describe a formal pipeline with\
    \ budgets and stage gates, and does not show reuse of codified learnings across\
    \ pilots\u2014requirements for scores 3 and 4. [4][8]\n\nGiven these constraints,\
    \ Orange\u2019s experimentation capability appears to be more than ad hoc due\
    \ to the presence of governance frameworks and organization-wide testing/enablement,\
    \ but the evidence is insufficient to confirm standardized experiment design,\
    \ evaluation coverage, and scalable stage-gated processes with reusable learnings.\
    \ This aligns best with Score 2 (basic structure and governance elements, but\
    \ limited visible pilot-specific metrics and review/evaluation rigor in the provided\
    \ materials). [2][4][43]"
  citations: []
  details:
