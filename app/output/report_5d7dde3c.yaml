- kpi_id: do_users_have_a_governed_self_service_data_ai_portal_marketplace_catalog_access_control_usage_analytics
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "The KPI asks whether Orange S.A. users have a governed self-service\
    \ data & AI portal/marketplace that provides (at minimum) cataloging plus access\
    \ control and usage analytics. The provided evidence set does not substantiate\
    \ the existence of a governed enterprise data/AI catalog or a unified self-service\
    \ marketplace for datasets/models/features at Orange S.A., so the assessment must\
    \ be conservative. [2][7]\n\nAcross multiple Orange Business pages, Orange emphasizes\
    \ data governance, security, compliance, and \u201Cdemocratiz[ing] data access,\u201D\
    \ but these statements remain at the level of offerings/intent and do not describe\
    \ a concrete, governed self-service portal with a data catalog, automated access\
    \ workflows, lineage, and usage analytics. [2][4][6]\n\nThe closest relevant product\
    \ evidence is Orange Business \u201CLive Intelligence,\u201D which explicitly\
    \ includes a \u201Ccatalog of AI foundation models,\u201D a \u201Clibrary of business\
    \ AI assistants,\u201D and \u201Cfeedback and reporting features.\u201D [7] This\
    \ supports that Orange has at least some catalog-like capability for AI models\
    \ (and packaged assistants) within the Live Intelligence platform and that there\
    \ are some reporting features; however, the evidence does not indicate (1) an\
    \ enterprise-wide data catalog/marketplace, (2) governed self-service access to\
    \ data assets (datasets/features) with role-based access control, (3) automated\
    \ approval flows for access requests, (4) lineage visibility, or (5) quantified\
    \ self-service fulfillment rates (e.g., >70% or >90%) and median wait times. [7]\n\
    \nAdditional articles reinforce Orange Business\u2019s positioning around trustworthy\
    \ AI, sovereign hosting, user control, and secure access to AI tools, but they\
    \ still do not evidence a governed self-service data & AI portal/marketplace for\
    \ Orange S.A. users as defined by the rubric (catalog + access control + usage\
    \ analytics with governance features like ownership/SLAs/lineage and automated\
    \ approvals). [1][3]\n\nGiven the presence of an AI model \u201Ccatalog\u201D\
    \ and \u201Cfeedback and reporting features\u201D inside Live Intelligence (indicating\
    \ more than purely ticket-based/tribal-knowledge access), Orange appears to meet\
    \ at least a basic-catalog level for part of the AI tooling surface area. [7]\
    \ Because the evidence does not demonstrate the broader, governed self-service\
    \ data & AI portal/marketplace capabilities required for score 3+ (curated catalog\
    \ with ownership/SLAs, role-based access, and usage tracking for popular assets)\
    \ and provides no self-service fulfillment metrics, Orange is best placed at Score\
    \ 2 (Basic catalog; manual/unclear approvals; incomplete portal/metadata/analytics\
    \ evidence). [7][2]"
