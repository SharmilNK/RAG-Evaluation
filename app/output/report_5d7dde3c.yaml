- kpi_id: how_visible_and_concrete_is_the_company_s_public_advocacy_and_action_on_responsible_ai_ai_for_good
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange S.A. demonstrates visible and relatively concrete public advocacy\
    \ and action on responsible AI through publicly described governance structures,\
    \ participation in a major EU voluntary initiative, and the use of third-party\
    \ certification to evidence specific responsible-AI claims. [1][2][5]\n\nPublic\
    \ advocacy is clearly articulated through Orange Business\u2019s statements positioning\
    \ the company as aligning its AI practices with the EU AI Act and an internal\
    \ \u201CData & AI Ethics Charter,\u201D and describing \u201CResponsible AI by\
    \ Design\u201D as a guiding philosophy across the AI lifecycle. [4][3] Orange\
    \ also states it is \u201Cpart of the EU AI Pact,\u201D framed as a voluntary\
    \ commitment to apply AI Act principles ahead of full enforcement, which constitutes\
    \ a concrete, externally anchored public commitment rather than a purely internal\
    \ aspiration. [1]\n\nThe company provides concrete descriptions of responsible-AI\
    \ operationalization via multiple governance and control mechanisms. Orange Business\
    \ reports a \u201Csecure and compliant internal platform\u201D to manage AI models\
    \ with centralized governance and GDPR safeguards, and it describes a Responsible\
    \ AI Design Authority that qualifies risk levels for AI projects plus a centralized\
    \ Responsible AI Committee for decision-making on complex deployment/accountability\
    \ questions. [2] It also states it has implemented \u201CAI Act risk management\
    \ planning,\u201D including risk assessments, mitigations, and \u201Cregular auditing\
    \ of AI systems for compliance monitoring,\u201D and it cites bias-reduction work\
    \ by research teams along with monitoring KPIs \u201Cto demonstrate our transparency\
    \ and fair AI approach.\u201D [1]\n\nBeyond governance, Orange provides examples\
    \ of responsible-AI action areas that connect to AI-for-Good themes (notably environmental\
    \ sustainability), stating it calculates and communicates the carbon costs of\
    \ GenAI solutions sold to customers and is applying life-cycle assessment (LCA)\
    \ methods to evaluate AI on the cloud. [8] This indicates efforts to measure and\
    \ disclose environmental externalities of AI deployments, which is more concrete\
    \ than a generic sustainability statement. [8]\n\nOrange also presents evidence\
    \ of external validation for at least one responsible-AI dimension by stating\
    \ it was the first company to be awarded the GEEIS-AI (AI Gender and Diversity)\
    \ certification, which serves as a third-party signal supporting claims around\
    \ bias/diversity considerations in the AI development chain. [1] In addition,\
    \ Orange publicly describes its Group-level ethics positioning and states that\
    \ \u201C100% of Orange\u2019s new AI solutions are developed according to the\
    \ principles of our Ethics Charter,\u201D which reads as a broad internal commitment\
    \ that is publicly disclosed. [5]\n\nAgainst the rubric, the evidence supports\
    \ a score of 4 (Medium-High) because Orange shows a portfolio of responsible-AI\
    \ structures and initiatives (ethics charter, ethics council/committee structures,\
    \ risk management planning, environmental impact measurement practices, and participation\
    \ in the EU AI Pact), includes some metrics-oriented language (KPIs for transparency/fair\
    \ AI and carbon-cost communication), and includes at least one third-party certification.\
    \ [1][2][5][8] The evidence does not rise to a 5 (High) because, within the provided\
    \ sources, there is insufficient substantiation that Orange is a broadly recognized\
    \ leader for AI-for-Good with sustained, externally comparable social-impact outcomes\
    \ at scale, nor clear evidence of widely used open tools/resources tied specifically\
    \ to responsible AI impact. [1][4][8]"
