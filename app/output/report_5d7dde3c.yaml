- kpi_id: how_clear_are_cross_functional_roles_and_responsibilities_for_ai_business_product_data_risk_legal_from_idea_to_run
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Orange describes having defined AI governance bodies and cross-functional\
    \ involvement that spans development through deployment, but the provided evidence\
    \ does not codify an explicit end-to-end RACI/operating model (idea\u2192build\u2192\
    deploy\u2192run) or provide quantified coverage/adherence across AI use cases.\
    \ [1][2][4]\n\nCross-functional participation (including legal/risk/compliance)\
    \ is clearly stated as part of Orange\u2019s AI governance approach. Orange reports\
    \ \u201Cembedding clear structures, processes and roles into AI development and\
    \ operational workflows,\u201D and explicitly calls out the use of \u201Cmultidisciplinary\
    \ teams involving legal, technical and compliance experts,\u201D indicating that\
    \ risk/legal are not purely after-the-fact participants. [1]\n\nGovernance touchpoints\
    \ and decision structures are evidenced via formal entities with distinct remits.\
    \ Orange states it established a \u201CResponsible AI Design Authority\u201D to\
    \ qualify/classify the risk level of each AI project, and also a \u201Ccentralized\
    \ Responsible AI Committee\u201D as a decision-making structure for \u201Ccomplex\
    \ questions\u201D around deployment, accountability, and risk management; together\
    \ these are consistent with scheduled governance touchpoints for build/deploy\
    \ decisions, with explicit accountability themes (risk classification, deployment/accountability\
    \ decisions). [2]\n\nThe evidence supports pre-deployment involvement for at least\
    \ some sensitive/high-risk contexts, but it is not documented as a standardized\
    \ RACI across all projects. Orange links its approach to EU AI Act expectations\
    \ (e.g., \u201Chuman oversight mechanisms\u2026 for high-risk systems\u201D) and\
    \ states \u201Chuman oversight is integral at every stage of the AI lifecycle,\u201D\
    \ which implies early (pre-deployment) risk/oversight engagement, at least for\
    \ high-risk systems. [1]\n\nOperationalization is described at a principles-and-structures\
    \ level rather than as a fully codified end-to-end operating model with named\
    \ accountable owners by stage. Orange references a \u201CData & AI Ethics Charter\
    \ and By Design Governance\u201D as an overarching framework and says these principles\
    \ are embedded into operations, but the excerpts do not specify concrete role-to-stage\
    \ mappings (business/product/data/risk/legal) from ideation to run, nor do they\
    \ present stage gates with named owners or a RACI artifact. [4]\n\nEvidence of\
    \ practice (not just policy) exists for at least one initiative, but it does not\
    \ establish organization-wide role clarity from idea to run. Orange reports that\
    \ before launching \u201CLive Intelligence,\u201D it used multidisciplinary teams\
    \ and tested the tool on \u201C50,000 of our employees before launch,\u201D which\
    \ supports the existence of cross-functional review/validation prior to rollout;\
    \ however, this is a single example and does not demonstrate coverage across \u2265\
    80% of AI use cases or measured adherence/SLAs. [1]\n\nGiven the rubric, the presence\
    \ of governance structures and explicit multidisciplinary involvement including\
    \ legal/compliance supports a score consistent with a defined build/deploy/run\
    \ governance with risk/legal involvement pre-deployment for sensitive/high-risk\
    \ systems (Score 3), while the lack of explicit end-to-end operating model documentation,\
    \ quantified coverage, and auditing/continuous improvement evidence prevents scoring\
    \ at 4\u20135. [1][2][4]"
