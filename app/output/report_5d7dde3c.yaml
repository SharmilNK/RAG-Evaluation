    \ approach. Orange states that it aligned GenAI adoption with core business strategy\
    \ and \u201Cclearly defined its expected impact\u201D on operations (networks,\
    \ contact centres, office productivity), framing GenAI as supportive rather than\
    \ job-reducing; this is presented as a trust-building communication stance aimed\
    \ at staff acceptance. [5] Orange also reports visible senior leader involvement,\
    \ including targeted education for senior leaders, customized Executive Committee\
    \ training, and direct CEO participation and sharing of experience with Live Intelligence,\
    \ which signals active executive sponsorship and coordinated leadership messaging\u2014\
    key markers of mature change leadership. [5]\n\nOrange also provides evidence\
    \ of structured change enablement at scale, which goes beyond isolated project-level\
    \ change processes. Orange\u2019s HR leadership emphasizes the need to \u201C\
    get employees on board,\u201D with a people-centered approach requiring training\
    \ and development. [6] Orange references an acculturation tool (Dinootoo) and\
    \ \u201Ca network of ambassadors\u201D to support employees, which indicates a\
    \ deliberate internal change network rather than ad hoc communications. [6] Additionally,\
    \ Orange reports broad internal usage of Dinootoo (100,000 employees), which implies\
    \ that AI enablement has been industrialized across a large portion of the workforce\
    \ rather than confined to pilots. [1]\n\nThe company further demonstrates structured\
    \ rollout practices that support adoption and reduce resistance by testing with\
    \ large internal populations and addressing employee concerns explicitly. Orange\
    \ Business reports that Live Intelligence was tested on 50,000 employees before\
    \ launch, suggesting planned deployment and feedback/validation cycles typical\
    \ of more mature change approaches. [2] Orange also describes addressing common\
    \ employee questions (e.g., data usage and hosting) with \u201Cclear commitments\u201D\
    \ and compliance measures (e.g., European hosting, no retention/reuse of data\
    \ sent to LLMs), which functions as change communication to mitigate adoption\
    \ friction and build trust. [5]\n\nHowever, the evidence stops short of demonstrating\
    \ \u201Cfully institutionalized change management with transparent, ongoing communication\u201D\
    \ across the whole enterprise in a way that is explicitly continuous, measured,\
    \ and standardized as a single company-wide change management framework. While\
    \ Orange describes leadership engagement, training, ambassadors, and scaled tools,\
    \ the supplied material does not provide clear proof of an end-to-end, company-wide\
    \ change management framework (e.g., standardized methodology, enterprise comms\
    \ cadence, adoption KPIs, ongoing transparency mechanisms) governing AI adoption\
    \ across all functions. [5][6][1] Therefore, the performance best fits Score 4\
    \ (company-wide framework supporting AI adoption) rather than Score 5. [5][6]\n\
    \nOverall, Orange\u2019s practices reflect coordinated leadership sponsorship,\
    \ scaled training/acculturation, ambassador networks, and large-scale internal\
    \ deployments\u2014strong indicators of mature change management and communication\
    \ enabling AI adoption\u2014supporting a Medium-High (4/5) assessment. [5][6][1][2]"
