- kpi_id: how_mature_and_reproducible_is_the_model_development_workflow_from_experimentation_to_ci_cd_and_release
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "The provided evidence does not document a mature, reproducible end-to-end\
    \ model development workflow (experimentation \u2192 CI/CD \u2192 release) for\
    \ Orange S.A.; instead, it mainly describes platform flexibility, deployment options,\
    \ and governance/trust positioning rather than concrete MLOps practices such as\
    \ standardized train/eval/serve pipelines, artifact versioning, automated testing,\
    \ and controlled release mechanisms. [1][4][7]\n\nOrange Business describes a\
    \ platform that lets users \u201Cchoose what type of model\u201D and \u201Cwhat\
    \ type of cloud you want to deploy,\u201D and mentions \u201Cpre-built prepackaged\
    \ use cases\u201D in \u201Cassistant library and agent libraries,\u201D which\
    \ indicates some level of productization/packaging of AI capabilities but does\
    \ not evidence reproducible ML pipelines, model registry/artifact versioning,\
    \ or CI/CD automation. [1]\n\nA Google Cloud case-style blog notes Orange\u2019\
    s AI use cases moving from \u201Cideation until their effective deployment by\
    \ AI factories,\u201D and discusses consolidation/migration from numerous on-prem\
    \ data lakes/warehouses (including a shared Hadoop platform) toward cloud, which\
    \ supports the idea of organizational structuring around deployment but still\
    \ does not provide workflow details like automated training/evaluation, reproducible\
    \ builds, or release controls (canary/rollback). [2]\n\nOrange Business \u201C\
    Trust by Design\u201D and \u201CLive Intelligence\u201D content emphasizes governance,\
    \ compliance, transparency, and customer control, which are relevant to trustworthy\
    \ operations but are not evidence of CI/CD for models and data, automated data/robustness\
    \ tests, lineage/feature store usage, or quantified workflow coverage (e.g., \u201C\
    \u226580% of models use the workflow\u201D). [7]\n\nOrange Business communications\
    \ also describe flexible AI workload deployment patterns (on-prem, hybrid, cloud)\
    \ and multi-cloud strategy benefits, but these are infrastructure/hosting options\
    \ rather than documentation of a reproducible model development and release workflow.\
    \ [4]\n\nGiven the absence of explicit evidence for standardized ML pipelines,\
    \ artifact versioning/model registries, automated test suites, and CI/CD with\
    \ controlled rollout/rollback, Orange S.A. cannot be credibly scored at rubric\
    \ level 3 or above based on the supplied materials. [1][2][7]\n\nWithin the lower\
    \ bands, the available evidence suggests more than purely ad hoc activity because\
    \ Orange Business references a reusable platform and packaged \u201Cassistant\u201D\
    \ and \u201Cagent\u201D libraries, and Orange references \u201CAI factories\u201D\
    \ for deployment; however, the evidence still falls short of demonstrating standardized,\
    \ reproducible MLOps practices. Therefore, the most defensible rating is Score\
    \ 2 (Partial maturity), noting a significant public-evidence gap around concrete\
    \ MLOps/CI-CD mechanisms. [1][2]"
