- kpi_id: are_ai_use_cases_integrated_into_core_business_processes_or_do_they_operate_as_standalone_projects
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Orange S.A. shows multiple AI use cases that are embedded into operational\
    \ and customer-facing workflows (not just standalone demos), with evidence spanning\
    \ marketing/sales, customer operations, network operations, and field work. Orange\u2019\
    s CEO described using AI to predict the marketing offers most likely to appeal\
    \ to customers and replicating it across countries, indicating the AI is part\
    \ of the recurring marketing offer process rather than a one-off experiment. [6]\
    \ Orange also reports large-scale process automation (500,000 hours saved in 2023)\
    \ used in \u201Crepetitive process driven tasks\u201D including customer contact\
    \ centers, which indicates integration into day-to-day operating processes rather\
    \ than isolated tools. [6]\n\nIn customer and sales processes, Orange reports\
    \ AI-driven personalization of product recommendations delivered through multiple\
    \ channels, including digital, direct marketing, and in-store retail recommendations\
    \ made by sales associates, which indicates integration into multi-channel sales\
    \ execution (and not a standalone analytics proof-of-concept). [1] Orange\u2019\
    s earnings-call commentary further claims measurable revenue increases from AI-driven\
    \ marketing offer prediction across \u201Cmany\u201D countries, reinforcing that\
    \ this use case is operating in production and linked to a business outcome. [6]\n\
    \nIn network operations, Orange states that radio configuration is automated in\
    \ most countries and that it can automatically change 20 million radio parameters\
    \ per month, with some of these automation use cases leveraging AI to reduce energy\
    \ consumption. [6] This reflects AI-enabled automation integrated into the network\
    \ configuration process with closed-loop execution (automatic parameter changes),\
    \ not merely decision support. [6]\n\nIn field operations, Orange describes a\
    \ workflow where a field technician takes a picture of a complex wiring job at\
    \ a telecom substation and \u201Cin a few seconds\u201D visual AI indicates whether\
    \ the job looks right. [1] This implies AI embedded in frontline quality/safety\
    \ verification steps within technician workflows (human-in-the-loop), rather than\
    \ a lab prototype. [1] Orange explicitly frames these deployments as \u201Csimple,\
    \ measurable improvements\u201D that do not require major changes in how staff\
    \ and customers operate, suggesting operational adoption within existing processes.\
    \ [1]\n\nAcross the group, Orange also references internal GenAI tooling at meaningful\
    \ usage levels (1,300 daily users for an internal genAI tool) and a large portfolio\
    \ of AI deployments (146 \u201Chigh-impact\u201D AI use cases in 2023). [6] While\
    \ the count of use cases indicates broad activity, the KPI here is integration\
    \ into core processes; the most direct integration evidence comes from the operational\
    \ examples above (marketing offer prediction, network parameter automation, contact-center\
    \ process automation, and field technician visual inspection support). [6] \n\n\
    However, the public evidence provided does not consistently document classic process\
    \ KPIs like AHT/FCR/MTTR improvements for service operations, nor does it show\
