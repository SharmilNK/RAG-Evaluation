    \ through AI or GenAI \u2014 such as automation, task augmentation, or optimized\
    \ hiring \u2014 resulting in stable or increased output with equal or fewer FTEs?"
  rubric:
  - '1: Limited impact: <10% improvement in a defined function or <5% automation of
