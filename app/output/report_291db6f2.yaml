    \ \u201Ccopilot\u201D for employees; 3\u20135 job postings cite LLM/RAG; one public\
    \ case study."
  - "4: Production LLM/RAG in \u22652 domains (e.g., care deflection + field ops)\
    \ and initial agentic automations (e.g., ticket triage); \u22652 case studies\
    \ and \u22656 job postings referencing agents/LLM ops; mentions of MLOps/tooling."
  - "5: Agentic architecture embedded in operating model (multi\u2011agent workflows\
    \ in care, network assurance, field ops) with governance; >3 public references\
    \ and \u226510 job postings citing agent frameworks; analyst/award recognition\
    \ and reported KPI gains."
  quant_rule: null
  evidence_requirements: null
