- kpi_id: to_what_extent_does_the_organization_allocate_and_scale_financial_human_and_technological_resources_to_ai_initiatives_in_a_way_that_delivers_measurable_business_outcomes_9
  name: AI Funding
  pillar: Execution
  type: rubric
  question: To what extent does the organization allocate and scale financial, human,
    and technological resources to AI initiatives in a way that delivers measurable
    business outcomes?
  rubric:
  - '1: Minimal or ad-hoc resource allocation.'
  - '2: Small budgets/pilots; inconsistent tracking.'
  - '3: Dedicated AI funding and teams in select areas; some business outcomes measured.'
  - '4: Sustained resource scaling across functions; measurable ROI for major initiatives.'
  - '5: Systematic enterprise allocation tied to KPIs, ROI dashboards, and continuous
    reprioritization.'
