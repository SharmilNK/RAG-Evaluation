kpi_definitions:
- kpi_id: what_is_the_maturity_of_the_companies_ai_strategy_1
  name: Strategic alignment- aligning growth and margin strategy to needs.
  pillar: Strategy
  type: rubric
  question: Does the company have an AI strategy?
  rubric:
  - '1: AI used sporadically, no formal strategy, limited business alignment.'
  - '2: Standalone AI projects, emerging roadmap, early data efforts but not integrated
    organization-wide.'
  - '3: Defined AI strategy aligned to business, cross-functional teams, enterprise
    data management, basic governance.'
  - '4: AI scaled across functions, mature data and ML platforms, KPIs tracked, workforce
    skilled, formal ethics.'
  - '5: AI is core to business model, continuous optimization, differentiated innovation,
    automated governance, and measurable impact.'
  quant_rule: null
  evidence_requirements: null
- kpi_id: evidence_of_ai_initiatives_with_reported_impact_on_key_metrics_efficiency_cx_cost_or_revenue_2
  name: Strategic alignment- aligning growth and margin strategy to needs.
  pillar: Strategy
  type: rubric
  question: Percentage of AI initiatives with outcomes tied to measurable business
    KPIs.
  rubric:
  - '1: No public evidence of AI impact'
  - "2: Only vague qualitative mentions (e.g. \u201CAI improves customer experience\u201D\
    )"
  - "3: 1\u20132 specific examples with some evidence of business benefit"
  - '4: Several initiatives with partial quantification (efficiency, cost, or CX impact)'
  - '5: Multiple initiatives with clearly quantified and recurring impact across business
    lines'
  quant_rule: null
  evidence_requirements: null
- kpi_id: does_the_company_s_c_level_publicly_communicate_a_defined_ai_strategy_3
  name: Strategic alignment- aligning growth and margin strategy to needs
  pillar: Strategy
  type: rubric
  question: C-level statements about AI Strategy
  rubric:
  - "1: No public signals of stakeholder commitment to AI\u2011driven change."
  - "2: High\u2011level intent (e.g., upskilling plans) without governance, budget,\
    \ or operating\u2011model changes."
  - '3: Formal governance (e.g., AI council) or CAIO appointment; initial budget lines
    or hiring push; launch of training program and partner MoUs.'
  - "4: Cross\u2011functional operating model with clear RACI; disclosed reskilling\
    \ targets (e.g., \u22651,000 employees), regulatory/ethics engagement, and signed\
    \ multi\u2011year partner agreements to support rollout."
  - "5: Board\u2011level oversight (committee/charter), public change KPIs (e.g.,\
    \ % workforce trained, adoption rates), union/regulator agreements where relevant,\
    \ and multi\u2011year funding commitments with progress updates in filings."
  quant_rule: null
  evidence_requirements: null
- kpi_id: are_there_board_members_with_proven_ai_expertise_4
  name: Strategic alignment- aligning growth and margin strategy to needs
  pillar: Strategy
  type: rubric
  question: Presence of AI talent/experience on the Board
  rubric:
  - '1: Zero directors with AI/ML/data expertise.'
  - '2: One director with general tech/IT background; limited direct AI experience.'
  - "3: \u22651 director with substantive AI/ML/data leadership (e.g., led DS/ML at\
    \ major tech) or recognized academic AI credentials; sporadic mention of board\
    \ AI oversight."
  - "4: \u22652 directors with strong AI/ML credentials OR a formal board committee\
    \ with AI in its remit (e.g., Technology & Innovation/Risk) and disclosed oversight\
    \ responsibilities."
  - "5: \u22653 directors with AI/ML track records AND an active board committee overseeing\
    \ AI strategy/risk/ethics; regular AI reporting in the annual report and participation\
    \ in external AI governance forums."
  quant_rule: null
  evidence_requirements: null
- kpi_id: how_proactive_and_impactful_is_the_company_s_public_ai_messaging_social_white_papers_in_core_markets_5
  name: Trust and change management- secure stakeholder buy-in to drive change
  pillar: Strategy
  type: rubric
  question: AI communications in social media, white papers (volume and boldness of
    messaging), limit to G7 or primary markets
  rubric:
  - "1: \u22642 items in last 12 months; generic messaging; no metrics or named partners/customers."
  - "2: 3\u20135 items; mostly marketing; limited telecom specificity; few quantified\
    \ claims."
  - "3: 6\u201310 items; includes \u22651 white paper or major conference talk (e.g.,\
    \ MWC, TM Forum) with telecom use\u2011case detail; at least one piece with quantified\
    \ impact."
  - "4: 11\u201320 items; steady multi\u2011channel cadence; several case studies\
    \ with metrics (e.g., AHT\u2193, energy\u2193), named partners/customers, and\
    \ earned\u2011media pickup."
  - "5: >20 items; sustained multi\u2011channel presence; bold, target\u2011backed\
    \ claims (e.g., care deflection \u226520%, RAN energy \u2193 \u226510%), multiple\
    \ reference customers, open\u2011sourced assets/benchmarks, and third\u2011party\
    \ awards."
  quant_rule: null
  evidence_requirements: null
