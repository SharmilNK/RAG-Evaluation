- kpi_id: innovation
  pillar: DB Imported
  type: rubric
  score: 1.8888888888888888
  confidence: 0.7
  rationale: "Overall, the Innovation KPI category is operating at an early-stage,\
    \ opportunistic level rather than as a deliberately managed capability, which\
    \ aligns with its 1.9/5 Low\u2013Medium score.\n\nAcross the drivers, the dominant\
    \ theme is inconsistency: innovation activity may exist in pockets, but it is\
    \ not clearly framed, reinforced, or scaled through a shared enterprise narrative.\
    \ The fact that Innovation is \u201Cnot specifically called out in the AI Playbook\u201D\
    \ signals a structural gap in strategic intent\u2014innovation is not being positioned\
    \ as a first-class outcome with defined pathways (e.g., discovery-to-delivery,\
    \ experimentation guardrails, investment criteria) that teams can reliably follow.\
    \ As a result, whatever innovation occurs is more likely to depend on local initiative\
    \ than on repeatable mechanisms, governance, and leadership sponsorship.\n\nThis\
    \ evidence justifies the Low\u2013Medium tier because it suggests partial presence\
    \ without institutionalization. A score near 2 implies the organization has some\
    \ elements that could support innovation, but they are not coherently integrated\
    \ into the operating model: innovation is not explicitly translated into expectations,\
    \ metrics, or resourcing decisions via the playbook, making it difficult to drive\
    \ consistent behavior, prioritize effectively, or demonstrate sustained outcomes.\
    \ In consulting terms, the category shows \u201Cactivity\u201D more than \u201C\
    capability.\u201D\n\nThe key risk is that innovation remains fragile and uneven\u2014\
    highly sensitive to individual champions and vulnerable to shifting priorities\u2014\
    while the organization struggles to convert experimentation into measurable business\
    \ value. Leadership\u2019s next step should be to explicitly codify innovation\
    \ in the AI Playbook: define what \u201Cinnovation\u201D means in this context,\
    \ how ideas are sourced and evaluated, what governance and risk thresholds apply,\
    \ how funding and capacity are allocated, and how success is measured (both near-term\
    \ learning metrics and longer-term value realization). This would convert latent\
    \ effort into a scalable, auditable innovation system and is the most direct lever\
    \ to move the score from Low\u2013Medium toward Medium."
