- kpi_id: evidence_of_ai_initiatives_with_reported_impact_on_key_metrics_efficiency_cx_cost_or_revenue
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "The KPI asks for public evidence of AI initiatives with reported impact\
    \ on key business metrics (efficiency, CX, cost, or revenue). The only directly\
    \ relevant structured signal indicates Telecom Italia has just one AI use case\
    \ with quantitative impact since 2023, which aligns best with a \u201C1\u2013\
    2 specific examples with some evidence of business benefit\u201D performance band\
    \ rather than \u201Cseveral initiatives with partial quantification.\u201D [1]\n\
    \nThe provided narrative evidence does not reliably document Telecom Italia\u2019\
    s own quantified AI impacts. The AmCham report passages discuss AI benefits in\
    \ general (including banking examples like Citibank and Generali Italia) and make\
    \ sector-level claims about telcos (e.g., AI-powered call center solutions yielding\
    \ at least 5% sales/revenue uplift), but these are not explicitly attributed to\
    \ Telecom Italia\u2019s initiatives or results. [2][3] Because the KPI requires\
    \ company-specific evidence of impact, these generalized or other-company examples\
    \ cannot be used to demonstrate Telecom Italia\u2019s reported AI metric improvements.\
    \ [2][3]\n\nSimilarly, the Oliver Wyman and PwC materials provide illustrative\
    \ or advisory examples of potential AI/genAI impacts for telcos (e.g., improvements\
    \ in marketing spend efficiency, NOC efficiency, average handling time), but they\
    \ do not identify Telecom Italia as the subject of those quantified results, and\
    \ therefore do not constitute Telecom Italia-specific reported impact. [4][5][6]\n\
    \nGiven the presence of a single quantified-impact AI use case in the signals\
    \ and the absence of Telecom Italia-specific, publicly cited metric impacts in\
    \ the evidence snippets provided, Telecom Italia best fits Score 3 (1\u20132 specific\
    \ examples with some evidence of business benefit). [1] The evidence set is insufficient\
    \ to justify Score 4 or 5 because it does not provide several Telecom Italia initiatives\
    \ with partial quantification or multiple recurring quantified impacts across\
    \ business lines. [1][4][5]"
