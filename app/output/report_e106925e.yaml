  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "The provided evidence does not substantiate that Telecom Italia S.p.A.\
    \ is actively shaping AI standards or regulation through consortia, position papers,\
    \ or standards pilots, beyond at most limited, indirect indications of industry-level\
    \ activity. The only potentially relevant document in the evidence set discussing\
    \ standards/ethics/industry coordination is an industry research agenda that describes\
    \ telecom-sector efforts (e.g., GSMA/ETNO ethical AI playbook and a joint AI taskforce),\
    \ but it does not attribute authorship, leadership, participation, or any specific\
    \ contribution to Telecom Italia S.p.A. itself, so it cannot be counted as company\
    \ engagement. [2]\n\nNo evidence chunk demonstrates Telecom Italia holding leadership\
    \ roles (e.g., chair/rapporteur), publishing position papers, being cited in regulatory/standards\
    \ outcomes, or running standards pilots that feed into regulation or internal\
    \ policy. The other evidence excerpts are generic framework descriptions about\
    \ AI project maturity, ecosystem roles, EU/OECD principles, and broad commentary\
    \ on European standardization influence; none of these establish Telecom Italia\u2019\
    s participation or influence in standards/regulatory shaping, and therefore are\
    \ not usable for scoring this KPI. [1][4][5][7][8]\n\nGiven the absence of company-specific,\
    \ KPI-relevant proof of active contributions or pilots, the most defensible assessment\
    \ is that Telecom Italia\u2019s standards/regulation shaping activity is not evidenced\
    \ here. However, because one signal indicates at least one membership in a \u201C\
    key digital/data consortia\u201D (without naming the body or describing engagement),\
    \ this supports a conservative tier above \u201Cno participation,\u201D aligning\
    \ best with \u201Cmembership in 1\u20132 bodies; limited engagement.\u201D [2]"
