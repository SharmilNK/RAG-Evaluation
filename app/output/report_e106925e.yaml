- kpi_id: how_well_does_the_company_report_compliance_with_ai_related_regulations
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Telecom Italia\u2019s public reporting in the provided materials shows\
    \ awareness of AI-related regulatory and ethics topics, but it does not clearly\
    \ document an AI regulatory compliance program (e.g., mappings, controls, audits,\
    \ or external assurance) that would meet the higher rubric tiers. [6]\n\nIn TIM\u2019\
    s 2024 sustainability annual report, the company lists external AI-related standards\
    \ and guidance it considers (e.g., UNESCO \u201CRecommendation on the Ethics of\
    \ Artificial Intelligence,\u201D GSMA \u201CAI Ethics Playbook,\u201D and the\
    \ Council of Europe Framework Convention on AI and Human Rights). [6] This indicates\
    \ a general commitment to align with recognized AI ethics/regulatory expectations,\
    \ but it does not evidence a concrete compliance framework mapping (such as to\
    \ NIST AI RMF) or an EU AI Act readiness plan in the provided excerpts. [6]\n\n\
    The same sustainability report excerpt describes that TIM Group policies are made\
    \ available internally and may be extended to third parties via contractual clauses\
    \ requiring acceptance/compliance with certain policies (explicitly mentioning\
    \ the Code of Ethics as an example). [6] While this suggests some capability to\
    \ flow governance requirements into supplier/third-party relationships, the excerpt\
    \ does not specify AI-specific supplier requirements, high-risk AI controls, or\
    \ internal audit processes tied to AI regulations, which are needed for Score\
    \ 4. [6]\n\nTIM\u2019s 2025 half-year financial report includes a general description\
    \ of the EU AI Act\u2019s entry into force, its risk-based classification approach,\
    \ examples of \u201Cunacceptable risk\u201D prohibitions, and potential fines.\
    \ [7] This is informative context about the regulatory environment, but it is\
    \ not presented as TIM\u2019s own compliance posture (e.g., internal governance,\
    \ compliance roles, accountability such as DPO/legal involvement for AI Act compliance,\
    \ implementation timelines, or reporting of compliance activities), which is required\
    \ for Score 3 and above. [7]\n\nSeveral other provided sources discuss Italy\u2019\
    s AI regulatory landscape in general (e.g., National AI Law, National AI Strategy,\
    \ regulator roles, and broader cross-jurisdiction compliance challenges), but\
    \ they do not provide company-specific evidence about Telecom Italia\u2019s compliance\
    \ reporting or controls; therefore, they are not reliable as evidence for scoring\
    \ TIM\u2019s reporting quality against this KPI. [1] [2] [4] [5] [8]\n\nGiven\
    \ the evidence that TIM publicly references AI-ethics/regulatory guidance but\
    \ does not publicly document a structured AI regulatory compliance framework,\
    \ readiness plan, high-risk AI processes, internal audits, cross-border compliance\
    \ approach, or independent assurance/certification, the most supportable tier\
    \ is Score 2 (general commitment without described frameworks/controls). [6] [7]"
