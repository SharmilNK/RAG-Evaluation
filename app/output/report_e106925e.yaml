- kpi_id: what_is_the_maturity_of_the_companies_ai_strategy
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Telecom Italia S.p.A. (TIM) demonstrates an AI strategy that is formalized,\
    \ cross-functional, and accompanied by governance and ethics, with evidence of\
    \ scaling AI-enabled capabilities across multiple functions, which aligns best\
    \ to a \u201CMedium-High\u201D maturity outcome under the rubric. [1][2][3]\n\n\
    At the strategy and operating-model level, TIM is described as having an overarching\
    \ AI governance model that includes a central AI Committee chaired by the CEO\
    \ and supported by cross-functional teams and specialist functions, which indicates\
    \ enterprise coordination rather than isolated pilots. [1][120] This setup is\
    \ consistent with the rubric\u2019s expectation of cross-functional teams and\
    \ defined strategic oversight, and it supports progression beyond standalone projects.\
    \ [3][120]\n\nOn scaling and platform maturity, TIM is explicitly described as\
    \ building AI infrastructure via investments in AI-ready data centers, expansion\
    \ of edge cloud capabilities, and partnerships with hyperscalers for AI services.\
    \ [122] This points to the presence of enabling platforms (data center/edge/hyperscaler\
    \ ecosystem) that support broader deployment rather than only experiment-level\
    \ AI. [122][5]\n\nOn governance and measurement, the evidence base emphasizes\
    \ that mature AI programs depend on measurable KPIs and strong project governance\
    \ (including process review and modernized IT/data-sharing capabilities). [2][3]\
    \ TIM\u2019s organizational/governance signals also indicate a structured corporate\
    \ governance model with internal committees and internal control and risk management\
    \ systems, which provides the governance environment needed to operationalize\
    \ KPI-based oversight for AI programs. [69][77] While the provided evidence does\
    \ not enumerate specific AI KPIs TIM tracks, the presence of formal governance\
    \ structures and the AI-committee model supports the rubric\u2019s \u201Cscaled\
    \ across functions with governance\u201D characteristics more than the lower tiers.\
    \ [2][120]\n\nOn ethics, TIM is reported to have published AI ethics documentation\
    \ (\u201CLinee Guida sull\u2019Intelligenza Artificiale\u201D) and an AI ethics\
    \ governance model is marked as present (\u201Cyes\u201D). [40][112] Formal ethics\
    \ is explicitly a Score-4 rubric indicator, and this signal directly supports\
    \ a Medium-High maturity assessment rather than a mid-level strategy without ethics\
    \ formalization. [40][112]\n\nOn breadth of AI adoption across functions, TIM\
    \ is described as adopting AI in manufacturing-related initiatives (predictive\
    \ maintenance, anomaly detection, digital twins, remote support) and also using\
    \ AI in design workflows (network/radio access design and optimization, document\
    \ automation, creative content generation for marketing and metaverse experiences).\
    \ [53][57] In addition, TIM is reported to use a range of AI technologies/models,\
    \ including internal productivity tools and customer-care AI (e.g., \u201CTIM\
    \ AI Customer Assistant,\u201D Microsoft 365 Copilot) and network-operations AI.\
    \ [58] This multi-domain adoption pattern is more consistent with scaling across\
    \ functions than with isolated, standalone pilots, supporting a Score 4 alignment.\
    \ [53][57][58]\n\nHowever, the evidence is not sufficient to justify Score 5 (AI\
    \ as core to the business model with continuous optimization and clearly demonstrated,\
    \ measurable enterprise impact). [7][5] The signals present a conflict on impact:\
    \ TIM is reported to have 5 AI use cases since 2023 and only 1 with quantitative\
    \ impact, while another signal claims 100 AI use cases with financial impact since\
    \ 2023; because these are inconsistent and no primary, KPI-linked evidence is\
    \ provided here to reconcile them, the assessment must remain conservative and\
    \ cannot treat \u201Cmeasurable impact at scale\u201D as conclusively proven.\
    \ [75][76][104] Additionally, board-level AI experience is reported as 0, which\
    \ is not disqualifying for Score 4 but does not support Score 5\u2019s implication\
    \ of AI being fully embedded at the highest strategic levels as a differentiated,\
    \ continuously optimized business-model driver. [50][70]\n\nConsidering the strongest,\
    \ KPI-relevant signals\u2014cross-functional AI governance chaired by the CEO,\
    \ presence of AI ethics governance and published guidelines, and investments in\
    \ AI infrastructure\u2014TIM most closely fits Score 4 (AI scaled across functions\
    \ with formal ethics and enabling platforms), while lacking the unambiguous, consistently\
    \ evidenced \u201Cmeasurable impact/core business model\u201D requirements to\
    \ reach Score 5. [120][40][112][122]"
