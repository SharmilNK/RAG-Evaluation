- kpi_id: to_what_extent_does_the_company_promote_an_ethical_culture_and_mechanisms_for_continuous_improvement_in_ai_practices
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Telecom Italia S.p.A. (TIM) demonstrates a defined ethical culture for\
    \ AI with formalized mechanisms intended to translate ethical principles into\
    \ day-to-day AI practices, supported by governance and periodic review processes,\
    \ which aligns best with a \u201CMedium-High\u201D performance level under the\
    \ rubric. [7]\n\nTIM explicitly reports having \u201CArtificial Intelligence Guidelines\u201D\
    \ that \u201Cdefine the regulatory framework for the development, use and purchase\
    \ of Artificial Intelligence Systems,\u201D and states that this framework is\
    \ intended to ensure \u201Cethical principles translate into day-to-day operations\
    \ in the interest of the Company and all its Stakeholders.\u201D [7] The same\
    \ disclosure indicates the Guidelines cover (i) ethical principles for AI development,\
    \ use, and purchase, (ii) the external and internal regulatory framework relating\
    \ to AI systems, and (iii) an \u201Corganizational and governance structure for\
    \ managing AI issues,\u201D which collectively evidences a formal AI ethics policy\
    \ plus an implementation mechanism rather than ethics awareness alone. [7]\n\n\
    TIM also evidences broader ethics governance practices that support continuous\
    \ improvement through formal review cycles: its Code of Ethics and Conduct was\
    \ adopted by a Board of Directors resolution (March 15, 2023) and \u201Ca periodic\
    \ review of the Code is also ensured to implement any necessary updates.\u201D\
    \ [8] While this statement is about the Code of Ethics (not exclusively AI), it\
    \ supports the presence of an organizational norm of periodically updating ethics-related\
    \ governance instruments, which is relevant to the KPI\u2019s \u201Cmechanisms\
    \ for continuous improvement in AI practices\u201D when considered alongside the\
    \ company\u2019s AI Guidelines and AI governance structure. [7][8]\n\nTIM further\
    \ indicates mechanisms to embed expectations across the organization and into\
    \ third-party relationships: it reports making group policies available to stakeholders\
    \ via intranet and website and adds that, where appropriate, \u201Cspecific contractual\
    \ clauses will be added\u201D for third parties relating to acceptance/compliance\
    \ with policies such as the Code of Ethics. [5] This strengthens the interpretation\
    \ that ethics-related requirements are operationalized (including beyond internal\
    \ teams), which is consistent with more active governance than \u201Climited enforcement.\u201D\
    \ [5]\n\nHowever, the provided evidence does not demonstrate the highest rubric\
    \ level (\u201Cethics-by-design embedded across lifecycle; continuous learning\
    \ and audits applied\u201D) because it does not substantiate lifecycle-wide ethics-by-design\
    \ practices, independent auditing, continuous learning loops specific to AI systems,\
    \ or a dedicated AI ethics committee with a defined cadence and public outputs\
    \ (e.g., audit results, model reviews, or impact assessments). [7] As a result,\
    \ TIM fits best at Score 4 (active governance and review processes) rather than\
    \ Score 5. [7][8]\n\nSome evidence supplied is not company-specific and therefore\
    \ cannot be used to score TIM\u2019s performance. For example, the Humane-AI telecommunications\
    \ industry research agenda and statements about sector-wide ethical AI efforts\
    \ (e.g., GSMA/ETNO initiatives) describe the industry context rather than TIM\u2019\
    s own governance and improvement mechanisms. [1][2][3][6]"
