- kpi_id: how_rigorous_is_partner_vendor_capability_assessment_security_compliance_quality_delivery_integration
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Telecom Italia (TIM) evidences a structured supplier qualification approach\
    \ that goes beyond informal references by embedding a standardized self-assessment\
    \ questionnaire into its supplier qualification workflow and using questionnaire\
    \ results to compute a supplier risk index for vendor-list admission. TIM states\
    \ that, since 2014, suppliers entering qualification processes in higher sustainability-risk\
    \ procurement areas must complete a specific self-assessment questionnaire intended\
    \ to determine socio-environmental sustainability risk, and that this questionnaire\
    \ is integrated into the qualification application/workflow. [1] TIM reiterates\
    \ this mechanism in later reporting, confirming the same since-2014 process design\
    \ and its integration into qualification tooling. [3]\n\nThe assessment approach\
    \ also shows signs of rigor consistent with structured scoring/weightings rather\
    \ than a simple checklist: TIM describes processing supplier answers to determine\
    \ a \u201Csupplier sustainability risk index,\u201D explicitly indicating an indexed/scored\
    \ output used for supplier onboarding to the vendor list. [4] TIM further reports\
    \ that in 2020 it adjusted the questionnaire by \u201Cthe weighting system of\
    \ the questions\u201D to emphasize more sensitive issues, which is directly aligned\
    \ with the rubric\u2019s expectation for structured scoring with weightings and\
    \ evidence-based assessment inputs. [4]\n\nTIM\u2019s capability assessment scope,\
    \ while framed primarily under \u201Csustainability\u201D qualification, includes\
    \ multiple compliance-relevant domains that overlap with partner/vendor capability\
    \ expectations (e.g., anti-corruption and data protection), suggesting the qualification\
    \ instrument is not limited to environmental topics alone. [4] Additionally, TIM\
    \ indicates coverage breadth by stating that sustainability risk is integrated\
    \ into the supplier qualification process by default for all new suppliers in\
    \ markets deemed to have sustainability risk, and that a renewal mechanism was\
    \ introduced to keep the supplier-base view up to date. [4] TIM also reports refresher\
    \ campaigns for previously qualified suppliers, reinforcing periodic re-validation\
    \ rather than one-time onboarding checks. [1]\n\nEvidence of audit activity exists,\
    \ but the most concrete, count-based audit/controls disclosure in the provided\
    \ materials is historical (2007). TIM reported extensive supplier controls including\
    \ \u201Ctechnical-organisational audits at Supplier\u2019s premises\u201D both\
    \ for incoming quality control and for qualification procedures, plus audits of\
    \ high-risk subcontractors; it also reported vendor-rating monitoring and qualification\
    \ controls with recorded negative outcomes and fixed-term qualifications. [5]\
    \ TIM also describes a process for high-risk commodity categories that includes\
    \ pre-contractual qualification assessing technical/organizational characteristics,\
    \ followed by controls during supply that range from vendor-rating monitoring\
    \ to incoming quality controls, with additional execution controls on technical\
    \ works. [6] However, these sources do not establish a current cadence such as\
    \ \u201C\u22651 vendor audit/year,\u201D nor do they quantify the number of critical\
    \ vendors audited per year in recent periods. [5] \n\nTIM also references participation\
    \ in a \u201CJoint Audit Cooperation\u201D initiative (an agreement with other\
    \ telecom operators) providing for sustainability audit activities at common suppliers\u2019\
    \ and sub-suppliers\u2019 production plants, which supports the existence of audit\
    \ mechanisms and collaboration on audits. [8] Nonetheless, the provided evidence\
    \ does not specify annual audit counts, critical-vendor audit thresholds, red\
    \ teaming, use-case-specific risk-based assessments beyond sustainability risk\
    \ context, or tracking of corrective actions\u2014elements required to justify\
    \ a score of 4 or 5. [4]\n\nGiven the demonstrated presence of (a) an embedded\
    \ supplier qualification assessment process, (b) a computed risk index derived\
    \ from supplier responses, and (c) explicit weighting adjustments in the assessment\
    \ model, TIM meets the rubric\u2019s core expectations for \u201Cstructured scoring\
    \ with weightings\u201D and an evidence-driven assessment process consistent with\
    \ a score of 3. [4] Due to insufficient KPI-specific evidence on modern audit\
    \ frequency/volume (e.g., \u22653 critical vendors/year), red teaming, and corrective-action\
    \ tracking/continuous improvement, a higher tier cannot be supported from the\
    \ provided sources. [5]"
