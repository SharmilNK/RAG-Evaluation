- kpi_id: what_is_the_number_of_documented_ai_use_cases_and_how_well_are_they_aligned_with_business_strategy
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "The most KPI-relevant structured signal states that Telecom Italia S.p.A.\
    \ has disclosed 5 AI use cases since 2023, which places the company in the rubric\u2019\
    s 3\u20135 use-case band (Score 3). [1]\n\nHowever, the provided documentary evidence\
    \ chunks do not substantiate Telecom Italia\u2019s own documented use cases; instead,\
    \ the Humane AI \u201CAI Research agenda for the telecommunications industry\u201D\
    \ describes general telecom-industry AI use cases (e.g., anomaly detection for\
    \ cyber-attacks, fraud reduction, next-best action/activity, churn prediction,\
    \ smart pricing, credit scoring) without attributing these to Telecom Italia specifically.\
    \ [2][3][4] Because these are industry-level examples rather than company-specific\
    \ disclosures, they are not counted as Telecom Italia use cases for this KPI.\
    \ [2][3][4]\n\nGiven the absence of company-specific public documentation in the\
    \ evidence set enumerating the 5 use cases (e.g., named deployments, production\
    \ status, or metrics) and explicitly tying them to Telecom Italia\u2019s business\
    \ strategy, the strategic alignment can only be assessed as limited/implicit based\
    \ on the available materials. [1][2][3][4] The score is therefore kept at Score\
    \ 3 (Medium) rather than increased toward Score 4, since Score 4 requires 6\u2013\
    10 use cases across multiple domains with explicit linkage to telecom strategic\
    \ themes and evidence of production/metrics, which is not supported by the provided\
    \ evidence. [1]\n\nAdditionally, there is a material inconsistency among signals:\
    \ one signal claims \u201CNumber of AI use cases with financial impact since 2023:\
    \ 100,\u201D which conflicts sharply with \u201CNumber of AI use cases since 2023:\
    \ 5.\u201D [1][5] With no supporting company-specific documentation in the evidence\
    \ chunks to validate the higher figure, the more conservative interpretation aligned\
    \ to the KPI (documented AI use cases) is to rely on the explicit \u201C5 use\
    \ cases since 2023\u201D signal for the core scoring. [1][2][3][4][5]"
