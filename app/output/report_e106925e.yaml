    \ group policies take into account ethics-related external references (including\
    \ UNESCO\u2019s \u201CRecommendation on the Ethics of Artificial Intelligence\u201D\
    \ and the GSMA \u201CAI Ethics Playbook\u201D), this is framed as policy consideration\
