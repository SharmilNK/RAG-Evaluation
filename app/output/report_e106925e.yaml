- kpi_id: how_clear_are_cross_functional_roles_and_responsibilities_for_ai_business_product_data_risk_legal_from_idea_to_run
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "After validating scope, none of the provided evidence chunks directly\
    \ describes Telecom Italia S.p.A.\u2019s (TIM\u2019s) cross-functional AI operating\
    \ model (e.g., a RACI from idea\u2192build\u2192deploy\u2192run, stage gates,\
    \ or explicit role ownership across business/product/data/risk/legal). [1][2][3][4][5][6][7][8]\n\
    \nMost evidence is either (a) general telecom/AI advisory content (PwC reference\
    \ model and recommended governance patterns) rather than TIM-specific operating\
    \ practice, or (b) general/regulatory or cross-company survey material that does\
    \ not document TIM\u2019s own role clarity from ideation to run. [1][3][4][5][6][7][8]\n\
    \nSignals provide limited but TIM-specific governance indicators: they state TIM\
    \ has an \u201CAI ethics governance model\u201D (yes) and has published AI ethics\
    \ documentation (\u201CLinee Guida sull\u2019Intelligenza Artificiale\u201D) describing\
    \ ethical principles and governance for AI use, which implies some formalization\
    \ of roles/controls at least around Responsible/ethical AI. [112][40]\n\nHowever,\
    \ the signals do not evidence (1) an end-to-end RACI covering build/deploy/run,\
    \ (2) scheduled governance touchpoints and stage gates with named accountable\
    \ owners, (3) documented early involvement of risk/legal for sensitive use cases,\
    \ or (4) quantified coverage/adherence across AI use cases (e.g., \u226580% or\
    \ >95% following a defined process with SLAs). [112][40]\n\nGiven the presence\
    \ of some AI governance/ethics artifacts but a lack of TIM-specific evidence for\
    \ end-to-end cross-functional role clarity from idea to run, the most supportable\
    \ rating is Score 2 (some role/governance elements exist, but insufficient evidence\
    \ of full lifecycle role clarity and early risk/legal integration). [112][40]"
