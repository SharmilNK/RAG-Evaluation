- kpi_id: how_long_has_the_company_had_operational_ai_solutions_in_place
  pillar: DB Imported
  type: rubric
  score: 5.0
  confidence: 0.7
  rationale: "Vodafone\u2019s first externally evidenced operational AI execution\
    \ dates back to 2019 or earlier, meeting the \u201Cpioneer\u201D threshold (\u2264\
    2016) based on an executive statement that Vodafone had \u201Cbeen working on\
    \ AI since 2016, 2017,\u201D focused on machine learning and predictive AI for\
    \ network prediction and planning, which indicates operational use in core network\
    \ processes rather than purely experimental activity. [1]\n\nVodafone also provides\
    \ company-authored evidence (2019) that it was already operating multiple AI solutions\
    \ at scale, including its TOBi machine-learning chatbot \u201Claunched in 11 markets\u201D\
    \ and AI deployed in radio access networks to anticipate capacity needs and optimize\
    \ handovers, with quantified outcomes such as automation of \u201Ctwo-thirds of\
    \ customer contact\u201D in Italy and \u201Creduction in network energy consumption\
    \ of up to 15%.\u201D [2]\n\nContinuity of operational AI since 2018 is evidenced\
    \ by public references across at least three different years. In 2019, Vodafone\
    \ documented live deployments such as TOBi and AI in radio access networks and\
    \ a big data team using AI algorithms. [2] In 2025, Vodafone reported generative\
    \ AI embedded in core operations, including \u201CSuperTOBi live in all European\
    \ markets\u201D handling ~60 million customer conversations monthly and a \u201C\
    call centre agent assist in Germany,\u201D with quantified improvements (e.g.,\
    \ 61% improvement in helpfulness rating, 70% end-to-end resolution rate, and +8pp\
    \ NPS improvement). [3] Separately, a 2026 Vodafone publication describes AI as\
    \ integrated into everyday operations and discusses evolving AI within employee\
    \ workflows, reinforcing that AI remains an active operational focus beyond a\
    \ single point-in-time deployment. [4]\n\nTaken together, the evidence supports\
    \ that Vodafone has had operational AI solutions in place since at least 2016\u2013\
    2017 and has continued referencing operational AI deployments in multiple years\
    \ since 2018, satisfying both the \u201Cpioneer\u201D start date and the continuity\
    \ requirement for the highest tier. [1][2][3][4]"
