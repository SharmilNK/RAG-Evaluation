- kpi_id: how_well_does_the_company_report_compliance_with_ai_related_regulations
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone publicly discloses an AI governance and principles framework\
    \ that explicitly anchors its approach in external regulatory/ethical guidance,\
    \ including the European Commission\u2019s Ethics Guidelines for Trustworthy AI\
    \ and OECD transparency principles, indicating more than a generic \u201Cwe will\
    \ comply\u201D posture. Vodafone states it contributed to the EU Ethics Guidelines\
    \ and that these informed its own AI framework, which sets expectations across\
    \ transparency/accountability, ethics/fairness, privacy/security, human rights,\
    \ and inclusion. [1][7][8]\n\nOn legal/regulatory alignment, Vodafone\u2019s AI\
    \ framework commits to managing customer data \u201Cin line with\u2026prevailing\
    \ legislation\u201D and to using AI only when a \u201Cclear legal basis\u201D\
    \ has been established. This is a direct, public statement of legal-compliance\
    \ intent tied to operational use of AI with customer data, rather than a purely\
    \ aspirational message. [6]\n\nVodafone also documents concrete internal controls\
    \ relevant to AI risk management that resemble \u201Cdocumented processes\u201D\
    \ expected for stronger regulatory compliance readiness. In its cybersecurity\
    \ factsheet, Vodafone describes integrating \u201Csecure AI lifecycle practice,\
    \ requirements and tools\u201D into strategic AI platforms and internally developed\
    \ AI applications, and it specifies internal development requirements including\
    \ \u201Crisk assessment,\u201D \u201Cdesigning for transparency,\u201D reducing\
    \ bias, and ensuring \u201Cthe right degree of human oversight,\u201D with an\
    \ explicit heightened-control condition where high-impact models require human\
    \ input into the final decision. These are process disclosures consistent with\
    \ controls for higher-risk AI use (even if not explicitly labeled as \u201Chigh-risk\u201D\
    \ under the EU AI Act). [3]\n\nVodafone further evidences internal oversight and\
    \ assurance mechanisms through its broader privacy governance reporting. Vodafone\
    \ states that privacy control frameworks undergo continuous risk-based improvement\
    \ and that effectiveness is subject to \u201Cregular reporting and testing by\
    \ the privacy teams and internal audit,\u201D with findings remediated and monitored.\
    \ Vodafone also identifies senior legal oversight: the Group General Counsel oversees\
    \ the global privacy programme, and the Group Privacy Officer reports to the General\
    \ Counsel and provides regular status reports plus an annual update to the Audit\
    \ and Risk Committee. While this is privacy-focused, it is directly relevant to\
    \ AI regulatory compliance to the extent AI systems process personal data and\
    \ are subject to GDPR and related data-protection obligations. [4]\n\nHowever,\
    \ Vodafone\u2019s public reporting in the provided evidence does not show several\
    \ elements required for the highest tier: there is no evidence here of independent\
    \ assessments or certifications specific to AI governance (e.g., ISO/IEC 42001),\
    \ no explicit annual AI regulatory compliance reporting, and no explicit mapping\
    \ to AI-specific regulatory frameworks such as the EU AI Act readiness plan or\
    \ NIST AI RMF. The AI framework includes a pledge to \u201Creport on key learnings\
    \ and observations\u201D as the framework evolves, but this is not the same as\
    \ a recurring compliance report against AI regulations. [5]\n\nGiven the presence\
    \ of documented internal requirements (risk assessment, transparency, bias considerations,\
    \ human oversight) and internal audit/testing mechanisms, Vodafone\u2019s reporting\
    \ is stronger than simple commitments and aligns best with a Medium-High (Score\
    \ 4) assessment, but it falls short of Score 5 due to the lack of independent\
    \ certification/regulator-facing annual compliance reporting and explicit AI-regulation\
    \ mapping in the supplied materials. [3][4][5]"
