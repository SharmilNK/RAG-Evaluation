- kpi_id: how_does_the_company_integrate_community_engagement_and_social_responsibility_into_its_ai_initiatives
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone has articulated defined, company-wide commitments that explicitly\
    \ connect its AI activity to broader societal impact areas (human rights, inclusivity,\
    \ and closing the digital divide), and it describes ongoing engagement with external\
    \ stakeholders\u2014meeting the rubric\u2019s expectation of regular community/stakeholder\
    \ engagement and ethical impact assessment practices. [2][3][4]\n\nOn ethical/social\
    \ responsibility integration, Vodafone states that its AI should respect privacy,\
    \ security, and fundamental rights and that it aims for AI-driven decisions to\
    \ be fair and free of harmful bias, positioning these as responsibilities to customers,\
    \ employees, and wider society. [3] Vodafone further commits to ensuring AI systems\
    \ foster \u201Cdiversity, accessibility and inclusivity,\u201D and to minimising\
    \ risks of systems being unlawfully used to the detriment of people\u2019s human\
    \ rights. [4] These are defined social responsibility principles for AI (rubric\
    \ score 3) and go beyond minimal or loosely connected CSR. [3][4]\n\nOn ethical\
    \ impact assessment and safeguards, Vodafone describes operational requirements\
    \ for internal AI application development that include risk assessment, designing\
    \ for transparency, lack of bias, and ensuring an appropriate degree of human\
    \ oversight, with an explicit escalation for \u201Chigh impact on people\u201D\
    \ use cases requiring human input on final decisions. [1] Vodafone also states\
    \ it is working on an improved methodology to assess the \u201Chuman impact\u201D\
    \ of AI data processing on individuals\u2019 rights and freedoms, which directly\
    \ aligns with the rubric\u2019s ethical impact assessment expectation (rubric\
    \ score 4). [2]\n\nOn community/stakeholder engagement, Vodafone commits to \u201C\
    proactively engage with industry peers and other relevant experts (e.g. academics\
    \ and civil society)\u201D via consultation exercises to help ensure AI systems\
    \ are human-centric and inclusive. [4] It also commits to establishing and maintaining\
    \ \u201Ca regular dialogue\u201D with customers about how it should use data and\
    \ AI tools to serve them, indicating an ongoing engagement mechanism rather than\
    \ one-off outreach. [4][7] In addition, Vodafone reports participation in cross-industry\
    \ forums collaborating on telecom-specific AI use cases (in the context of cybersecurity),\
    \ evidencing external engagement around applied AI topics. [1]\n\nOn broader social\
    \ outcomes tied to AI, Vodafone explicitly links its AI introduction to closing\
    \ the \u201Cdigital divide\u201D and states it is undertaking educational initiatives\
    \ in a number of markets to raise broad awareness of new technologies, and it\
    \ further frames this as building capacity through awareness-raising and educational\
    \ partnerships. [2][6] This shows intent to integrate social responsibility objectives\
    \ into AI adoption beyond internal governance and risk controls. [2][6]\n\nHowever,\
    \ the evidence provided is largely principles- and commitment-led and does not\
    \ include transparent, measurable lifecycle-embedded social responsibility metrics\
    \ (e.g., disclosed KPIs on community outcomes, published results of impact assessments,\
    \ or quantified progress on digital divide outcomes specifically attributable\
    \ to AI). [2][3][4][6] Because the rubric\u2019s score 5 requires \u201Ctransparent,\
    \ measurable social responsibility embedded in AI lifecycle,\u201D the provided\
    \ materials support a Medium-High assessment (score 4) rather than High. [1][2][4]"
