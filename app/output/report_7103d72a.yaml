    \ a formalized ethical culture rather than ad-hoc awareness. [2][6] The framework\
    \ includes commitments to inform customers and employees when they are interacting\
    \ with AI systems, and to ensure \u201Chuman-in-control\u201D oversight, including\
    \ a position that AI should empower people and avoid unfair outcomes. [6][2]\n\
    \nVodafone also evidences operationalization mechanisms that go beyond a policy\
    \ statement, which supports a score above \u201Cdefined policy with limited enforcement.\u201D\
    \ Specifically, Vodafone states it has \u201Cdefined requirements for internal\
    \ AI application development,\u201D including risk assessment, designing for transparency,\
    \ lack of bias, and providing \u201Cthe right degree of human oversight,\u201D\
    \ with an explicit requirement that if an AI model could have a high impact on\
    \ people, \u201Ca human [must] have input on the final decision.\u201D [1] This\
    \ is direct evidence of lifecycle controls (requirements applied at development\
    \ and decision stages) rather than only high-level principles. [1][6]\n\nOn continuous\
    \ improvement mechanisms, Vodafone explicitly commits to regularly reviewing and\
    \ updating its AI Framework \u201Cin light of new products and technological developments,\u201D\
    \ and pledges to \u201Creport on key learnings and observations\u201D as commitments\
    \ are disseminated across the business. [7] In addition, Vodafone describes employee-facing\
    \ awareness and policy updates for responsible AI usage\u2014e.g., an \u201Cawareness\
    \ programme\u201D and updated policies clarifying what data must not be shared\
    \ with public AI tools\u2014suggesting ongoing iteration as risks evolve. [1]\n\
    \nHowever, the evidence set does not clearly document the presence of an \u201C\
    active ethics committee\u201D with defined remit, cadence, decision rights, and\
    \ escalation pathways specific to AI, even though a structured signal indicates\
    \ an \u201CAI ethics governance model\u201D exists. [112] The evidence also does\
    \ not demonstrate recurring audits (e.g., internal audit program results, third-party\
    \ audits, or systematic monitoring metrics) applied across the AI lifecycle and\
    \ portfolio, which is a key differentiator for Score 5 (\u201Ccontinuous learning\
    \ and audits applied\u201D). [1][7] Vodafone\u2019s commitments to review/update\
    \ and report learnings indicate continuous review, but the provided sources do\
    \ not rise to the level of embedded, audited ethics-by-design across the full\
    \ lifecycle and organisation required for the highest tier. [7][1]\n\nGiven the\
    \ combination of (a) a published AI ethics framework, (b) stated internal development\
    \ requirements including risk assessment and human oversight for high-impact uses,\
    \ and (c) an explicit process commitment to regularly update the framework and\
    \ report learnings, Vodafone aligns best with Score 4 (\u201Cactive\u2026 and\
    \ continuous review process\u201D) on the provided rubric and evidence. [2][1][7]"
