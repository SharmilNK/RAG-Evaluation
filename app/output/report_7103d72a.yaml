- kpi_id: are_ai_use_cases_integrated_into_core_business_processes_or_do_they_operate_as_standalone_projects
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone shows evidence that AI is integrated into multiple core operational\
    \ domains (customer operations and network operations) rather than being limited\
    \ to isolated demos, with indications of closed-loop network automation; however,\
    \ the provided evidence does not consistently document end-to-end closed-loop\
    \ actions across three+ processes with standard operational KPIs (e.g., AHT/FCR/MTTR)\
    \ in a way that would justify an enterprise-wide \u201CScore 5\u201D. [3][5]\n\
    \nIn customer operations, Vodafone\u2019s \u201CTOBi\u201D machine-learning chatbot\
    \ is described as deployed at scale (launched in 11 markets) and tied to substantial\
    \ automation of customer contact (Italy cited as \u201Ctwo-thirds of customer\
    \ contact is now automated\u201D), which implies the AI is embedded in a real\
    \ customer-service workflow rather than a pilot. [3] While this demonstrates operational\
    \ integration in a core process (customer contact handling), the evidence excerpt\
    \ does not specify classic contact-centre process KPIs (e.g., AHT, FCR) or closed-loop\
    \ downstream actions (e.g., auto-case creation, auto-dispatch), limiting how far\
    \ this can be scored on the rubric\u2019s higher tiers solely on the basis of\
    \ published metrics. [3]\n\nIn network operations, Vodafone states it deploys\
    \ AI within radio access networks to anticipate capacity needs and optimise device\
    \ handovers between cell sites, with an asserted impact of reducing network energy\
    \ consumption \u201Cup to 15%.\u201D [3] This indicates AI is acting inside core\
    \ network engineering processes (capacity optimisation, mobility management) rather\
    \ than as a standalone analytics tool. [3] Additional evidence from a Vodafone\
    \ executive interview describes a focus on \u201Cautonomous closed loop optimization\u201D\
    \ and \u201Cnetwork planning,\u201D which maps directly to deeper operational\
    \ integration and closed-loop control concepts in network operations. [5]\n\n\
    Across security/governance-adjacent processes, Vodafone\u2019s cybersecurity factsheet\
    \ describes integrating \u201Csecure AI lifecycle practice, requirements and tools\
    \ into strategic AI platforms and internally developed AI applications,\u201D\
    \ plus requirements for risk assessment, transparency, bias considerations, and\
    \ \u201Cthe right degree of human oversight,\u201D including mandatory human input\
    \ for high-impact model decisions. [2] This supports that AI use is being operationalised\
    \ with guardrails and development controls within internal platforms/applications\
    \ (i.e., not purely ad hoc experimentation), but the described AI augmentation\
    \ example is primarily a cyber-policy chatbot for employees and experimentation\
    \ for threat detection/investigation/response, which is not sufficient on its\
    \ own to demonstrate broad closed-loop operational automation across multiple\
    \ operational workflows. [2]\n\nTaken together, the strongest, most specific evidence\
    \ supports AI embedded in at least two major core process areas\u2014(1) customer\
    \ care contact automation via TOBi and (2) network optimisation/automation in\
    \ the RAN\u2014with at least one quantified operational outcome (energy reduction\
    \ up to 15%) and explicit intent toward closed-loop optimisation in network operations.\
    \ [3][5] The evidence does not, however, provide clear, case-study-level documentation\
    \ of closed-loop actions across three or more processes with standard operational\
    \ KPIs like AHT/FCR/MTTR improvements, nor does it demonstrate enterprise-wide\
    \ integrated automation with approval/rollback workflows required for the top\
    \ rubric tier. [3][5][2] Therefore, Vodafone best fits \u201CScore 4: Medium-High\u201D\
    \ on the provided rubric and evidence. [3][5][2]"
