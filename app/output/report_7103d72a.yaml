- kpi_id: how_systematically_are_external_benchmarks_used_to_drive_ai_delivery_performance_speed_quality_cost_and_improvement_targets
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Vodafone provides evidence of defining and monitoring internal performance\
    \ metrics for AI-enabled delivery areas, but the provided materials do not show\
    \ systematic use of external benchmarks (e.g., top-quartile peer targets across\
    \ speed/quality/cost) to drive AI delivery performance and improvement targets.\
    \ [2]\n\nOn the positive side, Vodafone describes building a \u201Csupply-chain-analytics\
    \ control centre\u201D to measure \u201Cefficiency and compliance metrics\u201D\
    \ across procurement, with a specialist data-science team defining KPIs and setting\
    \ up visualization so that \u201C750 users company-wide\u201D can track performance.\
    \ [2] This indicates a structured internal measurement approach and broad dissemination\
    \ of metrics (supporting the idea that delivery performance is instrumented),\
    \ but the cited description does not reference peer/top-quartile benchmarks or\
    \ gap-to-best targets for AI delivery outcomes (speed, quality, or cost). [2]\n\
    \nSeparately, Vodafone\u2019s cybersecurity factsheet shows an established cadence\
    \ for target-setting and monitoring: \u201Ceach year we set new annual targets,\u201D\
    \ with progress \u201Cmonitored and reported quarterly\u201D to senior leadership,\
    \ and with plans to \u201Cautomate the capture and reporting of key risk indicator\
    \ data from source systems.\u201D [3] This demonstrates systematic target management\
    \ and movement toward more automated measurement, but it is focused on cyber controls\
    \ and key risk indicators rather than AI delivery performance benchmarks, and\
    \ it does not evidence external benchmark comparisons (peer vs top quartile) being\
    \ used to set AI delivery improvement targets. [3]\n\nVodafone also notes participation\
    \ in \u201Ccross-industry forums\u201D collaborating on telecom-specific AI use\
    \ cases, which suggests some exposure to external practices and potential comparisons.\
    \ [1] However, participation in forums is not the same as operating a defined\
    \ external benchmarking program tied to AI delivery KPIs (lead time, failure rate,\
    \ cost) and improvement OKRs, and no explicit benchmark set, peer set, or gap\
    \ analysis is documented in the provided evidence. [1]\n\nBecause the evidence\
    \ supports internal KPI definition and monitoring (and some industry engagement)\
    \ but does not demonstrate a defined external benchmarking set, annual benchmark\
    \ gap analysis, targets vs top-quartile peers, or continuous automated benchmarking\
    \ feeds for AI delivery performance, Vodafone best fits \u201Coccasional peer\
    \ comparisons; limited metric scope\u201D rather than the more systematic benchmark-driven\
    \ tiers. [1][2][3]\n\nKey gaps vs higher rubric tiers: there is no explicit identification\
    \ of external benchmark sources/peers, no top-quartile target-setting for AI delivery\
    \ metrics, no documented benchmark gap closure OKRs, and no evidence of measurable\
    \ year-over-year improvement against those external benchmarks across core AI\
    \ delivery metrics (speed, quality, cost). [1][2][3]"
