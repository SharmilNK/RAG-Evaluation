- kpi_id: communication_of_ai_skill_building_academies_or_employee_enablement
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone publicly communicates multiple AI-related employee enablement\
    \ efforts that go beyond generic training references, including named and role-targeted\
    \ learning journeys and leadership-focused programs, but it does not consistently\
    \ publish clear AI-skill program outcome metrics (e.g., number of employees trained/certified\
    \ specifically in AI), which prevents a top-tier score. [1][2][5]\n\nVodafone\
    \ describes a leadership-focused AI enablement approach using \u201Cflight schools\u201D\
    \ that educate leaders on AI so they can act as role models for change, and states\
    \ that this approach is being \u201Ccascad(ed) \u2026 through the entire organization\u201D\
    \ to train people on prompting and to \u201Cupskill \u2026 core skills,\u201D\
    \ indicating planned breadth beyond a single cohort. [1]\n\nVodafone also communicates\
    \ a named AI upskilling initiative via its \u2018Empower You\u2019 campaign, described\
    \ as a structured \u201Cthree-hour learning journey\u201D covering what AI is,\
    \ why Vodafone is focusing on it, and how to use AI ethically at work, explicitly\
    \ targeting both leaders and employees. [2]\n\nIn addition to AI-specific enablement,\
    \ Vodafone reports having \u201Cskills-led academies\u201D that provide \u201C\
    targeted learning journeys\u201D and can lead to externally benchmarked \u201C\
    nanodegrees,\u201D and it publishes participation/usage metrics for these academies\
    \ (e.g., \u201C87,000 users\u201D completing \u201Capproximately 600,000 courses\u201D\
    ). [5]\n\nHowever, while Vodafone\u2019s academies include strong quantitative\
    \ reporting, the disclosed metrics are not explicitly tied to AI skill-building\
    \ outcomes (e.g., AI course completions, AI certifications, or measured AI capability\
    \ uplift), and the AI-specific initiatives cited (flight schools and \u2018Empower\
    \ You\u2019) are described without published participation/completion metrics,\
    \ which falls short of the rubric\u2019s Score 5 requirement for published metrics\
    \ on AI skill programs. [1][2][5]\n\nTherefore, based on evidence of structured,\
    \ multi-level enablement across leadership and the wider organization (but limited\
    \ AI-specific program metrics), Vodafone aligns best with Score 4 (Structured\
    \ multi-level training for multiple roles or functions). [1][2][5]"
