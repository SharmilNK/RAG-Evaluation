    \ high-impact models). [1] While this indicates the company operationalizes responsible-AI\
    \ practices, the evidence does not explicitly connect these internal policies\
    \ to learnings from external standards pilots or to measurable regulatory advantage\
    \ from early alignment, which are requirements for scores 4\u20135. [1][2]\n\n\
    Given the verified contribution to a major EU ethics guideline initiative and\
    \ stated proactive participation in coalitions/self-regulatory bodies, Vodafone\
    \ meets the rubric for active contributions. [2][5] Due to lack of evidenced leadership\
    \ roles, named consortia participation with demonstrable influence, or clearly\
    \ evidenced standards/regulatory pilots, the score is set at Medium (3) rather\
    \ than Medium-High or High. [1][2][5]"
