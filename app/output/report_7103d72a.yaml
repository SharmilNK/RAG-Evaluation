- kpi_id: to_what_extent_has_the_company_operationalized_ai_demonstrating_tangible_rollout_and_active_usage_of_ai_or_genai_in_core_business_operations_workflows_or_decision_processes_at_scale
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone shows clear evidence of AI and GenAI being operationalized\
    \ in multiple core operations with quantified, ongoing usage at scale, alongside\
    \ standardized MLOps controls\u2014supporting a Medium-High (4) score rather than\
    \ pilot-stage maturity. Vodafone reports GenAI as \u201Cembedded in core operations\u201D\
    \ and describes \u201Corganisation-wide application enabled by AI taskforce\u201D\
    \ and \u201C2,000 engineers in shared operations,\u201D indicating structured,\
    \ cross-functional enablement beyond isolated experiments [1].\n\nIn customer\
    \ operations, Vodafone documents scaled, production usage of GenAI in (1) agent-assist\
    \ for call-centre operations in Germany, where GenAI provides \u201Cimmediate\
    \ overview of customer communication history,\u201D alongside a reported \u201C\
    61% improvement in \u2018helpfulness\u2019 rating,\u201D indicating measurable\
    \ operational impact in a frontline workflow [1]. Vodafone also reports optimization\
    \ and scaling of AI virtual assistants (2) \u201CTOBi & SuperTOBi (GenAI)\u201D\
    \ handling approximately \u201C60m customer conversations monthly,\u201D with\
    \ \u201CSuperTOBi live in all European markets,\u201D plus a \u201C70% end-to-end\
    \ resolution rate\u201D and \u201C+8pp NPS improvement,\u201D which is strong\
    \ evidence of high-volume, multi-market deployment in a core customer-service\
    \ process rather than a pilot [1].\n\nIn procurement operations, Vodafone reports\
    \ an (3) \u201CAutonomous procurement portal\u201D where a \u201CGenAI sourcing\
    \ platform [is] used in 90% of our tenders,\u201D alongside a \u201C30% reduction\
    \ in sourcing time,\u201D indicating broad operational adoption within the procurement\
    \ function and a quantified efficiency outcome [1].\n\nVodafone also provides\
    \ evidence of standardized AI operations (MLOps) that align with the rubric expectations\
    \ for operational maturity (monitoring/controls and repeatable deployment). Vodafone\
    \ describes its \u201CAI Booster\u201D ML platform built on Google Cloud/Vertex\
    \ AI with automation and embedded \u201Cguardrails, controls, and approvals,\u201D\
    \ and states it has \u201Ccompletely automated ML lifecycle compliance activities\
    \ (drift / skew detection, explainability, auditability, etc.) via reusable pipelines,\u201D\
    \ which maps to standardized operations such as drift detection and formal approvals\
    \ expected at higher tiers [2]. Vodafone further reports that PoC-to-production\
    \ can be reduced to \u201Cas little as four weeks,\u201D suggesting a repeatable\
    \ operating model that supports scaling across use cases rather than ad hoc delivery\
    \ [2].\n\nGovernance and responsible-use controls are documented as being integrated\
    \ into AI development and deployment processes, supporting the interpretation\
    \ that operationalization is managed rather than purely opportunistic. Vodafone\
    \ states it integrates \u201Csecure AI lifecycle practice, requirements and tools\
    \ into strategic AI platforms and internally developed AI applications,\u201D\
    \ limits access to public AI applications, and requires risk assessment and human\
    \ oversight for \u201Chigh impact\u201D models, indicating defined operational\
    \ requirements around AI usage [3]. Vodafone\u2019s AI Framework also describes\
    \ AI being used to \u201Crun our business,\u201D including AI-powered chatbots\
    \ for customer enquiries and AI techniques in networks to identify capacity needs,\
    \ supporting that AI is applied across multiple operational domains (customer\
    \ service and networks) rather than a single function [4].\n\nHowever, the evidence\
    \ set does not robustly enumerate 25+ distinct scaled use cases across 8+ functions,\
    \ nor does it quantify that >80% of processes/workforce use AI, which prevents\
    \ a Score 5 under the rubric. The most concrete, discrete scaled deployments evidenced\
    \ are the three operational use cases explicitly described with adoption/usage\
    \ metrics (agent assist, TOBi/SuperTOBi, procurement portal), plus platform-level\
    \ enablement and governance\u2014supporting a Score 4 (15\u201325 scaled use cases\
    \ across 4\u20137 functions and multiple regions) only insofar as multi-market\
    \ scale is demonstrated for customer AI (all European markets) and standardized\
    \ MLOps is described, but without a comprehensive counted list of 15\u201325 scaled\
    \ use cases the assessment must remain conservative within the Medium-High band\
    \ [1][2].\n\nCounted scaled AI/GenAI operational deployments evidenced (discrete\
    \ entities):\n1) Call centre agent assist in Germany (GenAI summarization/overview\
    \ of customer history; helpfulness +61%) [1].\n2) TOBi & SuperTOBi GenAI virtual\
    \ assistants (c.60m monthly conversations; SuperTOBi live in all European markets;\
    \ 70% end-to-end resolution; +8pp NPS) [1].\n3) Autonomous procurement portal\
    \ / GenAI sourcing platform (used in 90% of tenders; 30% reduction in sourcing\
    \ time) [1]."
