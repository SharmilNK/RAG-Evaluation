    \ it demonstrates at least one concrete AI-related industry alliance participation\
    \ and other cross-industry forum engagement, but lacks documented academic partnerships,\
    \ joint labs/MoUs, and co-authored papers needed for Score 3\u20135. [1][3][8]"
