- kpi_id: do_users_have_a_governed_self_service_data_ai_portal_marketplace_catalog_access_control_usage_analytics
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Vodafone has evidence of automated, governed self-service provisioning\
    \ for an internal ML environment (\u201CAI Booster\u201D), but the provided materials\
    \ do not evidence a governed self-service data & AI portal/marketplace that includes\
    \ a catalog/marketplace experience, access control workflows for data assets,\
    \ and usage analytics across assets.\n\nThe strongest relevant evidence is Vodafone\u2019\
    s description of its ML platform \u201CAI Booster\u201D built on Google Cloud,\
    \ where \u201Cusers simply complete an online form, and then, within minutes,\
    \ receive a fully functional AI Booster environment with all the right guardrails,\
    \ controls, and approvals,\u201D indicating a self-service workflow with embedded\
    \ governance/controls and rapid turnaround (minutes) for provisioning an ML environment.\
    \ [1] This supports that Vodafone has at least some self-service capability and\
    \ that approvals/guardrails are integrated into the process, rather than being\
    \ entirely ticket-driven. [1]\n\nHowever, the KPI asks specifically for a governed\
    \ self-service data & AI portal/marketplace featuring a catalog, access control,\
    \ and usage analytics. The AI Booster evidence describes automated provisioning\
    \ and MLOps compliance automation (e.g., drift/skew detection, explainability,\
    \ auditability) but does not describe a unified portal/marketplace for discovering\
    \ data products/models via a catalog, nor does it mention lineage visibility,\
    \ usage analytics, recommendations/ratings, or measurable self-service fulfillment\
    \ rates (>70% or >90%). [1] Without evidence of a catalog/marketplace (and associated\
    \ discovery, ownership metadata, lineage, and usage telemetry across assets),\
    \ the rubric levels 3\u20135 are not met based on the provided sources. [1]\n\n\
    Other provided evidence relates to governance more generally (e.g., approvals\
    \ for sensitive use cases, privacy controls) rather than a self-service data/AI\
    \ portal. Vodafone\u2019s ESG disclosure states that algorithmic use cases need\
    \ approval from security, privacy, and (where relevant) AI governance perspectives,\
    \ which supports the presence of governance processes but not a self-service portal/marketplace\
    \ with catalog and usage analytics. [3] Likewise, Vodafone\u2019s cybersecurity\
    \ factsheet discusses secure AI lifecycle practices and limiting access to public\
    \ AI applications, again demonstrating governance intent and controls but not\
    \ a data/AI marketplace capability. [8]\n\nSome evidence appears to describe governance\
    \ features delivered by a third-party vendor platform (Writer) rather than Vodafone\u2019\
    s own governed self-service data/AI portal; as presented, it does not substantiate\
    \ that Vodafone provides users a catalog/marketplace with access workflows and\
    \ usage analytics for Vodafone data/model assets. [2]\n\nGiven the demonstrated\
    \ self-service provisioning with guardrails/approvals for an ML environment (supporting\
    \ at least \u201Cbasic\u201D self-service access enablement) but the lack of explicit\
    \ evidence for a catalog/marketplace, role-based dataset/model access management\
    \ through a portal, and usage analytics, Vodafone is best placed at Score 2 (Basic\
    \ catalog / manual access approvals / stale metadata). The score is conservative\
    \ because even \u201Cbasic catalog\u201D is not clearly evidenced; the primary\
    \ support is self-service environment provisioning rather than asset cataloging\
    \ and analytics. [1]"
