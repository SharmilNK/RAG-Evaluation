- kpi_id: number_of_ai_use_cases_demonstrating_measurable_financial_impact_e_g_revenue_cost_or_efficiency_gains
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "The KPI requires assessing what share of Vodafone Group plc\u2019s AI\
    \ use cases demonstrate measurable financial impact (revenue, cost, or efficiency\
    \ gains). The provided evidence does not give a denominator of total AI use cases\
    \ with measurable financial impact as a share of all AI use cases; however, one\
    \ source states Vodafone is \u201Cdeveloping around 140 use cases,\u201D which\
    \ can serve as the closest available proxy for total use cases in scope. [2]\n\
    \nFrom Vodafone\u2019s own H1 FY26 results presentation, at least three AI deployments\
    \ are described with quantified, operational efficiency/experience outcomes that\
    \ are plausibly tied to cost/efficiency gains: (1) \u201CCall centre agent assist\
    \ in Germany\u201D delivering \u201C61% improvement in \u2018helpfulness\u2019\
    \ rating\u201D and \u201Cfaster resolution,\u201D (2) \u201CTOBi & SuperTOBi\u201D\
    \ handling ~60m customer conversations monthly with \u201C70% end-to-end resolution\
    \ rate\u201D and \u201C+8pp NPS improvement,\u201D and (3) an \u201CAutonomous\
    \ procurement portal\u201D used in \u201C90% of our tenders\u201D delivering \u201C\
    30% reduction in sourcing time.\u201D [4] These are measurable outcomes (efficiency/time\
    \ reductions and resolution/quality metrics) but are not consistently translated\
    \ into explicit financial terms (e.g., currency savings or incremental revenue)\
    \ in the disclosed material. [4]\n\nAdditional quantified efficiency evidence\
    \ exists for Vodafone UK marketing operations: Vodafone UK\u2019s demand generation\
    \ team \u201Celiminated 20 hours per week of manual banner creation,\u201D and\
    \ VOIS \u201Ccut campaign production time in half.\u201D [1] These are measurable\
    \ productivity/efficiency improvements and therefore relevant to the KPI\u2019\
    s \u201Ccost or efficiency gains\u201D framing, but again they are not converted\
    \ into stated financial results (e.g., cost saved). [1]\n\nBy contrast, other\
    \ AI references describe benefits qualitatively (e.g., \u201Chuge reduction\u201D\
    \ in mean time to resolve faults) without a supporting metric, and therefore do\
    \ not clearly meet the KPI\u2019s \u201Cmeasurable\u201D requirement for financial/efficiency\
    \ impact. [2] Similarly, the Google Cloud blog describes what Vodafone \u201C\
    will use gen AI\u201D to do and asserts \u201Csignificant cost savings,\u201D\
    \ but it does not provide realized, quantified outcomes, so it is not counted\
    \ as a demonstrated measurable impact use case. [5]\n\nCounting only AI use cases\
    \ with clearly quantified outcomes in the evidence yields four discrete measurable-impact\
    \ examples: (1) Call centre agent assist in Germany (61% helpfulness improvement),\
    \ (2) TOBi/SuperTOBi virtual assistants (70% end-to-end resolution; +8pp NPS),\
    \ (3) Autonomous procurement portal (30% reduction in sourcing time; 90% of tenders),\
    \ and (4) Vodafone UK demand generation banner/campaign production automation\
    \ (20 hours/week saved; campaign production time halved). [1][4] Against the closest\
    \ available total of ~140 use cases under development, this implies ~4/140 \u2248\
    \ 2.9% of use cases with measurable impact evidenced in the provided materials,\
    \ which is below 10% and would map to Score 1 if this proxy were definitive. [2]\n\
    \nHowever, the evidence base appears incomplete for enumerating Vodafone\u2019\
    s measurable-impact use cases, because it provides only a handful of examples\
    \ while also indicating a large portfolio (~140 use cases) and scaled deployments\
    \ embedded \u201Cin core operations.\u201D [2][4] Given this gap (limited disclosure\
    \ of quantified outcomes per use case in the provided evidence), a conservative\
    \ but not minimum tier assessment is appropriate: Vodafone has multiple measurable\
    \ efficiency outcomes in production, but the share of use cases with measurable\
    \ impact cannot be shown to exceed 10% based on the supplied material. [1][2][4]\
    \ Therefore, Vodafone is scored Low-Medium (2), reflecting demonstrated measurable\
    \ outcomes in several deployments but insufficient evidence to establish a high\
    \ proportion across the broader use-case portfolio. [1][2][4]"
