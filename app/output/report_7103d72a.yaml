- kpi_id: presence_and_clarity_of_a_publicly_communicated_ai_roadmap_outlining_long_term_objectives_milestones_and_investment_priorities
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Vodafone publicly communicates an AI-related direction primarily through\
    \ a responsible/ethical use framework, but the provided materials do not constitute\
    \ a clear, long-term AI roadmap with objectives, milestones, and investment priorities.\
    \ Vodafone\u2019s public \u201CArtificial Intelligence framework\u201D (2019)\
    \ is structured around principles such as transparency and accountability, ethics\
    \ and fairness, privacy and security, and human rights/inclusivity, which clarifies\
    \ governance intent and responsible-use commitments rather than a delivery roadmap\
    \ with phased milestones or investment prioritisation. [4][7][8]\n\nAcross the\
    \ evidence set, the most concrete public AI documentation remains policy-oriented\
    \ rather than roadmap-oriented. The AI Framework and accompanying newsroom article\
    \ describe what Vodafone \u201Cwill\u201D do in areas like extending privacy commitments,\
    \ improving methodologies to assess human impact, and keeping security systems\
    \ updated, but they do not present time-bound milestones, a sequence of delivery\
    \ phases, or measurable targets/KPIs that would allow an external reader to track\
    \ progress against a multi-year plan. [1][8]\n\nOther public content included\
    \ here is either forward-looking commentary about AI in the market or operational\
    \ practice statements, neither of which meets the roadmap threshold. Vodafone\u2019\
    s \u201CFast Forward predictions\u201D content discusses expectations for how\
    \ businesses will operationalise AI by 2026, but it is framed as general predictions\
    \ and does not outline Vodafone\u2019s own long-term objectives, milestones, or\
    \ investment priorities. [2]\n\nOperational evidence shows responsible AI controls\
    \ and some experimentation, but still does not provide a roadmap structure. Vodafone\u2019\
    s cybersecurity factsheet (2025) describes integrating secure AI lifecycle practices\
    \ into strategic AI platforms and internally developed AI applications, limiting\
    \ access to public AI applications, and experimenting with AI to augment cybersecurity\
    \ processes (e.g., a cyber policy chatbot), which supports the existence of AI\
    \ governance and use in specific functions. [3] However, this factsheet does not\
    \ communicate an enterprise AI roadmap with dated milestones, periodic roadmap\
    \ updates, or explicit investment priorities tied to those milestones. [3]\n\n\
    Several provided items are not sufficiently attributable to Vodafone Group plc\u2019\
    s own public roadmap communications or are not roadmap evidence. A third-party\
    \ vendor blog about \u201CVOIS (Vodafone) marketing transformation\u201D provides\
    \ ROI-style outcome metrics and generic \u201Cyour roadmap\u201D advice, but it\
    \ is not a Vodafone Group plc-published AI roadmap with long-term milestones and\
    \ investment priorities. [5] A podcast excerpt discusses sustained adoption and\
    \ the need for alignment between technology, business priorities, and governance,\
    \ but it does not provide a published Vodafone roadmap with milestones or investment\
    \ sequencing. [6]\n\nTaken together, the evidence demonstrates public communication\
    \ of AI principles and some functional initiatives, but it lacks the defining\
    \ elements of the KPI: a publicly communicated, long-term AI roadmap with clear\
    \ objectives, milestones, and investment priorities, plus update cadence and accountability\
    \ mechanisms. Therefore, Vodafone\u2019s performance aligns best with a \u201C\
    draft/internal roadmap or limited scope\u201D level rather than a comprehensive\
    \ public roadmap. [1][3][4][8]"
