- kpi_id: how_visible_and_concrete_is_the_company_s_public_advocacy_and_action_on_responsible_ai_ai_for_good
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Vodafone Group plc has a clear and concrete public position on responsible\
    \ AI through a published Artificial Intelligence (AI) Framework that sets out\
    \ specific principles and commitments for how it designs and deploys AI (e.g.,\
    \ transparency, fairness, privacy/security, and human-rights considerations).\
    \ [3]\n\nOn public advocacy, Vodafone explicitly positions its approach as aligned\
    \ to major international governance efforts and states it contributed to the EU\
    \ Ethics Guidelines for Trustworthy AI (April 2019), using that work as an input\
    \ to its own framework. [4]\n\nOn action (implementation), Vodafone provides concrete\
    \ descriptions of internal controls and operating practices intended to make AI\
    \ \u201Csecure and responsible,\u201D including secure AI lifecycle practices,\
    \ restricting employee access to public AI applications to reduce misuse, employee\
    \ awareness programmes, and defined requirements for internal AI application development\
    \ (e.g., risk assessment, transparency, bias considerations, and human oversight\
    \ for high-impact models). [2]\n\nHowever, against the higher tiers of the rubric,\
    \ the provided materials do not evidence a multi-year external \u201CAI-for-Good\u201D\
    \ portfolio with named partners and quantified, social-impact outcome metrics;\
    \ instead, they include higher-level commitments such as undertaking educational\
    \ initiatives in a number of markets to raise awareness and seeking to reduce\
    \ any digital divide through awareness-raising and educational partnerships, without\
    \ reporting concrete impact results (e.g., beneficiaries reached, measured improvements,\
    \ or third-party-verified outcomes). [1] [7]\n\nVodafone also commits to ongoing\
    \ updates and reporting \u201Ckey learnings and observations\u201D as the framework\
    \ evolves, which supports periodic update intent, but the evidence provided here\
    \ does not include published KPIs/targets for responsible-AI or externally assured\
    \ impact reporting. [6]\n\nOverall, this places Vodafone at \u201CMedium\u201D\
    \ (Score 3): it has published commitments and documented operational controls\
    \ consistent with an active responsible-AI programme, but the evidence provided\
    \ does not demonstrate impact metrics, external assurance, or widely recognized/validated\
    \ AI-for-Good outcomes needed for Scores 4\u20135. [2] [3] [6]"
