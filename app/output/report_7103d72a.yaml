- kpi_id: is_risk_appetite_for_ai_explicitly_defined_by_domain_use_case_and_used_for_approvals_and_guardrails
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Vodafone has documented AI risk-related requirements that go beyond\
    \ aspirational principles and into conditional guardrails that are triggered by\
    \ the nature/impact of the use case, indicating an implicitly defined risk appetite\
    \ for higher-risk AI applications. In its cybersecurity factsheet, Vodafone states\
    \ it has defined requirements for internal AI application development that include\
    \ conducting a risk assessment and designing for transparency, lack of bias, and\
    \ an appropriate degree of human oversight. It further specifies an additional\
    \ safeguard for higher-impact use cases: \u201CIf the AI model could have a high\
    \ impact on people, we require a human to have input on the final decision,\u201D\
    \ which functions as a threshold-based approval/guardrail tied to use-case impact.\
    \ [1]\n\nVodafone also communicates enterprise AI principles that anchor risk\
    \ sensitivity in specific sensitive domains such as privacy, security, fairness/bias,\
    \ and human rights, which supports the existence of defined risk thresholds in\
    \ sensitive areas (even if not numerically quantified). Vodafone\u2019s AI Framework\
    \ emphasizes respecting privacy and security of end-user data and fundamental\
    \ rights, use of pseudonymised and permissioned customer data, and seeking AI-driven\
    \ decisions that are \u201Cfair and free of any harmful bias.\u201D [2] Vodafone\u2019\
    s public-policy materials similarly frame its AI approach around human rights\
    \ (including privacy and security), transparency, and fairness, which indicates\
    \ the areas where risk tolerance is constrained. [3]\n\nHowever, the evidence\
    \ does not show a clearly explicit, quantified risk appetite \u201Cby domain/use\
    \ case\u201D (e.g., enumerated categories with defined tolerance levels) nor does\
    \ it demonstrate workflow-integrated approvals that systematically reference a\
    \ defined AI risk appetite. The AI-related guardrail cited (\u201Chigh impact\
    \ on people\u201D requires human input) is a clear threshold concept, but the\
    \ documentation provided does not define what constitutes \u201Chigh impact,\u201D\
    \ does not show domain-specific risk appetite statements (e.g., customer service\
    \ vs. HR vs. network operations), and does not show exception handling with named\
    \ owners and timelines. [1]\n\nAdditionally, while Vodafone describes broader\
    \ cyber risk quantification and escalation mechanisms (e.g., a risk quantification\
    \ model and senior oversight for high risks in a risk register), this is presented\
    \ at a general cybersecurity risk-management level and is not explicitly tied\
    \ to AI risk appetite definition by domain/use case or to AI-specific approval\
    \ workflows in the provided evidence. [4]\n\nTaken together, Vodafone meets the\
    \ rubric level where risk thresholds/guardrails are defined for sensitive areas\
    \ and applied as requirements for higher-impact AI (risk assessment, bias/transparency\
    \ requirements, and mandatory human input for potentially high-impact models),\
    \ but it does not provide evidence of quantified, domain-specific AI risk appetite\
    \ with tracked exceptions or automated workflow checks/reporting. This aligns\
    \ best with Score 3 (Medium). [1][2]"
