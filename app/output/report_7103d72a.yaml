- kpi_id: does_the_company_publish_clear_governance_documents_outlining_ai_and_data_use_deployment_and_controls
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Vodafone Group plc publicly publishes a dedicated AI governance document\u2014\
    its \u201CVodafone Artificial Intelligence Framework\u201D\u2014that sets out\
    \ principles and commitments for how Vodafone designs and uses AI, including transparency\
    \ to users, fairness, privacy/security, and human rights considerations, which\
    \ is materially more substantial than a brief mention in a general code of conduct.\
    \ [1][3]\n\nThe published framework includes clear high-level controls relevant\
    \ to AI deployment, such as commitments to disclose when customers or employees\
    \ are interacting with AI systems (e.g., chatbots identifying themselves as non-human\
    \ operators). [4]\n\nVodafone\u2019s documentation also addresses human oversight\
    \ at a principles level by stating that Vodafone will apply effective oversight\
    \ and a \u201Chuman-in-control\u201D approach to AI usage, which aligns with the\
    \ rubric expectation for high-level \u201CHIL\u201D (human-in-the-loop / human\
    \ oversight) policy coverage. [4]\n\nThe framework further includes an escalation/redress\
    \ mechanism by indicating that individuals who believe they have been unfairly\
    \ treated by a decision made by a Vodafone-deployed AI system can escalate concerns\
    \ via Vodafone\u2019s published complaints process in their country of operation.\
    \ [5]\n\nVodafone also commits to privacy/security controls at a governance level,\
    \ including commitments that customer data will be carefully managed, used only\
    \ with a clear legal basis, and stored securely under strict access control in\
    \ compliance with group policies and applicable laws. [6][7]\n\nSeparately, Vodafone\u2019\
    s Cybersecurity Factsheet (2025) describes additional operational expectations\
    \ for internal AI application development, including risk assessment, designing\
    \ for transparency and lack of bias, and ensuring the \u201Cright degree of human\
    \ oversight,\u201D including requiring a human to have input on final decisions\
    \ when an AI model could have a high impact on people. [2]\n\nHowever, based on\
    \ the provided evidence, Vodafone\u2019s public materials do not reach the rubric\u2019\
    s \u201Cdetailed governance\u201D level because they do not clearly publish (i)\
    \ a risk-tiering taxonomy for AI systems, (ii) defined bias/privacy metrics, (iii)\
    \ vendor/supplier-specific AI requirements, or (iv) a public model inventory.\
    \ [1][2]\n\nThe AI Framework states it will be \u201Cregularly review[ed] and\
    \ update[d]\u201D and pledges to report on \u201Ckey learnings and observations,\u201D\
    \ but the evidence provided does not show publicly posted periodic update history,\
    \ annual reporting cadence, dashboards, audit summaries, or incident learnings\
    \ sufficient for Score 5. [5]\n\nTaken together, the evidence supports a Score\
    \ 3 (Medium): Vodafone publishes a dedicated, clearly scoped AI framework and\
    \ related materials that cover transparency, privacy/security, high-level fairness,\
    \ human oversight principles, and a redress/escalation path, but lacks the detailed,\
    \ operational governance artifacts (risk tiers, metrics, vendor requirements,\
    \ model inventory, and audit/incident reporting) required for Scores 4\u20135.\
    \ [1][2][4][5]"
