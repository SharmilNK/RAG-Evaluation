- kpi_id: to_what_degree_has_the_company_built_ai_literacy_and_encouraged_knowledge_sharing_across_the_workforce
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone shows clear evidence of structured AI learning initiatives\
    \ that target leadership first and are being scaled more broadly, alongside mechanisms\
    \ that support internal knowledge access\u2014meeting the rubric\u2019s expectation\
    \ for structured learning and emerging communities/practices, but stopping short\
    \ of unequivocal, evidenced enterprise-wide AI literacy and a dedicated knowledge\
    \ platform culture at full scale. [1][3]\n\nVodafone has implemented leadership-focused\
    \ AI enablement that is described as a \u201Cflight school\u201D model and is\
    \ reported to have been \u201Ca huge success at our leadership level,\u201D with\
    \ an explicit intention to cascade it \u201Cthrough the entire organization,\u201D\
    \ including training teams to improve prompting and \u201Cupskilling\u2026 core\
    \ skills.\u201D [1] This directly supports the presence of structured learning\
    \ (not merely ad hoc awareness) and indicates planned broad workforce reach, which\
    \ aligns with Score 4 characteristics. [1]\n\nIn addition to leadership training,\
    \ Vodafone describes a more standardized learning intervention for both leaders\
    \ and employees via an \u2018Empower You\u2019 campaign described as \u201Ca three-hour\
    \ learning journey\u201D covering what AI is, Vodafone\u2019s AI focus, and \u201C\
    how to use AI ethically at work.\u201D [3] The same source also describes encouraging\
    \ employees to use Microsoft Copilot in day-to-day work, reinforcing that learning\
    \ is tied to practical application rather than theory only. [3]\n\nVodafone also\
    \ evidences AI-related awareness and policy communication to employees, specifically\
    \ around responsible use and data handling with public AI tools, indicating workforce-facing\
    \ AI guidance beyond technical teams. [2] Vodafone states it \u201Cdeveloped an\
    \ awareness programme\u201D and \u201Cupdated our policies\u201D so employees\
    \ understand what data must not be shared with public AI applications, and it\
    \ restricts access to public AI applications to reduce misuse risks. [2] While\
    \ this is primarily risk/usage governance rather than skills development, it still\
    \ contributes to baseline AI literacy and responsible-use awareness across employees.\
    \ [2]\n\nOn internal knowledge access and sharing enablers, Vodafone reports deploying\
    \ a cybersecurity chatbot that \u201Ccan answer employee questions on cyber policies\
    \ and standards,\u201D which is a concrete internal mechanism for distributing\
    \ knowledge at scale (at least within cybersecurity policy/standards). [2] This\
    \ supports internal knowledge sharing infrastructure, though the evidence is scoped\
    \ to cybersecurity rather than a broad AI knowledge platform across domains. [2]\n\
    \nVodafone\u2019s own AI Framework indicates an intent to \u201Cprovide training\
    \ and education to help our employees use AI-based systems to support their work,\u201D\
    \ and to \u201Csupport our existing employees to gain new skills,\u201D which\
    \ supports the presence of structured, employer-led reskilling intent connected\
    \ to AI adoption. [5] However, this is stated at the policy/framework level and\
    \ does not, by itself, prove enterprise-wide completion rates or an established\
    \ peer-sharing culture. [5]\n\nOverall, the evidence supports a Score 4 (structured\
    \ AI learning plus internal mechanisms that facilitate knowledge access/sharing),\
    \ primarily through leadership \u2018flight schools\u2019 with planned organizational\
    \ cascade and a standardized employee learning journey (\u2018Empower You\u2019\
    ), complemented by formal awareness programs and an internal Q&A chatbot for employees.\
    \ [1][2][3] The evidence does not clearly substantiate Score 5 because it does\
    \ not provide definitive proof of an enterprise-wide AI literacy program with\
    \ measured completion/coverage across the workforce, nor does it document a dedicated\
    \ enterprise knowledge platform or widespread communities of practice for AI knowledge\
    \ sharing as an established cultural norm. [1][2][3][5]"
