- kpi_id: how_extensive_are_the_company_s_partnerships_with_external_ai_vendors_or_startups
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Vodafone has evidence of multiple deep, strategic AI partnerships with\
    \ major external technology vendors, including long-term agreements and joint\
    \ technical developments, but the provided evidence does not substantiate a broad\
    \ portfolio of 21+ (or >30) active AI vendor/startup partnerships within the last\
    \ 24 months as required for the higher tiers. [1][4][5]\n\nVodafone\u2019s partnership\
    \ with Microsoft is described as a strategic, multi-year engagement, including\
    \ a ten-year partnership and a $1.5B investment commitment announced in January\
    \ 2024, which indicates material scale and depth rather than a limited pilot.\
    \ [1] Vodafone also reports a large internal deployment as an early outcome (55,000\
    \ Microsoft Copilot seats rolled out across Vodafone in conjunction with Microsoft\
    \ and KPMG), which demonstrates operationalization at enterprise scale and suggests\
    \ an active partnership with tangible rollout activity (not just experimentation).\
    \ [1]\n\nVodafone\u2019s partnership with Google is also characterized as strategic\
    \ and long-term, with evidence of a prior 2019 agreement and a subsequent deepening\
    \ of the relationship via a ten-year, \u201Cbillion+\u201D deal announced in October\
    \ 2024. [4] The evidence further cites a notable joint development with Google:\
    \ a cloud-based platform called \u201CAI booster\u201D that helps engineers deploy\
    \ models securely, described as having \u201Cvery fast and significant uptake\
    \ across Vodafone.\u201D [5] This constitutes at least one publicly described\
    \ technical output/platform resulting from collaboration with an external AI vendor.\
    \ [5]\n\nBeyond Microsoft and Google, Vodafone is described as having struck \u201C\
    strategic technology partnerships\u201D in the last 18 months with Accenture as\
    \ well, indicating at least a third strategic partner relevant to its AI/IT transformation\
    \ efforts. [4] However, the evidence does not provide details on AI-specific co-developed\
    \ solutions, deployments, or measurable outcomes tied to Accenture (or other startups/vendors),\
    \ limiting how far this partnership can be credited toward the rubric\u2019s higher-tier\
    \ requirements for multiple co-developed solutions with published milestones or\
    \ early customer usage. [4]\n\nOn geographic and breadth criteria, the evidence\
    \ indicates customer-facing deployment \u201Cin multiple countries\u201D for the\
    \ GenAI version of TOBi (\u201CSuper TOBi\u201D), which supports the idea that\
    \ partner-enabled AI capabilities are being rolled out beyond a single market.\
    \ [5] Still, the KPI being scored is the extensiveness of partnerships (counts,\
    \ diversity across startups/vendors, and breadth), and the provided materials\
    \ primarily document a small number of strategic hyperscaler/consulting relationships\
    \ rather than a wide partnership ecosystem. [4][5]\n\nCount of discrete, clearly\
    \ evidenced external AI vendor partnerships in the provided materials (verifiable\
    \ and explicitly named): [1][4][5]\n1) Microsoft (ten-year strategic partnership;\
    \ Copilot deployment at 55,000 seats; joint go-to-market referenced). [1]\n2)\
    \ Google (ten-year \u201Cbillion+\u201D deal; earlier 2019 agreement; joint development\
    \ of \u201CAI booster\u201D). [4][5]\n3) Accenture (described as a strategic technology\
    \ partnership struck in the last 18 months). [4]\n\nGiven the rubric thresholds,\
    \ Vodafone clearly exceeds the \u201C0\u20131\u201D partnership level and demonstrates\
    \ at least one strategic partner with depth and at least one publicly described\
    \ technical output (AI booster) through joint work, aligning best with Score 3\
    \ requirements (\u22651 strategic partner beyond standard cloud providers is partially\
    \ evidenced via Accenture\u2019s inclusion as a strategic partner, and a publicly\
    \ described technical output is evidenced via AI booster). [4][5] However, the\
    \ evidence does not support 21\u201330 active partnerships, \u22652 strategic\
    \ partners with \u22652 co-developed solutions with published milestones/early\
    \ customer usage, nor >30 partnerships with multiple commercially deployed co-developed\
    \ solutions and measurable outcomes, so Scores 4\u20135 are not justified based\
    \ on the supplied sources. [4][5]"
