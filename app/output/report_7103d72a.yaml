- kpi_id: how_mature_and_effective_are_the_company_s_change_management_and_communication_practices_in_enabling_ai_adoption
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone describes AI adoption as a sustained behavioural change effort\
    \ (not a one-off deployment), explicitly stating the need to \u201Censure that\
    \ people change their behaviours very consistently\u201D to embed AI into ways\
    \ of working, which indicates a deliberate change-management orientation rather\
    \ than purely technical enablement. [3]\n\nVodafone also links successful AI change\
    \ to orchestrating business priorities, technology readiness, and governance \u201C\
    to scale the change that needs to happen,\u201D which reflects a structured approach\
    \ to stakeholder alignment and adoption at scale rather than ad-hoc or reactive\
    \ communication. [3]\n\nOn the operating model side, Vodafone attributes its ability\
    \ to \u201Cintroduce AI at scale\u201D to \u201Coperational strength and structure,\u201D\
    \ including standardising workplace components and driving compliance as foundational\
    \ capabilities that enable change. [2] This emphasis on standardisation and compliance\
    \ suggests repeatable enterprise mechanisms that support consistent rollout and\
    \ adoption across the organisation. [2]\n\nVodafone further characterises its\
    \ workplace approach as a \u201Chighly standardized service offering\u201D with\
    \ \u201Cclear commitment to security \u2013 compliance, security,\u201D and frames\
    \ agility as \u201Cresponding to change but doing it with structure,\u201D indicating\
    \ that change is handled through established structures intended to work at global\
    \ scale. [4]\n\nEvidence also shows organised people-change and communications\
    \ practices in the context of generative AI adoption: Vodafone reports significant\
    \ investment in training and \u201Cassimilation capabilities,\u201D creation of\
    \ a \u201Cbig community of leaders,\u201D and training \u201Cmore than a thousand\
    \ people\u201D in generative AI who are embedded across teams to unlock process\
    \ improvements. [6] Vodafone also reports internal promotion and celebration of\
    \ success stories to bring the \u201Cwhole organization\u201D along, which is\
    \ a concrete internal-communications tactic to broaden adoption. [6]\n\nLeadership\
    \ alignment appears strong for AI-enabled transformation efforts, with Vodafone\
    \ stating that transformation is \u201Cled from the entire executive committee,\u201D\
    \ with the HR Director leading \u201Cpeople change transformation elements\u201D\
    \ and the CFO leading \u201Cvalue capture,\u201D signalling cross-functional executive\
    \ sponsorship and ownership beyond IT. [6]\n\nIn addition, Vodafone documents\
    \ an AI awareness programme and policy updates to clarify what employee data \u201C\
    must not be shared with public AI applications,\u201D indicating formalised, organisation-wide\
    \ communications and guidance connected to responsible AI use. [8]\n\nHowever,\
    \ while the evidence demonstrates structured change enablement, training, leadership\
    \ sponsorship, and some formalised communications (awareness programme, internal\
    \ success promotion), it does not clearly evidence a fully institutionalised,\
    \ continuous, transparent company-wide change-management framework for AI (e.g.,\
    \ consistently documented enterprise change methodology, ongoing metrics-driven\
    \ communication cadences, or a standard playbook applied across all AI initiatives).\
    \ [6][8] Therefore, Vodafone fits best at Score 4 (company-wide framework supporting\
    \ AI adoption) rather than Score 5 (fully institutionalised with transparent,\
    \ ongoing communication). [6][8]\n\nOverall, Vodafone shows mature and effective\
    \ change-management and communication practices that support AI adoption at scale\
    \ through structured operational foundations, governance-aligned orchestration,\
    \ broad training/leader communities, internal amplification of wins, and executive-level\
    \ sponsorship. [2][3][4][6][8]"
