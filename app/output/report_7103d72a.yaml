- kpi_id: to_what_extent_does_the_company_actively_support_employee_well_being_and_engagement_throughout_its_ai_transformation_journey
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone demonstrates structured, company-wide employee wellbeing and\
    \ engagement actions that are explicitly positioned to support large-scale digital\
    \ and AI change, including training/education for AI tools, employee-experience\
    \ improvements, and mechanisms to listen to employees, which collectively aligns\
    \ best with a \u201Cstructured initiatives linked to AI change programs\u201D\
    \ rubric tier. [1][4][6][7][8]\n\nVodafone\u2019s AI Framework explicitly frames\
    \ AI adoption as a workforce change that should improve employees\u2019 work experience\
    \ and emphasizes support for employees through reskilling and training as AI is\
    \ introduced. [1] The framework states an expectation that AI will automate routine\
    \ tasks so employees can spend more time on \u201Chigher value and rewarding activities,\u201D\
    \ and commits to supporting employees \u201Cto gain new skills\u201D to move into\
    \ roles created by improved digital capability. [1] It also commits to deploying\
    \ \u201CAI-based systems to provide more effective work environments,\u201D \u201C\
    simplifying the work of our employees and improving their experience,\u201D plus\
    \ \u201Ctraining and education\u201D so employees can use AI-based systems at\
    \ work. [1] These statements indicate a deliberate people-centered approach to\
    \ AI transformation and workforce enablement rather than ad-hoc actions. [1]\n\
    \nVodafone also evidences broader, structured wellbeing and engagement programs\
    \ that support employees through major transformation periods, including mental/physical\
    \ wellbeing support and recognition programs, which are relevant because AI transformation\
    \ is described as part of a broader, sustained digital transformation context.\
    \ [2][3][4] In its Annual Report 2021, Vodafone commits that \u201Call our employees\
    \ will have access to physical, mental health and wellbeing support,\u201D and\
    \ emphasizes continued listening/consultation with employees about workplace plans.\
    \ [2] The same report describes ongoing wellbeing services across markets (including\
    \ online GP and CBT services in the UK and growth in employee assistance programmes\
    \ and psychological support services in multiple countries) and a scaled peer-to-peer\
    \ recognition tool (\u201CThank You\u201D) with 30,864 awards during the year,\
    \ indicating structured engagement mechanisms. [4]\n\nThere is also direct evidence\
    \ that Vodafone treats engagement as a key success factor for introducing AI \u201C\
    at scale\u201D in its digital workplace context. [6][7] In the Digital Workplace\
    \ Group podcast, Vodafone\u2019s representative links the introduction of \u201C\
    AI at scale\u201D with \u201Cdrive engagement,\u201D stating engagement is \u201C\
    a huge success factor\u201D and \u201Ca huge area of focus,\u201D and describes\
    \ a mission to deliver an \u201Cengaging, AI-enriched digital workplace experience\
    \ globally that drives employee productivity and satisfaction.\u201D [6][7] This\
    \ supports that employee engagement is being actively managed as part of AI-enabled\
    \ workplace change rather than being incidental. [6][7]\n\nOn monitoring/measurement,\
    \ Vodafone provides evidence of ongoing employee listening via pulse surveys with\
    \ multiple data points and response rates during the year, showing a structured\
    \ feedback loop (though the surveys are described in the context of COVID-19 response\
    \ rather than explicitly as AI-transformation monitoring). [8] Vodafone reports\
    \ it ran \u201Csix pulse surveys\u201D to listen to employee feedback and provides\
    \ results for items such as \u201CHow are you feeling?\u201D and \u201CConnected\
    \ to your team?\u201D with response rates shown across survey waves. [8] While\
    \ this supports systematic monitoring of employee sentiment, the evidence does\
    \ not clearly show that engagement and wellbeing are continuously monitored specifically\
    \ as part of AI governance, nor that such metrics are embedded into AI governance\
    \ decision-making. [8][1]\n\nGiven the above, Vodafone meets the rubric for Score\
    \ 4 by showing structured wellbeing and engagement initiatives (wellbeing support,\
    \ EAP/psychological services, recognition programs, and employee feedback mechanisms)\
    \ and explicit workforce-focused AI change commitments (training, education, improved\
    \ employee experience via AI systems, and engagement as a success factor for AI\
    \ at scale). [1][2][4][6][7][8] The evidence falls short of Score 5 because it\
    \ does not demonstrate continuous monitoring of engagement/wellbeing that is explicitly\
    \ \u201Cembedded into AI governance\u201D (e.g., AI-program-specific wellbeing\
    \ KPIs reviewed by AI governance bodies, or a clearly defined governance process\
    \ tying wellbeing metrics to AI rollout approvals). [8][1]"
