- kpi_id: how_mature_and_reproducible_is_the_model_development_workflow_from_experimentation_to_ci_cd_and_release
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone describes an ML platform (\u201CAI Booster\u201D) built on\
    \ Google Cloud that explicitly uses CI/CD tooling (Cloud Build and Artifact Registry)\
    \ and event-driven automation (Cloud Functions triggering Vertex Pipelines), indicating\
    \ a structured pathway from experimentation into repeatable pipelines and deployments\
    \ rather than ad hoc/manual releases.[1] Vodafone also states that users can request\
    \ an environment via an online form and receive \u201Ca fully functional AI Booster\
    \ environment\u201D with \u201Cguardrails, controls, and approvals\u201D within\
    \ minutes, which is consistent with a standardized, self-service workflow rather\
    \ than bespoke setup per project.[1]\n\nThe platform is presented as enabling\
    \ standardized, reusable pipelines across the ML lifecycle, including \u201Ccompletely\
    \ automated ML lifecycle compliance activities (drift / skew detection, explainability,\
    \ auditability, etc.) via reusable pipelines, containers, and managed services,\u201D\
    \ which aligns with rubric requirements for automated tests/robustness checks\
    \ and CI/CD-like controls embedded in the workflow.[1] Vodafone further notes\
    \ \u201Cstandardized and embedded ML templates,\u201D and cites the use of reusable\
    \ \u201CMLOps Turbo Templates\u201D (a reference implementation of Vertex Pipelines)\
    \ to accelerate production-ready MLOps, supporting maturity and reproducibility\
    \ via templated pipelines rather than one-off implementations.[2]\n\nVodafone\
    \ also reports a significant reduction in lead time from proof of concept to production\
    \ (\u201Cas little as four weeks\u201D), attributing it to a focus on MLOps and\
    \ an end-to-end \u201CML journey\u201D that is \u201Cfaster, and flexible, all\
    \ without compromising security,\u201D which is consistent with operationalized\
    \ model delivery practices (automation, governance controls) rather than purely\
    \ experimental work.[1]\n\nHowever, the provided evidence does not substantiate\
    \ several score-5 requirements such as a feature store, end-to-end lineage across\
    \ data/features/models, formalized governance gates as a documented release requirement\
    \ across the organization, or blue-green/shadow deployments \u201Cat scale,\u201D\
    \ nor does it provide quantitative coverage (e.g., \u226580% of models using this\
    \ workflow) required to firmly meet all rubric elements for score 4.[1][2] Given\
    \ the strong CI/CD + automated compliance claims but missing explicit canary/rollback\
    \ and workflow coverage metrics, Vodafone best fits \u201CMedium-High\u201D maturity\
    \ on this KPI.[1][2]"
