- kpi_id: innovation
  pillar: DB Imported
  type: rubric
  score: 2.7777777777777777
  confidence: 0.7
  rationale: "Overall, the Innovation KPI category demonstrates emerging but uneven\
    \ maturity, landing appropriately in the Medium tier because innovation intent\
    \ exists implicitly but is not yet translated into explicit, repeatable, and governed\
    \ practices within the AI Playbook.\n\nAcross the underlying drivers, a consistent\
    \ theme is that innovation is treated more as an assumed outcome of adopting AI\
    \ than as a deliberately managed capability. The evidence pattern implied by the\
    \ scoring suggests pockets of forward-looking activity (e.g., experimentation\
    \ or exploratory use cases) without a clear, playbook-level articulation of how\
    \ innovation is defined, prioritized, resourced, and scaled. This creates inconsistency:\
    \ teams may innovate locally, but the organization lacks the common language and\
    \ mechanisms to ensure innovations are systematically surfaced, evaluated, and\
    \ industrialized.\n\nThe 2.8/5 score and Medium performance tier are justified\
    \ because the category is neither absent nor strong. If innovation were well-managed,\
    \ it would be explicitly anchored in the playbook with clear pathways from ideation\
    \ to MVP to scaled deployment, along with decision rights, risk thresholds, and\
    \ measurable innovation outcomes. Instead, being \u201Cnot specifically called\
    \ out\u201D indicates innovation is currently under-institutionalized\u2014strong\
    \ enough to show some activity, but not mature enough to be dependable, repeatable,\
    \ or measurable across the enterprise.\n\nThe primary risk is that innovation\
    \ remains opportunistic and dependent on individual teams, leading to duplication,\
    \ uneven quality, and stalled pilots (\u201Cinnovation theater\u201D) that do\
    \ not convert into business value. Leadership\u2019s next step is to explicitly\
    \ codify innovation in the AI Playbook: define what qualifies as innovation, establish\
    \ an intake and prioritization model, fund and staff a lightweight experimentation-to-scale\
    \ pipeline, and add outcome metrics (e.g., throughput from experiments to production,\
    \ value realized, learning captured). Without this, the organization will likely\
    \ continue to see scattered innovation signals but limited compounding impact."
