- kpi_id: does_the_company_s_c_level_publicly_communicate_a_defined_ai_strategy
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone\u2019s public communications show that senior leadership and\
    \ corporate channels describe a defined AI strategy that goes beyond generic intent,\
    \ including an emphasis on embedding AI \u201Csafely within our processes,\u201D\
    \ sustained adoption, and governance as part of a \u201Ccorporate AI strategy.\u201D\
    \ [5][6] Vodafone also publicly articulates a responsible-AI approach with stated\
    \ commitments around privacy/security, human rights, and managing the transition\
    \ to AI, indicating a defined framework rather than ad hoc experimentation. [7]\n\
    \nFrom an operating-model and governance perspective, Vodafone describes structured\
    \ controls for \u201Csecure and responsible AI,\u201D including integrating \u201C\
    secure AI lifecycle practice\u201D into strategic AI platforms, limiting access\
    \ to public AI applications, requiring risk assessment and transparency/bias considerations\
    \ in internal AI development, and mandating human oversight for high-impact decisions.\
    \ [1] These elements evidence governance and risk-management processes that support\
    \ scaled AI deployment, not merely exploratory use. [1]\n\nEvidence also indicates\
    \ executive-level involvement and a cross-functional leadership model for AI-enabled\
    \ transformation. In a public interview, Vodafone states that the transformation\
    \ is \u201Cled from the entire executive committee,\u201D with the HR Director\
    \ leading \u201Cpeople change transformation\u201D elements and the CFO leading\
    \ \u201Cvalue capture,\u201D while \u201Ceach business leader needs to take ownership.\u201D\
    \ [8] This is consistent with a cross-functional operating model rather than AI\
    \ being confined to IT, and it demonstrates C-level public communication tying\
    \ AI to organization-wide change. [8]\n\nVodafone\u2019s public messaging includes\
    \ reskilling/training at meaningful scale, supporting a score above \u201Cformal\
    \ governance only.\u201D Specifically, Vodafone states it invested in \u201Cmore\
    \ than a thousand people\u201D trained in generative AI and embedded them across\
    \ teams to unlock process improvements, which meets the rubric\u2019s example\
    \ threshold for disclosed reskilling targets (\u22651,000). [8] The company also\
    \ references employee awareness programmes and updated policies regarding what\
    \ data must not be shared with public AI tools, reinforcing organization-wide\
    \ change management around AI use. [1]\n\nHowever, the evidence provided does\
    \ not clearly establish the rubric\u2019s score-5 requirements of board-level\
    \ AI oversight via a dedicated committee/charter, public change KPIs (e.g., %\
    \ workforce trained, adoption rates) and progress updates in filings, or explicit\
    \ multi-year funding commitments disclosed publicly. [1][7][8] While Vodafone\
    \ demonstrates executive-committee leadership and training numbers, the available\
    \ sources do not show a board committee/charter specifically for AI strategy oversight,\
    \ nor do they provide ongoing KPI-style progress reporting tied to AI transformation\
    \ outcomes. [1][7][8] Given these gaps, Vodafone aligns best with a Medium-High\
    \ (4) rather than High (5) tier under the rubric. [1][7][8]"
