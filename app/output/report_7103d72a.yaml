- kpi_id: how_well_are_cross_functional_collaboration_and_governance_structures_established_to_coordinate_ai_initiatives_across_departments
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone shows multiple, explicit indicators of coordinated, cross-functional\
    \ AI governance and collaboration that go beyond isolated pilots, but the provided\
    \ evidence does not demonstrate a fully integrated enterprise model with clearly\
    \ stated shared AI KPIs across departments (a requirement for the top tier). [4][1]\n\
    \nVodafone\u2019s AI enablement and change approach is described as being led\
    \ at the Executive Committee level, with specific cross-functional accountability\
    \ split across business functions rather than confined to IT. In the generative\
    \ AI / Copilot transformation discussion, Vodafone states it is \u201Cled from\
    \ the entire executive committee,\u201D with the HR Director leading \u201Cpeople\
    \ change transformation\u201D elements and the CFO leading \u201Cvalue capture,\u201D\
    \ and that \u201Ceach business leader needs to take ownership,\u201D which directly\
    \ indicates a defined cross-functional governance and operating model for AI adoption\
    \ (people, finance/value, and business ownership). [4]\n\nIn addition to executive\
    \ sponsorship, Vodafone describes organization-wide enablement mechanisms that\
    \ support cross-department collaboration: it \u201Cbuilt a big community of leaders\u201D\
    \ and trained \u201Cmore than a thousand people\u201D in generative AI, then \u201C\
    embedded them in teams across the company\u201D to unlock process improvements,\
    \ which is evidence of a structured, federated collaboration model rather than\
    \ ad hoc local experimentation. [4]\n\nVodafone also evidences formalized responsible/secure\
    \ AI requirements that function as governance controls applicable to internal\
    \ AI development, including \u201Cdefined requirements for internal AI application\
    \ development,\u201D risk assessment expectations, design requirements (transparency,\
    \ bias), and mandated \u201Chuman oversight\u201D for higher-impact models. This\
    \ indicates established governance structures (policies, lifecycle requirements)\
    \ that coordinate AI work across internal teams building AI applications. [1]\n\
    \nFinally, Vodafone describes a move toward standardized, scalable ways of delivering\
    \ AI-enabled capabilities through a \u201Chighly standardized service offering\u201D\
    \ intended for \u201Cglobal scale,\u201D explicitly pairing structure with agility;\
    \ and it describes an ambition toward an AI \u201Cframework\u201D and \u201Cfactory\
    \ approach\u201D enabling \u201Csystem integrations\u2026feasible at scale,\u201D\
    \ which supports the existence of collaborative workflows and shared platforms\
    \ that can coordinate AI initiatives across departments. [7][8]\n\nHowever, the\
    \ evidence stops short of demonstrating a fully integrated cross-functional AI\
    \ governance model with clear accountability and shared KPIs across departments.\
    \ While value capture ownership by the CFO is stated, there is no explicit evidence\
    \ of shared AI KPIs across functions, nor a clearly named enterprise AI governance\
    \ structure with defined membership/charter spanning departments in the provided\
    \ sources. Therefore, Vodafone best fits Score 4 (defined governance model and\
    \ collaborative workflows) rather than Score 5. [4][1]\n\nNote on signals: although\
    \ one signal claims a \u201Ctop-level AI Governance Board chaired by the CTO\u201D\
    \ and a \u201Cglobal responsible AI committee,\u201D signals are not accompanied\
    \ by auditable, Vodafone-specific primary-source citations in the provided evidence\
    \ pack; therefore, this assessment relies on the more directly verifiable provided\
    \ evidence describing cross-functional executive leadership, embedded genAI champions,\
    \ standardized offerings, and secure AI development requirements. [4][1][7][8]"
