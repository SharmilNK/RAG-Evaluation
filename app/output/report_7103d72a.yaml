- kpi_id: is_there_a_standardized_auditable_methodology_to_estimate_and_realize_roi_for_ai_ex_ante_and_ex_post
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "The provided evidence demonstrates that Vodafone can quantify ROI outcomes\
    \ for at least one AI-enabled marketing transformation, but it does not show a\
    \ standardized, auditable methodology that is consistently applied ex\u2011ante\
    \ and ex\u2011post across AI launches. [1]\n\nOn quantification of ROI outcomes\
    \ (ex\u2011post results): a third-party case-style write-up (from Writer) reports\
    \ specific financial outcomes tied to Vodafone/VOIS\u2019s marketing transformation\
    \ using Writer\u2019s platform, including \u201C333% ROI over three years,\u201D\
    \ \u201C$12.02 million net present value,\u201D \u201Cpayback in less than 6 months,\u201D\
    \ and quantified operational improvements such as \u201C50% reduction in agency\
    \ costs\u201D and \u201C200% improvement in marketing labor efficiency.\u201D\
    \ [1] These figures indicate that ROI can be calculated and communicated, but\
    \ the article does not describe the underlying calculation standard, governance\
    \ gates, or whether the ROI is measured consistently post-launch for most AI deployments.\
    \ [1]\n\nOn having a standardized methodology (templates, counterfactuals, confidence\
    \ ranges): the evidence does not document an enterprise-standard ROI template,\
    \ any requirement to include counterfactuals, or the use of confidence ranges\
    \ for ROI forecasts. [1] The same source includes a quote cautioning against trying\
    \ to produce \u201Cthe perfect business case in the perfect spreadsheet,\u201D\
    \ which suggests an iterative approach to adoption rather than a described standardized\
    \ financial methodology. [1]\n\nOn auditability and causal measurement (A/B testing,\
    \ diff-in-diff) and finance booking: none of the provided Vodafone-owned sources,\
    \ nor the Writer material, describes an audited ROI approach, the use of causal\
    \ inference methods, or a process where benefits are booked into finance systems\
    \ as verified savings or revenue uplift. [1][7] Vodafone\u2019s public AI Framework\
    \ focuses on ethics and responsible AI principles (e.g., transparency, accountability,\
    \ fairness, privacy/security, human rights), which is important governance, but\
    \ it is not an ROI estimation/realization methodology and does not establish auditable\
    \ ROI practices. [7]\n\nOn coverage across launches (\u226550% or \u226575% ex\u2011\
    post verification) and portfolio-level tracking: the evidence does not state what\
    \ percentage of AI launches have mandatory ex\u2011post impact reviews, nor does\
    \ it describe quarterly portfolio-level ROI tracking or forecast-versus-actual\
    \ variance management. [1][6] A Vodafone UK small-business advice article encourages\
    \ readers to \u201Ctest and refine\u201D and \u201Ccontinuously monitor\u201D\
    \ AI performance, but it is generic guidance and does not constitute evidence\
    \ of Vodafone Group\u2019s standardized, auditable ROI method for its own AI portfolio.\
    \ [6]\n\nGiven the presence of quantified ROI outcomes in at least one prominent\
    \ AI deployment (supporting that ROI is being estimated/measured in practice),\
    \ but the absence of evidence for standardized templates, counterfactual-based\
    \ evaluation, auditability, and broad ex\u2011post coverage, Vodafone best fits\
    \ Score 2 (Excel-style/one-off business case measurement with weak/undocumented\
    \ counterfactuals and limited evidence of systematic ex\u2011post requirements)\
    \ rather than Score 3 or higher. [1][7]"
