- kpi_id: how_well_is_delivery_aligned_with_applicable_ai_sector_regulations_during_rollout_and_operation_e_g_dpia_model_cards_dsars
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Vodafone shows clear evidence of defined governance, privacy-rights\
    \ processes, and internal AI development requirements that align delivery with\
    \ major regulatory expectations (notably GDPR-style controls), but the provided\
    \ evidence does not demonstrate quantified completeness (e.g., \u226580% of use\
    \ cases with artifacts pre\u2013go-live), multi-region obligations mapping, automated\
    \ evidence generation, or recent audit outcomes required for higher tiers. [1][5]\n\
    \nVodafone states it has defined requirements for internal AI application development\
    \ that include risk assessment, transparency, bias considerations, and human oversight\
    \ for high-impact models, which indicates at least a checklist-like gating approach\
    \ aligned to responsible AI and regulatory risk management expectations. [1] Vodafone\
    \ also describes an \u201Cend-to-end framework of controls\u201D where use cases\
    \ require approvals from security, privacy, and (where relevant) AI governance,\
    \ with sensitive/high-risk use cases also needing approval from a human-rights\
    \ perspective, which supports that compliance reviews are integrated into rollout\
    \ decisions rather than being purely post-build. [5]\n\nOn data subject rights\
    \ (DSAR-adjacent capabilities), Vodafone provides customers access to their data\
    \ through online and physical channels and indicates these channels can be used\
    \ to request deletion, correction, and data portability, with trained frontline\
    \ staff to respond to such requests; this is consistent with a defined DSAR process\
    \ in operation, even though the evidence does not explicitly name DSAR workflows,\
    \ timelines, or tooling. [5]\n\nVodafone also has publicly articulated AI principles\
    \ via its AI Framework (e.g., transparency and accountability; privacy and security;\
    \ ethics and fairness; human rights), and it links its approach to established\
    \ external guidance (e.g., EU Ethics Guidelines for Trustworthy AI and OECD transparency\
    \ concepts), which supports awareness of applicable regulatory/soft-law expectations\
    \ during AI deployment. [2][3][7] However, these sources are largely principles-focused\
    \ and do not provide concrete regulatory delivery artifacts such as DPIAs/records\
    \ of processing activities for AI use cases, model cards for sensitive systems,\
    \ or evidence-collection mechanisms in tools. [2][3][7]\n\nGiven the rubric, Vodafone\
    \ meets the characteristics of Score 3 most closely: it demonstrates risk assessment\
    \ requirements for internal AI development and describes customer processes aligned\
    \ to GDPR rights (access, deletion, correction, portability). [1][5] The evidence\
    \ is insufficient for Score 4 because it does not show multi-region obligation\
    \ mapping, does not report artifact completeness rates (e.g., \u226580% pre\u2013\
    go-live), and does not evidence systematic tooling that captures compliance artifacts\
    \ across use cases. [5][1] The evidence is also insufficient for Score 5 because\
    \ there is no support for continuous obligations monitoring, automatically generated\
    \ compliance evidence, or \u201Czero major findings\u201D from audits in the last\
    \ 12 months. [1][5]"
