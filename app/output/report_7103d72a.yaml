- kpi_id: strategy
  pillar: DB Imported
  type: rubric
  score: 3.4583333333333335
  confidence: 0.7
  rationale: "Overall, the Strategy KPI category demonstrates strong near-term execution\
    \ and use-case focus, but only moderate strategic maturity due to weak change\
    \ leadership and an underdeveloped long-term roadmap.\n\nAcross the drivers, a\
    \ clear pattern emerges: the organization is effective at choosing and delivering\
    \ high-impact AI initiatives quickly, and there is evidence of meaningful linkage\
    \ between growth/margin objectives and identified needs in at least part of the\
    \ strategic alignment assessment. This indicates a pragmatic, results-oriented\
    \ approach where prioritization and delivery discipline are strengths. However,\
    \ the category is internally inconsistent: strategic alignment is uneven (one\
    \ alignment lens is strong while another is materially weaker), suggesting the\
    \ strategy is not yet expressed as a single, consistently applied set of choices\
    \ and trade-offs across stakeholders, business units, or planning horizons.\n\n\
    The 3.5/5 Medium score and tier are justified by this split between \u201Cwhat\u201D\
    \ and \u201Chow.\u201D On the \u201Cwhat,\u201D performance is compelling: Use\
    \ Case Selection and Adoption Speed at 5.0 imply the portfolio is well targeted\
    \ and execution pathways are functioning. On the \u201Chow,\u201D performance\
    \ materially drags the category down: Trust and change management at 1.5 indicates\
    \ limited stakeholder buy-in mechanisms, insufficient communications/engagement,\
    \ or weak sponsorship\u2014factors that typically constrain scaling beyond early\
    \ wins. The Long-term AI Roadmap at 2.0 further explains why the overall tier\
    \ cannot be High: without a coherent multi-year direction (capabilities, operating\
    \ model, investment sequencing, and dependencies), current momentum is at risk\
    \ of remaining opportunistic rather than compounding into sustained advantage.\n\
    \nThe main leadership risk is that rapid adoption and strong use-case delivery\
    \ will outpace organizational alignment and trust, leading to fragmentation, local\
    \ optimization, and fatigue when scaling requires cross-functional process change\
    \ and governance. The next step is to convert short-term execution strength into\
    \ a durable strategic system: unify the strategic alignment story into one enterprise\
    \ narrative with explicit prioritization criteria, build a structured change and\
    \ stakeholder program (sponsorship, communications, enablement, feedback loops),\
    \ and translate the current pipeline into a sequenced 12\u201324+ month roadmap\
    \ that ties use cases to capability build (data, platform, skills) and measurable\
    \ business outcomes."
