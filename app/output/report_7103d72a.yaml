- kpi_id: is_the_firm_actively_shaping_ai_standards_and_regulation_via_consortia_position_papers_and_pilots
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Vodafone shows evidence of active contributions to AI-related standards/regulatory\
    \ discussions through identifiable public position-setting and direct contribution\
    \ to an EU expert process, but the provided evidence does not demonstrate formal\
    \ leadership roles (e.g., chairing) or clear influence on regulation beyond participation,\
    \ nor does it document standards/regulatory \u201Cpilots\u201D in a way that meets\
    \ the rubric\u2019s higher tiers. [2][5]\n\nVodafone publicly states it \u201C\
    contributed\u201D to the European Commission-related \u201CEthics Guidelines for\
    \ Trustworthy AI\u201D (published April 2019) and that this contribution informed\
    \ Vodafone\u2019s own AI Framework. [2] This is consistent with active engagement\
    \ (beyond passive membership) in a multi-stakeholder, policy-adjacent process,\
    \ aligning with the rubric\u2019s expectation of contributions such as papers/working\
    \ groups. [2]\n\nVodafone\u2019s AI Framework further commits the company to \u201C\
    proactively participate\u201D in \u201Cindustry coalitions and self-regulatory\
    \ bodies working on research, laws, regulations and ethical guidelines for AI,\u201D\
    \ explicitly naming the \u201CEU High Level Expert Group on AI\u201D as an example.\
    \ [5] This strengthens the case that Vodafone positions itself as an active participant\
    \ in AI governance/standards ecosystems, rather than merely observing. [5]\n\n\
    However, the evidence provided does not substantiate leadership roles or chair\
    \ positions in AI standards/regulatory bodies. [2][5] The materials also do not\
    \ provide a clearly described standards or regulatory pilot (i.e., a pilot explicitly\
    \ run under a standards body or intended to validate/shape a regulatory framework),\
    \ even though Vodafone notes it is \u201Cengaged in cross-industry forums\u201D\
