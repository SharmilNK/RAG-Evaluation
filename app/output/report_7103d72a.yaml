- kpi_id: is_the_ai_use_case_portfolio_actively_balanced_by_impact_feasibility_risk_and_time_to_value_with_stage_gates
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "Vodafone provides evidence of governance being designed into at least\
    \ one AI-enabled process, but the provided materials do not substantiate an actively\
    \ balanced, stage-gated AI use-case portfolio across impact, feasibility, risk,\
    \ and time-to-value. In a VOIS/Vodafone marketing transformation example, Vodafone\
    \ leaders describe building \u201Cgovernance frameworks, brand guidelines, and\
    \ approval workflows\u201D into AI processes \u201Cfrom day one,\u201D indicating\
    \ upfront control design and workflow discipline for that initiative. [1]\n\n\
    However, the evidence does not show a portfolio-level, multi-criteria prioritization\
    \ mechanism (e.g., a consistent scoring model spanning impact, feasibility/data\
    \ readiness, risk, and time-to-value) or recurring portfolio reviews with explicit\
    \ exit criteria for pilots. The Digital Workplace Group interview excerpt emphasizes\
    \ the need to align technology readiness, business priorities, and governance\
    \ to scale adoption, but it is framed as a leadership perspective on adoption\
    \ challenges rather than a documented stage-gate operating model with defined\
    \ thresholds, cadence, or portfolio balancing rules. [2]\n\nSignals indicate Vodafone\
    \ has formal corporate governance and an AI ethics governance model/framework,\
    \ which supports the existence of risk and oversight structures around AI generally.\
    \ [3][4][5] Nevertheless, these signals do not, on their own, demonstrate that\
    \ Vodafone actively balances its AI use-case portfolio via stage-gates across\
    \ the specified dimensions (impact, feasibility, risk, and time-to-value), nor\
    \ do they provide metrics like horizon mix targets, stage-gate pass rates, or\
    \ transparent kill rates required for higher tiers. [3][4][5]\n\nGiven the presence\
    \ of process-level governance/approval workflows in at least one AI program but\
    \ lack of evidence for systematic, portfolio-wide stage-gated balancing and rebalancing,\
