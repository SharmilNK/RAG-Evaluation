- kpi_id: what_business_visible_monitoring_exists_for_models_in_production_performance_drift_data_quality_incidents_and_who_sees_it
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Vodafone provides production ML monitoring capabilities as part of its\
    \ Vertex AI-based \u201CAI Booster\u201D platform, including automated drift/skew\
    \ detection and other compliance-related checks, indicating model health monitoring\
    \ beyond purely ad hoc user discovery. Vodafone states it has \u201Ccompletely\
    \ automated ML lifecycle compliance activities (drift / skew detection, explainability,\
    \ auditability, etc.) via reusable pipelines, containers, and managed services,\u201D\
    \ which directly evidences systematic monitoring for drift and related controls\
    \ in the production lifecycle. [1]\n\nHowever, the provided evidence does not\
    \ clearly demonstrate business-visible, role-based dashboards (i.e., what business\
    \ stakeholders can see), nor does it specify which audiences (business, risk,\
    \ operations) have access to monitoring views or how they consume them (dashboards\
    \ vs. reports vs. logs). The same source describes automation, guardrails, controls,\
    \ and approvals but does not mention business-facing dashboards, unified model\
    \ health views that include business KPIs, or who sees/owns those views. [1]\n\
    \nThe evidence supports the existence of explainability and auditability mechanisms,\
    \ but it does not confirm enterprise-grade incident monitoring workflows (alert-to-action),\
    \ SLA-bound response processes, or coverage levels across production models (e.g.,\
    \ \u226580% or 100% of critical models). Vodafone\u2019s description emphasizes\
    \ automated compliance activities, yet does not quantify model coverage, identify\
    \ named model owners, or document a workflow for incidents (detection \u2192 alerting\
    \ \u2192 triage \u2192 remediation/rollback) accessible to business and operational\
    \ roles. [1]\n\nOther provided materials discuss general corporate risk monitoring\
    \ and oversight (e.g., risk framework reporting to management committees and the\
    \ Board), but they are not specific to model-in-production monitoring (performance/drift/data\
    \ quality/incidents) and do not evidence business-visible model telemetry for\
    \ ML systems. Therefore, they do not materially increase the score for this KPI\
    \ beyond what is directly stated about the ML platform\u2019s drift/skew detection\
    \ and compliance automation. [6]\n\nGiven the clear evidence of automated drift/skew\
    \ detection (and related explainability/auditability) but missing evidence on\
    \ business-visible dashboards, business KPI monitoring, role-based access, alert-to-action\
    \ SLAs, and production coverage, Vodafone aligns best with a \u2018Medium\u2019\
    \ maturity level rather than \u2018Medium-High\u2019 or \u2018High\u2019. [1]"
