- kpi_id: is_ai_development_mainly_in_house_or_partnership_based_and_how_does_this_affect_risk_and_expertise
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone\u2019s AI development approach is best characterized as a build\u2013\
    buy\u2013partner model, with a clear emphasis on strategic partnerships while\
    \ also operating internal AI platforms and internal AI application development\
    \ practices. [2][3][4][8]\n\nOn the partnership-based side, Vodafone has publicly\
    \ articulated and executed multiple large, multi-year strategic alliances with\
    \ major technology providers, which indicates that a meaningful portion of its\
    \ AI capability (especially GenAI enablement and cloud AI infrastructure) is partnership-enabled\
    \ rather than purely home-grown. [2][8] Evidence includes a 10-year strategic\
    \ partnership with Microsoft with a stated $1.5bn investment and an early outcome\
    \ of rolling out 55,000 Microsoft Copilot seats across Vodafone (in conjunction\
    \ with Microsoft and KPMG). [2] Vodafone has also struck a 10-year \u201Cbillion+\u201D\
    \ deal with Google, and TM Forum highlights that Vodafone has built \u201Cdepth\
    \ of strategic technology partnerships\u2026 with Accenture, Google, and Microsoft\u201D\
    \ over the last 18 months. [8] This combination exceeds the rubric\u2019s requirement\
    \ for \u22653 strategic partners and supports a score above \u201CMedium.\u201D\
    \ [8]\n\nOn the in-house side, Vodafone presents internal AI platform elements\
    \ and internal AI application development controls, suggesting internal ownership\
    \ and technical capability beyond vendor-led pilots. [3][4] Google Cloud describes\
    \ \u201CVodafone\u2019s ML platform built on Vertex AI,\u201D including standardized\
    \ templates to accelerate ML adoption, indicating Vodafone has an internal ML\
    \ platform layer even if it is implemented on a hyperscaler\u2019s services rather\
    \ than fully proprietary infrastructure. [3] Vodafone\u2019s cybersecurity factsheet\
    \ further states that it integrates secure AI lifecycle practices into \u201C\
    strategic AI platforms and internally developed AI applications,\u201D and that\
    \ it has defined requirements for internal AI application development (risk assessment,\
    \ transparency, bias considerations, and human oversight for high-impact models).\
    \ [4] This shows internal governance and internal build capability that reduces\
    \ uncontrolled experimentation risk and supports institutional expertise development.\
    \ [4]\n\nThe partnership-heavy model creates explicit risk considerations (notably\
    \ dependency/lock-in and reliance on third-party LLMs), and Vodafone leadership\
    \ has acknowledged these risks and framed an architectural response focused on\
    \ openness and avoiding tight coupling. [5] Vodafone\u2019s CTO has \u201Cruled\
    \ out any development from scratch of an LLM,\u201D meaning Vodafone will rely\
    \ on third-party LLMs for generative AI. [5] At the same time, Vodafone emphasizes\
    \ controlling data placement and enabling interoperability across multiple LLM/hyperscaler\
    \ options, which is a risk-mitigation stance aligned to reducing lock-in and enabling\
    \ multi-vendor resilience. [5]\n\nVodafone also recognizes operational risk from\
    \ uncontrolled AI proliferation (\u201CAI sprawl\u201D) and stresses the need\
    \ for disciplined patterns/recipes and interoperability frameworks, while citing\
    \ its internal engineering talent (OSS experience paired with \u201Cdigital and\
    \ AI native\u201D talent). [7] This reinforces that Vodafone is not merely outsourcing\
    \ AI development: it is pairing internal domain engineering with partner ecosystems,\
    \ which increases the chance of building durable expertise while managing governance\
    \ and regulatory risk. [7]\n\nCount of strategic partners evidenced for this KPI\
    \ (named and directly relevant to AI capability build-out) includes at least four,\
    \ meeting the rubric threshold for a score of 4 and approaching the breadth expected\
    \ for 5, but without enough evidence here of multiple co-developed assets/IP sharing\
    \ at the level required for a \u201CHigh\u201D score. [2][3][8]\n1) Microsoft\
    \ (10-year strategic partnership; $1.5bn investment; Copilot rollout). [2]\n2)\
    \ Google (10-year \u201Cbillion+\u201D deal; ML platform on Vertex AI). [3][8]\n\
    3) Accenture (identified as a strategic technology partner in the last 18 months).\
    \ [8]\n4) Datatonic (Google Cloud AI partner instrumental in building reusable\
    \ MLOps templates and an open-source codebase component for Vodafone\u2019s MLOps\
    \ approach). [3]\n\nGiven the clear internal platform/governance signals plus\
    \ \u22653 strategic partners and joint/partner-enabled implementation evidence,\
    \ Vodafone fits the rubric for Score 4 (Medium-High). [3][4][8] A Score 5 is not\
    \ assigned because, within the provided evidence, long-term funding disclosure\
    \ beyond the Microsoft investment is not consistently documented, and explicit\
    \ co-development/IP sharing breadth (e.g., multiple co-developed assets, broad\
    \ patent/open-source proof directly tied to Vodafone\u2019s AI platform strategy)\
    \ is not sufficiently evidenced to meet the \u201CHigh\u201D threshold. [2][3][8]"
