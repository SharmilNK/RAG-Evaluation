- kpi_id: how_rigorous_is_partner_vendor_capability_assessment_security_compliance_quality_delivery_integration
  pillar: DB Imported
  type: rubric
  score: 4.0
  confidence: 0.7
  rationale: "Vodafone demonstrates a risk-based, multi-layer partner/vendor capability\
    \ assessment approach that spans security, compliance/ESG, and ongoing corrective-action\
    \ follow-up, which aligns best to the rubric\u2019s \u201Crisk-based assessments\u201D\
    \ and \u201Cred teaming\u201D expectations for a Medium-High score. Vodafone states\
    \ that supplier lifecycle controls are embedded to \u201Cset requirements, assess\
    \ risk and monitor each supplier\u2019s security performance,\u201D including\
    \ determining each supplier\u2019s inherent risk based on the service being provided\
    \ and using a questionnaire-based control assessment to determine residual risk,\
    \ which then sets a review frequency \u201Cfrom annual to every three years.\u201D\
    \ [1][2]\n\nOn the security rigor dimension specifically, Vodafone explicitly\
    \ references red teaming performed by external specialists to uncover areas for\
    \ improvement, evidencing advanced adversarial testing practices rather than only\
    \ checklist-based onboarding. [3] While this red teaming statement is made in\
    \ the context of Vodafone\u2019s own security controls, it is still directly relevant\
    \ to the KPI\u2019s assessment-rigor standard because it evidences the organization\u2019\
    s use of adversarial assurance methods as part of its broader control validation\
    \ approach. [3]\n\nFor supplier oversight in security, Vodafone describes concrete\
    \ mechanisms beyond informal selection: minimum security requirements are written\
    \ into supplier contracts at onboarding, suppliers are risk-rated based on the\
    \ service, and then control effectiveness is evaluated (questionnaire) to establish\
    \ residual risk and drive a defined reassessment cadence (annual to every three\
    \ years). [2] Vodafone also states it follows up on \u201Copen actions\u201D and\
    \ tracks and manages supplier security incidents, which is consistent with corrective\
    \ actions being tracked rather than a one-time evaluation. [2]\n\nFor compliance/quality-type\
    \ supplier capability assessment (ethical, labour, environmental standards), Vodafone\
    \ documents that supplier requirements are \u201Cbacked up by risk assessments,\
    \ audits and operational improvement processes\u201D and are \u201Cunderpinned\
    \ by binding contractual commitments.\u201D [4][5] Vodafone further describes\
    \ detailed supplier compliance assessments against its Code of Ethical Purchasing\
    \ that \u201Cmay involve an on-site audit,\u201D including audits conducted via\
    \ the telecom industry\u2019s Joint Audit Cooperation (JAC). [4][5] Where suppliers\
    \ do not meet standards, Vodafone provides a \u201Ccorrective action plan\u201D\
    \ and requires suppliers to submit evidence of completion, indicating a remediation\
    \ workflow rather than merely identifying gaps. [4][5]\n\nVodafone also evidences\
    \ structured scoring/weighting in supplier evaluation processes: it introduced\
    \ \u201Ca 20% weighting for environmental and social criteria\u201D in RFQ supplier\
    \ evaluation criteria, and notes that the assessment \u201Cawards positive scoring\u201D\
    \ for specific supplier capabilities (e.g., science-based targets, product-specific\
    \ CO2 data). [6] This supports that Vodafone uses more formalized scoring elements\
    \ (at least for ESG-related criteria) rather than only qualitative or reference-based\
    \ selection. [6]\n\nVodafone provides explicit evidence of audit activity volume\
    \ for supplier site assessments: in FY21, \u201C76 site assessments were conducted\
    \ (either by Vodafone or through JAC).\u201D [5] This supports the rubric requirement\
    \ of conducting at least one vendor audit per year and suggests a systematic audit\
    \ program rather than ad hoc assessments. [5]\n\nHowever, the evidence does not\
    \ fully support a Score 5 because it does not demonstrate an \u201Cintegrated,\
    \ continuous assessment\u201D across vendors with performance-based contracting\
    \ and consistent year-over-year vendor improvements. [2][5] The evidence also\
    \ does not explicitly confirm that Vodafone audits \u201C\u22653 critical vendors\u201D\
    \ per year specifically (the site-assessment count is not explicitly tied to \u201C\
    critical vendors\u201D), nor does it describe vendor-specific red teaming or continuous\
    \ monitoring instrumentation beyond periodic review cycles. [2][5]\n\nOverall,\
    \ Vodafone\u2019s documented practices exceed a basic checklist approach and show\
    \ risk-based supplier security assessments with defined review frequency, contractual\
    \ security requirements, incident/action tracking, substantial audit activity,\
    \ structured scoring elements in supplier evaluation, and corrective action plans\
    \ with evidence submission. [2][4][5][6] These map most closely to the rubric\u2019\
    s Score 4 (Medium-High) requirements, with some but not all elements needed for\
    \ Score 5. [2][5]"
