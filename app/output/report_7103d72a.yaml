- kpi_id: total_number_of_documented_ai_use_cases_implemented_by_the_company
  pillar: DB Imported
  type: rubric
  score: 2.0
  confidence: 0.7
  rationale: "## KPI focus and evidence validity\nThe KPI is the **total number of\
    \ documented AI use cases implemented by Vodafone Group plc**. The most directly\
    \ relevant structured signal available is **\u201CNumber of AI use cases with\
    \ quantitative impact since 2023: 11\u201D**, which explicitly counts AI use cases\
    \ and is therefore used as the primary basis for scoring. [1]\n\nSeveral provided\
    \ evidence chunks were discarded for KPI counting because they either (a) are\
    \ not about Vodafone (e.g., Accenture content shown is about other companies such\
    \ as Poste Italiane and the NFL), or (b) describe AI capability/intent without\
    \ giving a count of implemented use cases. [2][3]\n\n## Count of documented, implemented\
    \ AI use cases\nUsing the provided signal, Vodafone has **11 documented AI use\
    \ cases (with quantitative impact since 2023)**. [1]\n\nBecause the rubric thresholds\
    \ are based on **counts of use cases**, and the only explicit, use-case-specific\
    \ count provided is **11**, Vodafone falls in the **6\u201315 use cases** band.\
    \ [1]\n\n## Rubric mapping to score\n- The rubric defines **Score 2** as **6\u2013\
    15 use cases**. [1]\n- Vodafone\u2019s documented count is **11**, which is within\
    \ this band. [1]\n\n## Context from supporting evidence (not used to increase\
    \ the count)\nVodafone\u2019s own H1 FY26 materials describe multiple generative-AI\
    \ deployments embedded in operations (e.g., call-centre agent assist in Germany,\
    \ GenAI virtual assistants TOBi/SuperTOBi across European markets, an autonomous\
    \ procurement portal, and the \u201CVodafone AI Booster platform\u201D), demonstrating\
    \ real implementation but **not providing a consolidated total number of use cases**\
    \ across the enterprise. [4]\n\nVodafone also publicly states it is using AI in\
    \ customer service via its TOBi chatbot, in radio access networks for capacity/energy\
    \ optimisation, and via a big-data team applying AI for business insights; however,\
    \ these statements again do **not quantify** total implemented AI use cases, so\
    \ they cannot be reliably converted into a higher use-case count for this KPI.\
    \ [5]\n\n## Final assessment\nGiven the explicit documented count of **11 AI use\
    \ cases** (with quantitative impact since 2023), Vodafone is assessed at **Score\
    \ 2 (Low-Medium)** for this KPI. [1]\n\n## Evidence gap / conservatism note\n\
    Vodafone likely has more AI use cases than the 11 counted here, but the provided\
    \ materials do not include a comprehensive inventory of implemented AI use cases.\
    \ Therefore, the scoring remains conservative and anchored to the only explicit\
    \ use-case count in the inputs. [1][4][5]"
