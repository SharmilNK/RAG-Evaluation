- kpi_id: has_the_company_appointed_an_executive_or_function_dedicated_to_ai_ethics_and_risk
  pillar: DB Imported
  type: rubric
  score: 3.0
  confidence: 0.7
  rationale: "Vodafone has publicly documented an AI ethics approach through a formal\
    \ \u201CVodafone Artificial Intelligence (AI) Framework,\u201D which sets out\
    \ principles such as transparency and accountability, ethics and fairness, privacy\
    \ and security, and human rights considerations for AI systems it creates and\
    \ uses. [1]\n\nBeyond principles, Vodafone also describes concrete risk-related\
    \ expectations for internal AI application development, including \u201Crisk assessment,\u201D\
    \ designing for \u201Ctransparency,\u201D \u201Clack of bias,\u201D and \u201C\
    human oversight,\u201D with a requirement that where an AI model could have a\
    \ \u201Chigh impact on people,\u201D a human must have input on the final decision.\
    \ [2]\n\nHowever, the provided evidence does not clearly show that Vodafone has\
    \ appointed a specific executive or named role/function whose primary remit is\
    \ AI ethics and AI risk (e.g., a Head of Responsible AI, AI Ethics Officer, or\
    \ equivalent). [1][2]\n\nThe evidence also does not demonstrate several higher-tier\
    \ governance elements that would indicate a more mature, central Responsible AI\
    \ function\u2014such as explicit review gates across the model lifecycle, a model\
    \ register, or a structured and described staff training program specifically\
    \ for Responsible AI (as distinct from general awareness). While Vodafone references\
    \ an \u201Cawareness programme\u201D and policy updates about what data employees\
    \ must not share with public AI applications, this is framed as guidance on secure/responsible\
    \ use of public AI tools rather than documentation of a dedicated AI ethics/risk\
    \ executive function. [2]\n\nGiven the existence of a published AI framework and\
    \ described internal AI risk expectations (supporting at least a \u201Cdedicated\
    \ lead or committee\u201D level of maturity), but the lack of explicit evidence\
    \ of an appointed executive/function dedicated to AI ethics and risk and lack\
    \ of evidence for model registers/review gates/independent oversight, Vodafone\
    \ best fits the rubric\u2019s Score 3 (Medium). [1][2]"
