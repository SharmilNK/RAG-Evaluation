kpi_definitions:
- kpi_id: what_is_the_maturity_of_the_companies_ai_strategy_1
  name: Strategic alignment- aligning growth and margin strategy to needs.
  pillar: Strategy
  type: rubric
  question: Does the company have an AI strategy?
  rubric:
  - '1: AI used sporadically, no formal strategy, limited business alignment.'
  - '2: Standalone AI projects, emerging roadmap, early data efforts but not integrated
    organization-wide.'
  - '3: Defined AI strategy aligned to business, cross-functional teams, enterprise
    data management, basic governance.'
  - '4: AI scaled across functions, mature data and ML platforms, KPIs tracked, workforce
    skilled, formal ethics.'
  - '5: AI is core to business model, continuous optimization, differentiated innovation,
    automated governance, and measurable impact.'
  quant_rule: null
  evidence_requirements: null
- kpi_id: evidence_of_ai_initiatives_with_reported_impact_on_key_metrics_efficiency_cx_cost_or_revenue_2
  name: Strategic alignment- aligning growth and margin strategy to needs.
  pillar: Strategy
  type: rubric
  question: Percentage of AI initiatives with outcomes tied to measurable business
    KPIs.
